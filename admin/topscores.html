<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON ARCADE — Top Scores</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:#0a0a12;font-family:'Rajdhani',sans-serif;color:#fff}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);z-index:9999}
.header{text-align:center;padding:40px 20px 20px}
.header h1{font-family:'Orbitron',monospace;font-weight:900;font-size:28px;letter-spacing:6px;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.6),0 0 40px rgba(255,215,0,0.2)}
.header .sub{font-weight:300;font-size:14px;letter-spacing:3px;color:#7a7a9a;text-transform:uppercase;margin-top:8px}
.back-link{display:inline-block;margin:10px 20px;font-family:'Rajdhani',sans-serif;font-size:14px;color:#7a7a9a;text-decoration:none;letter-spacing:2px}
.back-link:hover{color:#00f0ff}
.controls{display:flex;justify-content:center;gap:12px;padding:10px 20px 20px;flex-wrap:wrap}
.controls input{font-family:'Rajdhani',sans-serif;font-size:14px;padding:8px 16px;background:rgba(255,255,255,0.05);border:1px solid #222;color:#fff;border-radius:3px;width:240px;letter-spacing:1px}
.controls input::placeholder{color:#7a7a9a}
.controls select{font-family:'Rajdhani',sans-serif;font-size:14px;padding:8px 12px;background:#12121f;border:1px solid #222;color:#8888aa;border-radius:3px;cursor:pointer}
.loading{text-align:center;padding:60px;color:#7a7a9a;font-size:16px;letter-spacing:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding:0 20px 40px;max-width:1400px;margin:0 auto}
.game-board{background:#12121f;border:1px solid #1a1a2e;border-radius:6px;overflow:hidden;transition:border-color 0.2s}
.game-board:hover{border-color:#00f0ff33}
.game-board .title-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #1a1a2e}
.game-board .title-bar h2{font-family:'Orbitron',monospace;font-weight:700;font-size:13px;letter-spacing:2px;color:#00f0ff;text-shadow:0 0 8px rgba(0,240,255,0.3)}
.game-board .title-bar .count{font-size:12px;color:#7a7a9a;letter-spacing:1px}
.score-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.02);gap:12px}
.score-row:last-child{border-bottom:none}
.score-row .rank{font-family:'Orbitron',monospace;font-weight:700;font-size:14px;width:28px;text-align:center}
.rank-1{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.4)}
.rank-2{color:#c0c0c0;text-shadow:0 0 6px rgba(192,192,192,0.3)}
.rank-3{color:#cd7f32;text-shadow:0 0 6px rgba(205,127,50,0.3)}
.rank-n{color:#7a7a9a}
.score-row .name{font-family:'Orbitron',monospace;font-weight:400;font-size:13px;letter-spacing:2px;color:#8888aa;flex:0 0 auto}
.score-row .score{font-family:'Orbitron',monospace;font-weight:700;font-size:14px;color:#00f0ff;text-shadow:0 0 6px rgba(0,240,255,0.3);margin-left:auto}
.score-row .time{font-size:11px;color:#7a7a9a;letter-spacing:1px;flex:0 0 auto;min-width:80px;text-align:right}
.empty{padding:20px 16px;color:#7a7a9a;font-size:13px;text-align:center;letter-spacing:1px}
.totals{text-align:center;padding:20px;color:#7a7a9a;font-size:13px;letter-spacing:2px}
</style>
</head>
<body>
<a href="/admin/stats.html" class="back-link">STATS &#8594;</a>
<a href="/" class="back-link">&#8592; HUB</a>
<div class="header">
  <h1>TOP SCORES</h1>
  <div class="sub">Global leaderboards for all games</div>
</div>
<div class="controls">
  <input type="text" id="search" placeholder="Filter games...">
  <select id="sort">
    <option value="name">Sort: A-Z</option>
    <option value="entries">Sort: Most Entries</option>
    <option value="top">Sort: Highest Score</option>
  </select>
</div>
<div class="loading" id="loading">LOADING LEADERBOARDS...</div>
<div class="grid" id="grid" style="display:none"></div>
<div class="totals" id="totals"></div>

<script>
(function() {
  var GAMES = [
    'afterglow','breakout-architect','burndown','catalyst','chromaself','curfew',
    'doodle-drop','faultline','flappy-rewind','gridlock','impostor-pixel',
    'mine-finder','minesweeper','minisudoku','neon-snake','neurosort',
    'pacman-amnesia','palette','pong-both-sides','priorself','queens',
    'reflex-chain','signal','split-second','sudoku','territory',
    'tetris-betrayal','truecolor','wordchain','wordchain-duel','mathblitz'
  ];

  var boards = {};
  var loaded = 0;

  function timeAgo(ts) {
    var diff = Date.now() - ts;
    var mins = Math.floor(diff / 60000);
    var hours = Math.floor(diff / 3600000);
    var days = Math.floor(diff / 86400000);
    if (days > 0) return days + (days === 1 ? ' day ago' : ' days ago');
    if (hours > 0) return hours + (hours === 1 ? ' hr ago' : ' hrs ago');
    if (mins > 0) return mins + (mins === 1 ? ' min ago' : ' mins ago');
    return 'just now';
  }

  // Escape text for safe DOM insertion
  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function fetchAll() {
    GAMES.forEach(function(game) {
      fetch('/api/leaderboard/' + game)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          boards[game] = data.leaderboard || [];
        })
        .catch(function() {
          boards[game] = [];
        })
        .finally(function() {
          loaded++;
          if (loaded >= GAMES.length) render();
        });
    });
  }

  function render() {
    document.getElementById('loading').style.display = 'none';
    var grid = document.getElementById('grid');
    grid.style.display = '';
    grid.innerHTML = '';

    var search = document.getElementById('search').value.toLowerCase();
    var sort = document.getElementById('sort').value;

    var entries = Object.keys(boards).map(function(g) {
      return { game: g, lb: boards[g] };
    });

    if (search) {
      entries = entries.filter(function(e) { return e.game.indexOf(search) !== -1; });
    }

    if (sort === 'entries') {
      entries.sort(function(a, b) { return b.lb.length - a.lb.length; });
    } else if (sort === 'top') {
      entries.sort(function(a, b) {
        var sa = a.lb.length ? a.lb[0].score : 0;
        var sb = b.lb.length ? b.lb[0].score : 0;
        return sb - sa;
      });
    } else {
      entries.sort(function(a, b) { return a.game.localeCompare(b.game); });
    }

    var totalEntries = 0;
    var totalGames = 0;

    entries.forEach(function(e) {
      totalGames++;
      totalEntries += e.lb.length;

      var card = document.createElement('div');
      card.className = 'game-board';

      var titleBar = document.createElement('div');
      titleBar.className = 'title-bar';
      var h2 = document.createElement('h2');
      h2.textContent = e.game.toUpperCase().replace(/-/g, ' ');
      var countSpan = document.createElement('span');
      countSpan.className = 'count';
      countSpan.textContent = e.lb.length + ' ENTRIES';
      titleBar.appendChild(h2);
      titleBar.appendChild(countSpan);
      card.appendChild(titleBar);

      if (e.lb.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No scores yet';
        card.appendChild(empty);
      } else {
        e.lb.forEach(function(entry, i) {
          var row = document.createElement('div');
          row.className = 'score-row';

          var rankSpan = document.createElement('span');
          rankSpan.className = 'rank ' + (i < 3 ? 'rank-' + (i + 1) : 'rank-n');
          rankSpan.textContent = i + 1;

          var nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = entry.name || '???';

          var scoreSpan = document.createElement('span');
          scoreSpan.className = 'score';
          scoreSpan.textContent = entry.score.toLocaleString();

          var timeSpan = document.createElement('span');
          timeSpan.className = 'time';
          timeSpan.textContent = timeAgo(entry.ts);

          row.appendChild(rankSpan);
          row.appendChild(nameSpan);
          row.appendChild(scoreSpan);
          row.appendChild(timeSpan);
          card.appendChild(row);
        });
      }

      grid.appendChild(card);
    });

    document.getElementById('totals').textContent =
      totalGames + ' GAMES  /  ' + totalEntries + ' TOTAL ENTRIES';
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('sort').addEventListener('change', render);

  fetchAll();
})();
</script>
</body>
</html>
