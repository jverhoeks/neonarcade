<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* --- SCANLINE OVERLAY --- */

  #game-wrapper {

  /* --- HEADER / HUD --- */
  #hud {

    width: min(90vw, 500px);

  }

  .hud-block {
    display: flex;
    flex-direction: column;

  }

  .hud-label {
    font-family: 'Rajdhani', sans-serif;

  /* --- CANVAS --- */
  #game-canvas {
    border: 1px solid rgba(0,240,255,0.15);

  /* --- LEGEND --- */

  }

  #gameover-overlay h2 {

    text-shadow: 0 0 20px rgba(255,45,123,0.5);
  }

  .overlay .sub {
    font-family: 'Rajdhani', sans-serif;

  #final-score {

  .play-btn {

    background: rgba(0,240,255,0.06);
    color: var(--neon-cyan);

  }

  .play-btn:hover {

  .play-btn:active {

  .controls-hint {

  /* score pop particles */
  .score-pop {
    position: absolute;
    font-family: 'Orbitron', monospace;

    animation: scoreFly 0.7s ease-out forwards;
  }

  .score-pop.easy-pop {
    color: var(--neon-green);
    text-shadow: 0 0 10px rgba(57,255,20,0.7);
  }

  .score-pop.hard-pop {
    color: var(--neon-gold);
    text-shadow: 0 0 10px rgba(255,215,0,0.7);
    font-size: 26px;
  }

  @keyframes scoreFly {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
  }

  .score-table {
    margin: 16px auto;
    max-width: 320px;
    font-family: 'Rajdhani', sans-serif;
  }

  /* screen shake */
  @keyframes shake {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(2px, -3px); }
    60% { transform: translate(-2px, 1px); }
    80% { transform: translate(1px, -2px); }
  }

  .shake {
    animation: shake 0.25s ease;
  }
</style>

<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="cur-score" class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score-val">0</span>

      <span class="hud-value" id="best-val">0</span>

  </div>

  <div style="position:relative; display:inline-block;">
    <canvas id="game-canvas"></canvas>

    <div id="start-overlay" class="overlay visible">
      <h2>NEON SNAKE</h2>

  </div>

  <div id="legend">
    <div class="legend-item"><span class="legend-dot easy"></span>EASY +10 (+1)</div>
    <div class="legend-item"><span class="legend-dot hard"></span>HARD +50 (+3)</div>
  </div>

<script src="/neon.js"></script>
<script>
(() => {
  // --- CONFIG ---
  const GRID = 20;
  const BASE_SPEED = 120;        // ms per tick at start
  const MIN_SPEED = 55;          // fastest possible
  const SPEED_DECAY = 0.997;     // multiplier each tick
  const EASY_PTS = 10;
  const HARD_PTS = 50;
  const EASY_GROW = 1;
  const HARD_GROW = 3;

  // --- ELEMENTS ---
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score-val');
  const bestEl = document.getElementById('best-val');
  const startOverlay = document.getElementById('start-overlay');
  const gameoverOverlay = document.getElementById('gameover-overlay');
  const finalScoreEl = document.getElementById('final-score');
  const newBestEl = document.getElementById('new-best');
  const wrapper = document.getElementById('game-wrapper');

  // --- SIZING ---
  let cols, rows, cellSize;

  function resize() {
    const maxW = Math.min(window.innerWidth * 0.92, 500);
    const maxH = Math.min(window.innerHeight * 0.65, 500);
    const maxCell = Math.floor(Math.min(maxW, maxH) / GRID);
    cellSize = Math.max(maxCell, 12);
    cols = GRID;
    rows = GRID;
    canvas.width = cols * cellSize;
    canvas.height = rows * cellSize;
  }

  resize();
  window.addEventListener('resize', () => { resize(); draw(); });

  // --- STATE ---
  let snake, dir, nextDir, score, highScore, growQueue;
  let easyFood, hardFood;
  let gameRunning, gameOver, speed, tickTimer;
  let particles = [];
  let trail = [];

  Neon.init({ game: 'neon-snake', mode: 'high' });
  highScore = Neon.getHighScore();
  bestEl.textContent = highScore;

  function init() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    growQueue = 0;
    speed = BASE_SPEED;
    particles = [];
    trail = [];
    scoreEl.textContent = '0';
    placeFood('easy');
    placeFood('hard');
    gameRunning = true;
    gameOver = false;
  }

  function isCellOccupied(x, y) {
    if (snake.some(s => s.x === x && s.y === y)) return true;
    if (easyFood && easyFood.x === x && easyFood.y === y) return true;
    if (hardFood && hardFood.x === x && hardFood.y === y) return true;
    return false;
  }

  function placeFood(type) {
    let x, y, attempts = 0;
    const WALL_ZONE = 2; // cells from edge considered "wall zone"
    do {
      if (type === 'hard') {
        // spawn within 2 cells of any wall
        const side = Math.floor(Math.random() * 4);
        if (side === 0)      { x = Math.floor(Math.random() * WALL_ZONE); y = Math.floor(Math.random() * rows); }
        else if (side === 1) { x = cols - 1 - Math.floor(Math.random() * WALL_ZONE); y = Math.floor(Math.random() * rows); }
        else if (side === 2) { y = Math.floor(Math.random() * WALL_ZONE); x = Math.floor(Math.random() * cols); }
        else                 { y = rows - 1 - Math.floor(Math.random() * WALL_ZONE); x = Math.floor(Math.random() * cols); }
      } else {
        // easy: spawn in the inner area, away from walls
        x = WALL_ZONE + Math.floor(Math.random() * (cols - WALL_ZONE * 2));
        y = WALL_ZONE + Math.floor(Math.random() * (rows - WALL_ZONE * 2));
      }
      attempts++;
    } while (isCellOccupied(x, y) && attempts < 500);
    if (type === 'easy') easyFood = { x, y };
    else hardFood = { x, y };
  }

  // --- PARTICLES ---
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const vel = 1 + Math.random() * 3;
      particles.push({
        x: x * cellSize + cellSize / 2,
        y: y * cellSize + cellSize / 2,
        vx: Math.cos(angle) * vel,
        vy: Math.sin(angle) * vel,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        color,
        size: 2 + Math.random() * 3,
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // --- SCORE POP ---
  function showScorePop(gridX, gridY, pts, type) {
    const canvasRect = canvas.getBoundingClientRect();
    const wrapperRect = canvas.parentElement.getBoundingClientRect();
    const px = gridX * cellSize + cellSize / 2 + (canvasRect.left - wrapperRect.left);
    const py = gridY * cellSize + (canvasRect.top - wrapperRect.top);
    const el = document.createElement('div');
    el.className = `score-pop ${type === 'easy' ? 'easy-pop' : 'hard-pop'}`;
    el.textContent = `+${pts}`;
    el.style.left = px + 'px';
    el.style.top = py + 'px';
    canvas.parentElement.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }

  // --- GAME LOOP ---
  function tick() {
    if (!gameRunning) return;

    dir = { ...nextDir };

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      die();
      return;
    }

    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      die();
      return;
    }

    snake.unshift(head);

    // trail ghost
    trail.push({ x: head.x, y: head.y, life: 1 });

    // check food
    let ate = null;
    if (easyFood && head.x === easyFood.x && head.y === easyFood.y) {
      ate = 'easy';
      score += EASY_PTS;
      growQueue += EASY_GROW;
      spawnParticles(head.x, head.y, 'rgba(57,255,20,', 8);
      showScorePop(head.x, head.y, EASY_PTS, 'easy');
      easyFood = null;
      hardFood = null;
      placeFood('easy');
      placeFood('hard');
    } else if (hardFood && head.x === hardFood.x && head.y === hardFood.y) {
      ate = 'hard';
      score += HARD_PTS;
      growQueue += HARD_GROW;
      spawnParticles(head.x, head.y, 'rgba(255,215,0,', 14);
      showScorePop(head.x, head.y, HARD_PTS, 'hard');
      easyFood = null;
      hardFood = null;
      placeFood('easy');
      placeFood('hard');
    }

    if (ate) {
      scoreEl.textContent = score;
      scoreEl.classList.add('pop');
      setTimeout(() => scoreEl.classList.remove('pop'), 120);
    }

    if (growQueue > 0) {
      growQueue--;
    } else {
      snake.pop();
    }

    // speed up: hard food gives a bigger speed boost
    if (ate === 'hard') {
      speed = Math.max(MIN_SPEED, speed * 0.92);
    } else if (ate === 'easy') {
      speed = Math.max(MIN_SPEED, speed * 0.97);
    }
    speed = Math.max(MIN_SPEED, speed * SPEED_DECAY);

    updateParticles();
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life -= 0.06;
      if (trail[i].life <= 0) trail.splice(i, 1);
    }

    draw();
    tickTimer = setTimeout(tick, speed);
  }

  function die() {
    gameRunning = false;
    gameOver = true;
    canvas.classList.add('shake');
    setTimeout(() => canvas.classList.remove('shake'), 250);

    // head explosion
    spawnParticles(snake[0].x, snake[0].y, 'rgba(255,45,123,', 20);

    finalScoreEl.textContent = score;

    // Prompt for name if first time, then save
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      highScore = Neon.getHighScore();
      bestEl.textContent = highScore;
      newBestEl.textContent = result.isNewBest ? 'NEW BEST!' : '';
      Neon.render(document.querySelector('.score-table'));

      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }

      setTimeout(() => {
        draw();
        gameoverOverlay.classList.add('visible');
      }, 400);
    });
  }

  // --- DRAW ---
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= cols; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cellSize, 0);
      ctx.lineTo(x * cellSize, rows * cellSize);
      ctx.stroke();
    }
    for (let y = 0; y <= rows; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellSize);
      ctx.lineTo(cols * cellSize, y * cellSize);
      ctx.stroke();
    }

    // trail
    for (const t of trail) {
      ctx.fillStyle = `rgba(0,240,255,${t.life * 0.06})`;
      ctx.fillRect(t.x * cellSize, t.y * cellSize, cellSize, cellSize);
    }

    // snake body
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / snake.length;
      const pad = 1;

      if (i === 0) {
        // head - brighter
        ctx.fillStyle = '#00f0ff';
        ctx.shadowColor = 'rgba(0,240,255,0.8)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.roundRect(
          s.x * cellSize + pad,
          s.y * cellSize + pad,
          cellSize - pad * 2,
          cellSize - pad * 2,
          3
        );
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        const fade = 0.4 + 0.6 * (1 - t);
        ctx.fillStyle = `rgba(0,200,220,${fade})`;
        ctx.fillRect(
          s.x * cellSize + pad,
          s.y * cellSize + pad,
          cellSize - pad * 2,
          cellSize - pad * 2
        );
      }
    }

    // easy food
    if (easyFood) {
      const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.005);
      const ex = easyFood.x * cellSize + cellSize / 2;
      const ey = easyFood.y * cellSize + cellSize / 2;
      const r = (cellSize / 2 - 2) * pulse;

      ctx.shadowColor = 'rgba(57,255,20,0.7)';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#39ff14';
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // hard food
    if (hardFood) {
      const pulse = 0.75 + 0.25 * Math.sin(Date.now() * 0.008);
      const hx = hardFood.x * cellSize + cellSize / 2;
      const hy = hardFood.y * cellSize + cellSize / 2;
      const r = (cellSize / 2 - 1) * pulse;

      // outer glow
      ctx.shadowColor = 'rgba(255,215,0,0.9)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(hx, hy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // inner diamond
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      const ir = r * 0.35;
      ctx.beginPath();
      ctx.moveTo(hx, hy - ir);
      ctx.lineTo(hx + ir, hy);
      ctx.lineTo(hx, hy + ir);
      ctx.lineTo(hx - ir, hy);
      ctx.closePath();
      ctx.fill();
    }

    // particles
    for (const p of particles) {
      ctx.fillStyle = p.color + p.life + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // draw initial state
  function drawIdle() {
    init();
    gameRunning = false;
    draw();
  }

  drawIdle();

  // --- INPUT ---
  function setDirection(dx, dy) {
    // prevent 180 turn
    if (dir.x === -dx && dir.y === -dy) return;
    // prevent queuing same direction
    if (nextDir.x === dx && nextDir.y === dy) return;
    nextDir = { x: dx, y: dy };
  }

  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;

    // start/restart with space
    if (e.code === 'Space') {
      e.preventDefault();
      if (!gameRunning && !gameOver) {
        startGame();
      } else if (gameOver) {
        restartGame();
      }
      return;
    }

    const key = e.key.toLowerCase();
    switch (key) {
      case 'arrowup': case 'w': e.preventDefault(); setDirection(0, -1); break;
      case 'arrowdown': case 's': e.preventDefault(); setDirection(0, 1); break;
      case 'arrowleft': case 'a': e.preventDefault(); setDirection(-1, 0); break;
      case 'arrowright': case 'd': e.preventDefault(); setDirection(1, 0); break;
    }
  });

  // touch / swipe
  let touchStartX, touchStartY;

  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    if (touchStartX === undefined) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    if (Math.max(absDx, absDy) < 15) {
      // tap - start or restart
      if (!gameRunning && !gameOver) startGame();
      else if (gameOver) restartGame();
      return;
    }

    if (absDx > absDy) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
  });

  // buttons
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('retry-btn').addEventListener('click', restartGame);

  function startGame() {
    startOverlay.classList.remove('visible');
    init();
    tickTimer = setTimeout(tick, speed);
  }

  function restartGame() {
    gameoverOverlay.classList.remove('visible');
    clearTimeout(tickTimer);
    init();
    draw();
    tickTimer = setTimeout(tick, speed);
  }

  // keep particles/food animating during idle
  function renderLoop() {
    if (!gameRunning && !gameOver) {
      draw();
    } else if (gameOver) {
      updateParticles();
      draw();
    }
    requestAnimationFrame(renderLoop);
  }
  requestAnimationFrame(renderLoop);
})();
</script>
</body>
</html>
