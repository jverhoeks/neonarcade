<script src="/neon.js"></script>
<script>
(() => {
  Neon.init({ game: 'signal', mode: 'high' });

  const ROUNDS = 5;
  const ROUND_TIMES = [60, 50, 45, 35, 30];
  const HINT1_TIME = 10;
  const HINT2_TIME = 30;
  const STORAGE_DAILY = 'signal_daily';

  const EASY_MESSAGES = [
    "PIZZA", "SLOTH", "GHOST", "TACOS", "SHARK",
    "CHAOS", "SNACK", "COUCH", "CLOUD", "SLEEP",
    "BRAIN", "VIBES", "PIXEL", "KARMA", "TOAST"
  ];

  const MEDIUM_MESSAGES = [
    "PENGUIN", "PIGEON", "COFFEE", "POTATO", "WIZARD",
    "ZOMBIE", "DRAGON", "CACTUS", "GOBLIN", "AVOCADO",
    "BANANA", "HAUNTED", "CRYPTIC", "PHANTOM", "VOLTAGE"
  ];

  const HARD_MESSAGES = [
    "HOLOGRAM", "BLACKHOLE", "ALGORITHM", "AUTOPILOT", "INVISIBLE",
    "FREQUENCY", "DIMENSION", "EVOLUTION", "JELLYFISH", "OBSIDIAN",
    "ENCRYPTED", "MAGNITUDE", "LABYRINTH", "TURBULENT", "SYNTHETIC"
  ];

  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTypeClick() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(800 + Math.random() * 400, audioCtx.currentTime);
    g.gain.setValueAtTime(0.03, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.05);
  }

  function playSuccess() {
    ensureAudio();
    const t = audioCtx.currentTime;
    [523, 659, 784, 1047].forEach(function(f, i) {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, t + i * 0.08);
      g.gain.setValueAtTime(0.08, t + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.3);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.3);
    });
  }

  function playFail() {
    ensureAudio();
    const t = audioCtx.currentTime;
    const dur = 0.35;
    const bufSize = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur);
    const o = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t);
    o.frequency.linearRampToValueAtTime(80, t + 0.3);
    g2.gain.setValueAtTime(0.06, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g2); g2.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.3);
  }

  function playTick() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, audioCtx.currentTime);
    g.gain.setValueAtTime(0.02, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.03);
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = color;
      p.style.boxShadow = '0 0 6px ' + color;
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 120;
      const dx = Math.cos(angle) * speed;
      const dy = Math.sin(angle) * speed;
      const startTime = performance.now();
      (function animP(now) {
        const elapsed = (now - startTime) / 1000;
        if (elapsed > 0.8) { p.remove(); return; }
        p.style.left = (x + dx * elapsed) + 'px';
        p.style.top = (y + dy * elapsed + 100 * elapsed * elapsed) + 'px';
        p.style.opacity = String(1 - elapsed / 0.8);
        requestAnimationFrame(animP);
      })(performance.now());
    }
  }

  function caesarEncrypt(text, shift) {
    return text.split('').map(function(c) {
      if (c >= 'A' && c <= 'Z') {
        return String.fromCharCode(((c.charCodeAt(0) - 65 + shift) % 26) + 65);
      }
      return c;
    }).join('');
  }

  function letterSwapEncrypt(text, pairs) {
    var map = {};
    pairs.forEach(function(pair) { map[pair[0]] = pair[1]; map[pair[1]] = pair[0]; });
    return text.split('').map(function(c) { return map[c] || c; }).join('');
  }

  function symbolSubEncrypt(text, symbolMap) {
    return text.split('').map(function(c) { return symbolMap[c] || c; }).join('');
  }

  function seededRandom(seed) {
    var s = seed;
    return function() {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      return s / 0x7fffffff;
    };
  }

  function getDayNumber() {
    var epoch = new Date(2026, 0, 1);
    var now = new Date();
    now.setHours(0, 0, 0, 0);
    return Math.floor((now - epoch) / 86400000) + 1;
  }

  var startScreen = document.getElementById('startScreen');
  var gameScreen = document.getElementById('gameScreen');
  var transitionScreen = document.getElementById('transitionScreen');
  var resultsScreen = document.getElementById('resultsScreen');
  var dailyBadge = document.getElementById('dailyBadge');
  var bestScoreDisplay = document.getElementById('bestScoreDisplay');
  var startBtn = document.getElementById('startBtn');
  var roundLabel = document.getElementById('roundLabel');
  var cipherLabel = document.getElementById('cipherLabel');
  var timerText = document.getElementById('timerText');
  var timerFill = document.getElementById('timerFill');
  var encryptedText = document.getElementById('encryptedText');
  var hintBox = document.getElementById('hintBox');
  var answerInput = document.getElementById('answerInput');
  var submitBtn = document.getElementById('submitBtn');
  var skipBtn = document.getElementById('skipBtn');
  var keyReveal = document.getElementById('keyReveal');
  var transTitle = document.getElementById('transTitle');
  var transResult = document.getElementById('transResult');
  var transAnswer = document.getElementById('transAnswer');
  var transScore = document.getElementById('transScore');
  var nextRoundBtn = document.getElementById('nextRoundBtn');
  var resultsGrid = document.getElementById('resultsGrid');
  var totalScoreEl = document.getElementById('totalScore');
  var newBestMsg = document.getElementById('newBestMsg');
  var resultsBest = document.getElementById('resultsBest');
  var shareBtn = document.getElementById('shareBtn');
  var replayBtn = document.getElementById('replayBtn');
  var copiedMsg = document.getElementById('copiedMsg');

  var currentRound = 0;
  var score = 0;
  var roundResults = [];
  var roundMessages = [];
  var roundCiphers = [];
  var timerInterval = null;
  var timeLeft = 0;
  var roundStartTime = 0;
  var hint1Shown = false;
  var hint2Shown = false;
  var dayNum = getDayNumber();
  var rng = seededRandom(dayNum * 7919);

  function showScreen(screen) {
    [startScreen, gameScreen, transitionScreen, resultsScreen].forEach(function(s) { s.classList.remove('active'); });
    screen.classList.add('active');
  }

  function init() {
    dayNum = getDayNumber();
    dailyBadge.textContent = 'DAILY #' + dayNum;
    var best = Neon.getHighScore();
    if (best > 0) {
      bestScoreDisplay.textContent = 'BEST: ' + best;
      bestScoreDisplay.style.display = '';
    } else {
      bestScoreDisplay.style.display = 'none';
    }
    showScreen(startScreen);
  }

  function selectDailyMessages() {
    rng = seededRandom(dayNum * 7919);
    var e1 = EASY_MESSAGES[Math.floor(rng() * EASY_MESSAGES.length)];
    var remaining = EASY_MESSAGES.filter(function(m) { return m !== e1; });
    var e2 = remaining[Math.floor(rng() * remaining.length)];
    var m1 = MEDIUM_MESSAGES[Math.floor(rng() * MEDIUM_MESSAGES.length)];
    var h1 = HARD_MESSAGES[Math.floor(rng() * HARD_MESSAGES.length)];
    var rem2 = HARD_MESSAGES.filter(function(m) { return m !== h1; });
    var h2 = rem2[Math.floor(rng() * rem2.length)];
    roundMessages = [e1, e2, m1, h1, h2];
  }

  function buildCipher(round, message) {
    if (round <= 1) {
      var shift = 1 + Math.floor(rng() * 5);
      var encrypted = caesarEncrypt(message, shift);
      return {
        type: 'CAESAR SHIFT',
        encrypted: encrypted,
        key: 'Shift: +' + shift,
        partialKey: 'Shift: +' + shift,
        shift: shift
      };
    } else if (round === 2) {
      var alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      var usedLetters = [];
      var seen = {};
      message.replace(/[^A-Z]/g, '').split('').forEach(function(c) {
        if (!seen[c]) { seen[c] = true; usedLetters.push(c); }
      });
      var pairs = [];
      var used = {};
      var numPairs = 2 + Math.floor(rng() * 2);
      var attempts = 0;
      while (pairs.length < numPairs && attempts < 50) {
        var a = usedLetters[Math.floor(rng() * usedLetters.length)];
        var b = usedLetters[Math.floor(rng() * usedLetters.length)];
        if (a !== b && !used[a] && !used[b]) {
          pairs.push([a, b]);
          used[a] = true; used[b] = true;
        }
        attempts++;
      }
      var enc = letterSwapEncrypt(message, pairs);
      return {
        type: 'LETTER SWAP',
        encrypted: enc,
        key: pairs.map(function(p) { return p[0] + '<>' + p[1]; }).join(', '),
        partialKey: pairs.slice(0, 1).map(function(p) { return p[0] + '<>' + p[1]; }).join('') + ', ...',
        pairs: pairs
      };
    } else if (round === 3) {
      var symbols = ['@','#','$','%','&','*','+','=','!','?','^','~','>','<','{','}'];
      var ul = [];
      var s2 = {};
      message.replace(/[^A-Z]/g, '').split('').forEach(function(c) {
        if (!s2[c]) { s2[c] = true; ul.push(c); }
      });
      ul.sort();
      var symMap = {};
      var shuffledSyms = symbols.slice().sort(function() { return rng() - 0.5; });
      ul.forEach(function(letter, i) {
        symMap[letter] = shuffledSyms[i % shuffledSyms.length];
      });
      var enc2 = symbolSubEncrypt(message, symMap);
      var revealCount = Math.floor(ul.length / 3);
      var partialEntries = ul.slice(0, revealCount).map(function(l) { return symMap[l] + '=' + l; });
      return {
        type: 'SYMBOL CODE',
        encrypted: enc2,
        key: ul.map(function(l) { return symMap[l] + '=' + l; }).join(' '),
        partialKey: partialEntries.join(' ') + ' ...',
        symMap: symMap
      };
    } else {
      var sh = 2 + Math.floor(rng() * 4);
      var shifted = caesarEncrypt(message, sh);
      var vowelSymbols = { 'A': '@', 'E': '3', 'I': '!', 'O': '0', 'U': '^' };
      var enc3 = shifted.split('').map(function(c) { return vowelSymbols[c] || c; }).join('');
      return {
        type: 'COMBO CIPHER',
        encrypted: enc3,
        key: 'Shift +' + sh + ', then A=@ E=3 I=! O=0 U=^',
        partialKey: 'Shift +' + sh + ', vowels replaced...',
        shift: sh,
        vowelSymbols: vowelSymbols
      };
    }
  }

  function startGame() {
    ensureAudio();
    currentRound = 0;
    score = 0;
    roundResults = [];
    selectDailyMessages();
    roundCiphers = roundMessages.map(function(msg, i) { return buildCipher(i, msg); });
    startRound();
  }

  function startRound() {
    showScreen(gameScreen);
    var r = currentRound;
    roundLabel.textContent = 'ROUND ' + (r + 1) + '/' + ROUNDS;
    cipherLabel.textContent = roundCiphers[r].type;
    encryptedText.textContent = roundCiphers[r].encrypted;
    timeLeft = ROUND_TIMES[r];
    roundStartTime = Date.now();
    hint1Shown = false;
    hint2Shown = false;
    hintBox.textContent = '';
    keyReveal.textContent = '';
    answerInput.value = '';
    answerInput.focus();
    updateTimer();
    clearInterval(timerInterval);
    timerInterval = setInterval(tickTimer, 100);
  }

  function updateTimer() {
    var r = currentRound;
    var total = ROUND_TIMES[r];
    var pct = Math.max(0, timeLeft / total * 100);
    timerFill.style.width = pct + '%';
    timerFill.classList.remove('warn', 'danger');
    if (pct < 25) timerFill.classList.add('danger');
    else if (pct < 50) timerFill.classList.add('warn');
    timerText.textContent = Math.ceil(timeLeft) + 's';
  }

  function tickTimer() {
    var elapsed = (Date.now() - roundStartTime) / 1000;
    timeLeft = ROUND_TIMES[currentRound] - elapsed;
    var r = currentRound;

    if (elapsed >= HINT1_TIME && !hint1Shown) {
      hint1Shown = true;
      var word = roundMessages[r];
      var blanks = word[0] + ' ' + Array(word.length - 1).fill('_').join(' ');
      hintBox.textContent = 'HINT: ' + word.length + ' letters — ' + blanks;
      playTick();
    }
    if (elapsed >= HINT2_TIME && !hint2Shown) {
      hint2Shown = true;
      keyReveal.textContent = 'KEY: ' + roundCiphers[r].partialKey;
      playTick();
    }

    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
      roundTimeout();
    }
    updateTimer();
  }

  function submitAnswer() {
    var answer = answerInput.value.trim().toUpperCase();
    var correct = roundMessages[currentRound];
    if (!answer) return;

    if (answer === correct) {
      clearInterval(timerInterval);
      var elapsed = (Date.now() - roundStartTime) / 1000;
      var maxTime = ROUND_TIMES[currentRound];
      var timeBonus = Math.max(0, Math.round((1 - elapsed / maxTime) * 1000));
      var streakCount = 0;
      for (var i = roundResults.length - 1; i >= 0; i--) {
        if (roundResults[i].solved) streakCount++;
        else break;
      }
      var streakBonus = streakCount * 100;
      var roundScore = timeBonus + streakBonus;
      score += roundScore;
      playSuccess();

      var rect = submitBtn.getBoundingClientRect();
      spawnParticles(rect.left + rect.width / 2, rect.top, '#39ff14', 15);

      roundResults.push({
        solved: true,
        skipped: false,
        time: elapsed,
        score: roundScore
      });

      showTransition(true, elapsed, roundScore, false);
    } else {
      playFail();
      document.body.classList.add('shake');
      setTimeout(function() { document.body.classList.remove('shake'); }, 250);
      answerInput.value = '';
      answerInput.focus();
      var rect2 = answerInput.getBoundingClientRect();
      spawnParticles(rect2.left + rect2.width / 2, rect2.top, '#ff2d7b', 8);
    }
  }

  function skipRound() {
    clearInterval(timerInterval);
    playFail();
    roundResults.push({ solved: false, skipped: true, time: 0, score: 0 });
    showTransition(false, 0, 0, true);
  }

  function roundTimeout() {
    playFail();
    var rect = encryptedText.getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, '#ff2d7b', 12);
    document.body.classList.add('shake');
    setTimeout(function() { document.body.classList.remove('shake'); }, 250);
    roundResults.push({ solved: false, skipped: false, time: ROUND_TIMES[currentRound], score: 0 });
    showTransition(false, ROUND_TIMES[currentRound], 0, false);
  }

  function showTransition(solved, time, roundScore, skipped) {
    showScreen(transitionScreen);
    if (solved) {
      transTitle.textContent = 'DECODED';
      transTitle.style.color = '#39ff14';
      transTitle.style.textShadow = '0 0 10px rgba(57,255,20,0.5)';
      transResult.textContent = 'Cracked in ' + time.toFixed(1) + 's';
    } else if (skipped) {
      transTitle.textContent = 'SKIPPED';
      transTitle.style.color = '#4a4a6a';
      transTitle.style.textShadow = 'none';
      transResult.textContent = 'Signal lost';
    } else {
      transTitle.textContent = 'TIMED OUT';
      transTitle.style.color = '#ff2d7b';
      transTitle.style.textShadow = '0 0 10px rgba(255,45,123,0.5)';
      transResult.textContent = 'Could not decode in time';
    }
    transAnswer.textContent = '"' + roundMessages[currentRound] + '"';
    transScore.textContent = solved ? '+' + roundScore + ' pts' : '+0 pts';

    if (currentRound >= ROUNDS - 1) {
      nextRoundBtn.textContent = 'SEE RESULTS';
    } else {
      nextRoundBtn.textContent = 'NEXT SIGNAL';
    }
  }

  function nextRound() {
    currentRound++;
    if (currentRound >= ROUNDS) {
      showResults();
    } else {
      startRound();
    }
  }

  function showResults() {
    while (resultsGrid.firstChild) resultsGrid.removeChild(resultsGrid.firstChild);
    roundResults.forEach(function(r, i) {
      var row = document.createElement('div');
      row.className = 'result-row';
      var roundNum = document.createElement('div');
      roundNum.className = 'result-round';
      roundNum.textContent = 'ROUND ' + (i + 1);
      var status = document.createElement('div');
      status.className = 'result-status';
      if (r.solved) {
        status.classList.add('solved');
        var m = Math.floor(r.time / 60);
        var s = Math.floor(r.time % 60);
        status.textContent = m + ':' + (s < 10 ? '0' : '') + s + ' +' + r.score;
      } else if (r.skipped) {
        status.classList.add('skipped');
        status.textContent = 'SKIPPED';
      } else {
        status.classList.add('failed');
        status.textContent = 'TIMED OUT';
      }
      row.appendChild(roundNum);
      row.appendChild(status);
      resultsGrid.appendChild(row);
    });

    totalScoreEl.textContent = String(score);

    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      if (result.isNewBest) {
        newBestMsg.style.display = '';
      } else {
        newBestMsg.style.display = 'none';
      }
      var best = Neon.getHighScore();
      resultsBest.textContent = best ? 'BEST: ' + best : '';
      Neon.render(document.getElementById('signalScoreTable'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
      localStorage.setItem(STORAGE_DAILY, JSON.stringify({ day: dayNum, score: score, results: roundResults }));
      copiedMsg.textContent = '';
      showScreen(resultsScreen);
    });
  }

  function buildShareText() {
    var text = '\u{1F4E1} SIGNAL #' + dayNum + '\n';
    roundResults.forEach(function(r, i) {
      var num = i + 1;
      if (r.solved) {
        var m = Math.floor(r.time / 60);
        var s = Math.floor(r.time % 60);
        text += num + ': \u{1F513} ' + m + ':' + (s < 10 ? '0' : '') + s + '\n';
      } else if (r.skipped) {
        text += num + ': \u{1F512} gave up\n';
      } else {
        text += num + ': \u{1F512} timed out\n';
      }
    });
    text += 'Score: ' + score + '\nCan you crack the code?';
    return text;
  }

  function shareResults() {
    var text = buildShareText();
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      copiedMsg.textContent = 'COPIED TO CLIPBOARD';
      setTimeout(function() { copiedMsg.textContent = ''; }, 2500);
    }).catch(function() {
      copiedMsg.textContent = 'COPY FAILED';
    });
  }

  startBtn.addEventListener('click', startGame);
  submitBtn.addEventListener('click', submitAnswer);
  skipBtn.addEventListener('click', skipRound);
  nextRoundBtn.addEventListener('click', nextRound);
  shareBtn.addEventListener('click', shareResults);
  replayBtn.addEventListener('click', function() {
    showScreen(startScreen);
    init();
  });

  answerInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitAnswer();
    }
  });

  answerInput.addEventListener('input', function() {
    playTypeClick();
  });

  document.addEventListener('touchstart', function(e) {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  var lastTap = 0;
  document.addEventListener('touchend', function(e) {
    if (e.target === answerInput) return;
    var now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });

  var dots = [];
  var dotCanvas = document.createElement('canvas');
  dotCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;';
  document.body.appendChild(dotCanvas);
  var dctx = dotCanvas.getContext('2d');

  function resizeDotCanvas() {
    dotCanvas.width = window.innerWidth * devicePixelRatio;
    dotCanvas.height = window.innerHeight * devicePixelRatio;
    dctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resizeDotCanvas();
  window.addEventListener('resize', resizeDotCanvas);

  for (var i = 0; i < 30; i++) {
    dots.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: 1 + Math.random() * 1.5,
      a: 0.1 + Math.random() * 0.15
    });
  }

  function drawDots() {
    dctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    dots.forEach(function(d) {
      d.x += d.vx;
      d.y += d.vy;
      if (d.x < 0) d.x = window.innerWidth;
      if (d.x > window.innerWidth) d.x = 0;
      if (d.y < 0) d.y = window.innerHeight;
      if (d.y > window.innerHeight) d.y = 0;
      dctx.beginPath();
      dctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      dctx.fillStyle = 'rgba(0, 240, 255, ' + d.a + ')';
      dctx.fill();
    });
    requestAnimationFrame(drawDots);
  }
  drawDots();

  init();
})();
</script>
</body>
</html>
