<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CONSTELLATION — Neon Chill</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
:root {
  --bg-deep: #050510;
  --bg-surface: #12121f;
  --neon-cyan: #00f0ff;
  --neon-green: #39ff14;
  --neon-gold: #ffd700;
  --neon-pink: #ff2d7b;
  --neon-purple: #b44dff;
  --neon-orange: #ff8c00;
  --text-dim: #4a4a6a;
  --text-mid: #8888aa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg-deep); font-family: 'Rajdhani', sans-serif; color: #fff; touch-action: none; -webkit-user-select: none; user-select: none; }
body::after {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  pointer-events: none; z-index: 9999;
}
canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* START SCREEN */
#start-screen {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, rgba(0,240,255,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(180,77,255,0.04) 0%, transparent 50%),
              var(--bg-deep);
  transition: opacity 0.6s ease;
}
#start-screen.hidden { opacity: 0; pointer-events: none; }
.start-title {
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(28px, 6vw, 56px);
  letter-spacing: 8px; color: var(--neon-cyan);
  text-shadow: 0 0 10px rgba(0,240,255,0.6), 0 0 40px rgba(0,240,255,0.2);
  margin-bottom: 12px;
}
.start-subtitle {
  font-family: 'Rajdhani', sans-serif; font-weight: 300; font-size: clamp(14px, 2.5vw, 20px);
  letter-spacing: 3px; text-transform: uppercase; color: var(--text-mid);
  margin-bottom: 40px;
}
.play-btn {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px;
  letter-spacing: 3px; padding: 14px 40px;
  border: 1px solid var(--neon-cyan); background: rgba(0,240,255,0.06);
  color: var(--neon-cyan); cursor: pointer; border-radius: 3px;
  text-transform: uppercase; transition: all 0.2s;
}
.play-btn:hover { background: rgba(0,240,255,0.15); box-shadow: 0 0 20px rgba(0,240,255,0.2); transform: scale(1.04); }
.start-hint {
  margin-top: 24px; font-size: 13px; color: var(--text-dim); letter-spacing: 1px;
}
#startLB { margin-top: 24px; width: 90%; max-width: 400px; }

/* FLOATING UI */
#game-ui {
  position: absolute; top: 0; left: 0; right: 0; z-index: 50;
  display: none; padding: 12px 16px;
  pointer-events: none;
}
#game-ui.active { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
#game-ui > * { pointer-events: auto; }
.stat-box {
  font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px;
  padding: 6px 14px; background: rgba(10,10,18,0.8); border: 1px solid rgba(0,240,255,0.15);
  border-radius: 3px; color: var(--neon-cyan);
  text-shadow: 0 0 6px rgba(0,240,255,0.3);
}
.stat-box span { color: #fff; font-weight: 700; }
.ui-btn {
  font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 6px 14px; border-radius: 3px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(10,10,18,0.8);
  color: var(--text-mid); transition: all 0.2s;
}
.ui-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.ui-btn.active-mode { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,240,255,0.08); }
.ui-spacer { flex: 1; min-width: 10px; }

/* NAME INPUT */
#name-overlay {
  position: absolute; inset: 0; z-index: 200; display: none;
  background: rgba(5,5,16,0.92); align-items: center; justify-content: center; flex-direction: column;
}
#name-overlay.active { display: flex; }
#name-overlay h2 {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 18px;
  letter-spacing: 4px; color: var(--neon-cyan); margin-bottom: 16px;
}
#name-input {
  font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: 2px;
  background: rgba(0,240,255,0.06); border: 1px solid var(--neon-cyan);
  color: #fff; padding: 10px 20px; border-radius: 3px; text-align: center;
  outline: none; width: 260px; max-width: 80vw;
}
#name-input::placeholder { color: var(--text-dim); }
#name-submit {
  margin-top: 14px; padding: 10px 30px;
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 12px;
  letter-spacing: 3px; border: 1px solid var(--neon-green); background: rgba(57,255,20,0.08);
  color: var(--neon-green); cursor: pointer; border-radius: 3px; text-transform: uppercase;
}

/* TOAST */
#toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 3px; font-family: 'Rajdhani', sans-serif;
  font-size: 14px; letter-spacing: 2px; color: var(--neon-green);
  background: rgba(10,10,18,0.9); border: 1px solid var(--neon-green);
  opacity: 0; transition: opacity 0.3s; z-index: 300; pointer-events: none;
}
#toast.show { opacity: 1; }

/* BOTTOM BAR */
#bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
  display: none; padding: 12px 16px; pointer-events: none;
  justify-content: center; gap: 8px; flex-wrap: wrap;
}
#bottom-bar.active { display: flex; }
#bottom-bar > * { pointer-events: auto; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="start-screen">
  <div class="start-title">CONSTELLATION</div>
  <div class="start-subtitle">Connect the stars. Name your sky.</div>
  <button class="play-btn" id="btn-start">START</button>
  <div class="start-hint">Click stars to connect them</div>
  <div id="startLB"></div>
</div>

<div id="game-ui">
  <div class="stat-box">STARS <span id="stat-stars">0</span></div>
  <div class="stat-box">LINES <span id="stat-lines">0</span></div>
  <button class="ui-btn active-mode" id="btn-daily">DAILY SKY</button>
  <button class="ui-btn" id="btn-random">NEW SKY</button>
  <div class="ui-spacer"></div>
  <button class="ui-btn" id="btn-undo">UNDO</button>
  <button class="ui-btn" id="btn-share">SHARE</button>
  <button class="ui-btn" id="btn-menu">MENU</button>
</div>

<div id="bottom-bar">
  <div class="stat-box" style="border-color: rgba(180,77,255,0.2); color: var(--neon-purple);">
    SKY NAME: <span id="sky-name-display" style="cursor:pointer; text-decoration: underline dotted;">Unnamed</span>
  </div>
</div>

<div id="name-overlay">
  <h2>NAME YOUR SKY</h2>
  <input type="text" id="name-input" placeholder="My constellation..." maxlength="30" autocomplete="off">
  <button id="name-submit">SAVE</button>
</div>

<div id="toast"></div>

<script src="/neon.js"></script>
<script>
(() => {
  // ======== SEEDED PRNG (mulberry32) ========
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function hashStr(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) {
      h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    }
    return h;
  }

  function getDaySeed() {
    var d = new Date();
    var str = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
    return hashStr(str);
  }

  function getDayNumber() {
    var epoch = new Date(2024, 0, 1);
    var now = new Date();
    now.setHours(0,0,0,0);
    return Math.floor((now - epoch) / 86400000);
  }

  // ======== AUDIO ========
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playBell(freq) {
    ensureAudio();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq || 600;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.8);
  }

  function playConnect() {
    var notes = [523, 587, 659, 698, 784, 880, 988, 1047];
    var freq = notes[Math.floor(Math.random() * notes.length)];
    playBell(freq);
    // Soft harmonic
    setTimeout(function() { playBell(freq * 1.5); }, 80);
  }

  function playUndo() {
    ensureAudio();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }

  // Ambient hum
  var ambientGain = null;
  function startAmbient() {
    ensureAudio();
    if (ambientGain) return;
    var osc1 = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    ambientGain = audioCtx.createGain();
    osc1.type = 'sine'; osc1.frequency.value = 80;
    osc2.type = 'sine'; osc2.frequency.value = 120;
    ambientGain.gain.value = 0.015;
    osc1.connect(ambientGain); osc2.connect(ambientGain);
    ambientGain.connect(audioCtx.destination);
    osc1.start(); osc2.start();
  }

  // ======== CANVAS SETUP ========
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W, H, dpr;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ======== GAME STATE ========
  var stars = [];
  var connections = []; // [{a: starIndex, b: starIndex}]
  var selectedStar = -1;
  var hoveredStar = -1;
  var isDaily = true;
  var skyName = 'Unnamed';
  var gameStarted = false;

  var STAR_RADIUS = 3;
  var HIT_RADIUS = 20;
  var STAR_COUNT_MIN = 55;
  var STAR_COUNT_MAX = 75;
  var MARGIN = 40;

  // ======== STAR GENERATION ========
  function generateStars(seed) {
    var rng = mulberry32(seed);
    var count = Math.floor(rng() * (STAR_COUNT_MAX - STAR_COUNT_MIN + 1)) + STAR_COUNT_MIN;
    var newStars = [];
    var attempts = 0;
    while (newStars.length < count && attempts < 5000) {
      attempts++;
      var x = MARGIN + rng() * (W - MARGIN * 2);
      var y = MARGIN + 50 + rng() * (H - MARGIN * 2 - 80);
      // Min distance check
      var tooClose = false;
      for (var j = 0; j < newStars.length; j++) {
        var dx = newStars[j].x - x, dy = newStars[j].y - y;
        if (dx*dx + dy*dy < 30*30) { tooClose = true; break; }
      }
      if (tooClose) continue;
      newStars.push({
        x: x, y: y,
        baseBright: 0.4 + rng() * 0.5,
        phase: rng() * Math.PI * 2,
        twinkleSpeed: 0.5 + rng() * 1.5,
        size: 1.5 + rng() * 2.5,
        hue: rng() < 0.7 ? 0 : (rng() < 0.5 ? 200 : 40) // mostly white, some blue/warm
      });
    }
    return newStars;
  }

  function connectedStarCount() {
    var set = {};
    for (var i = 0; i < connections.length; i++) {
      set[connections[i].a] = true;
      set[connections[i].b] = true;
    }
    return Object.keys(set).length;
  }

  function updateStats() {
    document.getElementById('stat-stars').textContent = connectedStarCount();
    document.getElementById('stat-lines').textContent = connections.length;
  }

  function connectionExists(a, b) {
    for (var i = 0; i < connections.length; i++) {
      if ((connections[i].a === a && connections[i].b === b) ||
          (connections[i].a === b && connections[i].b === a)) return true;
    }
    return false;
  }

  // ======== NEBULA CACHE ========
  var nebulaCanvas = null;
  function renderNebula() {
    nebulaCanvas = document.createElement('canvas');
    nebulaCanvas.width = canvas.width;
    nebulaCanvas.height = canvas.height;
    var nc = nebulaCanvas.getContext('2d');
    nc.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Dark background
    nc.fillStyle = '#050510';
    nc.fillRect(0, 0, W, H);

    // Nebula blobs
    var blobs = [
      { x: W * 0.3, y: H * 0.25, r: Math.max(W, H) * 0.4, color: 'rgba(0,100,180,0.03)' },
      { x: W * 0.7, y: H * 0.6, r: Math.max(W, H) * 0.35, color: 'rgba(120,40,180,0.025)' },
      { x: W * 0.15, y: H * 0.8, r: Math.max(W, H) * 0.3, color: 'rgba(0,180,200,0.02)' },
      { x: W * 0.85, y: H * 0.2, r: Math.max(W, H) * 0.25, color: 'rgba(180,77,255,0.02)' },
      { x: W * 0.5, y: H * 0.5, r: Math.max(W, H) * 0.5, color: 'rgba(0,240,255,0.012)' },
    ];
    for (var i = 0; i < blobs.length; i++) {
      var b = blobs[i];
      var g = nc.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      g.addColorStop(0, b.color);
      g.addColorStop(1, 'transparent');
      nc.fillStyle = g;
      nc.fillRect(0, 0, W, H);
    }
  }

  // ======== DRAWING ========
  function drawStar(s, idx, time) {
    var bright = s.baseBright + Math.sin(time * s.twinkleSpeed + s.phase) * 0.25;
    bright = Math.max(0.15, Math.min(1, bright));
    var r = s.size;
    var isSelected = idx === selectedStar;
    var isHovered = idx === hoveredStar;

    // Outer glow
    ctx.save();
    var alpha = bright * 0.6;
    if (s.hue === 0) {
      ctx.shadowColor = 'rgba(200,220,255,' + alpha + ')';
    } else if (s.hue === 200) {
      ctx.shadowColor = 'rgba(100,180,255,' + alpha + ')';
    } else {
      ctx.shadowColor = 'rgba(255,220,150,' + alpha + ')';
    }
    ctx.shadowBlur = 12 + bright * 8;

    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    var coreBright = Math.floor(180 + bright * 75);
    if (s.hue === 0) {
      ctx.fillStyle = 'rgb(' + coreBright + ',' + coreBright + ',' + Math.min(255, coreBright + 20) + ')';
    } else if (s.hue === 200) {
      ctx.fillStyle = 'rgb(' + Math.floor(coreBright*0.6) + ',' + Math.floor(coreBright*0.85) + ',' + coreBright + ')';
    } else {
      ctx.fillStyle = 'rgb(' + coreBright + ',' + Math.floor(coreBright*0.9) + ',' + Math.floor(coreBright*0.6) + ')';
    }
    ctx.fill();
    ctx.restore();

    // Selection ring
    if (isSelected) {
      var pulse = 0.5 + Math.sin(time * 4) * 0.3;
      ctx.save();
      ctx.strokeStyle = 'rgba(0,240,255,' + pulse + ')';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = 'rgba(0,240,255,0.5)';
      ctx.shadowBlur = 10;
      var ringR = r + 8 + Math.sin(time * 3) * 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, ringR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Hover highlight
    if (isHovered && !isSelected) {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,240,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawConnection(c, time) {
    var a = stars[c.a], b = stars[c.b];
    ctx.save();

    // Main line
    var grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, 'rgba(0,240,255,0.6)');
    grad.addColorStop(0.5, 'rgba(0,240,255,0.35)');
    grad.addColorStop(1, 'rgba(0,240,255,0.6)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.2;
    ctx.shadowColor = 'rgba(0,240,255,0.4)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();

    // Subtle outer glow line
    ctx.strokeStyle = 'rgba(0,240,255,0.08)';
    ctx.lineWidth = 4;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();

    ctx.restore();
  }

  function drawPendingLine(time) {
    if (selectedStar < 0 || hoveredStar < 0 || selectedStar === hoveredStar) return;
    if (connectionExists(selectedStar, hoveredStar)) return;
    var a = stars[selectedStar], b = stars[hoveredStar];
    ctx.save();
    ctx.strokeStyle = 'rgba(0,240,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function draw(time) {
    ctx.clearRect(0, 0, W, H);

    // Nebula background
    if (nebulaCanvas) {
      ctx.drawImage(nebulaCanvas, 0, 0, W, H);
    }

    // Connections
    for (var i = 0; i < connections.length; i++) {
      drawConnection(connections[i], time);
    }

    // Pending line
    drawPendingLine(time);

    // Stars
    for (var i = 0; i < stars.length; i++) {
      drawStar(stars[i], i, time);
    }
  }

  // ======== INPUT ========
  function getStarAt(px, py) {
    var best = -1, bestDist = HIT_RADIUS * HIT_RADIUS;
    for (var i = 0; i < stars.length; i++) {
      var dx = stars[i].x - px, dy = stars[i].y - py;
      var d = dx*dx + dy*dy;
      if (d < bestDist) { bestDist = d; best = i; }
    }
    return best;
  }

  function handleClick(px, py) {
    if (!gameStarted) return;
    ensureAudio();
    startAmbient();
    var idx = getStarAt(px, py);
    if (idx < 0) {
      selectedStar = -1;
      return;
    }
    if (selectedStar < 0) {
      selectedStar = idx;
      playBell(440);
    } else if (selectedStar === idx) {
      selectedStar = -1;
    } else {
      if (!connectionExists(selectedStar, idx)) {
        connections.push({ a: selectedStar, b: idx });
        playConnect();
        updateStats();
        saveProgress();
      }
      selectedStar = idx;
    }
  }

  function handleMove(px, py) {
    if (!gameStarted) return;
    hoveredStar = getStarAt(px, py);
    canvas.style.cursor = hoveredStar >= 0 ? 'pointer' : 'default';
  }

  canvas.addEventListener('mousedown', function(e) {
    handleClick(e.clientX, e.clientY);
  });
  canvas.addEventListener('mousemove', function(e) {
    handleMove(e.clientX, e.clientY);
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    handleClick(t.clientX, t.clientY);
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    handleMove(t.clientX, t.clientY);
  }, { passive: false });

  // ======== BUTTONS ========
  document.getElementById('btn-start').addEventListener('click', function() {
    startGame();
  });

  document.getElementById('btn-daily').addEventListener('click', function() {
    if (isDaily) return;
    isDaily = true;
    this.classList.add('active-mode');
    document.getElementById('btn-random').classList.remove('active-mode');
    loadDaily();
  });

  document.getElementById('btn-random').addEventListener('click', function() {
    isDaily = false;
    this.classList.add('active-mode');
    document.getElementById('btn-daily').classList.remove('active-mode');
    newRandomSky();
  });

  document.getElementById('btn-undo').addEventListener('click', function() {
    if (connections.length > 0) {
      connections.pop();
      playUndo();
      updateStats();
      saveProgress();
    }
  });

  document.getElementById('btn-share').addEventListener('click', shareResult);

  document.getElementById('btn-menu').addEventListener('click', function() {
    // Save score before returning
    saveScore();
    gameStarted = false;
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('game-ui').classList.remove('active');
    document.getElementById('bottom-bar').classList.remove('active');
    selectedStar = -1;
    hoveredStar = -1;
    Neon.render(document.getElementById('startLB'));
  });

  document.getElementById('sky-name-display').addEventListener('click', openNameInput);

  document.getElementById('name-submit').addEventListener('click', submitName);
  document.getElementById('name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitName();
  });

  // ======== NAME INPUT ========
  function openNameInput() {
    var overlay = document.getElementById('name-overlay');
    overlay.classList.add('active');
    var inp = document.getElementById('name-input');
    inp.value = skyName === 'Unnamed' ? '' : skyName;
    setTimeout(function() { inp.focus(); }, 100);
  }

  function submitName() {
    var val = document.getElementById('name-input').value.trim();
    if (val) skyName = val;
    document.getElementById('name-overlay').classList.remove('active');
    document.getElementById('sky-name-display').textContent = skyName;
    saveProgress();
  }

  // ======== SHARE ========
  function shareResult() {
    var dayNum = getDayNumber();
    var prefix = isDaily ? ('Daily Sky #' + dayNum) : 'Random Sky';
    var text = '\u2b50 CONSTELLATION\n' +
      connectedStarCount() + ' stars connected \u00b7 ' + connections.length + ' lines drawn\n' +
      prefix + '\n' +
      'neonarcade.net/neonchill/constellation.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showToast('Copied to clipboard!');
      });
    }
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  // ======== SAVE / LOAD ========
  var SAVE_KEY = 'neonarcade_constellation_progress';

  function saveProgress() {
    var data = {
      isDaily: isDaily,
      seed: currentSeed,
      connections: connections,
      skyName: skyName
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadProgress() {
    try {
      var raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  // ======== SCORE ========
  function saveScore() {
    var score = connections.length;
    if (score <= 0) return;
    var nameReady = Neon.getName() ? Promise.resolve() : Promise.resolve();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      if (result && result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    }).catch(function() {});
  }

  // ======== GAME FLOW ========
  var currentSeed = 0;

  function loadDaily() {
    currentSeed = getDaySeed();
    stars = generateStars(currentSeed);
    connections = [];
    selectedStar = -1;
    skyName = 'Unnamed';

    // Try to restore daily progress
    var saved = loadProgress();
    if (saved && saved.isDaily && saved.seed === currentSeed) {
      connections = saved.connections || [];
      skyName = saved.skyName || 'Unnamed';
    }

    document.getElementById('sky-name-display').textContent = skyName;
    renderNebula();
    updateStats();
  }

  function newRandomSky() {
    currentSeed = Date.now();
    stars = generateStars(currentSeed);
    connections = [];
    selectedStar = -1;
    skyName = 'Unnamed';
    document.getElementById('sky-name-display').textContent = skyName;
    renderNebula();
    updateStats();
    saveProgress();
  }

  function startGame() {
    ensureAudio();
    startAmbient();
    gameStarted = true;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.add('active');
    document.getElementById('bottom-bar').classList.add('active');
    loadDaily();
  }

  // ======== MAIN LOOP ========
  var startTime = performance.now();

  function loop() {
    var time = (performance.now() - startTime) / 1000;
    draw(time);
    requestAnimationFrame(loop);
  }

  // ======== INIT ========
  Neon.init({
    game: 'constellation',
    mode: 'high',
    key: 'neonarcade_neonchill_constellation_scores'
  });

  // Pre-generate stars for start screen background
  currentSeed = getDaySeed();
  stars = generateStars(currentSeed);
  renderNebula();

  Neon.render(document.getElementById('startLB'));

  // Handle resize: regenerate stars at new positions
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      resize();
      stars = generateStars(currentSeed);
      renderNebula();
      // Revalidate connections (stars moved)
      if (gameStarted) {
        // Connections reference indices which are stable, stars just moved position
        // That's fine — indices still valid
      }
    }, 200);
  });

  loop();
})();
</script>
</body>
</html>
