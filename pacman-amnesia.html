<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PAC-MAN AMNESIA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Rajdhani',sans-serif;color:#fff;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
#gameCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px)}
#hud{position:fixed;top:0;left:0;width:100%;z-index:20;display:none;padding:10px 20px;font-family:'Orbitron',sans-serif;font-size:clamp(12px,2.5vw,16px)}
#hud-left{float:left;color:#00ffff;text-shadow:0 0 10px #00ffff}
#hud-center{text-align:center;color:#88ff88;text-shadow:0 0 8px #88ff88;font-size:clamp(10px,2vw,14px)}
#hud-right{float:right;color:#ff6688;text-shadow:0 0 10px #ff6688}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;text-align:center;background:#0a0a12}
.screen.hidden{display:none}
#startScreen h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,56px);color:#00ffff;text-shadow:0 0 20px #00ffff,0 0 40px #0088aa,0 0 80px #004466;margin-bottom:20px;letter-spacing:4px}
#startScreen .subtitle{font-family:'Rajdhani',sans-serif;font-size:clamp(14px,3vw,22px);color:#8888aa;margin-bottom:50px;max-width:80%;line-height:1.6}
.btn{font-family:'Orbitron',sans-serif;font-size:clamp(14px,3vw,22px);padding:14px 48px;border:2px solid #00ffff;background:transparent;color:#00ffff;cursor:pointer;text-transform:uppercase;letter-spacing:3px;transition:all 0.3s;text-shadow:0 0 10px #00ffff;box-shadow:0 0 15px rgba(0,255,255,0.2),inset 0 0 15px rgba(0,255,255,0.1);margin:8px}
.btn:hover{background:rgba(0,255,255,0.15);box-shadow:0 0 30px rgba(0,255,255,0.4)}
#startScreen .highscore{margin-top:30px;font-family:'Orbitron',sans-serif;font-size:clamp(10px,2vw,14px);color:#ffaa00;text-shadow:0 0 10px #ffaa00}
#startScreen .controls-hint{margin-top:15px;font-family:'Rajdhani',sans-serif;font-size:clamp(11px,2vw,15px);color:#555577;line-height:1.4}
#gameOverScreen h1{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,44px);color:#ff4466;text-shadow:0 0 20px #ff4466;margin-bottom:30px}
.stats-container{font-family:'Rajdhani',sans-serif;font-size:clamp(16px,3vw,24px);color:#aaaacc;line-height:2;margin-bottom:30px}
.stats-container .val{color:#00ffff;text-shadow:0 0 8px #00ffff}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
#winScreen h1{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,44px);color:#00ff88;text-shadow:0 0 20px #00ff88;margin-bottom:30px}
#warningOverlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.3s}
.score-table { margin: 16px auto; max-width: 320px; font-family: 'Rajdhani', sans-serif; }
.score-table-title { font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 3px; color: #ffd700; text-align: center; margin-bottom: 8px; text-shadow: 0 0 8px rgba(255,215,0,0.4); }
.score-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.score-rank { color: #4a4a6a; font-size: 13px; width: 20px; }
.score-val  { color: #00ffff; font-size: 16px; font-weight: 700; text-shadow: 0 0 8px rgba(0,255,255,0.4); flex: 1; text-align: center; }
.score-time { color: #4a4a6a; font-size: 12px; text-align: right; }
</style>
</head>
<body>
<div id="scanlines"></div>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div id="hud-left">SCORE: <span id="scoreDisplay">0</span></div>
  <div id="hud-right">LIVES: <span id="livesDisplay"></span></div>
  <div style="clear:both"></div>
  <div id="hud-center">DOTS: <span id="dotsDisplay">0/0</span></div>
</div>
<div id="warningOverlay"></div>

<div id="startScreen" class="screen">
  <h1>PAC-MAN<br>AMNESIA</h1>
  <div class="subtitle">The maze is dark. The ghosts can see.<br>Only your small light reveals the path.<br>Bump walls to briefly reveal them. Eat 50 dots for a full flash.</div>
  <button class="btn" id="startBtn">START</button>
  <div class="highscore" id="highScoreDisplay"></div>
  <div class="controls-hint">Arrow keys / WASD or swipe to move</div>
</div>

<div id="gameOverScreen" class="screen hidden">
  <h1>GAME OVER</h1>
  <div class="stats-container" id="gameOverStats"></div>
  <div class="score-table" id="gameOverScoreTable"></div>
  <div class="btn-group">
    <button class="btn" id="shareBtn">SHARE</button>
    <button class="btn" id="replayBtn">REPLAY</button>
  </div>
</div>

<div id="winScreen" class="screen hidden">
  <h1>MAZE CLEARED!</h1>
  <div class="stats-container" id="winStats"></div>
  <div class="score-table" id="winScoreTable"></div>
  <div class="btn-group">
    <button class="btn" id="winShareBtn">SHARE</button>
    <button class="btn" id="winReplayBtn">REPLAY</button>
  </div>
</div>

<script>
(function() {
'use strict';

function saveScore(key, score) {
  var scores = JSON.parse(localStorage.getItem(key) || '[]');
  scores.push({ score: score, ts: Date.now() });
  scores.sort(function(a, b) { return b.score - a.score; });
  scores = scores.slice(0, 5);
  localStorage.setItem(key, JSON.stringify(scores));
  return scores;
}
function timeAgo(ts) {
  var diff = Date.now() - ts;
  var mins  = Math.floor(diff / 60000);
  var hours = Math.floor(diff / 3600000);
  var days  = Math.floor(diff / 86400000);
  if (days  > 0) return days  + (days  === 1 ? ' day ago'  : ' days ago');
  if (hours > 0) return hours + (hours === 1 ? ' hour ago' : ' hours ago');
  if (mins  > 0) return mins  + (mins  === 1 ? ' min ago'  : ' mins ago');
  return 'just now';
}
function renderScoreTable(el, scores) {
  if (!el) return;
  while (el.firstChild) el.removeChild(el.firstChild);
  var title = document.createElement('div');
  title.className = 'score-table-title';
  title.textContent = '\uD83C\uDFC6 YOUR BESTS';
  el.appendChild(title);
  scores.forEach(function(s, i) {
    var row = document.createElement('div');
    row.className = 'score-row';
    var rank = document.createElement('span');
    rank.className = 'score-rank';
    rank.textContent = String(i + 1);
    var val = document.createElement('span');
    val.className = 'score-val';
    val.textContent = String(s.score);
    var time = document.createElement('span');
    time.className = 'score-time';
    time.textContent = timeAgo(s.ts);
    row.appendChild(rank);
    row.appendChild(val);
    row.appendChild(time);
    el.appendChild(row);
  });
}

// =============================================
// CONSTANTS
// =============================================
var TILE = 20;
var COLS = 28;
var ROWS = 31;
var W = COLS * TILE;
var H = ROWS * TILE;
var PLAYER_VIS = 3;     // normal visibility radius in tiles
var POWER_VIS = 6;      // power pellet visibility radius
var WALL_FLASH_MS = 2000;
var MAZE_FLASH_MS = 2000;
var POWER_MS = 5000;
var DOTS_PER_FLASH = 50;
var DOT_PTS = 10;
var GHOST_PTS = 200;
var P_SPEED = 2;        // player pixels per frame
var G_SPEED = 1.7;      // ghost normal speed
var G_FRIGHT_SPEED = 0.9;
var G_EATEN_SPEED = 3;

// Direction helpers: 0=right, 1=down, 2=left, 3=up
var DX = [1, 0, -1, 0];
var DY = [0, 1, 0, -1];
var DIR_ANGLE = [0, Math.PI * 0.5, Math.PI, -Math.PI * 0.5];

// Classic Pac-Man style maze (28x31)
// 1=wall, 2=dot, 3=power pellet, 4=ghost house interior, 5=gate, 0=empty
var MAZE_DEF = [
  '1111111111111111111111111111',  // 0
  '1222222222222112222222222221',  // 1
  '1211112111112112111121111121',  // 2
  '1311112111112112111121111131',  // 3
  '1211112111112112111121111121',  // 4
  '1222222222222222222222222221',  // 5
  '1211112112111111211211112121',  // 6
  '1211112112111111211211112121',  // 7
  '1222222112222112222112222221',  // 8
  '1111112111110110111121111111',  // 9
  '0000012111110110111121000000',  // 10
  '0000012110000000011211000000',  // 11
  '0000012110111511011211000000',  // 12
  '1111112110144441011211111111',  // 13
  '0000002000144441000200000000',  // 14  (tunnel row)
  '1111112110144441011211111111',  // 15
  '0000012110111111011211000000',  // 16
  '0000012110000000011211000000',  // 17
  '0000012110111111011211000000',  // 18
  '1111112110111111011211111111',  // 19
  '1222222222222112222222222221',  // 20
  '1211112111112112111121111121',  // 21
  '1211112111112112111121111121',  // 22
  '1322112222222002222222112231',  // 23  (player start row)
  '1112112112111111211211211121',  // 24
  '1112112112111111211211211121',  // 25
  '1222222212222112222122222221',  // 26
  '1211111111112112111111111121',  // 27
  '1211111111112112111111111121',  // 28
  '1222222222222222222222222221',  // 29
  '1111111111111111111111111111',  // 30
];

// =============================================
// STATE
// =============================================
var canvas, ctx;
var sceneCanvas, sceneCtx;   // cached offscreen
var maskCanvas, maskCtx;     // cached offscreen
var maze = [];
var dots = [];
var dotsEaten = 0;
var totalDots = 0;
var score = 0;
var lives = 3;
var ghostsEaten = 0;
var gameState = 'start';
var explored = {};          // key = r*COLS+c
var revealedWalls = [];     // {r, c, time}
var mazeFlashEnd = 0;
var powerEnd = 0;
var dotsSinceFlash = 0;
var shakeEnd = 0;
var _pacScores = JSON.parse(localStorage.getItem('neonarcade_scores_pacman') || '[]');
var highScore = _pacScores.length > 0 ? _pacScores[0].score : 0;
var deathPause = 0;         // timestamp when death animation ends

// Player
var player = {
  x: 0, y: 0,
  dir: -1, nextDir: -1,
  mouth: 0.1, mouthOpening: true
};

// Ghosts
var GHOST_COLORS = ['#ff2222', '#ffb8ff', '#00ffdd', '#ffb852'];
var ghosts = [];

// Audio
var audioCtx = null;
var warningNode = null;
var warningGainNode = null;

// =============================================
// AUDIO
// =============================================
function ensureAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Ambient drone
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 55;
    g.gain.value = 0.025;
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    // LFO for pulsing
    var lfo = audioCtx.createOscillator();
    var lg = audioCtx.createGain();
    lfo.frequency.value = 0.4;
    lg.gain.value = 0.012;
    lfo.connect(lg);
    lg.connect(g.gain);
    lfo.start();
  } catch (e) { /* audio not available */ }
}

function sfx(freq, endFreq, dur, vol, wave) {
  if (!audioCtx) return;
  try {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = wave || 'square';
    o.frequency.value = freq;
    if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 20), audioCtx.currentTime + dur * 0.85);
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

function sfxDot()      { sfx(580 + (dotsEaten % 2) * 120, 0, 0.06, 0.07, 'square'); }
function sfxPower()    { sfx(180, 900, 0.5, 0.12, 'sawtooth'); }
function sfxFlash()    { sfx(90, 1400, 0.5, 0.14, 'sawtooth'); }
function sfxDeath()    { sfx(500, 60, 0.9, 0.14, 'sawtooth'); }
function sfxGhostEat() { sfx(300, 1600, 0.25, 0.11, 'square'); }
function sfxBump()     { sfx(70, 0, 0.12, 0.12, 'triangle'); }

function updateWarning() {
  if (!audioCtx) return;
  var minD = 999;
  var pr = Math.floor(player.y / TILE);
  var pc = Math.floor(player.x / TILE);
  for (var i = 0; i < ghosts.length; i++) {
    var g = ghosts[i];
    if (g.frightened || g.eaten || g.inHouse) continue;
    var d = Math.abs(Math.floor(g.y / TILE) - pr) + Math.abs(Math.floor(g.x / TILE) - pc);
    if (d < minD) minD = d;
  }
  var vis = powerEnd > Date.now() ? POWER_VIS : PLAYER_VIS;
  var overlay = document.getElementById('warningOverlay');
  if (minD <= 8 && minD > vis) {
    if (!warningNode) {
      try {
        warningNode = audioCtx.createOscillator();
        warningGainNode = audioCtx.createGain();
        warningNode.type = 'sine';
        warningNode.connect(warningGainNode);
        warningGainNode.connect(audioCtx.destination);
        warningNode.start();
      } catch (e) { return; }
    }
    var prox = Math.max(0, Math.min(1, 1 - (minD - vis) / (8 - vis)));
    warningNode.frequency.value = 110 + prox * 420;
    warningGainNode.gain.value = prox * 0.055;
    overlay.style.background = 'radial-gradient(circle, transparent 40%, rgba(255,0,0,' + (prox * 0.12).toFixed(3) + ') 100%)';
    overlay.style.opacity = '1';
  } else {
    if (warningGainNode) warningGainNode.gain.value = 0;
    overlay.style.opacity = '0';
  }
}

// =============================================
// MAZE
// =============================================
function initMaze() {
  maze = [];
  dots = [];
  dotsEaten = 0;
  totalDots = 0;
  explored = {};
  revealedWalls = [];
  mazeFlashEnd = 0;
  powerEnd = 0;
  dotsSinceFlash = 0;
  for (var r = 0; r < ROWS; r++) {
    maze[r] = [];
    dots[r] = [];
    for (var c = 0; c < COLS; c++) {
      var ch = parseInt(MAZE_DEF[r][c]);
      maze[r][c] = ch;
      dots[r][c] = (ch === 2 || ch === 3) ? ch : 0;
      if (ch === 2 || ch === 3) totalDots++;
    }
  }
}

// =============================================
// PLAYER
// =============================================
function initPlayer() {
  player.x = 14 * TILE + TILE / 2;
  player.y = 23 * TILE + TILE / 2;
  player.dir = -1;
  player.nextDir = -1;
  player.mouth = 0.1;
  player.mouthOpening = true;
}

function canGo(px, py, d) {
  var nx = px + DX[d] * P_SPEED;
  var ny = py + DY[d] * P_SPEED;
  var h = TILE * 0.38;
  var pts = [[nx - h, ny - h], [nx + h, ny - h], [nx - h, ny + h], [nx + h, ny + h]];
  for (var i = 0; i < 4; i++) {
    var col = Math.floor(pts[i][0] / TILE);
    var row = Math.floor(pts[i][1] / TILE);
    if (col < 0 || col >= COLS) continue; // tunnel passthrough
    if (row < 0 || row >= ROWS) return false;
    var t = maze[row][col];
    if (t === 1 || t === 5) return false;
  }
  return true;
}

function movePlayer() {
  if (player.dir === -1 && player.nextDir === -1) return;

  // Try queued direction first — snap to nearest tile center on cross-axis
  // so turns succeed whenever the player is close to a junction, not pixel-perfect
  if (player.nextDir !== -1) {
    var sx = player.x, sy = player.y;
    if (player.nextDir === 0 || player.nextDir === 2) {
      sy = Math.round((player.y - TILE / 2) / TILE) * TILE + TILE / 2;
    } else {
      sx = Math.round((player.x - TILE / 2) / TILE) * TILE + TILE / 2;
    }
    var snapDist = Math.abs(sx - player.x) + Math.abs(sy - player.y);
    if (snapDist < TILE * 0.45 && canGo(sx, sy, player.nextDir)) {
      player.x = sx;
      player.y = sy;
      player.dir = player.nextDir;
      player.nextDir = -1;
    }
  }
  if (player.dir === -1) return;

  if (canGo(player.x, player.y, player.dir)) {
    player.x += DX[player.dir] * P_SPEED;
    player.y += DY[player.dir] * P_SPEED;

    // Tunnel wrap
    if (player.x < -TILE) player.x += W + TILE * 2;
    if (player.x > W + TILE) player.x -= W + TILE * 2;

    // Snap cross-axis for clean turns
    if (player.dir === 0 || player.dir === 2) {
      var ty = Math.round((player.y - TILE / 2) / TILE) * TILE + TILE / 2;
      player.y += (ty - player.y) * 0.4;
    } else {
      var tx = Math.round((player.x - TILE / 2) / TILE) * TILE + TILE / 2;
      player.x += (tx - player.x) * 0.4;
    }

    // Mouth anim
    player.mouth += player.mouthOpening ? 0.07 : -0.07;
    if (player.mouth > 0.35) player.mouthOpening = false;
    if (player.mouth < 0.02) player.mouthOpening = true;
  } else {
    // Wall bump detection
    var br = Math.floor((player.y + DY[player.dir] * TILE * 0.55) / TILE);
    var bc = Math.floor((player.x + DX[player.dir] * TILE * 0.55) / TILE);
    if (br >= 0 && br < ROWS && bc >= 0 && bc < COLS && maze[br][bc] === 1) {
      var found = false;
      for (var i = 0; i < revealedWalls.length; i++) {
        if (revealedWalls[i].r === br && revealedWalls[i].c === bc) {
          revealedWalls[i].time = Date.now();
          found = true;
          break;
        }
      }
      if (!found) {
        revealedWalls.push({ r: br, c: bc, time: Date.now() });
        sfxBump();
        shakeEnd = Date.now() + 120;
      }
    }
  }

  // Eat dots / power pellets
  var pr = Math.floor(player.y / TILE);
  var pc = Math.floor(player.x / TILE);
  if (pc >= 0 && pc < COLS && pr >= 0 && pr < ROWS) {
    if (dots[pr][pc] === 2) {
      dots[pr][pc] = 0;
      dotsEaten++;
      dotsSinceFlash++;
      score += DOT_PTS;
      sfxDot();
      if (dotsSinceFlash >= DOTS_PER_FLASH) {
        dotsSinceFlash = 0;
        mazeFlashEnd = Date.now() + MAZE_FLASH_MS;
        sfxFlash();
      }
    } else if (dots[pr][pc] === 3) {
      dots[pr][pc] = 0;
      dotsEaten++;
      dotsSinceFlash++;
      score += DOT_PTS;
      powerEnd = Date.now() + POWER_MS;
      sfxPower();
      for (var i = 0; i < ghosts.length; i++) {
        if (!ghosts[i].eaten && !ghosts[i].inHouse) {
          ghosts[i].frightened = true;
          ghosts[i].frightEnd = Date.now() + POWER_MS;
          ghosts[i].dir = (ghosts[i].dir + 2) % 4;
        }
      }
      if (dotsSinceFlash >= DOTS_PER_FLASH) {
        dotsSinceFlash = 0;
        mazeFlashEnd = Date.now() + MAZE_FLASH_MS;
        sfxFlash();
      }
    }
  }

  // Track explored tiles
  var vis = powerEnd > Date.now() ? POWER_VIS : PLAYER_VIS;
  var vr = Math.floor(player.y / TILE);
  var vc = Math.floor(player.x / TILE);
  for (var dr = -vis; dr <= vis; dr++) {
    for (var dc = -vis; dc <= vis; dc++) {
      if (dr * dr + dc * dc <= vis * vis) {
        var er = vr + dr, ec = vc + dc;
        if (er >= 0 && er < ROWS && ec >= 0 && ec < COLS) {
          explored[er * COLS + ec] = 1;
        }
      }
    }
  }

  // Win check
  if (dotsEaten >= totalDots) {
    gameState = 'win';
    endGame(true);
  }
}

// =============================================
// GHOSTS
// =============================================
function initGhosts() {
  ghosts = [];
  var starts = [
    { r: 11, c: 13 },  // blinky starts outside, above gate
    { r: 14, c: 11 },  // pinky in house left
    { r: 14, c: 13 },  // inky in house center
    { r: 14, c: 14 },  // clyde in house right
  ];
  var corners = [
    { r: 0, c: COLS - 1 }, { r: 0, c: 0 },
    { r: ROWS - 1, c: COLS - 1 }, { r: ROWS - 1, c: 0 }
  ];
  var now = Date.now();
  for (var i = 0; i < 4; i++) {
    ghosts.push({
      x: starts[i].c * TILE + TILE / 2,
      y: starts[i].r * TILE + TILE / 2,
      dir: i === 0 ? 2 : 3,
      color: GHOST_COLORS[i],
      frightened: false,
      frightEnd: 0,
      eaten: false,
      inHouse: i > 0,
      releaseAt: now + i * 4000,
      scatter: corners[i]
    });
  }
}

function ghostTarget(g, idx) {
  var pr = Math.floor(player.y / TILE);
  var pc = Math.floor(player.x / TILE);
  if (g.eaten) return { r: 12, c: 13 }; // aim for gate entrance
  if (g.frightened) return { r: Math.floor(Math.random() * ROWS), c: Math.floor(Math.random() * COLS) };
  // scatter/chase cycle: 7s scatter, 20s chase
  var cycle = (Date.now() / 1000) % 27;
  if (cycle < 7) return g.scatter;
  var pd = player.dir >= 0 ? player.dir : 0;
  switch (idx) {
    case 0: return { r: pr, c: pc }; // blinky: direct
    case 1: return { r: pr + DY[pd] * 4, c: pc + DX[pd] * 4 }; // pinky: ahead
    case 2: // inky: relative to blinky
      var ar = pr + DY[pd] * 2, ac = pc + DX[pd] * 2;
      var b = ghosts[0];
      return { r: ar * 2 - Math.floor(b.y / TILE), c: ac * 2 - Math.floor(b.x / TILE) };
    case 3: // clyde: shy
      var dist = Math.abs(pr - Math.floor(g.y / TILE)) + Math.abs(pc - Math.floor(g.x / TILE));
      return dist > 8 ? { r: pr, c: pc } : g.scatter;
    default: return { r: pr, c: pc };
  }
}

function moveGhost(g, idx) {
  var now = Date.now();

  // In house: wait then float up
  if (g.inHouse) {
    if (now < g.releaseAt) {
      // Bob up and down
      g.y += Math.sin(now / 300) * 0.3;
      return;
    }
    // Move toward exit (gate is at col 13, row 12)
    var exitX = 13 * TILE + TILE / 2;
    var exitY = 11 * TILE + TILE / 2;
    // First center horizontally on gate column
    if (Math.abs(g.x - exitX) > 1.5) {
      g.x += (exitX > g.x ? 1 : -1) * 1.5;
      return;
    }
    g.x = exitX;
    // Then move up
    if (g.y > exitY) {
      g.y -= 1.5;
      return;
    }
    g.y = exitY;
    g.inHouse = false;
    g.dir = Math.random() < 0.5 ? 0 : 2;
    return;
  }

  // Eaten ghost returning to house - check if near the gate area
  if (g.eaten) {
    var homeX = 13 * TILE + TILE / 2;
    var homeY = 14 * TILE + TILE / 2;
    var gateY = 12 * TILE + TILE / 2;
    // If ghost is near gate entrance, teleport into house
    if (Math.abs(g.x - homeX) < TILE && Math.abs(g.y - gateY) < TILE * 1.5) {
      g.eaten = false;
      g.inHouse = true;
      g.releaseAt = now + 3000;
      g.x = homeX;
      g.y = homeY;
      return;
    }
  }

  // End frightened
  if (g.frightened && now > g.frightEnd) g.frightened = false;

  var spd = g.eaten ? G_EATEN_SPEED : (g.frightened ? G_FRIGHT_SPEED : G_SPEED);
  var gr = Math.floor(g.y / TILE);
  var gc = Math.floor(g.x / TILE);
  var cx = gc * TILE + TILE / 2;
  var cy = gr * TILE + TILE / 2;

  // Decision point: at tile center
  if (Math.abs(g.x - cx) < spd + 0.5 && Math.abs(g.y - cy) < spd + 0.5) {
    g.x = cx;
    g.y = cy;

    var tgt = ghostTarget(g, idx);
    var opp = (g.dir + 2) % 4;
    var bestD = g.dir;
    var bestDist = Infinity;

    for (var d = 0; d < 4; d++) {
      if (d === opp && !g.eaten) continue; // no reverse (unless eaten, need to get home)
      var nr = gr + DY[d];
      var nc = gc + DX[d];
      // Tunnel
      if (nc < 0 || nc >= COLS) {
        var wc = nc < 0 ? COLS - 1 : 0;
        var dd = (tgt.r - nr) * (tgt.r - nr) + (tgt.c - wc) * (tgt.c - wc);
        if (dd < bestDist) { bestDist = dd; bestD = d; }
        continue;
      }
      if (nr < 0 || nr >= ROWS) continue;
      var tile = maze[nr][nc];
      if (tile === 1) continue;
      if (tile === 5 && !g.eaten) continue; // gate blocked for non-eaten
      var dd2 = (tgt.r - nr) * (tgt.r - nr) + (tgt.c - nc) * (tgt.c - nc);
      if (dd2 < bestDist) { bestDist = dd2; bestD = d; }
    }
    if (bestDist === Infinity) bestD = opp; // stuck, reverse
    g.dir = bestD;
  }

  g.x += DX[g.dir] * spd;
  g.y += DY[g.dir] * spd;

  // Tunnel wrap
  if (g.x < -TILE) g.x += W + TILE * 2;
  if (g.x > W + TILE) g.x -= W + TILE * 2;
}

function checkCollisions() {
  for (var i = 0; i < ghosts.length; i++) {
    var g = ghosts[i];
    if (g.inHouse || g.eaten) continue;
    var dx = player.x - g.x;
    var dy = player.y - g.y;
    if (dx * dx + dy * dy < TILE * TILE * 0.6) {
      if (g.frightened) {
        g.eaten = true;
        g.frightened = false;
        ghostsEaten++;
        score += GHOST_PTS;
        sfxGhostEat();
      } else {
        return true; // death
      }
    }
  }
  return false;
}

// =============================================
// RENDERING
// =============================================
function render(ts) {
  var now = Date.now();
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Shake
  var sx = 0, sy = 0;
  if (now < shakeEnd) {
    sx = (Math.random() - 0.5) * 5;
    sy = (Math.random() - 0.5) * 5;
  }
  ctx.save();
  ctx.translate(sx, sy);

  var vis = powerEnd > now ? POWER_VIS : PLAYER_VIS;
  var flashing = mazeFlashEnd > now;

  // --- Draw scene onto offscreen ---
  sceneCtx.clearRect(0, 0, W, H);

  // Maze walls
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var x = c * TILE, y = r * TILE;
      var t = maze[r][c];

      if (t === 1) {
        if (flashing) {
          var fp = (mazeFlashEnd - now) / MAZE_FLASH_MS;
          sceneCtx.fillStyle = 'rgba(80,180,255,' + (0.25 + fp * 0.45).toFixed(2) + ')';
          sceneCtx.fillRect(x, y, TILE, TILE);
          sceneCtx.strokeStyle = 'rgba(0,255,255,' + (0.35 + fp * 0.35).toFixed(2) + ')';
          sceneCtx.lineWidth = 1;
          sceneCtx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
        } else {
          sceneCtx.fillStyle = '#1a1a3a';
          sceneCtx.fillRect(x, y, TILE, TILE);
          sceneCtx.strokeStyle = '#2a2a5a';
          sceneCtx.lineWidth = 0.5;
          sceneCtx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
        }
      } else if (t === 5) {
        sceneCtx.fillStyle = '#ff66cc';
        sceneCtx.fillRect(x, y + TILE * 0.35, TILE, TILE * 0.3);
      }
    }
  }

  // Revealed wall overlays (red flash + fade)
  for (var i = revealedWalls.length - 1; i >= 0; i--) {
    var rw = revealedWalls[i];
    var age = now - rw.time;
    if (age >= WALL_FLASH_MS) {
      revealedWalls.splice(i, 1);
      continue;
    }
    var wx = rw.c * TILE, wy = rw.r * TILE;
    // Red flash in first 250ms
    if (age < 250) {
      var ra = (1 - age / 250) * 0.8;
      sceneCtx.fillStyle = 'rgba(255,40,40,' + ra.toFixed(2) + ')';
      sceneCtx.fillRect(wx, wy, TILE, TILE);
    }
    // Visible wall that fades
    var fa = Math.max(0, 1 - age / WALL_FLASH_MS);
    sceneCtx.fillStyle = 'rgba(50,50,110,' + (fa * 0.6).toFixed(2) + ')';
    sceneCtx.fillRect(wx, wy, TILE, TILE);
    sceneCtx.strokeStyle = 'rgba(90,90,180,' + (fa * 0.7).toFixed(2) + ')';
    sceneCtx.lineWidth = 1;
    sceneCtx.strokeRect(wx + 0.5, wy + 0.5, TILE - 1, TILE - 1);
  }

  // Dots
  for (var r2 = 0; r2 < ROWS; r2++) {
    for (var c2 = 0; c2 < COLS; c2++) {
      var d = dots[r2][c2];
      if (d === 2) {
        sceneCtx.fillStyle = '#00ffff';
        sceneCtx.beginPath();
        sceneCtx.arc(c2 * TILE + TILE / 2, r2 * TILE + TILE / 2, 2, 0, Math.PI * 2);
        sceneCtx.fill();
      } else if (d === 3) {
        var pulse = 4 + Math.sin(ts / 180) * 2;
        sceneCtx.save();
        sceneCtx.shadowColor = '#00ff66';
        sceneCtx.shadowBlur = 12;
        sceneCtx.fillStyle = '#00ff66';
        sceneCtx.beginPath();
        sceneCtx.arc(c2 * TILE + TILE / 2, r2 * TILE + TILE / 2, pulse, 0, Math.PI * 2);
        sceneCtx.fill();
        sceneCtx.restore();
      }
    }
  }

  // Player
  sceneCtx.save();
  sceneCtx.translate(player.x, player.y);
  var pa = DIR_ANGLE[player.dir >= 0 ? player.dir : 0];
  sceneCtx.rotate(pa);
  // Glow
  var pg = sceneCtx.createRadialGradient(0, 0, 1, 0, 0, TILE * 0.8);
  pg.addColorStop(0, 'rgba(0,255,255,0.35)');
  pg.addColorStop(1, 'rgba(0,255,255,0)');
  sceneCtx.fillStyle = pg;
  sceneCtx.fillRect(-TILE, -TILE, TILE * 2, TILE * 2);
  // Body
  sceneCtx.beginPath();
  sceneCtx.arc(0, 0, TILE * 0.42, player.mouth, Math.PI * 2 - player.mouth);
  sceneCtx.lineTo(0, 0);
  sceneCtx.closePath();
  sceneCtx.shadowColor = '#00ffff';
  sceneCtx.shadowBlur = 14;
  sceneCtx.fillStyle = '#00ffff';
  sceneCtx.fill();
  sceneCtx.shadowBlur = 0;
  sceneCtx.restore();

  // Ghosts
  for (var gi = 0; gi < ghosts.length; gi++) {
    var gh = ghosts[gi];
    if (gh.eaten) {
      // Eyes only
      var ex = DX[gh.dir] * 2, ey = DY[gh.dir] * 2;
      sceneCtx.fillStyle = '#fff';
      sceneCtx.beginPath();
      sceneCtx.arc(gh.x - 4, gh.y - 4, 3, 0, Math.PI * 2);
      sceneCtx.arc(gh.x + 4, gh.y - 4, 3, 0, Math.PI * 2);
      sceneCtx.fill();
      sceneCtx.fillStyle = '#22f';
      sceneCtx.beginPath();
      sceneCtx.arc(gh.x - 4 + ex, gh.y - 4 + ey, 1.5, 0, Math.PI * 2);
      sceneCtx.arc(gh.x + 4 + ex, gh.y - 4 + ey, 1.5, 0, Math.PI * 2);
      sceneCtx.fill();
      continue;
    }

    sceneCtx.save();
    sceneCtx.translate(gh.x, gh.y);

    var bColor;
    if (gh.frightened) {
      bColor = (gh.frightEnd - now < 1500 && Math.floor(now / 150) % 2) ? '#ffffff' : '#2222ff';
    } else {
      bColor = gh.color;
    }

    // Body outline
    var hw = TILE * 0.42;
    sceneCtx.beginPath();
    sceneCtx.arc(0, -2, hw, Math.PI, 0);
    sceneCtx.lineTo(hw, TILE * 0.22);
    for (var wv = 0; wv < 3; wv++) {
      var wave = Math.sin(ts / 140 + wv * 2.1) * 2;
      sceneCtx.lineTo(hw - (wv + 0.5) * (hw * 2 / 3), TILE * 0.18 + wave);
    }
    sceneCtx.lineTo(-hw, TILE * 0.22);
    sceneCtx.closePath();

    sceneCtx.shadowColor = bColor;
    sceneCtx.shadowBlur = 10;
    sceneCtx.strokeStyle = bColor;
    sceneCtx.lineWidth = 2;
    sceneCtx.stroke();
    sceneCtx.fillStyle = bColor + '30';
    sceneCtx.fill();
    sceneCtx.shadowBlur = 0;

    // Eyes
    var edx = DX[gh.dir] * 2, edy = DY[gh.dir] * 2;
    sceneCtx.fillStyle = '#fff';
    sceneCtx.beginPath();
    sceneCtx.arc(-4, -4, 3, 0, Math.PI * 2);
    sceneCtx.arc(4, -4, 3, 0, Math.PI * 2);
    sceneCtx.fill();
    sceneCtx.fillStyle = gh.frightened ? '#f00' : '#111';
    sceneCtx.beginPath();
    sceneCtx.arc(-4 + edx, -4 + edy, 1.5, 0, Math.PI * 2);
    sceneCtx.arc(4 + edx, -4 + edy, 1.5, 0, Math.PI * 2);
    sceneCtx.fill();

    sceneCtx.restore();
  }

  // --- FOG OF WAR ---
  if (flashing) {
    // Full visibility
    ctx.drawImage(sceneCanvas, 0, 0);
  } else {
    // Build visibility mask
    maskCtx.clearRect(0, 0, W, H);

    // Player light
    var lg = maskCtx.createRadialGradient(
      player.x, player.y, TILE * 0.5,
      player.x, player.y, vis * TILE
    );
    lg.addColorStop(0, 'rgba(255,255,255,1)');
    lg.addColorStop(0.5, 'rgba(255,255,255,0.85)');
    lg.addColorStop(0.8, 'rgba(255,255,255,0.3)');
    lg.addColorStop(1, 'rgba(255,255,255,0)');
    maskCtx.fillStyle = lg;
    maskCtx.beginPath();
    maskCtx.arc(player.x, player.y, vis * TILE, 0, Math.PI * 2);
    maskCtx.fill();

    // Revealed walls light
    for (var ri = 0; ri < revealedWalls.length; ri++) {
      var rw2 = revealedWalls[ri];
      var age2 = now - rw2.time;
      if (age2 < WALL_FLASH_MS) {
        var a2 = Math.max(0, 1 - age2 / WALL_FLASH_MS);
        var rwx = rw2.c * TILE + TILE / 2;
        var rwy = rw2.r * TILE + TILE / 2;
        var rg = maskCtx.createRadialGradient(rwx, rwy, 0, rwx, rwy, TILE * 1.5);
        rg.addColorStop(0, 'rgba(255,255,255,' + a2.toFixed(2) + ')');
        rg.addColorStop(1, 'rgba(255,255,255,0)');
        maskCtx.fillStyle = rg;
        maskCtx.beginPath();
        maskCtx.arc(rwx, rwy, TILE * 1.5, 0, Math.PI * 2);
        maskCtx.fill();
      }
    }

    // Apply mask
    sceneCtx.globalCompositeOperation = 'destination-in';
    sceneCtx.drawImage(maskCanvas, 0, 0);
    sceneCtx.globalCompositeOperation = 'source-over';

    ctx.drawImage(sceneCanvas, 0, 0);
  }

  // --- Ghost glow through darkness ---
  for (var gj = 0; gj < ghosts.length; gj++) {
    var gg = ghosts[gj];
    if (gg.eaten || gg.inHouse) continue;
    var gdx = player.x - gg.x;
    var gdy = player.y - gg.y;
    var gdist = Math.sqrt(gdx * gdx + gdy * gdy);

    // Show glow even when inside visibility (dimmer when close), but especially outside
    if (!flashing && gdist > vis * TILE * 0.5) {
      var maxD = 14 * TILE;
      if (gdist < maxD) {
        var inten = Math.pow(1 - gdist / maxD, 1.5);
        var gSize = TILE * (1.2 + inten * 2.5);
        var gc2 = gg.frightened ? '#2222ff' : gg.color;
        var ggr = ctx.createRadialGradient(gg.x, gg.y, 0, gg.x, gg.y, gSize);
        var ha1 = Math.min(255, Math.floor(inten * 70));
        var ha2 = Math.min(255, Math.floor(inten * 30));
        ggr.addColorStop(0, gc2 + toHex2(ha1));
        ggr.addColorStop(0.4, gc2 + toHex2(ha2));
        ggr.addColorStop(1, gc2 + '00');
        ctx.fillStyle = ggr;
        ctx.beginPath();
        ctx.arc(gg.x, gg.y, gSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(25,25,55,0.12)';
  ctx.lineWidth = 0.5;
  for (var gr2 = 0; gr2 <= ROWS; gr2++) {
    ctx.beginPath();
    ctx.moveTo(0, gr2 * TILE);
    ctx.lineTo(W, gr2 * TILE);
    ctx.stroke();
  }
  for (var gc3 = 0; gc3 <= COLS; gc3++) {
    ctx.beginPath();
    ctx.moveTo(gc3 * TILE, 0);
    ctx.lineTo(gc3 * TILE, H);
    ctx.stroke();
  }

  // Flash bright overlay at start of maze flash
  if (flashing) {
    var fp2 = (mazeFlashEnd - now) / MAZE_FLASH_MS;
    if (fp2 > 0.85) {
      var bri = ((fp2 - 0.85) / 0.15);
      ctx.fillStyle = 'rgba(200,255,255,' + (bri * 0.4).toFixed(2) + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  ctx.restore();
}

function toHex2(n) {
  var h = Math.max(0, Math.min(255, Math.round(n))).toString(16);
  return h.length < 2 ? '0' + h : h;
}

// =============================================
// HUD
// =============================================
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score.toLocaleString();
  document.getElementById('dotsDisplay').textContent = dotsEaten + '/' + totalDots;
  var l = '';
  for (var i = 0; i < lives; i++) l += '\u25CF ';
  document.getElementById('livesDisplay').textContent = l;
}

// =============================================
// GAME LOOP
// =============================================
function loop(ts) {
  if (gameState !== 'playing') return;

  var now = Date.now();
  if (now < deathPause) {
    // Brief pause after death
    requestAnimationFrame(loop);
    return;
  }

  movePlayer();
  for (var i = 0; i < ghosts.length; i++) moveGhost(ghosts[i], i);

  if (checkCollisions()) {
    lives--;
    sfxDeath();
    if (lives <= 0) {
      gameState = 'gameover';
      endGame(false);
      return;
    }
    // Reset positions, brief pause
    initPlayer();
    initGhosts();
    deathPause = Date.now() + 800;
  }

  updateWarning();
  render(ts);
  updateHUD();
  requestAnimationFrame(loop);
}

// =============================================
// SCREENS
// =============================================
function exploredPct() {
  var passable = 0, exp = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (maze[r][c] !== 1) {
        passable++;
        if (explored[r * COLS + c]) exp++;
      }
    }
  }
  return Math.round((exp / Math.max(passable, 1)) * 100);
}

function fillStats(el, win) {
  while (el.firstChild) el.removeChild(el.firstChild);
  var pct = exploredPct();
  var data = win
    ? [['Score: ', score.toLocaleString()],
       ['All ', totalDots + ' dots eaten!'],
       ['Ghosts Eaten: ', String(ghostsEaten)],
       ['Maze Explored: ', pct + '%']]
    : [['Score: ', score.toLocaleString()],
       ['Dots: ', dotsEaten + '/' + totalDots],
       ['Ghosts Eaten: ', String(ghostsEaten)],
       ['Maze Explored: ', pct + '%'],
       ['High Score: ', highScore.toLocaleString()]];
  for (var i = 0; i < data.length; i++) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(data[i][0]));
    var span = document.createElement('span');
    span.className = 'val';
    span.textContent = data[i][1];
    div.appendChild(span);
    el.appendChild(div);
  }
}

function endGame(win) {
  var topScores = saveScore('neonarcade_scores_pacman', score);
  if (topScores.length > 0 && topScores[0].score > highScore) {
    highScore = topScores[0].score;
  }
  var screenId = win ? 'winScreen' : 'gameOverScreen';
  var statsId = win ? 'winStats' : 'gameOverStats';
  var tableId = win ? 'winScoreTable' : 'gameOverScoreTable';
  fillStats(document.getElementById(statsId), win);
  renderScoreTable(document.getElementById(tableId), topScores);
  document.getElementById(screenId).classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  if (warningGainNode) warningGainNode.gain.value = 0;
  document.getElementById('warningOverlay').style.opacity = '0';
}

function showStart() {
  var _sc = JSON.parse(localStorage.getItem('neonarcade_scores_pacman') || '[]');
  if (_sc.length > 0) highScore = _sc[0].score;
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'none';
  if (highScore > 0) {
    document.getElementById('highScoreDisplay').textContent = 'HIGH SCORE: ' + highScore.toLocaleString();
  }
}

function startGame() {
  ensureAudio();
  initMaze();
  initPlayer();
  initGhosts();
  score = 0;
  lives = 3;
  ghostsEaten = 0;
  deathPause = 0;
  gameState = 'playing';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'block';
  requestAnimationFrame(loop);
}

// =============================================
// SHARE
// =============================================
function share() {
  var pct = exploredPct();
  var txt = '\uD83D\uDC7B PAC-MAN AMNESIA\nScore: ' + score.toLocaleString() +
    '\nDots: ' + dotsEaten + '/' + totalDots + ' | Ghosts: ' + ghostsEaten +
    '\nExplored: ' + pct + '% in the dark\nThe maze forgets. Do you? \uD83C\uDF11';
  if (navigator.share) {
    navigator.share({ text: txt }).catch(function() {
      copyText(txt);
    });
  } else {
    copyText(txt);
  }
}

function copyText(t) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function() { alert('Copied to clipboard!'); });
  } else {
    prompt('Copy your score:', t);
  }
}

// =============================================
// INPUT
// =============================================
function setDir(d) {
  if (gameState === 'playing') player.nextDir = d;
}

document.addEventListener('keydown', function(e) {
  var d = -1;
  switch (e.key) {
    case 'ArrowRight': case 'd': case 'D': d = 0; break;
    case 'ArrowDown':  case 's': case 'S': d = 1; break;
    case 'ArrowLeft':  case 'a': case 'A': d = 2; break;
    case 'ArrowUp':    case 'w': case 'W': d = 3; break;
  }
  if (d >= 0) { e.preventDefault(); setDir(d); }
});

var tX = 0, tY = 0;
document.addEventListener('touchstart', function(e) {
  tX = e.touches[0].clientX;
  tY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - tX;
  var dy = e.changedTouches[0].clientY - tY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 12) return;
  setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 0 : 2) : (dy > 0 ? 1 : 3));
});

// BUTTONS
// =============================================
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);
document.getElementById('winReplayBtn').addEventListener('click', startGame);
document.getElementById('shareBtn').addEventListener('click', share);
document.getElementById('winShareBtn').addEventListener('click', share);

// =============================================
// CANVAS SETUP
// =============================================
function resize() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;
  var mw = window.innerWidth * 0.96;
  var mh = window.innerHeight * 0.92;
  var sc = Math.min(mw / W, mh / H);
  canvas.style.width = Math.floor(W * sc) + 'px';
  canvas.style.height = Math.floor(H * sc) + 'px';
}

// Create cached offscreen canvases
sceneCanvas = document.createElement('canvas');
sceneCanvas.width = W;
sceneCanvas.height = H;
sceneCtx = sceneCanvas.getContext('2d');

maskCanvas = document.createElement('canvas');
maskCanvas.width = W;
