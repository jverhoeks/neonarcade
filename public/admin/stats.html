<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON ARCADE — Stats Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:#0a0a12;font-family:'Rajdhani',sans-serif;color:#fff}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);z-index:9999}
.header{text-align:center;padding:40px 20px 20px}
.header h1{font-family:'Orbitron',monospace;font-weight:900;font-size:28px;letter-spacing:6px;color:#b44dff;text-shadow:0 0 10px rgba(180,77,255,0.6),0 0 40px rgba(180,77,255,0.2)}
.header .sub{font-weight:300;font-size:14px;letter-spacing:3px;color:#7a7a9a;text-transform:uppercase;margin-top:8px}
.back-link{display:inline-block;margin:10px 20px;font-family:'Rajdhani',sans-serif;font-size:14px;color:#7a7a9a;text-decoration:none;letter-spacing:2px}
.back-link:hover{color:#00f0ff}
.summary{display:flex;justify-content:center;gap:30px;padding:20px;flex-wrap:wrap}
.summary .stat-box{background:#12121f;border:1px solid #1a1a2e;border-radius:6px;padding:20px 30px;text-align:center;min-width:140px}
.stat-box .val{font-family:'Orbitron',monospace;font-weight:900;font-size:28px;letter-spacing:2px}
.stat-box .lbl{font-weight:300;font-size:12px;letter-spacing:3px;color:#7a7a9a;text-transform:uppercase;margin-top:4px}
.val-plays{color:#00f0ff;text-shadow:0 0 8px rgba(0,240,255,0.4)}
.val-likes{color:#39ff14;text-shadow:0 0 8px rgba(57,255,20,0.4)}
.val-issues{color:#ff2d7b;text-shadow:0 0 8px rgba(255,45,123,0.4)}
.val-games{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.4)}
.controls{display:flex;justify-content:center;gap:12px;padding:10px 20px 20px;flex-wrap:wrap}
.controls input{font-family:'Rajdhani',sans-serif;font-size:14px;padding:8px 16px;background:rgba(255,255,255,0.05);border:1px solid #222;color:#fff;border-radius:3px;width:240px;letter-spacing:1px}
.controls input::placeholder{color:#7a7a9a}
.loading{text-align:center;padding:60px;color:#7a7a9a;font-size:16px;letter-spacing:2px}
.table-wrap{max-width:1100px;margin:0 auto;padding:0 20px 40px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-family:'Orbitron',monospace;font-weight:700;font-size:11px;letter-spacing:2px;color:#7a7a9a;text-transform:uppercase;padding:12px 16px;border-bottom:1px solid #1a1a2e;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#8888aa}
thead th.sorted-asc::after{content:' \25B2';color:#00f0ff}
thead th.sorted-desc::after{content:' \25BC';color:#00f0ff}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.02);transition:background 0.15s}
tbody tr:hover{background:rgba(0,240,255,0.03)}
tbody td{padding:10px 16px;font-size:14px;letter-spacing:1px}
td.game-name{font-family:'Orbitron',monospace;font-weight:700;font-size:12px;letter-spacing:2px;color:#00f0ff}
td.num{font-family:'Orbitron',monospace;font-weight:400;font-size:14px;text-align:right;padding-right:24px}
td.plays{color:#00f0ff}
td.likes{color:#39ff14}
td.issues{color:#ff2d7b}
.bar{display:inline-block;height:6px;border-radius:3px;margin-left:8px;vertical-align:middle;opacity:0.5}
.bar-plays{background:#00f0ff}
.bar-likes{background:#39ff14}
.bar-issues{background:#ff2d7b}
</style>
</head>
<body>
<a href="/admin/topscores.html" class="back-link">TOP SCORES &#8594;</a>
<a href="/" class="back-link">&#8592; HUB</a>
<div class="header">
  <h1>STATS</h1>
  <div class="sub">Plays, likes & issues across all games</div>
</div>
<div class="summary" id="summary" style="display:none">
  <div class="stat-box"><div class="val val-games" id="total-games">0</div><div class="lbl">Games</div></div>
  <div class="stat-box"><div class="val val-plays" id="total-plays">0</div><div class="lbl">Total Plays</div></div>
  <div class="stat-box"><div class="val val-likes" id="total-likes">0</div><div class="lbl">Total Likes</div></div>
  <div class="stat-box"><div class="val val-issues" id="total-issues">0</div><div class="lbl">Total Issues</div></div>
</div>
<div class="controls">
  <input type="text" id="search" placeholder="Filter games...">
</div>
<div class="loading" id="loading">LOADING STATS...</div>
<div class="table-wrap" id="table-wrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th data-col="rank">#</th>
        <th data-col="game">Game</th>
        <th data-col="plays" class="sorted-desc">Plays</th>
        <th data-col="likes">Likes</th>
        <th data-col="issues">Issues</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
(function() {
  var data = {};
  var sortCol = 'plays';
  var sortDir = 'desc';

  function fetchStats() {
    fetch('/api/stats')
      .then(function(r) { return r.json(); })
      .then(function(res) {
        data = res.games || {};
        render();
      })
      .catch(function() {
        document.getElementById('loading').textContent = 'FAILED TO LOAD STATS';
      });
  }

  function render() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('summary').style.display = '';
    document.getElementById('table-wrap').style.display = '';

    var search = document.getElementById('search').value.toLowerCase();

    var entries = Object.keys(data).map(function(g) {
      return { game: g, plays: data[g].plays, likes: data[g].likes, issues: data[g].issues };
    });

    if (search) {
      entries = entries.filter(function(e) { return e.game.indexOf(search) !== -1; });
    }

    entries.sort(function(a, b) {
      var va = sortCol === 'game' ? a.game : a[sortCol];
      var vb = sortCol === 'game' ? b.game : b[sortCol];
      if (sortCol === 'game') {
        return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      }
      return sortDir === 'asc' ? va - vb : vb - va;
    });

    var totalPlays = 0, totalLikes = 0, totalIssues = 0;
    entries.forEach(function(e) {
      totalPlays += e.plays;
      totalLikes += e.likes;
      totalIssues += e.issues;
    });
    document.getElementById('total-games').textContent = entries.length;
    document.getElementById('total-plays').textContent = totalPlays.toLocaleString();
    document.getElementById('total-likes').textContent = totalLikes.toLocaleString();
    document.getElementById('total-issues').textContent = totalIssues.toLocaleString();

    var maxPlays = Math.max.apply(null, entries.map(function(e) { return e.plays; }).concat([1]));
    var maxLikes = Math.max.apply(null, entries.map(function(e) { return e.likes; }).concat([1]));
    var maxIssues = Math.max.apply(null, entries.map(function(e) { return e.issues; }).concat([1]));

    var tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    entries.forEach(function(e, i) {
      var tr = document.createElement('tr');

      var tdRank = document.createElement('td');
      tdRank.className = 'num';
      tdRank.style.color = '#7a7a9a';
      tdRank.textContent = i + 1;

      var tdName = document.createElement('td');
      tdName.className = 'game-name';
      tdName.textContent = e.game.toUpperCase().replace(/-/g, ' ');

      var tdPlays = document.createElement('td');
      tdPlays.className = 'num plays';
      tdPlays.textContent = e.plays.toLocaleString();
      var barP = document.createElement('span');
      barP.className = 'bar bar-plays';
      barP.style.width = Math.round(e.plays / maxPlays * 80) + 'px';
      tdPlays.appendChild(barP);

      var tdLikes = document.createElement('td');
      tdLikes.className = 'num likes';
      tdLikes.textContent = e.likes.toLocaleString();
      var barL = document.createElement('span');
      barL.className = 'bar bar-likes';
      barL.style.width = Math.round(e.likes / maxLikes * 80) + 'px';
      tdLikes.appendChild(barL);

      var tdIssues = document.createElement('td');
      tdIssues.className = 'num issues';
      tdIssues.textContent = e.issues.toLocaleString();
      var barI = document.createElement('span');
      barI.className = 'bar bar-issues';
      barI.style.width = Math.round(e.issues / maxIssues * 80) + 'px';
      tdIssues.appendChild(barI);

      tr.appendChild(tdRank);
      tr.appendChild(tdName);
      tr.appendChild(tdPlays);
      tr.appendChild(tdLikes);
      tr.appendChild(tdIssues);
      tbody.appendChild(tr);
    });

    var ths = document.querySelectorAll('thead th');
    ths.forEach(function(th) {
      th.classList.remove('sorted-asc', 'sorted-desc');
      if (th.getAttribute('data-col') === sortCol) {
        th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
      }
    });
  }

  document.querySelectorAll('thead th').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = th.getAttribute('data-col');
      if (col === 'rank') return;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = col === 'game' ? 'asc' : 'desc';
      }
      render();
    });
  });

  document.getElementById('search').addEventListener('input', render);

  fetchStats();
})();
</script>
</body>
</html>
