<style>

  body::before {

  }
  .loading-dots::after {
    content: '';

  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }

  }

  /* Prompt (no game selected) */
  .prompt-state {
    padding: 64px 24px;

    margin-bottom: 16px;
    display: block;

  .prompt-state .msg {

  /* Footer */

  }
  .back-link:hover {
    text-shadow: 0 0 10px rgba(0,240,255,0.5);

  }

  /* Responsive */
  @media (max-width: 520px) {
    .container { padding: 24px 12px 40px; }

    .lb-table th, .lb-table td { padding-left: 16px; padding-right: 16px; }
    .stats-bar { padding: 12px 16px; }
    .rank-cell { width: 44px; }
  }
</style>

<script>
(function() {
  'use strict';

  // Game slug -> category path mapping
  var GAME_CATEGORY = {
    'neon-snake': 'neonarcade', 'impostor-pixel': 'neonarcade', 'catalyst': 'neonarcade',
    'pong-both-sides': 'neonarcade', 'afterglow': 'neonarcade', 'flappy-rewind': 'neonarcade',
    'palette': 'neonarcade', 'pacman-amnesia': 'neonarcade', 'territory': 'neonarcade',
    'signal': 'neonarcade', 'burndown': 'neonarcade', 'mine-finder': 'neonarcade',
    'tetris-betrayal': 'neonarcade', 'faultline': 'neonarcade', 'wordchain': 'neonarcade',
    'split-second': 'neonarcade', 'chimp': 'neonarcade', 'pour': 'neonarcade',
    'bloomfield': 'neonarcade', 'typeblitz': 'neonarcade',
    'sudoku': 'neonmind', 'minisudoku': 'neonmind', 'queens': 'neonmind',
    'minesweeper': 'neonmind', 'kakuro': 'neonmind', 'nonogram': 'neonmind',
    'bridges': 'neonmind', 'tango': 'neonmind', 'lightup': 'neonmind',
    'tents': 'neonmind', 'skyscrapers': 'neonmind', 'connections': 'neonmind',
    'hitori': 'neonmind', 'kenken': 'neonmind',
    'mathblitz': 'neongrind', 'reflex-chain': 'neongrind', 'neurosort': 'neongrind',
    'colorname': 'neongrind', 'numbersense': 'neongrind', 'gridmatch': 'neongrind',
    'sequencer': 'neongrind',
    'invaders': 'neonclassic', 'breakout': 'neonclassic', 'tetris': 'neonclassic',
    '2048': 'neonclassic', 'pairs': 'neonclassic', 'asteroids': 'neonclassic',
    'frogger': 'neonclassic',
    'fusion': 'neonquest', 'jackpot': 'neonquest', 'firewall': 'neonquest',
    'swarm': 'neonquest', 'synthesis': 'neonquest',
    'blackjack': 'neoncasino', 'poker': 'neoncasino', 'roulette': 'neoncasino',
    'slots': 'neoncasino', 'video-poker': 'neoncasino'
  };

  // Time-based games (mode: low — lower is better, display as mm:ss)
  var TIME_GAMES = {
    'sudoku': true, 'minisudoku': true, 'queens': true, 'minesweeper': true,
    'kakuro': true, 'nonogram': true, 'bridges': true, 'tango': true,
    'lightup': true, 'tents': true, 'skyscrapers': true, 'connections': true,
    'hitori': true, 'kenken': true, 'pairs': true, 'battleship': true
  };

  var picker = document.getElementById('game-picker');
  var boardArea = document.getElementById('board-area');

  // Read ?game= param on load
  var params = new URLSearchParams(window.location.search);
  var initialGame = params.get('game');
  if (initialGame && picker.querySelector('option[value="' + CSS.escape(initialGame) + '"]')) {
    picker.value = initialGame;
    loadBoard(initialGame);
  }

  picker.addEventListener('change', function() {
    var slug = picker.value;
    if (slug) {
      // Update URL without reload
      var url = new URL(window.location);
      url.searchParams.set('game', slug);
      window.history.replaceState(null, '', url);
      loadBoard(slug);
    } else {
      var url2 = new URL(window.location);
      url2.searchParams.delete('game');
      window.history.replaceState(null, '', url2);
      showPrompt();
    }
  });

  function showPrompt() {
    boardArea.textContent = '';
    var card = document.createElement('div');
    card.className = 'board-card';
    var ps = document.createElement('div');
    ps.className = 'prompt-state';
    var icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = '#';
    var msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = 'Select a game to view the leaderboard';
    ps.appendChild(icon);
    ps.appendChild(msg);
    card.appendChild(ps);
    boardArea.appendChild(card);
  }

  function showLoading() {
    boardArea.textContent = '';
    var card = document.createElement('div');
    card.className = 'board-card';
    var s = document.createElement('div');
    s.className = 'state-msg';
    s.textContent = 'Loading leaderboard';
    var dots = document.createElement('span');
    dots.className = 'loading-dots';
    s.appendChild(dots);
    card.appendChild(s);
    boardArea.appendChild(card);
  }

  function showError(message) {
    boardArea.textContent = '';
    var card = document.createElement('div');
    card.className = 'board-card';
    var s = document.createElement('div');
    s.className = 'state-msg error';
    s.textContent = message;
    card.appendChild(s);
    boardArea.appendChild(card);
  }

  function formatScore(score, slug) {
    if (TIME_GAMES[slug]) {
      var total = Math.floor(score);
      var m = Math.floor(total / 60);
      var sec = total % 60;
      return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    }
    return score.toLocaleString();
  }

  function getGameName(slug) {
    var opt = picker.querySelector('option[value="' + CSS.escape(slug) + '"]');
    return opt ? opt.textContent : slug;
  }

  function getGameURL(slug) {
    var cat = GAME_CATEGORY[slug];
    if (!cat) return '/';
    return '/' + cat + '/' + slug + '.html';
  }

  function loadBoard(slug) {
    showLoading();

    var lbURL = '/api/leaderboard/' + encodeURIComponent(slug);
    var statsURL = '/api/stats/' + encodeURIComponent(slug);

    Promise.all([
      fetch(lbURL).then(function(r) { return r.ok ? r.json() : Promise.reject('leaderboard fetch failed'); }),
      fetch(statsURL).then(function(r) { return r.ok ? r.json() : Promise.reject('stats fetch failed'); })
    ]).then(function(results) {
      var lbData = results[0];
      var statsData = results[1];
      renderBoard(slug, lbData.leaderboard || [], statsData);
    }).catch(function(err) {
      showError('Failed to load leaderboard');
    });
  }

  function renderBoard(slug, entries, stats) {
    boardArea.textContent = '';

    var card = document.createElement('div');
    card.className = 'board-card';

    // Header
    var header = document.createElement('div');
    header.className = 'board-header';

    var title = document.createElement('div');
    title.className = 'board-title';
    title.textContent = getGameName(slug);

    var playLink = document.createElement('a');
    playLink.className = 'play-link';
    playLink.href = getGameURL(slug);
    playLink.textContent = 'PLAY';

    header.appendChild(title);
    header.appendChild(playLink);
    card.appendChild(header);

    // Leaderboard table or empty
    if (entries.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'state-msg';
      empty.textContent = 'No scores yet — be the first!';
      card.appendChild(empty);
    } else {
      var table = document.createElement('table');
      table.className = 'lb-table';

      var thead = document.createElement('thead');
      var headRow = document.createElement('tr');
      var thRank = document.createElement('th');
      thRank.textContent = 'Rank';
      var thName = document.createElement('th');
      thName.textContent = 'Player';
      var thScore = document.createElement('th');
      thScore.textContent = 'Score';
      headRow.appendChild(thRank);
      headRow.appendChild(thName);
      headRow.appendChild(thScore);
      thead.appendChild(headRow);
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      for (var i = 0; i < entries.length; i++) {
        var entry = entries[i];
        var rank = i + 1;

        var tr = document.createElement('tr');
        if (rank === 1) tr.className = 'rank-1-row';
        else if (rank === 2) tr.className = 'rank-2-row';
        else if (rank === 3) tr.className = 'rank-3-row';

        var tdRank = document.createElement('td');
        tdRank.className = 'rank-cell';
        if (rank === 1) tdRank.className += ' rank-1';
        else if (rank === 2) tdRank.className += ' rank-2';
        else if (rank === 3) tdRank.className += ' rank-3';
        else tdRank.className += ' rank-other';
        tdRank.textContent = rank <= 3 ? ['', '#1', '#2', '#3'][rank] : rank;

        var tdName = document.createElement('td');
        tdName.className = 'name-cell';
        tdName.textContent = entry.name || '???';

        var tdScore = document.createElement('td');
        tdScore.className = 'score-cell';
        tdScore.textContent = formatScore(entry.score, slug);

        tr.appendChild(tdRank);
        tr.appendChild(tdName);
        tr.appendChild(tdScore);
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      card.appendChild(table);
    }

    // Stats bar
    var statsBar = document.createElement('div');
    statsBar.className = 'stats-bar';
    var totalPlays = (stats && stats.plays) || 0;
    var todayPlays = (stats && stats.playsToday) || 0;
    var totalSpan = document.createElement('span');
    totalSpan.className = 'stat-num';
    totalSpan.textContent = totalPlays.toLocaleString();
    var todaySpan = document.createElement('span');
    todaySpan.className = 'stat-num';
    todaySpan.textContent = todayPlays.toLocaleString();

    statsBar.appendChild(totalSpan);
    statsBar.appendChild(document.createTextNode(' total plays \u00B7 '));
    statsBar.appendChild(todaySpan);
    statsBar.appendChild(document.createTextNode(' today'));

    card.appendChild(statsBar);

    boardArea.appendChild(card);
  }

})();
</script>
</body>
</html>
