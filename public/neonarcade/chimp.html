<script>
(function() {
  'use strict';

  // ============ CONFIG ============
  var COLS = 5;
  var ROWS = 8;
  var START_LEVEL = 4;
  var START_DISPLAY_TIME = 1200;
  var DISPLAY_TIME_DECREASE = 80;
  var MIN_DISPLAY_TIME = 400;
  var CHIMP_LEVEL = 9;

  // ============ AUDIO ============
  var audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playRevealSound() {
    try {
      var ctx = getAudio();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(900, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  function playCorrectSound(num, total) {
    try {
      var ctx = getAudio();
      var baseFreq = 800 + (num / total) * 400;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(baseFreq * 1.2, ctx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      var ctx = getAudio();
      var osc = ctx.createOscillator();
      var osc2 = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      osc2.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc2.type = 'square';
      osc.frequency.setValueAtTime(180, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.35);
      osc2.frequency.setValueAtTime(190, ctx.currentTime);
      osc2.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc2.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
      osc2.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  function playLevelComplete() {
    try {
      var ctx = getAudio();
      var notes = [523, 659, 784, 1047];
      notes.forEach(function(freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.08);
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.08);
        gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + i * 0.08 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.2);
        osc.start(ctx.currentTime + i * 0.08);
        osc.stop(ctx.currentTime + i * 0.08 + 0.2);
      });
    } catch(e) {}
  }

  function playNewBestSound() {
    try {
      var ctx = getAudio();
      var notes = [523, 659, 784, 1047, 1319];
      notes.forEach(function(freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.1 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.3);
      });
    } catch(e) {}
  }

  // ============ PARTICLES ============
  function spawnParticles(x, y, color, count) {
    count = count || 12;
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = color;
      p.style.boxShadow = '0 0 6px ' + color;
      document.body.appendChild(p);
      var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      var speed = 60 + Math.random() * 80;
      var dx = Math.cos(angle) * speed;
      var dy = Math.sin(angle) * speed;
      (function(el, pdx, pdy) {
        var startX = x, startY = y;
        var startTime = performance.now();
        var duration = 500 + Math.random() * 300;
        function animate(now) {
          var t = (now - startTime) / duration;
          if (t >= 1) { el.remove(); return; }
          el.style.left = (startX + pdx * t) + 'px';
          el.style.top = (startY + pdy * t + 30 * t * t) + 'px';
          el.style.opacity = String(1 - t);
          el.style.transform = 'scale(' + (1 - t * 0.5) + ')';
          requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
      })(p, dx, dy);
    }
  }

  // ============ DOM REFS ============
  var startScreen = document.getElementById('start-screen');
  var gameoverScreen = document.getElementById('gameover-screen');
  var gridContainer = document.getElementById('grid-container');
  var grid = document.getElementById('grid');
  var hud = document.getElementById('hud');
  var hudLevel = document.getElementById('hud-level');
  var hudNumbers = document.getElementById('hud-numbers');
  var hudBest = document.getElementById('hud-best');
  var timerBarWrap = document.getElementById('timer-bar-wrap');
  var timerBar = document.getElementById('timer-bar');
  var startBtn = document.getElementById('start-btn');
  var retryBtn = document.getElementById('retry-btn');
  var shareBtn = document.getElementById('share-btn');
  var goVerdict = document.getElementById('go-verdict');
  var goLevel = document.getElementById('go-level');
  var goCorrect = document.getElementById('go-correct');
  var goBest = document.getElementById('go-best');
  var goNewBest = document.getElementById('go-newbest');

  // ============ STATE ============
  var level = START_LEVEL;
  var nextNum = 1;
  var totalCorrect = 0;
  var cells = [];
  var numberMap = {};
  var phase = 'idle'; // idle | showing | playing | gameover
  var displayTimeout = null;
  var bestLevel = 0;

  // ============ INIT ============
  Neon.init({ game: 'chimp', mode: 'high' });
  bestLevel = Neon.getHighScore() || 0;

  function buildGrid() {
    grid.textContent = '';
    cells = [];
    for (var i = 0; i < COLS * ROWS; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = String(i);
      cell.addEventListener('click', onCellClick);
      cell.addEventListener('touchend', onCellTouch);
      grid.appendChild(cell);
      cells.push(cell);
    }
  }

  buildGrid();

  // Render start screen leaderboard
  try { Neon.render(document.getElementById('startLB')); } catch(e) {}

  if (bestLevel > 0) {
    hudBest.textContent = String(bestLevel);
  }

  // ============ GAME FLOW ============
  function startGame() {
    startScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');
    gridContainer.style.display = 'flex';
    hud.style.display = 'flex';
    level = START_LEVEL;
    nextNum = 1;
    totalCorrect = 0;
    phase = 'idle';
    bestLevel = Neon.getHighScore() || 0;
    hudBest.textContent = bestLevel > 0 ? String(bestLevel) : '-';
    startRound();
  }

  function startRound() {
    // Reset all cells
    for (var c = 0; c < cells.length; c++) {
      cells[c].className = 'cell';
      cells[c].textContent = '';
    }
    numberMap = {};
    nextNum = 1;

    // Update HUD
    hudLevel.textContent = String(level);
    hudNumbers.textContent = String(level);

    // Place numbers randomly
    var positions = [];
    var totalCells = COLS * ROWS;
    while (positions.length < level) {
      var pos = Math.floor(Math.random() * totalCells);
      if (positions.indexOf(pos) === -1) {
        positions.push(pos);
      }
    }

    // Shuffle and assign numbers
    for (var s = positions.length - 1; s > 0; s--) {
      var j = Math.floor(Math.random() * (s + 1));
      var tmp = positions[s];
      positions[s] = positions[j];
      positions[j] = tmp;
    }

    for (var i = 0; i < level; i++) {
      var idx = positions[i];
      numberMap[idx] = i + 1;
      cells[idx].textContent = String(i + 1);
      cells[idx].className = 'cell showing';
    }

    phase = 'showing';
    playRevealSound();

    // Timer bar animation
    var displayTime = getDisplayTime();
    timerBarWrap.classList.add('visible');
    timerBar.style.transition = 'none';
    timerBar.style.transform = 'scaleX(1)';
    // Force reflow
    void timerBar.offsetWidth;
    timerBar.style.transition = 'transform ' + displayTime + 'ms linear';
    timerBar.style.transform = 'scaleX(0)';

    // Hide numbers after display time
    if (displayTimeout) clearTimeout(displayTimeout);
    displayTimeout = setTimeout(function() {
      hideNumbers();
    }, displayTime);
  }

  function getDisplayTime() {
    var t = START_DISPLAY_TIME - (level - START_LEVEL) * DISPLAY_TIME_DECREASE;
    return Math.max(t, MIN_DISPLAY_TIME);
  }

  function hideNumbers() {
    timerBarWrap.classList.remove('visible');
    phase = 'playing';

    for (var i = 0; i < cells.length; i++) {
      if (numberMap[i] !== undefined) {
        if (!cells[i].classList.contains('correct')) {
          cells[i].className = 'cell hidden-tile active';
          cells[i].textContent = '';
        }
      } else {
        cells[i].className = 'cell';
      }
    }
  }

  function onCellTouch(e) {
    e.preventDefault();
    handleTap(this);
  }

  function onCellClick(e) {
    if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
    handleTap(this);
  }

  function handleTap(cell) {
    if (phase === 'showing') {
      // Player taps during showing phase: hide immediately and process
      if (displayTimeout) { clearTimeout(displayTimeout); displayTimeout = null; }
      hideNumbers();
      processTap(cell);
      return;
    }
    if (phase !== 'playing') return;
    processTap(cell);
  }

  function processTap(cell) {
    var idx = parseInt(cell.dataset.index, 10);
    var num = numberMap[idx];

    if (num === undefined) return;
    if (cell.classList.contains('correct')) return;

    if (num === nextNum) {
      // CORRECT
      cell.className = 'cell correct';
      cell.textContent = String(num);
      totalCorrect++;

      var rect = cell.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      spawnParticles(cx, cy, '#39ff14', 8);
      playCorrectSound(num, level);

      nextNum++;

      if (nextNum > level) {
        // Level complete!
        phase = 'idle';
        playLevelComplete();
        level++;
        showLevelFlash(level);
        setTimeout(function() {
          startRound();
        }, 700);
      }
    } else {
      // WRONG
      gameOver(cell, idx);
    }
  }

  function showLevelFlash(lvl) {
    var flash = document.createElement('div');
    flash.className = 'level-flash';
    var span = document.createElement('span');
    span.className = 'level-flash-text';
    span.textContent = lvl > CHIMP_LEVEL ? 'LEVEL ' + lvl + ' \uD83D\uDC12' : 'LEVEL ' + lvl;
    flash.appendChild(span);
    document.body.appendChild(flash);
    setTimeout(function() { flash.remove(); }, 650);
  }

  function gameOver(wrongCell, wrongIdx) {
    phase = 'gameover';
    playWrongSound();
    document.body.classList.add('shake');
    setTimeout(function() { document.body.classList.remove('shake'); }, 300);

    // Show the wrong cell
    wrongCell.className = 'cell wrong';
    wrongCell.textContent = String(numberMap[wrongIdx]);

    var rect = wrongCell.getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, '#ff2d7b', 16);

    // Reveal all remaining hidden tiles
    for (var i = 0; i < cells.length; i++) {
      var num = numberMap[i];
      if (num !== undefined && !cells[i].classList.contains('correct') && i !== wrongIdx) {
        cells[i].className = 'cell reveal-wrong';
        cells[i].textContent = String(num);
      }
    }

    var levelReached = level;

    setTimeout(function() {
      showGameOver(levelReached);
    }, 1200);
  }

  function showGameOver(levelReached) {
    hud.style.display = 'none';
    gridContainer.style.display = 'none';
    timerBarWrap.classList.remove('visible');

    var beatChimp = levelReached > CHIMP_LEVEL;

    if (beatChimp) {
      goVerdict.textContent = 'YOU WIN!';
      goVerdict.className = 'go-verdict win';
    } else {
      goVerdict.textContent = 'CHIMP WINS';
      goVerdict.className = 'go-verdict lose';
    }

    goLevel.textContent = String(levelReached);
    goLevel.className = 'val' + (beatChimp ? ' green' : ' pink');
    goCorrect.textContent = String(totalCorrect);
    goBest.textContent = String(Math.max(bestLevel, levelReached));

    if (levelReached > bestLevel) {
      goNewBest.style.display = 'block';
      playNewBestSound();
    } else {
      goNewBest.style.display = 'none';
    }

    gameoverScreen.classList.remove('hidden');

    // Save score via Neon.js
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(levelReached);
    }).then(function(result) {
      bestLevel = Math.max(bestLevel, levelReached);
      Neon.render(document.getElementById('goLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    }).catch(function() {});
  }

  // ============ SHARE ============
  function buildShareText(levelReached) {
    var beatChimp = levelReached > CHIMP_LEVEL;
    var squares = '';
    var levelsCleared = levelReached - START_LEVEL;
    for (var i = 0; i < levelsCleared; i++) {
      squares += '\uD83D\uDFE9';
    }
    squares += '\uD83D\uDFE5';

    var lines = [
      '\uD83E\uDDE0 CHIMP TEST',
      'Level ' + levelReached + ' | ' + (beatChimp ? 'Beat the chimp! \uD83D\uDC12' : 'Chimp wins \uD83D\uDC12'),
      squares,
      'neonarcade.net/neonarcade/chimp.html'
    ];
    return lines.join('\n');
  }

  shareBtn.addEventListener('click', function() {
    var levelReached = parseInt(goLevel.textContent, 10);
    var text = buildShareText(levelReached);

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  });

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopiedFeedback();
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopiedFeedback(); } catch(e) {}
    ta.remove();
  }

  function showCopiedFeedback() {
    var orig = shareBtn.textContent;
    shareBtn.textContent = 'COPIED!';
    shareBtn.style.borderColor = '#39ff14';
    shareBtn.style.color = '#39ff14';
    setTimeout(function() {
      shareBtn.textContent = orig;
      shareBtn.style.borderColor = '';
      shareBtn.style.color = '';
    }, 1500);
  }

  // ============ INPUT ============
  startBtn.addEventListener('click', function() {
    startGame();
  });
  retryBtn.addEventListener('click', function() {
    startGame();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (phase === 'showing' || phase === 'playing') {
        if (displayTimeout) { clearTimeout(displayTimeout); displayTimeout = null; }
        phase = 'idle';
        gridContainer.style.display = 'none';
        hud.style.display = 'none';
        gameoverScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        return;
      }
    }
    if (e.code === 'Space' || e.code === 'Enter') {
      if (phase === 'idle' && !startScreen.classList.contains('hidden')) {
        e.preventDefault();
        startGame();
      } else if (phase === 'gameover') {
        e.preventDefault();
        startGame();
      }
    }
  });

  // Show more games bar after delay
  setTimeout(function() {
    var mg = document.getElementById('neonMoreGames');
    if (mg) mg.style.display = 'block';
  }, 3000);

})();
</script>
