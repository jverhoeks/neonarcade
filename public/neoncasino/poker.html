// ─── BANKROLL ──────────────────────────────────────────────────
const SALT = 'N30N_C4S1N0_2026';
function hashBankroll(chips) {
  var h = 2166136261; var s = SALT + ':' + chips;
  for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h >>> 0).toString(36);
}
function saveBankroll(chips) { localStorage.setItem('neoncasino_bankroll', JSON.stringify({ chips: chips, hash: hashBankroll(chips) })); }
function loadBankroll() { try { var data = JSON.parse(localStorage.getItem('neoncasino_bankroll')); if (data && data.hash === hashBankroll(data.chips)) return data.chips; } catch(e) {} return null; }

var bankroll = loadBankroll();

// ─── SOUND ─────────────────────────────────────────────────────
var audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

function playSound(type) {
  try {
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    var t = ctx.currentTime;
    gain.gain.setValueAtTime(0.12, t);
    switch(type) {
      case 'deal':
        osc.type = 'triangle'; osc.frequency.setValueAtTime(800, t);
        osc.frequency.exponentialRampToValueAtTime(400, t + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.1); break;
      case 'check':
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.start(t); osc.stop(t + 0.08); break;
      case 'chip':
        osc.type = 'square'; osc.frequency.setValueAtTime(1200, t);
        osc.frequency.exponentialRampToValueAtTime(800, t + 0.06);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.1); break;
      case 'fold':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t);
        osc.frequency.exponentialRampToValueAtTime(100, t + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t); osc.stop(t + 0.2); break;
      case 'allin':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.start(t); osc.stop(t + 0.5); break;
      case 'win':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, t);
        osc.frequency.setValueAtTime(659, t + 0.1);
        osc.frequency.setValueAtTime(784, t + 0.2);
        osc.frequency.setValueAtTime(1047, t + 0.3);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.start(t); osc.stop(t + 0.5); break;
      case 'lose':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.4);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.4); break;
    }
  } catch(e) {}
}

// ─── DECK ──────────────────────────────────────────────────────
function createDeck() {
  var deck = [];

    for (var ri = 0; ri < 13; ri++) {
      deck.push({ rank: RANKS[ri], suit: SUITS[si] });
    }
  }
  return deck;
}

function shuffleDeck(deck) {
  for (var i = deck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = deck[i]; deck[i] = deck[j]; deck[j] = tmp;
  }
  return deck;
}

function makeCardEl(card, facedown) {

// ─── HAND EVALUATION ───────────────────────────────────────────
function evaluatePokerHand(cards) {
  if (cards.length < 5) return { rank: 0, name: 'High Card', kickers: [], best: cards.slice() };

  var bestResult = null;
  var combos = getCombinations(cards, 5);

  for (var ci = 0; ci < combos.length; ci++) {
    var hand = combos[ci];
    var result = evaluate5(hand);
    if (!bestResult || compareHands(result, bestResult) > 0) {
      bestResult = result;
      bestResult.best = hand.slice();
    }
  }
  return bestResult;
}

function getCombinations(arr, k) {
  var results = [];
  function combine(start, combo) {
    if (combo.length === k) { results.push(combo.slice()); return; }
    for (var i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      combine(i + 1, combo);
      combo.pop();
    }
  }
  combine(0, []);
  return results;
}

function evaluate5(hand) {
  var values = hand.map(function(c) { return RANK_VALUES[c.rank]; }).sort(function(a,b) { return b - a; });
  var suits = hand.map(function(c) { return c.suit; });

  var isFlush = suits[0] === suits[1] && suits[1] === suits[2] && suits[2] === suits[3] && suits[3] === suits[4];

  var isStraight = false;
  var straightHigh = 0;
  if (values[0] - values[4] === 4 && new Set(values).size === 5) {
    isStraight = true;
    straightHigh = values[0];
  }
  // Wheel: A-2-3-4-5
  if (values[0] === 14 && values[1] === 5 && values[2] === 4 && values[3] === 3 && values[4] === 2) {
    isStraight = true;
    straightHigh = 5;
  }

  var counts = {};
  for (var i = 0; i < values.length; i++) {
    counts[values[i]] = (counts[values[i]] || 0) + 1;
  }
  var groups = [];
  for (var v in counts) {
    groups.push({ val: parseInt(v), count: counts[v] });
  }
  groups.sort(function(a, b) { return b.count - a.count || b.val - a.val; });

  if (isFlush && isStraight && straightHigh === 14) {
    return { rank: 9, name: 'Royal Flush', kickers: [14] };
  }
  if (isFlush && isStraight) {
    return { rank: 8, name: 'Straight Flush', kickers: [straightHigh] };
  }
  if (groups[0].count === 4) {
    return { rank: 7, name: 'Four of a Kind', kickers: [groups[0].val, groups[1].val] };
  }
  if (groups[0].count === 3 && groups[1].count === 2) {
    return { rank: 6, name: 'Full House', kickers: [groups[0].val, groups[1].val] };
  }
  if (isFlush) {
    return { rank: 5, name: 'Flush', kickers: values.slice() };
  }
  if (isStraight) {
    return { rank: 4, name: 'Straight', kickers: [straightHigh] };
  }
  if (groups[0].count === 3) {
    var k = groups.filter(function(g) { return g.count === 1; }).map(function(g) { return g.val; }).sort(function(a,b) { return b - a; });
    return { rank: 3, name: 'Three of a Kind', kickers: [groups[0].val].concat(k) };
  }
  if (groups[0].count === 2 && groups[1].count === 2) {
    var hi = Math.max(groups[0].val, groups[1].val);
    var lo = Math.min(groups[0].val, groups[1].val);
    var kicker = groups[2].val;
    return { rank: 2, name: 'Two Pair', kickers: [hi, lo, kicker] };
  }
  if (groups[0].count === 2) {
    var k2 = groups.filter(function(g) { return g.count === 1; }).map(function(g) { return g.val; }).sort(function(a,b) { return b - a; });
    return { rank: 1, name: 'Pair', kickers: [groups[0].val].concat(k2) };
  }
  return { rank: 0, name: 'High Card', kickers: values.slice() };
}

function compareHands(a, b) {
  if (a.rank !== b.rank) return a.rank - b.rank;
  for (var i = 0; i < Math.min(a.kickers.length, b.kickers.length); i++) {
    if (a.kickers[i] !== b.kickers[i]) return a.kickers[i] - b.kickers[i];
  }
  return 0;
}

// ─── HAND STRENGTH (for AI) ────────────────────────────────────
function holeCardStrength(c1, c2) {
  var r1 = RANK_VALUES[c1.rank], r2 = RANK_VALUES[c2.rank];
  var hi = Math.max(r1, r2), lo = Math.min(r1, r2);
  var score = 0;
  if (hi === 14) score = 10;
  else if (hi === 13) score = 8;
  else if (hi === 12) score = 7;
  else if (hi === 11) score = 6;
  else score = hi / 2;
  if (r1 === r2) { score = Math.max(score, 5) * 2; }
  if (c1.suit === c2.suit) score += 2;
  var gap = hi - lo - 1;
  if (gap === 0 && r1 !== r2) score += 1;
  else if (gap === 1) score -= 1;
  else if (gap === 2) score -= 2;
  else if (gap === 3) score -= 4;
  else if (gap >= 4) score -= 5;
  return Math.max(0, Math.min(1, score / 20));
}

var mpRoom = null;
var mpPollTimer = null;

};

    if (game.players[i].seat === seat) return game.players[i];
  }

}

// ─── SEAT RENDERING ────────────────────────────────────────────
var seatEls = [];

function createSeats() {
  seatEls.forEach(function(el) { if (el.parentNode) el.parentNode.removeChild(el); });
  seatEls = [];

  var container = document.getElementById('tableContainer');
  for (var i = 0; i < 6; i++) {
    var seat = document.createElement('div');
    seat.className = 'seat empty';
    seat.id = 'seat-' + i;
    seat.style.left = SEAT_POSITIONS[i].x + '%';
    seat.style.top = SEAT_POSITIONS[i].y + '%';

    var nameDiv = document.createElement('div');
    nameDiv.className = 'seat-name';
    nameDiv.textContent = 'JOIN';
    seat.appendChild(nameDiv);

    var chipsDiv = document.createElement('div');
    chipsDiv.className = 'seat-chips';
    seat.appendChild(chipsDiv);

    var actionDiv = document.createElement('div');
    actionDiv.className = 'seat-action';
    seat.appendChild(actionDiv);

    var betDiv = document.createElement('div');
    betDiv.className = 'seat-bet';
    seat.appendChild(betDiv);

    var cardsDiv = document.createElement('div');
    cardsDiv.className = 'seat-cards';
    seat.appendChild(cardsDiv);

    var timerDiv = document.createElement('div');
    timerDiv.className = 'turn-timer';
    var timerFill = document.createElement('div');
    timerFill.className = 'turn-timer-fill';
    timerDiv.appendChild(timerFill);
    seat.appendChild(timerDiv);

    container.appendChild(seat);
    seatEls.push(seat);
  }
}

function renderSeats() {
  if (!game) return;
  for (var i = 0; i < 6; i++) {
    var el = seatEls[i];
    if (!el) continue;
    var player = getPlayerBySeat(i);
    if (!player) {
      el.className = 'seat empty';
      el.querySelector('.seat-name').textContent = 'JOIN';
      el.querySelector('.seat-chips').textContent = '';
      el.querySelector('.seat-action').textContent = '';
      el.querySelector('.seat-bet').textContent = '';
      var cardsContainer = el.querySelector('.seat-cards');
      while (cardsContainer.firstChild) cardsContainer.removeChild(cardsContainer.firstChild);
      continue;
    }

    var cls = 'seat';
    if (player.folded) cls += ' folded';
    if (game.turnIndex >= 0 && game.players[game.turnIndex] === player && !game.handOver) cls += ' active-turn';
    if (player.isWinner) cls += ' winner';
    el.className = cls;
    el.querySelector('.seat-name').textContent = player.name;
    el.querySelector('.seat-chips').textContent = player.chips.toLocaleString();
    el.querySelector('.seat-action').textContent = player.lastAction || '';
    el.querySelector('.seat-bet').textContent = player.currentBet > 0 ? player.currentBet.toLocaleString() : '';

    // Cards
    var cardsContainer = el.querySelector('.seat-cards');
    while (cardsContainer.firstChild) cardsContainer.removeChild(cardsContainer.firstChild);

    if (player.cards && player.cards.length === 2 && i !== game.playerSeat) {
      if (game.phase === 'showdown' && !player.folded) {
        cardsContainer.appendChild(makeCardEl(player.cards[0]));
        cardsContainer.appendChild(makeCardEl(player.cards[1]));
      } else if (!player.folded) {
        cardsContainer.appendChild(makeCardEl(null, true));
        cardsContainer.appendChild(makeCardEl(null, true));
      }
    }

    // Turn timer
    if (cls.indexOf('active-turn') >= 0) {
      var elapsed = Date.now() - game.turnStartTime;
      var pct = Math.max(0, 100 - (elapsed / TURN_TIMEOUT * 100));
      el.querySelector('.turn-timer-fill').style.width = pct + '%';
    }
  }
}

function renderCommunity() {
  while ($communityArea.firstChild) $communityArea.removeChild($communityArea.firstChild);
  for (var i = 0; i < 5; i++) {
    if (i < game.community.length) {
      $communityArea.appendChild(makeCardEl(game.community[i]));
    } else {
      var placeholder = makeCardEl(null, true);
      placeholder.style.opacity = '0.2';
      $communityArea.appendChild(placeholder);

}

function renderPot() {
  var total = game.pot;
  for (var i = 0; i < game.players.length; i++) {
    total += game.players[i].currentBet;
  }
  $potDisplay.textContent = total > 0 ? ('POT: ' + total.toLocaleString()) : '';
}

function renderMyCards() {
  while ($myCards.firstChild) $myCards.removeChild($myCards.firstChild);

  var player = getPlayerBySeat(game.playerSeat);
  if (player && player.cards && player.cards.length === 2 && !player.folded) {
    $myCards.appendChild(makeCardEl(player.cards[0]));
    $myCards.appendChild(makeCardEl(player.cards[1]));

    if (game.community.length >= 3) {
      var allCards = player.cards.concat(game.community);
      var eval1 = evaluatePokerHand(allCards);
      $handLabel.textContent = eval1.name;
      $handLabel.classList.add('visible');
    } else if (player.cards[0].rank === player.cards[1].rank) {
      $handLabel.textContent = 'Pocket ' + player.cards[0].rank + 's';
      $handLabel.classList.add('visible');
    } else {
      $handLabel.classList.remove('visible');
    }
  } else {
    $handLabel.classList.remove('visible');
  }
}

  $dealerMarker.style.top = (pos.y + dy) + '%';

  renderCommunity();
  renderPot();
  renderMyCards();

}

// ─── ACTION BAR ────────────────────────────────────────────────
function updateActionBar() {
  if (!game || game.handOver) { $actionBar.classList.add('hidden'); return; }

  var player = getPlayerBySeat(game.playerSeat);
  if (!player || player.folded || player.allIn) { $actionBar.classList.add('hidden'); return; }

  var isMyTurn = game.turnIndex >= 0 && game.players[game.turnIndex].seat === game.playerSeat;
  if (!isMyTurn) { $actionBar.classList.add('hidden'); return; }

  $actionBar.classList.remove('hidden');

  var toCall = game.currentBet - player.currentBet;
  var canCheck = toCall === 0;
  var $check = document.getElementById('btnCheck');
  var $call = document.getElementById('btnCall');
  var $raiseWrap = document.getElementById('raiseWrap');
  var $slider = document.getElementById('raiseSlider');
  var $raiseLabel = document.getElementById('raiseAmountLabel');
  var $allIn = document.getElementById('btnAllIn');

  if (canCheck) {
    $check.style.display = '';
    $call.style.display = 'none';
  } else {
    $check.style.display = 'none';
    $call.style.display = '';
    $call.textContent = 'CALL ' + Math.min(toCall, player.chips).toLocaleString() + ' (C)';
  }

  var minRaise = game.currentBet + game.minRaise;
  var maxRaise = player.chips + player.currentBet;
  if (minRaise >= maxRaise) {
    $raiseWrap.style.display = 'none';
  } else {
    $raiseWrap.style.display = '';
    $slider.min = minRaise;
    $slider.max = maxRaise;
    if (parseInt($slider.value) < minRaise) $slider.value = minRaise;
    $raiseLabel.textContent = parseInt($slider.value).toLocaleString();
  }

  $allIn.textContent = 'ALL IN ' + player.chips.toLocaleString();
}

// ─── GAME FLOW ─────────────────────────────────────────────────
function startSolo() {
  isMultiplayer = false;
  cancelRoom();

  if (bankroll < BIG_BLIND) {
    bankroll = 1000;
    saveBankroll(bankroll);
    showToast('BANKROLL RESET TO 1,000');
  }

  var buyIn = Math.min(SESSION_BUY_IN, bankroll);
  bankroll -= buyIn;
  saveBankroll(bankroll);

  var players = [
    { seat: 0, name: Neon.getName() || 'YOU', chips: buyIn, isAI: false, aiType: null, cards: [], currentBet: 0, folded: false, allIn: false, lastAction: '', isWinner: false, hasActedThisRound: false },
  ];

  var aiSeats = [1, 3, 4];
  var usedNames = [];
  for (var i = 0; i < 3; i++) {
    var nameIdx;
    do { nameIdx = Math.floor(Math.random() * AI_NAMES.length); } while (usedNames.indexOf(nameIdx) >= 0);
    usedNames.push(nameIdx);
    var aiType = AI_TYPE_KEYS[Math.floor(Math.random() * AI_TYPE_KEYS.length)];
    players.push({ seat: aiSeats[i], name: AI_NAMES[nameIdx], chips: SESSION_BUY_IN, isAI: true, aiType: aiType, cards: [], currentBet: 0, folded: false, allIn: false, lastAction: '', isWinner: false, hasActedThisRound: false });
  }

  players.sort(function(a,b) { return a.seat - b.seat; });

  initGame(0, players);
  sessionStats.handsPlayed = 0;
  sessionStats.handsWon = 0;
  sessionStats.biggestPot = 0;
  sessionStats.bestHand = null;
  sessionStats.bestHandName = '';

  createSeats();
  showScreen('tableScreen');
  startTurnTimerLoop();
  startNewHand();
}

function startNewHand() {
  if (!game) return;

  var alive = game.players.filter(function(p) { return p.chips > 0 || p.seat === game.playerSeat; });
  if (alive.length < 2) { endSession(); return; }
  var me = getPlayerBySeat(game.playerSeat);
  if (me && me.chips <= 0) { endSession(); return; }

  game.players = alive;
  game.handOver = false;
  $winnerBanner.classList.remove('visible');

  for (var i = 0; i < game.players.length; i++) {
    var p = game.players[i];
    p.cards = [];
    p.currentBet = 0;
    p.folded = false;
    p.allIn = false;
    p.lastAction = '';
    p.isWinner = false;
    p.hasActedThisRound = false;
  }

  game.dealerSeat = getNextOccupiedSeat(game.dealerSeat);
  game.community = [];
  game.pot = 0;
  game.sidePots = [];
  game.currentBet = 0;
  game.minRaise = BIG_BLIND;
  game.phase = 'preflop';
  game.turnIndex = -1;

  game.deck = shuffleDeck(createDeck());
  for (var i = 0; i < game.players.length; i++) {
    game.players[i].cards = [game.deck.pop(), game.deck.pop()];
  }

  var sbSeat = getNextOccupiedSeat(game.dealerSeat);
  var bbSeat = getNextOccupiedSeat(sbSeat);
  postBlind(sbSeat, SMALL_BLIND);
  postBlind(bbSeat, BIG_BLIND);
  game.currentBet = BIG_BLIND;

  sessionStats.handsPlayed++;
  playSound('deal');

  renderAll();

  var firstActor = getNextActivePlayerIndex(playerIndexBySeat(bbSeat));
  game.turnIndex = firstActor;
  game.turnStartTime = Date.now();
  renderAll();

  processCurrentTurn();
}

function postBlind(seat, amount) {
  var p = getPlayerBySeat(seat);
  if (!p) return;
  var actual = Math.min(amount, p.chips);
  p.chips -= actual;
  p.currentBet = actual;
  if (p.chips === 0) p.allIn = true;
  p.lastAction = actual <= SMALL_BLIND ? 'SB' : 'BB';
}

function getNextOccupiedSeat(currentSeat) {
  for (var i = 1; i <= 6; i++) {
    var s = (currentSeat + i) % 6;
    if (getPlayerBySeat(s)) return s;
  }
  return currentSeat;
}

function playerIndexBySeat(seat) {
  for (var i = 0; i < game.players.length; i++) {
    if (game.players[i].seat === seat) return i;
  }
  return -1;
}

function getNextActivePlayerIndex(fromIndex) {
  for (var i = 1; i <= game.players.length; i++) {
    var idx = (fromIndex + i) % game.players.length;
    var p = game.players[idx];
    if (!p.folded && !p.allIn) return idx;
  }
  return -1;
}

// ─── TURN PROCESSING ───────────────────────────────────────────
function processCurrentTurn() {
  if (!game || game.handOver) return;

  var playersInHand = getPlayersInHand();
  if (playersInHand.length <= 1) { finishHand(); return; }

  if (isBettingRoundOver()) {
    collectBetsIntoPot();
    advancePhase();
    return;
  }

  if (game.turnIndex < 0 || game.turnIndex >= game.players.length) {
    // Shouldn't happen but guard
    collectBetsIntoPot();
    advancePhase();
    return;
  }

  var currentPlayer = game.players[game.turnIndex];
  if (!currentPlayer || currentPlayer.folded || currentPlayer.allIn) {
    game.turnIndex = getNextActivePlayerIndex(game.turnIndex);
    if (game.turnIndex < 0) { collectBetsIntoPot(); advancePhase(); return; }
    game.turnStartTime = Date.now();
    renderAll();
    processCurrentTurn();
    return;
  }

  renderAll();

  if (currentPlayer.isAI) {
    var delay = AI_THINK_MIN + Math.random() * (AI_THINK_MAX - AI_THINK_MIN);
    setTimeout(function() {
      if (!game || game.handOver) return;
      aiDecision(currentPlayer);
    }, delay);
  }
}

function isBettingRoundOver() {
  var activePlayers = game.players.filter(function(p) { return !p.folded && !p.allIn; });
  if (activePlayers.length === 0) return true;

  for (var i = 0; i < activePlayers.length; i++) {
    var p = activePlayers[i];
    if (!p.hasActedThisRound) return false;
    if (p.currentBet < game.currentBet) return false;
  }
  return true;
}

function collectBetsIntoPot() {
  for (var i = 0; i < game.players.length; i++) {
    game.pot += game.players[i].currentBet;
    game.players[i].currentBet = 0;
  }
}

function advancePhase() {
  for (var i = 0; i < game.players.length; i++) {
    game.players[i].hasActedThisRound = false;
    if (game.players[i].lastAction !== 'FOLD' && !game.players[i].folded) {
      game.players[i].lastAction = '';
    }
  }
  game.currentBet = 0;
  game.minRaise = BIG_BLIND;

  var playersNotFolded = getPlayersInHand();
  var activeNotAllIn = playersNotFolded.filter(function(p) { return !p.allIn; });

  if (game.phase === 'preflop') {
    game.phase = 'flop';
    game.deck.pop();
    game.community.push(game.deck.pop(), game.deck.pop(), game.deck.pop());
    playSound('deal');
  } else if (game.phase === 'flop') {
    game.phase = 'turn';
    game.deck.pop();
    game.community.push(game.deck.pop());
    playSound('deal');
  } else if (game.phase === 'turn') {
    game.phase = 'river';
    game.deck.pop();
    game.community.push(game.deck.pop());
    playSound('deal');
  } else if (game.phase === 'river') {
    game.phase = 'showdown';
    finishHand();
    return;
  }

  renderAll();

  if (activeNotAllIn.length <= 1 && playersNotFolded.length > 1) {
    setTimeout(function() { advancePhase(); }, 800);
    return;
  }

  if (playersNotFolded.length <= 1) {
    finishHand();
    return;
  }

  var startSearch = playerIndexBySeat(game.dealerSeat);
  game.turnIndex = getNextActivePlayerIndex(startSearch);
  if (game.turnIndex < 0) {
    // All remaining players are all-in, keep advancing
    setTimeout(function() { advancePhase(); }, 800);
    return;
  }
  game.turnStartTime = Date.now();
  renderAll();
  processCurrentTurn();
}

function finishHand() {
  game.handOver = true;
  game.phase = 'showdown';
  $actionBar.classList.add('hidden');

  // Collect any remaining bets
  for (var i = 0; i < game.players.length; i++) {
    game.pot += game.players[i].currentBet;
    game.players[i].currentBet = 0;
  }

  var playersInHand = getPlayersInHand();

  if (playersInHand.length === 1) {
    var winner = playersInHand[0];
    winner.chips += game.pot;
    winner.isWinner = true;
    winner.lastAction = 'WINS ' + game.pot.toLocaleString();
    if (game.pot > sessionStats.biggestPot) sessionStats.biggestPot = game.pot;
    if (winner.seat === game.playerSeat) {
      sessionStats.handsWon++;
      playSound('win');
      spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#ffd700', 20);
    }
    $winnerBanner.textContent = winner.name + ' WINS ' + game.pot.toLocaleString();
    $winnerBanner.classList.add('visible');
  } else {
    var evaluations = [];
    for (var i = 0; i < playersInHand.length; i++) {
      var p = playersInHand[i];
      var allCards = p.cards.concat(game.community);
      var result = evaluatePokerHand(allCards);
      evaluations.push({ player: p, eval: result });
    }

    evaluations.sort(function(a, b) { return compareHands(b.eval, a.eval); });

    var bestEval = evaluations[0].eval;
    var winners = evaluations.filter(function(e) { return compareHands(e.eval, bestEval) === 0; });

    var share = Math.floor(game.pot / winners.length);
    var remainder = game.pot - share * winners.length;

    for (var w = 0; w < winners.length; w++) {
      var winAmount = share + (w === 0 ? remainder : 0);
      winners[w].player.chips += winAmount;
      winners[w].player.isWinner = true;
      winners[w].player.lastAction = winners[w].eval.name;
    }

    if (game.pot > sessionStats.biggestPot) sessionStats.biggestPot = game.pot;

    for (var w = 0; w < winners.length; w++) {
      if (winners[w].player.seat === game.playerSeat) {
        sessionStats.handsWon++;
        playSound('win');
        spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#ffd700', 20);
      }
    }

    var myPlayer = getPlayerBySeat(game.playerSeat);
    if (myPlayer && !myPlayer.folded) {
      var myEval = evaluatePokerHand(myPlayer.cards.concat(game.community));
      if (!sessionStats.bestHand || myEval.rank > sessionStats.bestHand) {
        sessionStats.bestHand = myEval.rank;
        sessionStats.bestHandName = myEval.name;
      }
    }

    var bannerNames = winners.map(function(w) { return w.player.name; }).join(' & ');
    $winnerBanner.textContent = bannerNames + ' WINS (' + bestEval.name + ')';
    $winnerBanner.classList.add('visible');
  }

  game.pot = 0;
  game.sidePots = [];

  renderAll();

  setTimeout(function() {
    if (!game) return;
    startNewHand();
  }, 3500);
}

// ─── PLAYER ACTIONS ────────────────────────────────────────────
function doAction(action) {
  if (!game || game.handOver) return;
  if (game.turnIndex < 0 || game.turnIndex >= game.players.length) return;
  var me = game.players[game.turnIndex];
  if (!me || me.seat !== game.playerSeat) return;

  executeAction(me, action);
}

function executeAction(player, action, raiseAmount) {
  clearTimeout(game.turnTimer);
  var toCall = game.currentBet - player.currentBet;

  switch(action) {
    case 'fold':
      player.folded = true;
      player.lastAction = 'FOLD';
      player.hasActedThisRound = true;
      playSound('fold');
      break;

    case 'check':
      if (toCall > 0) return;
      player.lastAction = 'CHECK';
      player.hasActedThisRound = true;
      playSound('check');
      break;

    case 'call':
      var callAmount = Math.min(toCall, player.chips);
      player.chips -= callAmount;
      player.currentBet += callAmount;
      if (player.chips === 0) player.allIn = true;
      player.lastAction = player.allIn ? 'ALL IN' : 'CALL ' + callAmount;
      player.hasActedThisRound = true;
      playSound('chip');
      break;

    case 'raise':
      var $slider = document.getElementById('raiseSlider');
      var totalBet = raiseAmount || parseInt($slider.value);
      var needed = totalBet - player.currentBet;
      if (needed <= 0) return;
      if (needed > player.chips) needed = player.chips;
      player.chips -= needed;
      player.currentBet += needed;
      if (player.chips === 0) player.allIn = true;
      game.currentBet = player.currentBet;
      game.minRaise = Math.max(BIG_BLIND, needed);
      player.lastAction = player.allIn ? 'ALL IN' : 'RAISE ' + player.currentBet;
      player.hasActedThisRound = true;
      for (var i = 0; i < game.players.length; i++) {
        if (game.players[i] !== player && !game.players[i].folded && !game.players[i].allIn) {
          game.players[i].hasActedThisRound = false;
        }
      }
      playSound('chip');
      break;

    case 'allin':
      var allInTotal = player.chips + player.currentBet;
      if (allInTotal > game.currentBet) {
        game.minRaise = Math.max(BIG_BLIND, allInTotal - game.currentBet);
        game.currentBet = allInTotal;
        for (var i = 0; i < game.players.length; i++) {
          if (game.players[i] !== player && !game.players[i].folded && !game.players[i].allIn) {
            game.players[i].hasActedThisRound = false;
          }
        }
      }
      player.currentBet += player.chips;
      player.chips = 0;
      player.allIn = true;
      player.lastAction = 'ALL IN';
      player.hasActedThisRound = true;
      playSound('allin');
      break;
  }

  game.turnIndex = getNextActivePlayerIndex(game.turnIndex);
  game.turnStartTime = Date.now();
  renderAll();

  setTimeout(function() { processCurrentTurn(); }, 200);
}

// ─── AI DECISION ───────────────────────────────────────────────
function aiDecision(player) {
  if (!game || game.handOver || player.folded || player.allIn) return;

  var type = AI_TYPES[player.aiType] || AI_TYPES.tight;
  var toCall = game.currentBet - player.currentBet;
  var potSize = game.pot;
  for (var i = 0; i < game.players.length; i++) potSize += game.players[i].currentBet;

  var strength = 0;
  if (game.community.length === 0) {
    strength = holeCardStrength(player.cards[0], player.cards[1]);
  } else {
    var allCards = player.cards.concat(game.community);
    var eval1 = evaluatePokerHand(allCards);
    strength = (eval1.rank * 0.1) + 0.05;
    if (eval1.rank >= 1) strength += 0.15;
    if (eval1.rank >= 2) strength += 0.15;
    if (eval1.rank >= 4) strength += 0.2;
    strength = Math.min(1, strength);
  }

  var potOdds = toCall > 0 ? toCall / (potSize + toCall) : 0;
  var random = Math.random();

  if (toCall === 0) {
    if (strength > type.raiseFreq + random * 0.3) {
      var raiseSize = game.currentBet + game.minRaise + Math.floor(Math.random() * potSize * 0.5);
      raiseSize = Math.min(raiseSize, player.chips + player.currentBet);
      if (raiseSize <= player.currentBet || player.chips <= 0) {
        executeAction(player, 'check');
      } else if (player.chips <= raiseSize - player.currentBet) {
        executeAction(player, 'allin');
      } else {
        executeAction(player, 'raise', raiseSize);
      }
    } else {
      executeAction(player, 'check');
    }
  } else {
    if (strength < type.playRange * 0.5 && random > type.bluffFreq) {
      if (toCall > player.chips * 0.3) {
        executeAction(player, 'fold');
      } else if (random < 0.3) {
        executeAction(player, 'call');
      } else {
        executeAction(player, 'fold');
      }
    } else if (strength > 0.7 && random < type.raiseFreq + 0.2) {
      if (random < 0.15 && strength > 0.85) {
        executeAction(player, 'allin');
      } else {
        var raiseSize2 = game.currentBet + game.minRaise + Math.floor(Math.random() * potSize * 0.6);
        raiseSize2 = Math.min(raiseSize2, player.chips + player.currentBet);
        if (player.chips <= raiseSize2 - player.currentBet || player.chips <= 0) {
          executeAction(player, 'allin');
        } else {
          executeAction(player, 'raise', raiseSize2);
        }
      }
    } else if (strength >= potOdds || random < type.bluffFreq) {
      executeAction(player, 'call');
    } else {
      executeAction(player, 'fold');
    }
  }
}

// ─── TURN TIMER ────────────────────────────────────────────────
var turnTimerInterval = null;
function startTurnTimerLoop() {
  clearInterval(turnTimerInterval);
  turnTimerInterval = setInterval(function() {
    if (!game || game.handOver) return;
    if (game.turnIndex < 0 || game.turnIndex >= game.players.length) return;
    var currentPlayer = game.players[game.turnIndex];
    if (!currentPlayer) return;

    renderSeats();

    if (!currentPlayer.isAI && currentPlayer.seat === game.playerSeat) {
      var elapsed = Date.now() - game.turnStartTime;
      if (elapsed >= TURN_TIMEOUT) {
        executeAction(currentPlayer, 'fold');
        showToast('TIME OUT - AUTO FOLD');
      }
    }
  }, 500);
}

// ─── SESSION END ───────────────────────────────────────────────
function endSession() {
  clearInterval(turnTimerInterval);
  if (game) game.handOver = true;
  $actionBar.classList.add('hidden');

  var me = game ? getPlayerBySeat(game.playerSeat) : null;
  var finalChips = me ? me.chips : 0;

  bankroll = (loadBankroll() || 0) + finalChips;
  saveBankroll(bankroll);

  var profit = finalChips - sessionStats.startChips;

  if (finalChips > 0) {
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(finalChips);
    }).then(function(result) {
      Neon.render(document.getElementById('goLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    });
  }

  var $goTitle = document.getElementById('goTitle');
  var $goSubtitle = document.getElementById('goSubtitle');
  var $goStats = document.getElementById('goStats');

  if (profit >= 0) {
    $goTitle.textContent = profit > 0 ? 'SESSION OVER' : 'BROKE EVEN';
    $goTitle.className = 'go-title win';
    $goSubtitle.textContent = profit > 0 ? 'YOU WON ' + profit.toLocaleString() + ' CHIPS' : 'NO PROFIT THIS SESSION';
  } else {
    $goTitle.textContent = 'BUSTED';
    $goTitle.className = 'go-title lose';
    $goSubtitle.textContent = 'LOST ' + Math.abs(profit).toLocaleString() + ' CHIPS';
    playSound('lose');
  }

  // Build stats using DOM
  while ($goStats.firstChild) $goStats.removeChild($goStats.firstChild);
  var statsData = [
    ['HANDS PLAYED', sessionStats.handsPlayed, ''],
    ['HANDS WON', sessionStats.handsWon, 'gold'],
    ['BIGGEST POT', sessionStats.biggestPot.toLocaleString(), ''],
    ['BEST HAND', sessionStats.bestHandName || 'N/A', ''],
    ['BANKROLL', bankroll.toLocaleString(), 'gold'],
  ];
  for (var si = 0; si < statsData.length; si++) {
    var label = document.createElement('div');
    label.className = 'stat-label';
    label.textContent = statsData[si][0];
    $goStats.appendChild(label);
    var val = document.createElement('div');
    val.className = 'stat-value' + (statsData[si][2] ? ' ' + statsData[si][2] : '');
    val.textContent = statsData[si][1];
    $goStats.appendChild(val);
  }

  showScreen('gameOverScreen');
  Neon.render(document.getElementById('goLB'));
}

function backToStart() {
  game = null;
  clearInterval(turnTimerInterval);
  cancelRoom();
  updateBankrollDisplay();
  Neon.render(document.getElementById('startLB'));
  showScreen('startScreen');
}

// ─── SHARE ─────────────────────────────────────────────────────
function shareResult() {
  var profit = 0;
  var playerCount = 4;
  if (game) {
    var me = getPlayerBySeat(game.playerSeat);
    profit = (me ? me.chips : 0) - sessionStats.startChips;
    playerCount = game.players.length;
  }

  var text = '\uD83C\uDCCF NEON POKER\n';
  text += '\uD83D\uDCB0 ' + (profit >= 0 ? 'Won' : 'Lost') + ' ' + Math.abs(profit).toLocaleString() + ' chips in ' + sessionStats.handsPlayed + ' hands\n';
  text += '\uD83D\uDC65 ' + playerCount + '-player table | \uD83C\uDFC6 Biggest pot: ' + sessionStats.biggestPot.toLocaleString() + '\n';
  text += '\uD83C\uDFAF Best hand: ' + (sessionStats.bestHandName || 'N/A') + '\n';
  text += 'neonarcade.net/neoncasino/poker.html';

  if (navigator.share) {
    navigator.share({ text: text }).catch(function() {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('COPIED TO CLIPBOARD');
    });
  }
}

// ─── MULTIPLAYER ───────────────────────────────────────────────
function showCreateRoom() {
  document.getElementById('createRoomUI').classList.add('active');
  document.getElementById('joinRoomUI').classList.remove('active');
  document.getElementById('createStatus').textContent = 'CREATING...';
  document.getElementById('roomCodeDisplay').textContent = '----';
  document.getElementById('btnStartRoom').style.display = 'none';

  var name = Neon.getName() || 'YOU';
  fetch('/api/mroom/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { showToast(data.error.toUpperCase()); cancelRoom(); return; }
    mpRoom = { code: data.code, token: data.token, seat: data.seat };
    document.getElementById('roomCodeDisplay').textContent = data.code;
    document.getElementById('createStatus').textContent = 'WAITING FOR PLAYERS...';
    document.getElementById('btnStartRoom').style.display = '';
    startRoomPoll();
  }).catch(function() { showToast('NETWORK ERROR'); cancelRoom(); });
}

function showJoinRoom() {
  document.getElementById('joinRoomUI').classList.add('active');
  document.getElementById('createRoomUI').classList.remove('active');
  document.getElementById('joinStatus').textContent = '';
  document.getElementById('roomCodeInput').value = '';
  document.getElementById('roomCodeInput').focus();
}

function joinRoom() {
  var code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if (code.length !== 4) { document.getElementById('joinStatus').textContent = 'ENTER 4-LETTER CODE'; return; }
  document.getElementById('joinStatus').textContent = 'JOINING...';

  var name = Neon.getName() || 'PLR';
  fetch('/api/mroom/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: code, name: name })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { document.getElementById('joinStatus').textContent = data.error.toUpperCase(); return; }
    mpRoom = { code: data.code, token: data.token, seat: data.seat };
    document.getElementById('joinStatus').textContent = 'JOINED SEAT ' + (data.seat + 1) + ' - WAITING FOR HOST';
    isMultiplayer = true;
    startRoomPoll();
  }).catch(function() { document.getElementById('joinStatus').textContent = 'NETWORK ERROR'; });
}

function startMultiplayerGame() {
  if (!mpRoom) return;
  isMultiplayer = true;

  fetch('/api/mroom/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: mpRoom.code, token: mpRoom.token, msg: JSON.stringify({ type: 'start' }), state: 'playing' })
  }).then(function() {
    startSolo();
  });
}

function startRoomPoll() {
  clearInterval(mpPollTimer);
  mpPollTimer = setInterval(function() {
    if (!mpRoom) { clearInterval(mpPollTimer); return; }
    fetch('/api/mroom/poll?code=' + mpRoom.code + '&token=' + mpRoom.token + '&after=' + mpLastTs)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) return;
      var seatCount = Object.keys(data.seats || {}).length;
      var statusEl = document.getElementById('createStatus');
      if (statusEl && statusEl.offsetParent) statusEl.textContent = seatCount + '/6 PLAYERS - WAITING...';

      if (data.messages && data.messages.length > 0) {
        for (var i = 0; i < data.messages.length; i++) {
          var msg = data.messages[i];
          mpLastTs = Math.max(mpLastTs, msg.ts);
          try {
            var parsed = JSON.parse(msg.msg);
            if (parsed.type === 'start' && !game) {
              startSolo();
            }
          } catch(e) {}
        }
      }
    }).catch(function() {});
  }, POLL_INTERVAL);
}

function cancelRoom() {
  clearInterval(mpPollTimer);
  if (mpRoom) {
    fetch('/api/mroom/close', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: mpRoom.code, token: mpRoom.token })
    }).catch(function() {});
  }
  mpRoom = null;
  mpLastTs = 0;
  isMultiplayer = false;
  document.getElementById('createRoomUI').classList.remove('active');
  document.getElementById('joinRoomUI').classList.remove('active');
}

// ─── EVENT LISTENERS ───────────────────────────────────────────
document.getElementById('btnSolo').addEventListener('click', startSolo);
document.getElementById('btnCreate').addEventListener('click', showCreateRoom);
document.getElementById('btnJoin').addEventListener('click', showJoinRoom);
document.getElementById('btnStartRoom').addEventListener('click', startMultiplayerGame);
document.getElementById('btnCancelCreate').addEventListener('click', cancelRoom);
document.getElementById('btnCancelJoin').addEventListener('click', cancelRoom);
document.getElementById('btnJoinSubmit').addEventListener('click', joinRoom);
document.getElementById('btnPlayAgain').addEventListener('click', backToStart);
document.getElementById('btnShare').addEventListener('click', shareResult);

document.getElementById('btnFold').addEventListener('click', function() { doAction('fold'); });
document.getElementById('btnCheck').addEventListener('click', function() { doAction('check'); });
document.getElementById('btnCall').addEventListener('click', function() { doAction('call'); });
document.getElementById('btnRaise').addEventListener('click', function() { doAction('raise'); });
document.getElementById('btnAllIn').addEventListener('click', function() { doAction('allin'); });

document.getElementById('raiseSlider').addEventListener('input', function() {
  document.getElementById('raiseAmountLabel').textContent = parseInt(this.value).toLocaleString();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (game && !game.handOver) {
      var me = getPlayerBySeat(game.playerSeat);
      if (me) {
        bankroll = (loadBankroll() || 0) + me.chips;
        saveBankroll(bankroll);
      }
      game = null;
      clearInterval(turnTimerInterval);
      cancelRoom();
      updateBankrollDisplay();
      Neon.render(document.getElementById('startLB'));
      showScreen('startScreen');
    }
    return;
  }

  if (!game || game.handOver) return;
  if (game.turnIndex < 0 || game.turnIndex >= game.players.length) return;
  var me2 = game.players[game.turnIndex];
  if (!me2 || me2.seat !== game.playerSeat) return;

  var key = e.key.toLowerCase();
  if (key === 'f') doAction('fold');
  else if (key === 'c') {
    var toCall = game.currentBet - me2.currentBet;
    if (toCall === 0) doAction('check');
    else doAction('call');
  }
  else if (key === 'r') doAction('raise');
});

// ─── INIT ──────────────────────────────────────────────────────
createSeats();

})();
</script>
