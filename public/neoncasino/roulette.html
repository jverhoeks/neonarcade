      [523, 659, 784, 1047, 1319, 1568].forEach(function(f, i) {
        var o = ctx.createOscillator(); var g = ctx.createGain();
        o.type = 'square'; o.frequency.value = f;
        g.gain.setValueAtTime(0, t + i * 0.1);
        g.gain.linearRampToValueAtTime(0.12, t + i * 0.1 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.4);
        o.connect(g); g.connect(ctx.destination);
        o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.4);
      });
    } catch (e) {}
  }

  function playLoseSound() {
    try {
      var ctx = getAudio(); var t = ctx.currentTime;
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(300, t);
      o.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + 0.4);
    } catch (e) {}
  }

  // ====== WHEEL DRAWING ======
  var wheelCtx = $wheelCanvas.getContext('2d');
  var wheelLogW, wheelLogH, wheelRadius, wheelCenterX, wheelCenterY;
  var wheelAngle = 0;
  var ballAngle = 0;
  var ballRadius = 0;
  var animFrame = null;

  function sizeWheel() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var headerH = 44;
    var chipBarH = 54;
    var tableMinH = 300;
    var availH = vh - headerH - chipBarH - tableMinH;
    var maxWheelH = Math.max(160, Math.min(availH, 320));
    var maxWheelW = Math.min(vw - 16, 400);
    var sz = Math.min(maxWheelH, maxWheelW);

    wheelLogW = sz;
    wheelLogH = sz;
    wheelRadius = sz / 2 - 12;
    wheelCenterX = sz / 2;
    wheelCenterY = sz / 2;

    var dpr = window.devicePixelRatio || 1;
    $wheelCanvas.width = wheelLogW * dpr;
    $wheelCanvas.height = wheelLogH * dpr;
    $wheelCanvas.style.width = wheelLogW + 'px';
    $wheelCanvas.style.height = wheelLogH + 'px';
    wheelCtx.setTransform(1, 0, 0, 1, 0, 0);
    wheelCtx.scale(dpr, dpr);
  }

  function numColor(n) {
    if (n === 0) return '#39ff14';
    return RED_NUMS.has(n) ? '#ff2d7b' : '#1a1a2e';
  }

  function numTextColor(n) {
    if (n === 0) return '#0a0a12';
    return RED_NUMS.has(n) ? '#fff' : '#9999bb';
  }

  function drawWheel(angle, bAngle, bR, highlightNum) {
    var ctx = wheelCtx;
    var cx = wheelCenterX;
    var cy = wheelCenterY;
    var rad = wheelRadius;
    var n = WHEEL_SEQ.length;
    var arc = (Math.PI * 2) / n;

    ctx.clearRect(0, 0, wheelLogW, wheelLogH);

    // Outer ring glow
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, rad + 6, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,240,255,0.2)';
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(0,240,255,0.4)';
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.restore();

    // Draw pockets
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    for (var i = 0; i < n; i++) {
      var startA = i * arc - arc / 2;
      var endA = startA + arc;
      var num = WHEEL_SEQ[i];

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, rad, startA, endA);
      ctx.closePath();
      ctx.fillStyle = numColor(num);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Highlight winning pocket
      if (highlightNum !== undefined && num === highlightNum) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, rad, startA, endA);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255,215,0,0.35)';
        ctx.fill();
        ctx.restore();
      }

      // Number text
      ctx.save();
      ctx.rotate(startA + arc / 2);
      ctx.translate(rad * 0.78, 0);
      ctx.rotate(Math.PI / 2);
      ctx.fillStyle = numTextColor(num);
      ctx.font = 'bold ' + Math.max(8, rad * 0.08) + 'px Orbitron, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(num), 0, 0);
      ctx.restore();
    }

    // Inner circle
    ctx.beginPath();
    ctx.arc(0, 0, rad * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#12121f';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,240,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Center decoration
    ctx.beginPath();
    ctx.arc(0, 0, rad * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = '#0a0a12';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,240,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();

    // Ball
    if (bR > 0) {
      var bx = cx + Math.cos(bAngle) * bR;
      var by = cy + Math.sin(bAngle) * bR;

      // Trail
      for (var t = 1; t <= 4; t++) {
        var ta = bAngle - t * 0.06;
        var tx = cx + Math.cos(ta) * bR;
        var ty = cy + Math.sin(ta) * bR;
        ctx.beginPath();
        ctx.arc(tx, ty, 4 - t * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,240,255,' + (0.15 - t * 0.03) + ')';
        ctx.fill();
      }

      // Ball glow
      ctx.save();
      ctx.beginPath();
      ctx.arc(bx, by, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();

      // Ball core
      ctx.beginPath();
      ctx.arc(bx, by, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }

    // Pointer at top
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, cy - rad - 8);
    ctx.lineTo(cx - 6, cy - rad - 18);
    ctx.lineTo(cx + 6, cy - rad - 18);
    ctx.closePath();
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255,215,0,0.6)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.restore();
  }

  // ====== BETTING TABLE ======
  var cellDefs = [];

  function range(a, b) {
    var arr = [];
    for (var i = a; i <= b; i++) arr.push(i);
    return arr;
  }

  function buildTable() {
    $betTable.textContent = '';
    cellDefs.length = 0;

    // Zero spans full width at top
    var zeroCell = mkCell('straight-0', 'green', '0', 'straight', [0]);
    zeroCell.style.gridColumn = '1 / -1';
    $betTable.appendChild(zeroCell);

    // Numbers 1-36 in rows of 3
    for (var row = 0; row < 12; row++) {
      for (var col = 0; col < 3; col++) {
        var num = TABLE_ROWS[row][col];
        var isRed = RED_NUMS.has(num);
        var cls = isRed ? 'red' : 'black';
        var cell = mkCell('straight-' + num, cls, String(num), 'straight', [num]);
        $betTable.appendChild(cell);
      }
    }

    // Column bets
    ['2:1 (1st)', '2:1 (2nd)', '2:1 (3rd)'].forEach(function(label, i) {
      var nums = [];
      for (var rr = 0; rr < 12; rr++) nums.push(TABLE_ROWS[rr][i]);
      var cell = mkCell('column-' + (i + 1), 'outside', label, 'column', nums);
      $betTable.appendChild(cell);
    });

    // Dozen bets
    ['1st 12', '2nd 12', '3rd 12'].forEach(function(label, i) {
      var nums = [];
      for (var nn = i * 12 + 1; nn <= (i + 1) * 12; nn++) nums.push(nn);
      var cell = mkCell('dozen-' + (i + 1), 'outside', label, 'dozen', nums);
      $betTable.appendChild(cell);
    });

    // Outside bets: 2 rows of 3
    var outsideBets = [
      { id: 'low', label: '1-18', type: 'low', nums: range(1, 18) },
      { id: 'even', label: 'EVEN', type: 'even', nums: range(1, 36).filter(function(nn) { return nn % 2 === 0; }) },
      { id: 'red', label: 'RED', type: 'red', nums: Array.from(RED_NUMS) },
      { id: 'black', label: 'BLACK', type: 'black', nums: range(1, 36).filter(function(nn) { return !RED_NUMS.has(nn) && nn !== 0; }) },
      { id: 'odd', label: 'ODD', type: 'odd', nums: range(1, 36).filter(function(nn) { return nn % 2 === 1; }) },
      { id: 'high', label: '19-36', type: 'high', nums: range(19, 36) }
    ];

    outsideBets.forEach(function(b) {
      var cls = 'outside';
      if (b.id === 'red') cls = 'outside red';
      if (b.id === 'black') cls = 'outside black';
      var cell = mkCell(b.id, cls, b.label, b.type, b.nums);
      $betTable.appendChild(cell);
    });

    // Street bets (row of 3)
    addSectionHeader('STREET BETS (ROW OF 3)');
    for (var sr = 0; sr < 12; sr++) {
      var snums = TABLE_ROWS[sr];
      var scell = mkCell('street-' + sr, 'outside', snums.join('-'), 'street', snums.slice());
      scell.style.gridColumn = '1 / -1';
      $betTable.appendChild(scell);
    }

    // Line bets (2 rows of 3 = 6 numbers)
    addSectionHeader('LINE BETS (6 NUMBERS)');
    for (var lr = 0; lr < 11; lr++) {
      var lnums = TABLE_ROWS[lr].concat(TABLE_ROWS[lr + 1]);
      var lcell = mkCell('line-' + lr, 'outside', TABLE_ROWS[lr][0] + '-' + TABLE_ROWS[lr + 1][2], 'line', lnums);
      lcell.style.gridColumn = '1 / -1';
      $betTable.appendChild(lcell);
    }

    // Split bets (2 numbers)
    addSectionHeader('SPLIT BETS (2 NUMBERS)');
    // Horizontal splits (adjacent in same row)
    for (var hr = 0; hr < 12; hr++) {
      for (var hc = 0; hc < 2; hc++) {
        var ha = TABLE_ROWS[hr][hc];
        var hb = TABLE_ROWS[hr][hc + 1];
        var hcell = mkCell('split-h-' + ha + '-' + hb, 'outside', ha + '|' + hb, 'split', [ha, hb]);
        $betTable.appendChild(hcell);
      }
      // Fill third column with empty div
      var filler1 = document.createElement('div');
      $betTable.appendChild(filler1);
    }

    // Vertical splits (adjacent rows, same column)
    for (var vr = 0; vr < 11; vr++) {
      for (var vc = 0; vc < 3; vc++) {
        var va = TABLE_ROWS[vr][vc];
        var vb = TABLE_ROWS[vr + 1][vc];
        var vcell = mkCell('split-v-' + va + '-' + vb, 'outside', va + '/' + vb, 'split', [va, vb]);
        $betTable.appendChild(vcell);
      }
    }

    // Corner bets (4 numbers)
    addSectionHeader('CORNER BETS (4 NUMBERS)');
    for (var cr = 0; cr < 11; cr++) {
      for (var cc = 0; cc < 2; cc++) {
        var ca = TABLE_ROWS[cr][cc];
        var cb = TABLE_ROWS[cr][cc + 1];
        var ccc = TABLE_ROWS[cr + 1][cc];
        var cd = TABLE_ROWS[cr + 1][cc + 1];
        var ccell = mkCell('corner-' + ca + '-' + cb + '-' + ccc + '-' + cd, 'outside', ca + ',' + cb + ',' + ccc + ',' + cd, 'corner', [ca, cb, ccc, cd]);
        $betTable.appendChild(ccell);
      }
      var filler2 = document.createElement('div');
      $betTable.appendChild(filler2);
    }
  }

  function addSectionHeader(text) {
    var hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = text;
    $betTable.appendChild(hdr);

  function mkCell(id, cls, label, type, numbers) {
    var el = document.createElement('div');
    el.className = 'bet-cell ' + cls;
    el.dataset.cellId = id;
    el.textContent = label;
    el.addEventListener('click', function() { placeBet(id, type, numbers); });
    cellDefs.push({ id: id, type: type, numbers: numbers, element: el });
    return el;
  }

  // ====== PLACE BETS ======
  function placeBet(cellId, type, numbers) {
    if (spinning) return;
    var amount = selectedChip;
    var afford = bankroll - totalBet;
    if (amount > afford) return;
    if (amount < MIN_BET) return;
    if (totalBet + amount > 10000) return;

    bets.push({ type: type, numbers: numbers.slice(), amount: amount, cellId: cellId });
    totalBet += amount;

    updateBetVisuals();
    playChipClink();

    $spinBtn.disabled = false;
    updateHeader();
  }

  function updateBetVisuals() {
    // Clear all chip visuals
    var placed = document.querySelectorAll('.placed-chip');
    for (var p = 0; p < placed.length; p++) placed[p].remove();

    // Aggregate bets by cell
    var agg = {};
    bets.forEach(function(b) {
      if (!agg[b.cellId]) agg[b.cellId] = 0;
      agg[b.cellId] += b.amount;
    });

    // Place chip visuals
    var keys = Object.keys(agg);
    for (var k = 0; k < keys.length; k++) {
      var cellId = keys[k];
      var amount = agg[cellId];
      var cell = document.querySelector('[data-cell-id="' + cellId + '"]');
      if (!cell) continue;

      var chip = document.createElement('div');
      chip.className = 'placed-chip ' + chipClass(amount);
      chip.textContent = amount >= 1000 ? Math.round(amount / 1000) + 'k' : String(amount);
      cell.appendChild(chip);
    }
  }

  function chipClass(amount) {
    if (amount >= 500) return 'ch-500';
    if (amount >= 100) return 'ch-100';
    if (amount >= 50) return 'ch-50';
    if (amount >= 25) return 'ch-25';
    return 'ch-10';
  }

  function clearBets() {
    bets = [];
    totalBet = 0;
    updateBetVisuals();
    $spinBtn.disabled = true;
    updateHeader();
  }

  function undoBet() {
    if (bets.length === 0) return;
    var removed = bets.pop();
    totalBet -= removed.amount;
    updateBetVisuals();
    if (bets.length === 0) $spinBtn.disabled = true;
    updateHeader();
  }

  function updateHeader() {
    $hdrBankroll.textContent = '\u{1F4B0} ' + bankroll.toLocaleString();
    $hdrBetTotal.textContent = 'BET: ' + totalBet.toLocaleString();
  }

  // ====== SPIN ======
  function doSpin() {
    if (spinning || bets.length === 0) return;
    spinning = true;
    $spinBtn.disabled = true;

    // Deduct bet from bankroll
    bankroll -= totalBet;
    saveBankroll(bankroll);
    updateHeader();

    playSpinWhoosh();

    // Pick random result
    var resultIdx = Math.floor(Math.random() * WHEEL_SEQ.length);
    var resultNum = WHEEL_SEQ[resultIdx];

    // Target angle: position the winning pocket under the pointer (top)
    var arc = (Math.PI * 2) / WHEEL_SEQ.length;
    var targetPocketAngle = -Math.PI / 2 - resultIdx * arc;
    var extraRotations = (5 + Math.random() * 3) * Math.PI * 2;
    var targetAngle = targetPocketAngle - extraRotations;

    var startAngle = wheelAngle;
    var totalRotation = targetAngle - startAngle;
    var duration = 3500 + Math.random() * 1500;
    var startTime = performance.now();

    var lastTickAngle = startAngle;

    // Ball params
    var ballStartR = wheelRadius * 0.92;
    var ballEndR = wheelRadius * 0.62;
    var ballExtraSpins = (8 + Math.random() * 4) * Math.PI * 2;
    var ballTargetAngle = -Math.PI / 2;

    function animateSpin(now) {
      var elapsed = now - startTime;
      var t = Math.min(elapsed / duration, 1);

      // Ease out cubic
      var ease = 1 - Math.pow(1 - t, 3);

      wheelAngle = startAngle + totalRotation * ease;

      // Ball animation
      var ballT = Math.min(elapsed / (duration * 0.85), 1);
      var ballEase = 1 - Math.pow(1 - ballT, 4);
      ballAngle = -1 * ballExtraSpins * (1 - ballEase) + ballTargetAngle;
      ballRadius = ballStartR + (ballEndR - ballStartR) * ballEase;

      // Ball bounce in last 15% of animation
      if (ballT > 0.85 && ballT < 1) {
        var bounceT = (ballT - 0.85) / 0.15;
        ballRadius += Math.sin(bounceT * Math.PI * 3) * 8 * (1 - bounceT);
      }

      // Tick sounds (decelerate)
      var currentAngle = wheelAngle % (Math.PI * 2);
      var angleDiff = Math.abs(currentAngle - lastTickAngle);
      if (angleDiff > arc * 0.8 && t < 0.9) {
        playBallTick();
        lastTickAngle = currentAngle;
      }

      drawWheel(wheelAngle, ballAngle, ballRadius, t > 0.95 ? resultNum : undefined);

      if (t < 1) {
        animFrame = requestAnimationFrame(animateSpin);
      } else {
        wheelAngle = targetAngle;
        ballRadius = ballEndR;
        drawWheel(wheelAngle, ballTargetAngle, ballRadius, resultNum);
        playBallLand();

        setTimeout(function() { showResult(resultNum); }, 600);
      }
    }

    animFrame = requestAnimationFrame(animateSpin);
  }

  // ====== RESULT ======
  function getBetTypeName(bet) {
    switch (bet.type) {
      case 'straight': return 'Straight ' + bet.numbers[0];
      case 'split': return 'Split ' + bet.numbers.join('/');
      case 'street': return 'Street ' + bet.numbers[0] + '-' + bet.numbers[bet.numbers.length - 1];
      case 'corner': return 'Corner';
      case 'line': return 'Line';
      case 'dozen': return 'Dozen';
      case 'column': return 'Column';
      default: return bet.type.charAt(0).toUpperCase() + bet.type.slice(1);
    }
  }

  function showResult(num) {
    spinning = false;
    spinCount++;
    lastResult = num;

    var isRed = RED_NUMS.has(num);
    var colorName = num === 0 ? 'Green' : (isRed ? 'Red' : 'Black');

    // Calculate payouts
    var totalWin = 0;
    var hitStraight = false;

    // Build payout display using DOM
    $payoutBox.textContent = '';

    bets.forEach(function(bet) {
      var won = bet.numbers.indexOf(num) !== -1;
      var typeName = getBetTypeName(bet);

      var line = document.createElement('div');
      line.className = 'payout-line';

      var labelSpan = document.createElement('span');
      labelSpan.textContent = typeName;
      line.appendChild(labelSpan);

      var amountSpan = document.createElement('span');

      if (won) {
        var payout = bet.amount * PAYOUTS[bet.type] + bet.amount;
        totalWin += payout;
        amountSpan.className = 'pw';
        amountSpan.textContent = '+' + payout;
        if (bet.type === 'straight') hitStraight = true;
      } else {
        amountSpan.className = 'pl';
        amountSpan.textContent = '-' + bet.amount;
      }

      line.appendChild(amountSpan);
      $payoutBox.appendChild(line);
    });

    var netWin = totalWin - totalBet;
    bankroll += totalWin;
    saveBankroll(bankroll);

    if (totalWin > 0) winCount++;
    if (netWin > biggestWin) biggestWin = netWin;

    // Net total line
    var totalLine = document.createElement('div');
    totalLine.className = 'payout-total';
    var netLabel = document.createElement('span');
    netLabel.textContent = 'NET';
    totalLine.appendChild(netLabel);
    var netAmount = document.createElement('span');
    netAmount.className = netWin >= 0 ? 'pw' : 'pl';
    netAmount.textContent = (netWin >= 0 ? '+' : '') + netWin;
    totalLine.appendChild(netAmount);
    $payoutBox.appendChild(totalLine);

    // Highlight winning cells on table
    cellDefs.forEach(function(cd) {
      if (cd.numbers.indexOf(num) !== -1) {
        cd.element.classList.add('winner');
      }
    });

    // Show result overlay
    $resultNumber.textContent = String(num);
    $resultNumber.className = 'result-number ' + (num === 0 ? 'r-green' : (isRed ? 'r-red' : 'r-black'));
    $resultLabel.textContent = num + ' ' + colorName + (num !== 0 ? (num % 2 === 0 ? ' Even' : ' Odd') : '');

    $resultOverlay.classList.remove('hidden');

    // Effects
    if (totalWin > 0) {
      if (hitStraight || netWin >= totalBet * 5) {
        playBigWinFanfare();
        spawnParticles(window.innerWidth / 2, window.innerHeight / 3, 20, '#ffd700');
        spawnParticles(window.innerWidth / 2, window.innerHeight / 3, 15, '#ff2d7b');
        document.body.classList.add('shake');
        setTimeout(function() { document.body.classList.remove('shake'); }, 250);
      } else {
        playWinChime();
        spawnParticles(window.innerWidth / 2, window.innerHeight / 3, 12, '#39ff14');
      }
    } else {
      playLoseSound();
    }

    // Save high score (bankroll as score)
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(bankroll);
    }).then(function(result) {
      Neon.render(document.getElementById('goLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    });
  }

  // ====== PARTICLES ======
  function spawnParticles(x, y, count, color) {
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = 3 + Math.random() * 5;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = color;
      p.style.boxShadow = '0 0 6px ' + color;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.body.appendChild(p);

      var angle = Math.random() * Math.PI * 2;
      var speed = 60 + Math.random() * 140;
      var dx = Math.cos(angle) * speed;
      var dy = Math.sin(angle) * speed - 40;
      var dur = 600 + Math.random() * 400;

      p.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: 'translate(' + dx + 'px,' + dy + 'px) scale(0)', opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0,.8,.5,1)' }).onfinish = (function(el) { return function() { el.remove(); }; })(p);
    }
  }

  // ====== SHARE ======
  function shareResult() {
    var num = lastResult;
    var isRed = RED_NUMS.has(num);
    var colorName = num === 0 ? 'Green' : (isRed ? 'Red' : 'Black');

    var text = '\uD83C\uDFB0 NEON ROULETTE\n';
    text += '\uD83D\uDCB0 Bankroll: ' + bankroll.toLocaleString() + ' | \uD83C\uDFAF Hit: ' + num + ' ' + colorName + '\n';
    text += '\uD83D\uDCCA ' + spinCount + ' spins | \u2705 ' + winCount + ' wins';
    if (biggestWin > 0) text += ' | \uD83D\uDCA5 Best: +' + biggestWin;
    text += '\nneonarcade.net/neoncasino/roulette.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        navigator.clipboard.writeText(text).then(function() {
          $shareBtn.textContent = 'COPIED!';
          setTimeout(function() { $shareBtn.textContent = 'SHARE'; }, 1500);
        });
      });
    } else {
      navigator.clipboard.writeText(text).then(function() {
        $shareBtn.textContent = 'COPIED!';
        setTimeout(function() { $shareBtn.textContent = 'SHARE'; }, 1500);
      });
    }
  }

  // ====== SCREENS ======
  function showStart() {
    if (animFrame) cancelAnimationFrame(animFrame);
    $startScreen.classList.remove('hidden');
    $gameScreen.classList.add('hidden');
    $resultOverlay.classList.add('hidden');
    $chipBar.classList.add('hidden');

    // Check daily bonus
    if (checkDailyBonus()) {
      $dailyBonus.classList.remove('hidden');
      setTimeout(function() { $dailyBonus.classList.add('hidden'); }, 3000);
    }

    $startBankroll.textContent = '\uD83D\uDCB0 ' + bankroll.toLocaleString() + ' CHIPS';
    Neon.render(document.getElementById('startLB'));
  }

  function showGame() {
    $startScreen.classList.add('hidden');
    $gameScreen.classList.remove('hidden');
    $resultOverlay.classList.add('hidden');
    $chipBar.classList.remove('hidden');

    clearBets();
    sizeWheel();
    updateHeader();
    drawWheel(wheelAngle, 0, 0);

    // Remove winner highlights
    var winners = document.querySelectorAll('.winner');
    for (var w = 0; w < winners.length; w++) winners[w].classList.remove('winner');
  }

  function betAgain() {
    $resultOverlay.classList.add('hidden');

    // Remove winner highlights
    var winners = document.querySelectorAll('.winner');
    for (var w = 0; w < winners.length; w++) winners[w].classList.remove('winner');

    clearBets();
    updateHeader();
    drawWheel(wheelAngle, 0, 0);
  }

  // ====== CHIP SELECTOR ======
  var chipEls = document.querySelectorAll('.chip');
  for (var ci = 0; ci < chipEls.length; ci++) {
    chipEls[ci].addEventListener('click', function() {
      for (var cj = 0; cj < chipEls.length; cj++) chipEls[cj].classList.remove('active');
      this.classList.add('active');
      selectedChip = parseInt(this.dataset.value);
      playChipClink();
    });
  }

  // ====== EVENT LISTENERS ======
  $startBtn.addEventListener('click', showGame);
  $resetBtn.addEventListener('click', function() {
    bankroll = 1000;
    saveBankroll(bankroll);
    $startBankroll.textContent = '\uD83D\uDCB0 ' + bankroll.toLocaleString() + ' CHIPS';
  });
  $clearBtn.addEventListener('click', clearBets);
  $undoBtn.addEventListener('click', undoBet);
  $spinBtn.addEventListener('click', doSpin);
  $betAgainBtn.addEventListener('click', betAgain);
  $shareBtn.addEventListener('click', shareResult);

  // ESC key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (!$resultOverlay.classList.contains('hidden')) {
        betAgain();
      } else if (!$gameScreen.classList.contains('hidden') && !spinning) {
        // Return bets to bankroll
        bankroll += totalBet;
        saveBankroll(bankroll);
        showStart();
      }
    }
  });

  // Resize
  window.addEventListener('resize', function() {
    if (!$gameScreen.classList.contains('hidden')) {
      sizeWheel();
      drawWheel(wheelAngle, spinning ? ballAngle : 0, spinning ? ballRadius : 0);
    }
  });

  // ====== INIT ======
  buildTable();
  showStart();

})();
</script>
</body>
</html>
