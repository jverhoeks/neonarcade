  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playSlideSound() {
    try {
      ensureAudio();
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    } catch(e) {}
  }

  function playMergeSound(value) {
    try {
      ensureAudio();
      var baseFreq = 250 + Math.min(Math.log2(value) * 80, 800);
      var osc = audioCtx.createOscillator();
      var osc2 = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      osc2.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc2.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, audioCtx.currentTime + 0.15);
      osc2.frequency.setValueAtTime(baseFreq * 2, audioCtx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(baseFreq * 2.5, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc2.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);
      osc2.stop(audioCtx.currentTime + 0.2);
    } catch(e) {}
  }

  function playGameOverSound() {
    try {
      ensureAudio();
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.6);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.7);
    } catch(e) {}
  }

  function playWinFanfare() {
    try {
      ensureAudio();
      var notes = [523, 659, 784, 1047];
      notes.forEach(function(freq, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        var t = audioCtx.currentTime + i * 0.12;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.15, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t);
        osc.stop(t + 0.4);
      });
    } catch(e) {}
  }

  // ===== GAME STATE =====
  var grid = [];
  var score = 0;
  var moves = 0;
  var bestTile = 0;
  var gameOver = false;
  var won = false;
  var winShown = false;
  var canUndo = false;
  var prevGrid = [];
  var prevScore = 0;
  var prevMoves = 0;
  var animating = false;
  var tileIdCounter = 0;
  var highestTileEver = 0;

  // ===== SIZING =====
  var cellSize = 0;
  var gapSize = 8;
  var padSize = 8;

  function recalcSizes() {
    var containerRect = gridContainer.getBoundingClientRect();
    var innerSize = containerRect.width - padSize * 2;
    cellSize = (innerSize - gapSize * (SIZE - 1)) / SIZE;
  }

  function getCellPos(row, col) {
    return {
      x: col * (cellSize + gapSize),
      y: row * (cellSize + gapSize)
    };
  }

  // ===== GRID BG =====
  function buildGridBg() {
    while (gridBg.firstChild) gridBg.removeChild(gridBg.firstChild);
    for (var i = 0; i < SIZE * SIZE; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell-bg';
      gridBg.appendChild(cell);
    }
  }

  // ===== TILE MANAGEMENT =====
  function createTileElement(tile) {
    var el = document.createElement('div');
    el.className = 'tile';
    el.dataset.id = tile.id;
    updateTileStyle(el, tile);
    tilesLayer.appendChild(el);
    return el;
  }

  function updateTileStyle(el, tile) {
    var pos = getCellPos(tile.row, tile.col);
    var colors = getTileColors(tile.value);
    var fontSize;
    if (tile.value >= 16384) fontSize = cellSize * 0.18;
    else if (tile.value >= 1024) fontSize = cellSize * 0.22;
    else if (tile.value >= 128) fontSize = cellSize * 0.28;
    else fontSize = cellSize * 0.35;

    el.style.width = cellSize + 'px';
    el.style.height = cellSize + 'px';
    el.style.setProperty('--pos', 'translate(' + pos.x + 'px, ' + pos.y + 'px)');
    el.style.transform = 'translate(' + pos.x + 'px, ' + pos.y + 'px)';
    el.style.background = colors.bg;
    el.style.color = colors.fg;
    el.style.boxShadow = colors.glow;
    el.style.fontSize = fontSize + 'px';
    el.textContent = tile.value;

    if (tile.value >= 4096) {
      el.classList.add('tile-super');
    } else {
      el.classList.remove('tile-super');
    }
  }

  function getTileColors(value) {
    if (TILE_COLORS[value]) return TILE_COLORS[value];
    return {
      bg: '#1a1a2a',
      fg: '#ffffff',
      glow: '0 0 25px rgba(255,255,255,0.5), 0 0 50px rgba(255,255,255,0.25)'
    };
  }

  // ===== GRID LOGIC =====
  function createEmptyGrid() {
    var g = [];
    for (var r = 0; r < SIZE; r++) {
      g[r] = [];
      for (var c = 0; c < SIZE; c++) {
        g[r][c] = null;
      }
    }
    return g;
  }

  function cloneGrid(g) {
    return g.map(function(row) {
      return row.map(function(cell) {
        return cell ? { id: cell.id, value: cell.value, row: cell.row, col: cell.col, mergedFrom: null, isNew: false } : null;
      });
    });
  }

  function getEmptyCells() {
    var cells = [];
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (!grid[r][c]) cells.push({ row: r, col: c });
      }
    }
    return cells;
  }

  function addRandomTile() {
    var empty = getEmptyCells();
    if (empty.length === 0) return null;
    var cell = empty[Math.floor(Math.random() * empty.length)];
    var value = Math.random() < 0.9 ? 2 : 4;
    var tile = {
      id: tileIdCounter++,
      value: value,
      row: cell.row,
      col: cell.col,
      mergedFrom: null,
      isNew: true
    };
    grid[cell.row][cell.col] = tile;
    return tile;
  }

  function getHighestTile() {
    var max = 0;
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (grid[r][c] && grid[r][c].value > max) max = grid[r][c].value;
      }
    }
    return max;
  }

  function canMove() {
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return true;
      }
    }
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var val = grid[r][c].value;
        if (r < SIZE - 1 && grid[r + 1][c] && grid[r + 1][c].value === val) return true;
        if (c < SIZE - 1 && grid[r][c + 1] && grid[r][c + 1].value === val) return true;
      }
    }
    return false;
  }

  // ===== MOVE LOGIC =====
  function doMoveLogic(direction) {
    var vectors = {
      up:    { dr: -1, dc: 0 },
      down:  { dr: 1,  dc: 0 },
      left:  { dr: 0,  dc: -1 },
      right: { dr: 0,  dc: 1 }
    };

    var vec = vectors[direction];
    var moved = false;
    var mergeScore = 0;
    var merges = [];

    var rowOrder = [];
    var colOrder = [];
    for (var i = 0; i < SIZE; i++) {
      rowOrder.push(i);
      colOrder.push(i);
    }
    if (vec.dr === 1) rowOrder.reverse();
    if (vec.dc === 1) colOrder.reverse();

    var mergedThisMove = createEmptyGrid();

    for (var ri = 0; ri < rowOrder.length; ri++) {
      for (var ci = 0; ci < colOrder.length; ci++) {
        var r = rowOrder[ri];
        var c = colOrder[ci];
        var tile = grid[r][c];
        if (!tile) continue;

        var newR = r;
        var newC = c;
        while (true) {
          var nextR = newR + vec.dr;
          var nextC = newC + vec.dc;
          if (nextR < 0 || nextR >= SIZE || nextC < 0 || nextC >= SIZE) break;
          if (grid[nextR][nextC]) {
            if (grid[nextR][nextC].value === tile.value && !mergedThisMove[nextR][nextC]) {
              newR = nextR;
              newC = nextC;
            }
            break;
          }
          newR = nextR;
          newC = nextC;
        }

        if (newR === r && newC === c) continue;

        moved = true;
        grid[r][c] = null;

        if (grid[newR][newC] && grid[newR][newC].value === tile.value) {
          var newValue = tile.value * 2;
          var oldTargetId = grid[newR][newC].id;
          var mergedTile = {
            id: tileIdCounter++,
            value: newValue,
            row: newR,
            col: newC,
            mergedFrom: [tile.id, oldTargetId],
            isNew: false
          };
          grid[newR][newC] = mergedTile;
          mergedThisMove[newR][newC] = true;
          mergeScore += newValue;
          merges.push({ row: newR, col: newC, value: newValue, fromTileIds: [tile.id, oldTargetId] });
        } else {
          tile.row = newR;
          tile.col = newC;
          tile.isNew = false;
          tile.mergedFrom = null;
          grid[newR][newC] = tile;
        }
      }
    }

    return { moved: moved, mergeScore: mergeScore, merges: merges };
  }

  // ===== RENDER =====
  function renderTiles(result, newTile) {
    var existingEls = {};
    var allEls = tilesLayer.querySelectorAll('.tile');
    for (var i = 0; i < allEls.length; i++) {
      existingEls[allEls[i].dataset.id] = allEls[i];
    }

    var consumedIds = {};
    if (result && result.merges) {
      result.merges.forEach(function(m) {
        m.fromTileIds.forEach(function(id) { consumedIds[String(id)] = true; });
      });
    }

    // Collect all current tiles
    var currentTiles = [];
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (grid[r][c]) currentTiles.push(grid[r][c]);
      }
    }

    // Move consumed tiles to merge target position (for visual slide)
    if (result && result.merges) {
      result.merges.forEach(function(m) {
        m.fromTileIds.forEach(function(id) {
          var el = existingEls[String(id)];
          if (el) {
            var pos = getCellPos(m.row, m.col);
            el.style.transform = 'translate(' + pos.x + 'px, ' + pos.y + 'px)';
            el.style.zIndex = '0';
          }
        });
      });
    }

    // Update existing tiles positions (slides)
    currentTiles.forEach(function(tile) {
      var el = existingEls[String(tile.id)];
      if (el) {
        updateTileStyle(el, tile);
      }
    });

    // After slide animation: create merged tiles, remove consumed
    setTimeout(function() {
      // Remove consumed
      Object.keys(consumedIds).forEach(function(id) {
        var el = existingEls[id];
        if (el && el.parentNode) el.parentNode.removeChild(el);
      });

      // Create merged tile elements
      currentTiles.forEach(function(tile) {
        if (!existingEls[String(tile.id)]) {
          var el = createTileElement(tile);
          if (tile.mergedFrom) {
            el.classList.add('merged');
            setTimeout(function() { el.classList.remove('merged'); }, 200);
          }
        }
      });

      // Remove any orphaned elements
      var activeIds = {};
      currentTiles.forEach(function(t) { activeIds[String(t.id)] = true; });
      var remaining = tilesLayer.querySelectorAll('.tile');
      for (var j = 0; j < remaining.length; j++) {
        if (!activeIds[remaining[j].dataset.id]) {
          remaining[j].parentNode.removeChild(remaining[j]);
        }
      }

      // Spawn new tile
      if (newTile) {
        var el = createTileElement(newTile);
        el.classList.add('new-tile');
        setTimeout(function() { el.classList.remove('new-tile'); }, 200);
      }
    }, 155);
  }

  function fullRender() {
    while (tilesLayer.firstChild) tilesLayer.removeChild(tilesLayer.firstChild);
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (grid[r][c]) {
          grid[r][c].isNew = false;
          grid[r][c].mergedFrom = null;
          createTileElement(grid[r][c]);
        }
      }
    }
  }

  // ===== PARTICLES =====
  function spawnParticles(x, y, color, count) {
    var colors = color ? [color] : ['#00f0ff', '#ffd700', '#ff2d7b', '#39ff14', '#b44dff'];
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5);
      var dist = 30 + Math.random() * 50;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = colors[i % colors.length];
      p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
      document.body.appendChild(p);
      (function(el) {
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 800);
      })(p);
    }
  }

  function spawnScorePop(row, col, value) {
    var pos = getCellPos(row, col);
    var pop = document.createElement('div');
    pop.className = 'score-pop';
    pop.textContent = '+' + value;
    pop.style.left = (pos.x + cellSize / 2) + 'px';
    pop.style.top = pos.y + 'px';
    tilesLayer.appendChild(pop);
    setTimeout(function() { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 700);
  }

  // ===== GAME FLOW =====
  function initGame() {
    grid = createEmptyGrid();
    score = 0;
    moves = 0;
    bestTile = 0;
    gameOver = false;
    won = false;
    winShown = false;
    canUndo = false;
    prevGrid = [];
    prevScore = 0;
    prevMoves = 0;
    animating = false;
    tileIdCounter = 0;

    recalcSizes();
    buildGridBg();
    while (tilesLayer.firstChild) tilesLayer.removeChild(tilesLayer.firstChild);

    addRandomTile();
    addRandomTile();
    fullRender();

    updateDisplay();
    undoBtn.disabled = true;
  }

  function updateDisplay() {
    scoreDisplay.textContent = score;
    bestTile = getHighestTile();
    var localBest = Neon.getHighScore();
    bestDisplay.textContent = Math.max(score, localBest);
  }

  function doMove(direction) {
    if (gameOver || animating) return;

    // Save state for undo
    prevGrid = cloneGrid(grid);
    prevScore = score;
    prevMoves = moves;

    var result = doMoveLogic(direction);
    if (!result.moved) return;

    animating = true;
    playSlideSound();

    score += result.mergeScore;
    moves++;

    // Play merge sounds + particles
    result.merges.forEach(function(m) {
      playMergeSound(m.value);
      spawnScorePop(m.row, m.col, m.value);
      var pos = getCellPos(m.row, m.col);
      var containerRect = tilesLayer.getBoundingClientRect();
      var colors = getTileColors(m.value);
      spawnParticles(
        containerRect.left + pos.x + cellSize / 2,
        containerRect.top + pos.y + cellSize / 2,
        colors.fg,
        8
      );
    });

    // Check for new highest tile
    var newHighest = getHighestTile();
    if (newHighest > highestTileEver) {
      highestTileEver = newHighest;
      gridContainer.classList.add('shake');
      setTimeout(function() { gridContainer.classList.remove('shake'); }, 250);
    }

    // Add new tile
    var newTile = addRandomTile();
    renderTiles(result, newTile);

    canUndo = true;
    undoBtn.disabled = false;

    updateDisplay();

    setTimeout(function() {
      animating = false;

      // Check win
      if (newHighest >= 2048 && !winShown) {
        won = true;
        winShown = true;
        showWin();
        return;
      }

      // Check game over
      if (!canMove()) {
        gameOver = true;
        setTimeout(function() { showGameOver(); }, 300);
      }
    }, 180);
  }

  function doUndo() {
    if (!canUndo || animating || gameOver) return;
    grid = cloneGrid(prevGrid);
    score = prevScore;
    moves = prevMoves;
    canUndo = false;
    undoBtn.disabled = true;
    fullRender();
    updateDisplay();
  }

  // ===== SCREENS =====
  function showStart() {
    startScreen.classList.remove('hidden');
    gameOverOverlay.classList.add('hidden');
    winOverlay.classList.add('hidden');
    Neon.render(startLB);
  }

  function startGame() {
    startScreen.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    winOverlay.classList.add('hidden');
    highestTileEver = 0;
    initGame();
  }

  function showWin() {
    playWinFanfare();
    winOverlay.classList.remove('hidden');

    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;
    for (var i = 0; i < 20; i++) {
      (function(idx) {
        setTimeout(function() {
          spawnParticles(
            cx + (Math.random() - 0.5) * 200,
            cy + (Math.random() - 0.5) * 200,
            null, 8
          );
        }, idx * 50);
      })(i);
    }
  }

  function showGameOver() {
    playGameOverSound();
    goScore.textContent = score;
    goBest.textContent = bestTile;
    goMoves.textContent = moves;
    gameOverOverlay.classList.remove('hidden');

    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      Neon.render(goLB);
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    }).catch(function() {
      Neon.render(goLB);
    });
  }

  // ===== SHARE =====
  function getShareText() {
    var tileEmojis = {};
    tileEmojis[2] = '\u2b1b';
    tileEmojis[4] = '\u2b1b';
    tileEmojis[8] = '\ud83d\udfe6';
    tileEmojis[16] = '\ud83d\udfe9';
    tileEmojis[32] = '\ud83d\udfe8';
    tileEmojis[64] = '\ud83d\udfe7';
    tileEmojis[128] = '\ud83d\udfe5';
    tileEmojis[256] = '\ud83d\udfea';
    tileEmojis[512] = '\ud83d\udfe6';
    tileEmojis[1024] = '\ud83d\udfe8';
    tileEmojis[2048] = '\u2b1c';

    var gridText = '';
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (grid[r][c]) {
          var v = grid[r][c].value;
          gridText += tileEmojis[v] || '\ud83d\udfe5';
        } else {
          gridText += '\u2b1b';
        }
      }
      gridText += '\n';
    }

    return '\u2728 NEON 2048\n' +
      'Score: ' + score + ' | Best Tile: ' + bestTile + '\n' +
      'Moves: ' + moves + '\n' +
      gridText +
      'neonarcade.net/neonclassic/2048.html';
  }

  function shareResult() {
    var text = getShareText();
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      shareBtn.textContent = 'COPIED!';
      setTimeout(function() { shareBtn.textContent = 'SHARE'; }, 2000);
    }).catch(function() {
      shareBtn.textContent = 'FAILED';
      setTimeout(function() { shareBtn.textContent = 'SHARE'; }, 2000);
    });
  }

  // ===== INPUT: KEYBOARD =====
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      // If playing (start screen is hidden, game over not shown), quit to start
      if (startScreen.classList.contains('hidden') && gameOverOverlay.classList.contains('hidden') && winOverlay.classList.contains('hidden')) {
        e.preventDefault();
        gameOver = true;
        showStart();
        return;
      }
    }
    if (gameOver && !gameOverOverlay.classList.contains('hidden')) return;
    if (!winOverlay.classList.contains('hidden')) return;
    if (!startScreen.classList.contains('hidden')) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startGame();
      }
      return;
    }

    var keyMap = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      W: 'up', S: 'down', A: 'left', D: 'right'
    };

    if (keyMap[e.key]) {
      e.preventDefault();
      doMove(keyMap[e.key]);
    }

    if (e.key === 'z' || e.key === 'Z') {
      e.preventDefault();
      doUndo();
    }
  });

  // ===== INPUT: TOUCH/SWIPE =====
  var touchStartX = 0;
  var touchStartY = 0;
  var touchStartTime = 0;

  document.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (gameOver && !gameOverOverlay.classList.contains('hidden')) return;
    if (!startScreen.classList.contains('hidden')) return;
    if (!winOverlay.classList.contains('hidden')) return;

    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    var dt = Date.now() - touchStartTime;

    var absDx = Math.abs(dx);
    var absDy = Math.abs(dy);
    var minSwipe = 30;

    if (dt > 1000) return;
    if (absDx < minSwipe && absDy < minSwipe) return;

    if (absDx > absDy) {
      doMove(dx > 0 ? 'right' : 'left');
    } else {
      doMove(dy > 0 ? 'down' : 'up');
    }
  }, { passive: true });

  gridContainer.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  // ===== BUTTON HANDLERS =====
  startBtn.addEventListener('click', startGame);
  replayBtn.addEventListener('click', startGame);
  shareBtn.addEventListener('click', shareResult);
  undoBtn.addEventListener('click', doUndo);

  keepBtn.addEventListener('click', function() {
    winOverlay.classList.add('hidden');
    won = false;
  });

  endBtn.addEventListener('click', function() {
    winOverlay.classList.add('hidden');
    gameOver = true;
    setTimeout(function() { showGameOver(); }, 100);
  });

  // ===== RESIZE =====
  window.addEventListener('resize', function() {
    recalcSizes();
    fullRender();
  });

  // ===== INIT =====
  Neon.init({
    game: '2048',
    mode: 'high',
    key: 'neonarcade_neonclassic_2048_scores'
  });

  showStart();
  recalcSizes();
  buildGridBg();

})();
</script>
</body>
</html>
