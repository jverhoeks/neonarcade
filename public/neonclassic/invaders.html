<script src="/neon.js"></script>
<script>
(() => {
  // ===== CONFIG =====
  const CFG = {
    COLS: 11,
    ROWS: 5,
    ALIEN_W: 28,
    ALIEN_H: 20,
    ALIEN_PAD_X: 14,
    ALIEN_PAD_Y: 12,
    ALIEN_BASE_SPEED: 30,        // px/s horizontal
    ALIEN_SPEED_MULT: 1.15,      // per wave
    ALIEN_DROP: 18,              // px per drop
    ALIEN_SHOOT_BASE: 1.2,      // base shots/sec for the swarm
    ALIEN_SHOOT_WAVE_ADD: 0.15,  // extra shots/sec per wave
    PLAYER_SPEED: 220,           // px/s
    PLAYER_W: 32,
    PLAYER_H: 16,
    BULLET_SPEED: 380,
    ENEMY_BULLET_SPEED: 160,
    LIVES: 3,
    UFO_SPEED: 100,
    UFO_INTERVAL_MIN: 15000,
    UFO_INTERVAL_MAX: 30000,
    POINT_TOP: 30,
    POINT_MID: 20,
    POINT_BOT: 10,
    MARGIN_TOP: 60,
    MARGIN_BOTTOM: 40,
  };

  // ===== DOM REFS =====
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const shareBtn = document.getElementById('shareBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const finalWaveEl = document.getElementById('finalWave');
  const finalAccuracyEl = document.getElementById('finalAccuracy');
  const newBestLabel = document.getElementById('newBestLabel');

  // ===== SIZING =====
  let W, H, dpr, scale;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // scale factor so game fits nicely — design baseline 400px wide
    scale = Math.min(W / 400, H / 600, 2);
  }
  window.addEventListener('resize', resize);
  resize();

  // ===== AUDIO =====
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playShoot() {
    ensureAudio();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.08);
  }

  function playAlienDeath() {
    ensureAudio();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(600, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.18);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
  }

  function playPlayerDeath() {
    ensureAudio();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.5);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
    // noise burst
    var o2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    o2.type = 'square';
    o2.frequency.setValueAtTime(120, audioCtx.currentTime);
    o2.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
    g2.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g2.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.start(); o2.stop(audioCtx.currentTime + 0.4);
  }

  function playUfoSound() {
    ensureAudio();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(400, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
    o.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.3);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.3);
  }

  function playWaveComplete() {
    ensureAudio();
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(freq, i) {
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
      g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.12 + 0.02);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.12 + 0.25);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i * 0.12);
      o.stop(audioCtx.currentTime + i * 0.12 + 0.25);
    });
  }

  function playEnemyShoot() {
    ensureAudio();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(200, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
  }

  // ===== GAME STATE =====
  let state = 'start'; // start, playing, dying, gameOver, waveTransition
  let score, lives, wave, shotsFired, shotsHit;
  let player, aliens, playerBullets, enemyBullets, particles, ufo;
  let alienDir, alienSpeed, alienShootTimer, alienMoveTimer;
  let ufoTimer, ufoNextTime;
  let dyingTimer, waveTransTimer;
  let invincibleTimer;
  let animFrame;

  // Keys
  const keys = {};
  let touchLeft = false, touchRight = false, touchShoot = false;

  // ===== ALIEN TYPES =====
  // row 0 = top (small, 30pts, cyan)
  // row 1-2 = mid (crab, 20pts, green)
  // row 3-4 = bot (squid, 10pts, purple)
  function alienType(row) {
    if (row === 0) return { points: CFG.POINT_TOP, color: '#00f0ff', type: 'small' };
    if (row <= 2) return { points: CFG.POINT_MID, color: '#39ff14', type: 'crab' };
    return { points: CFG.POINT_BOT, color: '#b44dff', type: 'squid' };
  }

  // ===== DRAWING ALIENS =====
  function drawAlienSmall(cx, cy, s, frame) {
    // small angular shape in cyan
    ctx.save();
    ctx.translate(cx, cy);
    var w = CFG.ALIEN_W * s * 0.4;
    var h = CFG.ALIEN_H * s * 0.4;
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 8 * s;
    // body diamond
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.lineTo(w, 0);
    ctx.lineTo(0, h);
    ctx.lineTo(-w, 0);
    ctx.closePath();
    ctx.fill();
    // antennae
    var off = frame % 2 === 0 ? -2 * s : 2 * s;
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, -h);
    ctx.lineTo(-w * 0.6 + off, -h - 4 * s);
    ctx.moveTo(w * 0.3, -h);
    ctx.lineTo(w * 0.6 - off, -h - 4 * s);
    ctx.stroke();
    ctx.restore();
  }

  function drawAlienCrab(cx, cy, s, frame) {
    ctx.save();
    ctx.translate(cx, cy);
    var w = CFG.ALIEN_W * s * 0.45;
    var h = CFG.ALIEN_H * s * 0.38;
    ctx.fillStyle = '#39ff14';
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 8 * s;
    // body rounded rect
    ctx.beginPath();
    ctx.moveTo(-w, -h * 0.3);
    ctx.quadraticCurveTo(-w, -h, 0, -h);
    ctx.quadraticCurveTo(w, -h, w, -h * 0.3);
    ctx.lineTo(w, h * 0.5);
    ctx.lineTo(-w, h * 0.5);
    ctx.closePath();
    ctx.fill();
    // eyes
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(-w * 0.45, -h * 0.4, w * 0.25, h * 0.35);
    ctx.fillRect(w * 0.2, -h * 0.4, w * 0.25, h * 0.35);
    // claws
    var clawAngle = frame % 2 === 0 ? 0.3 : -0.1;
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(-w, h * 0.2);
    ctx.lineTo(-w - 4 * s, h * 0.5 + clawAngle * 8 * s);
    ctx.lineTo(-w - 2 * s, h * 0.8 + clawAngle * 4 * s);
    ctx.moveTo(w, h * 0.2);
    ctx.lineTo(w + 4 * s, h * 0.5 + clawAngle * 8 * s);
    ctx.lineTo(w + 2 * s, h * 0.8 + clawAngle * 4 * s);
    ctx.stroke();
    ctx.restore();
  }

  function drawAlienSquid(cx, cy, s, frame) {
    ctx.save();
    ctx.translate(cx, cy);
    var w = CFG.ALIEN_W * s * 0.48;
    var h = CFG.ALIEN_H * s * 0.42;
    ctx.fillStyle = '#b44dff';
    ctx.shadowColor = '#b44dff';
    ctx.shadowBlur = 8 * s;
    // dome
    ctx.beginPath();
    ctx.arc(0, -h * 0.2, w, -Math.PI, 0);
    ctx.lineTo(w, h * 0.3);
    ctx.lineTo(-w, h * 0.3);
    ctx.closePath();
    ctx.fill();
    // eyes
    ctx.fillStyle = '#0a0a12';
    ctx.beginPath();
    ctx.arc(-w * 0.35, -h * 0.1, w * 0.18, 0, Math.PI * 2);
    ctx.arc(w * 0.35, -h * 0.1, w * 0.18, 0, Math.PI * 2);
    ctx.fill();
    // tentacles
    ctx.strokeStyle = '#b44dff';
    ctx.lineWidth = 1.5 * s;
    var wiggle = frame % 2 === 0 ? 1 : -1;
    for (var i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i * w * 0.4, h * 0.3);
      ctx.quadraticCurveTo(
        i * w * 0.4 + wiggle * 3 * s,
        h * 0.6,
        i * w * 0.4 + wiggle * (i % 2 === 0 ? 2 : -2) * s,
        h * 0.9
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawAlien(alien, s, frame) {
    var info = alienType(alien.row);
    if (info.type === 'small') drawAlienSmall(alien.x, alien.y, s, frame);
    else if (info.type === 'crab') drawAlienCrab(alien.x, alien.y, s, frame);
    else drawAlienSquid(alien.x, alien.y, s, frame);
  }

  // ===== DRAW PLAYER =====
  function drawPlayer(px, py, s) {
    ctx.save();
    ctx.translate(px, py);
    var w = CFG.PLAYER_W * s * 0.5;
    var h = CFG.PLAYER_H * s * 0.5;
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 12 * s;
    // ship body
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.lineTo(w, h);
    ctx.lineTo(w * 0.5, h * 0.6);
    ctx.lineTo(-w * 0.5, h * 0.6);
    ctx.lineTo(-w, h);
    ctx.closePath();
    ctx.fill();
    // cockpit
    ctx.fillStyle = '#0a0a12';
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.2, 0, Math.PI * 2);
    ctx.fill();
    // glow accent
    ctx.fillStyle = 'rgba(0,240,255,0.4)';
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayerLife(px, py, s) {
    ctx.save();
    ctx.translate(px, py);
    var w = 8 * s;
    var h = 5 * s;
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 4 * s;
    ctx.beginPath();
    ctx.moveTo(0, -h);
    ctx.lineTo(w, h);
    ctx.lineTo(-w, h);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ===== DRAW UFO =====
  function drawUFO(ux, uy, s, t) {
    ctx.save();
    ctx.translate(ux, uy);
    var w = 20 * s;
    var h = 8 * s;
    var pulse = 0.7 + 0.3 * Math.sin(t * 6);
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 15 * s * pulse;
    // dome
    ctx.beginPath();
    ctx.ellipse(0, -h * 0.3, w * 0.4, h * 0.6, 0, -Math.PI, 0);
    ctx.fill();
    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, w, h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // lights
    ctx.fillStyle = '#ff8c00';
    for (var i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(i * w * 0.22, h * 0.1, 1.5 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ===== PARTICLES =====
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 40 + Math.random() * 120;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.3 + Math.random() * 0.4,
        maxLife: 0.3 + Math.random() * 0.4,
        color: color,
        size: 1.5 + Math.random() * 2.5
      });
    }
  }

  // ===== INIT GAME =====
  function initGame() {
    score = 0;
    lives = CFG.LIVES;
    wave = 1;
    shotsFired = 0;
    shotsHit = 0;
    invincibleTimer = 0;
    initWave();
  }

  function initWave() {
    aliens = [];
    playerBullets = [];
    enemyBullets = [];
    particles = [];
    ufo = null;

    // Compute grid sizing
    var cellW = (CFG.ALIEN_W + CFG.ALIEN_PAD_X) * scale;
    var cellH = (CFG.ALIEN_H + CFG.ALIEN_PAD_Y) * scale;
    var gridW = CFG.COLS * cellW;
    var startX = (W - gridW) / 2 + cellW / 2;
    var startY = CFG.MARGIN_TOP * scale;

    for (var r = 0; r < CFG.ROWS; r++) {
      for (var c = 0; c < CFG.COLS; c++) {
        aliens.push({
          row: r, col: c,
          x: startX + c * cellW,
          y: startY + r * cellH,
          alive: true,
          baseX: startX + c * cellW,
          baseY: startY + r * cellH
        });
      }
    }

    alienDir = 1;
    alienSpeed = CFG.ALIEN_BASE_SPEED * Math.pow(CFG.ALIEN_SPEED_MULT, wave - 1) * scale;
    alienMoveTimer = 0;
    alienShootTimer = 0;

    // Player
    player = {
      x: W / 2,
      y: H - CFG.MARGIN_BOTTOM * scale,
      canShoot: true,
      shootCooldown: 0
    };

    // UFO timer
    ufoNextTime = CFG.UFO_INTERVAL_MIN + Math.random() * (CFG.UFO_INTERVAL_MAX - CFG.UFO_INTERVAL_MIN);
    ufoTimer = 0;
  }

  // ===== ALIEN MOVEMENT FRAME for animation =====
  let alienFrame = 0;
  let alienFrameTimer = 0;

  // ===== GET BOTTOM ALIENS (for shooting) =====
  function getBottomAliens() {
    var colBottom = {};
    for (var i = 0; i < aliens.length; i++) {
      var a = aliens[i];
      if (!a.alive) continue;
      if (!colBottom[a.col] || a.row > colBottom[a.col].row) {
        colBottom[a.col] = a;
      }
    }
    var result = [];
    for (var c in colBottom) result.push(colBottom[c]);
    return result;
  }

  function aliensAlive() {
    var count = 0;
    for (var i = 0; i < aliens.length; i++) {
      if (aliens[i].alive) count++;
    }
    return count;
  }

  // ===== GAME LOOP =====
  let lastTime = 0;
  let totalTime = 0;

  function gameLoop(ts) {
    animFrame = requestAnimationFrame(gameLoop);
    var dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    totalTime += dt;

    if (state === 'playing') {
      update(dt);
    } else if (state === 'dying') {
      dyingTimer -= dt;
      updateParticles(dt);
      if (dyingTimer <= 0) {
        if (lives <= 0) {
          endGame();
          return;
        }
        state = 'playing';
        player.x = W / 2;
        invincibleTimer = 1.5;
        playerBullets = [];
        enemyBullets = [];
      }
    } else if (state === 'waveTransition') {
      waveTransTimer -= dt;
      updateParticles(dt);
      if (waveTransTimer <= 0) {
        wave++;
        initWave();
        state = 'playing';
      }
    }

    draw();
  }

  function update(dt) {
    // Invincibility
    if (invincibleTimer > 0) invincibleTimer -= dt;

    // Player movement
    var moveDir = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) moveDir = -1;
    if (keys['ArrowRight'] || keys['KeyD'] || touchRight) moveDir = 1;
    player.x += moveDir * CFG.PLAYER_SPEED * scale * dt;
    var halfW = CFG.PLAYER_W * scale * 0.5;
    if (player.x < halfW) player.x = halfW;
    if (player.x > W - halfW) player.x = W - halfW;

    // Player shooting
    player.shootCooldown -= dt;
    if ((keys['Space'] || touchShoot) && player.shootCooldown <= 0) {
      playerBullets.push({
        x: player.x,
        y: player.y - CFG.PLAYER_H * scale * 0.5,
        vy: -CFG.BULLET_SPEED * scale
      });
      player.shootCooldown = 0.3;
      shotsFired++;
      playShoot();
      touchShoot = false;
    }

    // Move player bullets
    for (var i = playerBullets.length - 1; i >= 0; i--) {
      playerBullets[i].y += playerBullets[i].vy * dt;
      if (playerBullets[i].y < -10) {
        playerBullets.splice(i, 1);
      }
    }

    // Move aliens
    var alive = aliensAlive();
    var speedBoost = 1 + (CFG.COLS * CFG.ROWS - alive) / (CFG.COLS * CFG.ROWS) * 2.5;
    var currentSpeed = alienSpeed * speedBoost;

    var needDrop = false;
    // Check if any alive alien would go out of bounds
    for (var i = 0; i < aliens.length; i++) {
      var a = aliens[i];
      if (!a.alive) continue;
      var nextX = a.x + alienDir * currentSpeed * dt;
      var hw = CFG.ALIEN_W * scale * 0.5;
      if (nextX - hw < 0 || nextX + hw > W) {
        needDrop = true;
        break;
      }
    }

    if (needDrop) {
      alienDir *= -1;
      for (var i = 0; i < aliens.length; i++) {
        if (aliens[i].alive) {
          aliens[i].y += CFG.ALIEN_DROP * scale;
        }
      }
    } else {
      for (var i = 0; i < aliens.length; i++) {
        if (aliens[i].alive) {
          aliens[i].x += alienDir * currentSpeed * dt;
        }
      }
    }

    // Alien animation frame
    alienFrameTimer += dt;
    if (alienFrameTimer > 0.5) {
      alienFrameTimer -= 0.5;
      alienFrame++;
    }

    // Alien shooting
    var shootRate = CFG.ALIEN_SHOOT_BASE + CFG.ALIEN_SHOOT_WAVE_ADD * (wave - 1);
    alienShootTimer += dt;
    if (alienShootTimer > 1 / shootRate) {
      alienShootTimer = 0;
      var bottoms = getBottomAliens();
      if (bottoms.length > 0) {
        var shooter = bottoms[Math.floor(Math.random() * bottoms.length)];
        enemyBullets.push({
          x: shooter.x,
          y: shooter.y + CFG.ALIEN_H * scale * 0.5,
          vy: (CFG.ENEMY_BULLET_SPEED + wave * 10) * scale
        });
        playEnemyShoot();
      }
    }

    // Move enemy bullets
    for (var i = enemyBullets.length - 1; i >= 0; i--) {
      enemyBullets[i].y += enemyBullets[i].vy * dt;
      if (enemyBullets[i].y > H + 10) {
        enemyBullets.splice(i, 1);
      }
    }

    // UFO
    ufoTimer += dt * 1000;
    if (!ufo && ufoTimer >= ufoNextTime) {
      ufoTimer = 0;
      ufoNextTime = CFG.UFO_INTERVAL_MIN + Math.random() * (CFG.UFO_INTERVAL_MAX - CFG.UFO_INTERVAL_MIN);
      var dir = Math.random() < 0.5 ? 1 : -1;
      ufo = {
        x: dir === 1 ? -30 : W + 30,
        y: 25 * scale,
        vx: dir * CFG.UFO_SPEED * scale,
        points: (Math.floor(Math.random() * 3) + 1) * 100
      };
    }
    if (ufo) {
      ufo.x += ufo.vx * dt;
      if (ufo.x < -50 || ufo.x > W + 50) {
        ufo = null;
      }
      // UFO sound periodically
      if (ufo && Math.floor(totalTime * 4) % 2 === 0 && Math.abs(totalTime * 4 - Math.floor(totalTime * 4)) < dt * 4) {
        playUfoSound();
      }
    }

    // Collision: player bullets vs aliens
    for (var bi = playerBullets.length - 1; bi >= 0; bi--) {
      var b = playerBullets[bi];
      var hit = false;
      for (var ai = 0; ai < aliens.length; ai++) {
        var a = aliens[ai];
        if (!a.alive) continue;
        var hw = CFG.ALIEN_W * scale * 0.48;
        var hh = CFG.ALIEN_H * scale * 0.48;
        if (b.x > a.x - hw && b.x < a.x + hw && b.y > a.y - hh && b.y < a.y + hh) {
          a.alive = false;
          var info = alienType(a.row);
          score += info.points;
          shotsHit++;
          spawnParticles(a.x, a.y, info.color, 12);
          playAlienDeath();
          hit = true;
          break;
        }
      }
      if (hit) {
        playerBullets.splice(bi, 1);
        continue;
      }
      // player bullets vs UFO
      if (ufo) {
        var uw = 20 * scale;
        var uh = 8 * scale;
        if (b.x > ufo.x - uw && b.x < ufo.x + uw && b.y > ufo.y - uh && b.y < ufo.y + uh) {
          score += ufo.points;
          shotsHit++;
          spawnParticles(ufo.x, ufo.y, '#ffd700', 15);
          // Show points
          particles.push({
            x: ufo.x, y: ufo.y,
            vx: 0, vy: -30,
            life: 1.0, maxLife: 1.0,
            color: '#ffd700',
            size: 0,
            text: '+' + ufo.points
          });
          playAlienDeath();
          ufo = null;
          playerBullets.splice(bi, 1);
          continue;
        }
      }
    }

    // Collision: enemy bullets vs player
    if (invincibleTimer <= 0) {
      for (var i = enemyBullets.length - 1; i >= 0; i--) {
        var b = enemyBullets[i];
        var pw = CFG.PLAYER_W * scale * 0.5;
        var ph = CFG.PLAYER_H * scale * 0.5;
        if (b.x > player.x - pw && b.x < player.x + pw &&
            b.y > player.y - ph && b.y < player.y + ph) {
          playerHit();
          enemyBullets.splice(i, 1);
          break;
        }
      }
    }

    // Collision: aliens reaching player row
    for (var i = 0; i < aliens.length; i++) {
      var a = aliens[i];
      if (!a.alive) continue;
      if (a.y + CFG.ALIEN_H * scale * 0.5 >= player.y - CFG.PLAYER_H * scale * 0.5) {
        lives = 0;
        playerHit();
        break;
      }
    }

    // Check wave complete
    if (aliensAlive() === 0 && state === 'playing') {
      playWaveComplete();
      state = 'waveTransition';
      waveTransTimer = 1.5;
      // clear bullets
      playerBullets = [];
      enemyBullets = [];
    }

    // Update particles
    updateParticles(dt);
  }

  function playerHit() {
    lives--;
    spawnParticles(player.x, player.y, '#ff2d7b', 20);
    playPlayerDeath();
    state = 'dying';
    dyingTimer = 1.0;
    canvas.classList.add('shake');
    setTimeout(function() { canvas.classList.remove('shake'); }, 250);
  }

  function updateParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  // ===== DRAW =====
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    var seed = 12345;
    for (var i = 0; i < 60; i++) {
      seed = (seed * 16807 + 0) % 2147483647;
      var sx = (seed / 2147483647) * W;
      seed = (seed * 16807 + 0) % 2147483647;
      var sy = (seed / 2147483647) * H;
      seed = (seed * 16807 + 0) % 2147483647;
      var ss = (seed / 2147483647) * 1.5 + 0.5;
      var twinkle = 0.3 + 0.7 * Math.abs(Math.sin(totalTime * 2 + i));
      ctx.globalAlpha = twinkle * 0.5;
      ctx.fillRect(sx, sy, ss, ss);
    }
    ctx.globalAlpha = 1;

    // HUD: score, wave, lives
    drawHUD();

    if (state === 'start') return;

    // Aliens
    for (var i = 0; i < aliens.length; i++) {
      if (aliens[i].alive) {
        drawAlien(aliens[i], scale, alienFrame);
      }
    }

    // UFO
    if (ufo) {
      drawUFO(ufo.x, ufo.y, scale, totalTime);
    }

    // Player bullets
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 6;
    for (var i = 0; i < playerBullets.length; i++) {
      var b = playerBullets[i];
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 2 * scale;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x, b.y + 8 * scale);
      ctx.stroke();
      // trail
      ctx.strokeStyle = 'rgba(0,240,255,0.3)';
      ctx.lineWidth = 1 * scale;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + 8 * scale);
      ctx.lineTo(b.x, b.y + 20 * scale);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // Enemy bullets
    ctx.shadowColor = '#ff2d7b';
    ctx.shadowBlur = 6;
    for (var i = 0; i < enemyBullets.length; i++) {
      var b = enemyBullets[i];
      ctx.strokeStyle = '#ff2d7b';
      ctx.lineWidth = 2 * scale;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x, b.y - 8 * scale);
      ctx.stroke();
      // trail
      ctx.strokeStyle = 'rgba(255,45,123,0.3)';
      ctx.lineWidth = 1 * scale;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y - 8 * scale);
      ctx.lineTo(b.x, b.y - 18 * scale);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // Player
    if (state === 'playing' || state === 'waveTransition') {
      if (invincibleTimer > 0 && Math.floor(invincibleTimer * 8) % 2 === 0) {
        // blink — skip drawing
      } else {
        drawPlayer(player.x, player.y, scale);
      }
    }

    // Particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var alpha = p.life / p.maxLife;
      if (p.text) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = (14 * scale) + "px 'Orbitron', monospace";
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
      } else {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.fillRect(p.x - p.size * 0.5, p.y - p.size * 0.5, p.size, p.size);
        ctx.restore();
      }
    }

    // Wave transition text
    if (state === 'waveTransition') {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = "900 " + (28 * scale) + "px 'Orbitron', monospace";
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 20;
      ctx.fillText('WAVE ' + (wave + 1), W / 2, H / 2);
      ctx.restore();
    }
  }

  function drawHUD() {
    ctx.save();
    // Score
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.font = "700 " + Math.max(14, 14 * scale) + "px 'Orbitron', monospace";
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 6;
    ctx.fillText(String(score || 0), 12, 10);

    // Wave
    ctx.textAlign = 'center';
    ctx.font = "300 " + Math.max(11, 11 * scale) + "px 'Rajdhani', sans-serif";
    ctx.fillStyle = '#9999bb';
    ctx.shadowBlur = 0;
    ctx.fillText('WAVE ' + (wave || 1), W / 2, 10);

    // Lives
    ctx.textAlign = 'right';
    for (var i = 0; i < (lives || 0); i++) {
      drawPlayerLife(W - 16 - i * 22 * Math.min(scale, 1.2), 18, Math.min(scale, 1.2));
    }

    ctx.restore();
  }

  // ===== END GAME =====
  function endGame() {
    state = 'gameOver';
    gameOverScreen.classList.remove('hidden');

    var accuracy = shotsFired > 0 ? Math.round(shotsHit / shotsFired * 100) : 0;
    finalScoreEl.textContent = score;
    finalWaveEl.textContent = wave;
    finalAccuracyEl.textContent = accuracy + '%';

    // Neon.js integration
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      if (result.isNewBest) {
        newBestLabel.style.display = 'block';
      } else {
        newBestLabel.style.display = 'none';
      }
      Neon.render(document.getElementById('leaderboard'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    }).catch(function() {
      newBestLabel.style.display = 'none';
      Neon.render(document.getElementById('leaderboard'));
    });
  }

  // ===== SHARE =====
  function buildShareText() {
    var accuracy = shotsFired > 0 ? Math.round(shotsHit / shotsFired * 100) : 0;
    // Build a row of blocks representing the final alien grid state
    var gridRow = '';
    // simplified: show 11 blocks, colored vs empty based on wave completion
    var filled = Math.min(11, Math.floor(score / 100));
    for (var i = 0; i < 11; i++) {
      gridRow += i < filled ? '\uD83D\uDFE6' : '\u2B1B';
    }
    var text = '\uD83D\uDC7E NEON INVADERS\n';
    text += 'Score: ' + score + ' | Wave: ' + wave + '\n';
    text += 'Accuracy: ' + accuracy + '%\n';
    text += gridRow + '\n';
    text += 'neonarcade.net/neonclassic/invaders.html';
    return text;
  }

  shareBtn.addEventListener('click', function() {
    var text = buildShareText();
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  });

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      shareBtn.textContent = 'COPIED!';
      setTimeout(function() { shareBtn.textContent = 'SHARE'; }, 1500);
    }).catch(function() {
      shareBtn.textContent = 'FAILED';
      setTimeout(function() { shareBtn.textContent = 'SHARE'; }, 1500);
    });
  }

  // ===== INPUT HANDLERS =====
  document.addEventListener('keydown', function(e) {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
  });
  document.addEventListener('keyup', function(e) {
    keys[e.code] = false;
  });

  // Touch controls
  var touchId = null;
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    ensureAudio();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      var x = t.clientX;
      var third = W / 3;
      if (x < third) {
        touchLeft = true;
      } else if (x > third * 2) {
        touchRight = true;
      } else {
        touchShoot = true;
      }
    }
  });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    touchLeft = false;
    touchRight = false;
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      var x = t.clientX;
      var third = W / 3;
      if (x < third) touchLeft = true;
      else if (x > third * 2) touchRight = true;
    }
  });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    touchLeft = false;
    touchRight = false;
    touchShoot = false;
  });
  canvas.addEventListener('touchcancel', function(e) {
    touchLeft = false;
    touchRight = false;
    touchShoot = false;
  });

  // ===== START / RESTART =====
  function startGame() {
    ensureAudio();
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    newBestLabel.style.display = 'none';
    initGame();
    state = 'playing';
    lastTime = performance.now();
    if (!animFrame) {
      animFrame = requestAnimationFrame(gameLoop);
    }
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', function() {
    gameOverScreen.classList.add('hidden');
    startGame();
  });

  // Also allow starting with space/enter from start screen
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && (state === 'playing' || state === 'dying' || state === 'waveTransition')) {
      e.preventDefault();
      state = 'start';
      if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
      startScreen.classList.remove('hidden');
      gameOverScreen.classList.add('hidden');
      if (typeof Neon !== 'undefined') Neon.render(document.getElementById('startLB'));
      requestAnimationFrame(idleLoop);
      return;
    }
    if (state === 'start' && (e.code === 'Space' || e.code === 'Enter')) {
      e.preventDefault();
      startGame();
    }
  });

  // ===== NEON.JS INIT =====
  if (typeof Neon !== 'undefined') {
    Neon.init({
      game: 'invaders',
      mode: 'high',
      key: 'neonarcade_neonclassic_invaders_scores'
    });
    Neon.render(document.getElementById('startLB'));
  }

  // ===== IDLE ANIMATION (start screen) =====
  function idleLoop(ts) {
    if (state !== 'start') return;
    var dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    totalTime += dt;

    alienFrameTimer += dt;
    if (alienFrameTimer > 0.5) {
      alienFrameTimer -= 0.5;
      alienFrame++;
    }

    // Draw background and some floating aliens
    ctx.clearRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    var seed = 12345;
    for (var i = 0; i < 60; i++) {
      seed = (seed * 16807 + 0) % 2147483647;
      var sx = (seed / 2147483647) * W;
      seed = (seed * 16807 + 0) % 2147483647;
      var sy = (seed / 2147483647) * H;
      seed = (seed * 16807 + 0) % 2147483647;
      var ss = (seed / 2147483647) * 1.5 + 0.5;
      var twinkle = 0.3 + 0.7 * Math.abs(Math.sin(totalTime * 2 + i));
      ctx.globalAlpha = twinkle * 0.4;
      ctx.fillRect(sx, sy, ss, ss);
    }
    ctx.globalAlpha = 1;

    // Draw some floating demo aliens
    var demoAliens = [
      { row: 0, x: W * 0.2 + Math.sin(totalTime * 0.8) * 20, y: H * 0.15 + Math.sin(totalTime * 1.2) * 8 },
      { row: 1, x: W * 0.5 + Math.sin(totalTime * 0.6 + 1) * 30, y: H * 0.12 + Math.cos(totalTime) * 10 },
      { row: 2, x: W * 0.8 + Math.sin(totalTime * 0.7 + 2) * 25, y: H * 0.18 + Math.sin(totalTime * 0.9 + 0.5) * 8 },
      { row: 4, x: W * 0.35 + Math.cos(totalTime * 0.5) * 20, y: H * 0.82 + Math.sin(totalTime * 1.1) * 6 },
      { row: 3, x: W * 0.65 + Math.sin(totalTime * 0.9 + 3) * 15, y: H * 0.85 + Math.cos(totalTime * 0.8) * 8 },
    ];
    ctx.globalAlpha = 0.3;
    for (var i = 0; i < demoAliens.length; i++) {
      drawAlien(demoAliens[i], scale * 0.8, alienFrame);
    }
    ctx.globalAlpha = 1;

    requestAnimationFrame(idleLoop);
  }

  lastTime = performance.now();
  requestAnimationFrame(idleLoop);

})();
</script>
