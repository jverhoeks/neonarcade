body::before {

.mob-group {

@keyframes shake {

  20% { transform: translate(3px, -2px); }
  30% { transform: translate(-2px, -3px); }
  40% { transform: translate(2px, 3px); }
  50% { transform: translate(-3px, -1px); }
  60% { transform: translate(3px, 1px); }
  70% { transform: translate(-1px, 3px); }
  80% { transform: translate(1px, -3px); }

.shake { animation: shake 0.25s ease; }
</style>

<script src="/neon.js"></script>
<script>
(() => {
  'use strict';

  // ═══════════════════════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════════════════════
  var ROAD_WIDTH = 3600;          // world units: total road width
  var SEG_LENGTH = 200;           // world depth per segment
  var CAMERA_HEIGHT = 1200;       // camera Y above road
  var CAMERA_FOV = 100;           // field of view degrees
  var CAMERA_DEPTH = 1 / Math.tan((CAMERA_FOV / 2) * Math.PI / 180);
  var TOTAL_SEGMENTS = 1600;      // road loops after this many
  var DRAW_DISTANCE = 300;        // how many segments to render
  var MAX_SPEED = 12000;          // world units per second at top speed
  var MAX_SPEED_MPH = 200;        // display mph at max speed
  var ACCEL = 6000;               // acceleration units/s^2
  var BRAKE_DECEL = 10000;        // braking
  var NATURAL_DECEL = 2000;       // coasting slowdown
  var OFF_ROAD_DECEL = 8000;      // off-road slowdown
  var OFF_ROAD_MAX_FRAC = 0.3;    // max speed fraction off-road
  var CENTRIFUGAL = 0.0008;       // curve pushes player
  var STEER_SPEED = 5000;         // steering in world units/s
  var CHECKPOINT_EVERY = 300;     // segments between checkpoints
  var CHECKPOINT_TIME = 30;       // seconds added
  var START_TIME = 60;            // starting seconds
  var CRASH_DURATION = 1.2;       // seconds of crash

  // Traffic
  var TRAFFIC_COUNT = 40;         // number of traffic cars placed on track
  var TRAFFIC_COLORS = ['#00f0ff', '#ff2d7b', '#39ff14', '#ffd700', '#b44dff', '#ff8c00'];

  // Road colors
  var C_ROAD_DARK = '#333350';
  var C_ROAD_LIGHT = '#3e3e60';
  var C_GRASS_DARK = '#061206';
  var C_GRASS_LIGHT = '#0a1e0a';
  var C_RUMBLE_CYAN = '#00f0ff';
  var C_RUMBLE_PINK = '#ff2d7b';
  var C_EDGE_CYAN = '#00f0ff';
  var C_EDGE_PINK = '#ff2d7b';
  var C_LINE_GOLD = '#ffd700';

  // ═══════════════════════════════════════════════════════════
  // DOM
  // ═══════════════════════════════════════════════════════════
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var startScreen = document.getElementById('startScreen');
  var gameOverScreen = document.getElementById('gameOverScreen');
  var startBtn = document.getElementById('startBtn');
  var restartBtn = document.getElementById('restartBtn');
  var shareBtn = document.getElementById('shareBtn');

  // ═══════════════════════════════════════════════════════════
  // HIDPI CANVAS
  // ═══════════════════════════════════════════════════════════
  var W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ═══════════════════════════════════════════════════════════
  // ROAD DATA
  // Each segment: { curve, hill, isCheckpoint }
  // curve = how much the road bends (-5 to 5)
  // hill = vertical offset (unused for simplicity, keeping flat)
  // ═══════════════════════════════════════════════════════════
  var road = [];
  var trackLength = 0;

  // Roadside trees: { segIndex, side } side = -1 or 1
  var trees = [];
  // Traffic cars: { segIndex, lane, color, speedFrac }
  var traffic = [];

  function buildRoad() {
    road = [];
    trees = [];
    traffic = [];

    // Build road sections: straight, curves, s-curves
    function addSection(count, curve) {
      for (var i = 0; i < count; i++) {
        road.push({ curve: curve, isCheckpoint: false });
      }
    }

    function addEased(count, fromCurve, toCurve) {
      for (var i = 0; i < count; i++) {
        var t = i / count;
        var c = fromCurve + (toCurve - fromCurve) * (0.5 - 0.5 * Math.cos(t * Math.PI));
        road.push({ curve: c, isCheckpoint: false });
      }
    }

    // Build varied track
    addSection(50, 0);          // straight
    addEased(30, 0, 3);         // ease into right curve
    addSection(60, 3);          // right curve
    addEased(30, 3, 0);         // ease out
    addSection(40, 0);          // straight
    addEased(25, 0, -4);        // ease into left curve
    addSection(50, -4);         // left curve
    addEased(25, -4, 0);        // ease out
    addSection(30, 0);          // straight
    addEased(20, 0, -2);        // S-curve part 1
    addSection(30, -2);
    addEased(20, -2, 3);        // S-curve transition
    addSection(30, 3);
    addEased(20, 3, 0);
    addSection(50, 0);          // long straight
    addEased(30, 0, 5);         // hard right
    addSection(40, 5);
    addEased(30, 5, -3);        // hard transition
    addSection(40, -3);
    addEased(30, -3, 0);
    addSection(60, 0);          // straight
    addEased(25, 0, 2);
    addSection(50, 2);
    addEased(25, 2, -4);
    addSection(60, -4);
    addEased(25, -4, 0);
    addSection(40, 0);
    addEased(20, 0, -5);        // hard left
    addSection(30, -5);
    addEased(20, -5, 0);
    addSection(50, 0);
    addEased(30, 0, 3);
    addSection(40, 3);
    addEased(30, 3, -2);
    addSection(30, -2);
    addEased(30, -2, 0);
    addSection(40, 0);

    // Pad to TOTAL_SEGMENTS
    while (road.length < TOTAL_SEGMENTS) {
      road.push({ curve: 0, isCheckpoint: false });
    }
    // Trim if too many
    road.length = TOTAL_SEGMENTS;
    trackLength = TOTAL_SEGMENTS * SEG_LENGTH;

    // Mark checkpoints
    for (var i = CHECKPOINT_EVERY; i < TOTAL_SEGMENTS; i += CHECKPOINT_EVERY) {
      road[i].isCheckpoint = true;
    }

    // Place trees every ~12 segments on both sides
    for (var i = 0; i < TOTAL_SEGMENTS; i++) {
      if (i % 12 === 0) {
        trees.push({ seg: i, side: -1 });
        trees.push({ seg: i, side: 1 });
      }
      // Extra random trees
      if (i % 7 === 3) {
        trees.push({ seg: i, side: Math.random() > 0.5 ? 1 : -1 });
      }
    }

    // Place traffic
    for (var t = 0; t < TRAFFIC_COUNT; t++) {
      var si = 60 + Math.floor(Math.random() * (TOTAL_SEGMENTS - 80));
      var lane = (Math.floor(Math.random() * 3) - 1) * 0.35; // -0.35, 0, 0.35
      traffic.push({
        seg: si,
        offset: lane,                // fraction of road half-width
        color: TRAFFIC_COLORS[Math.floor(Math.random() * TRAFFIC_COLORS.length)],
        speedFrac: 0.2 + Math.random() * 0.4,  // fraction of max speed
        z: si * SEG_LENGTH           // world z position
      });
    }
  }

  // ═══════════════════════════════════════════════════════════
  // GAME STATE
  // ═══════════════════════════════════════════════════════════
  var state = 'start'; // start, playing, crash, gameover
  var position = 0;           // player world z
  var speed = 0;              // world units per second
  var playerX = 0;            // world units left/right of center
  var timer = START_TIME;
  var totalDistKm = 0;
  var topSpeedMph = 0;
  var checkpoints = 0;
  var lastCheckpointSeg = -1;
  var crashTimer = 0;
  var crashDir = 0;
  var crashSpin = 0;
  var score = 0;
  var checkpointFlash = 0;
  var lastTimerWarn = 0;
  var particles = [];
  var speedLines = [];
  var gameTime = 0;

  // Stars for sky
  var stars = [];
  function initStars() {
    stars = [];
    for (var i = 0; i < 120; i++) {
      stars.push({
        xFrac: Math.random(),
        yFrac: Math.random(),
        size: 0.5 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  initStars();

  // ═══════════════════════════════════════════════════════════
  // INPUT
  // ═══════════════════════════════════════════════════════════
  var keys = {};
  var mobLeftDown = false, mobRightDown = false, mobGasDown = false, mobBrakeDown = false;

  document.addEventListener('keydown', function(e) {
    keys[e.key] = true;
    if (e.key === 'Escape' && (state === 'playing' || state === 'crash')) {
      state = 'start';
      startScreen.classList.remove('hidden');
      stopEngine();
    }
  });
  document.addEventListener('keyup', function(e) { keys[e.key] = false; });

  function setupMobBtn(id, setter) {
    var el = document.getElementById(id);
    el.addEventListener('touchstart', function(e) { e.preventDefault(); setter(true); }, { passive: false });
    el.addEventListener('touchend', function(e) { e.preventDefault(); setter(false); }, { passive: false });
    el.addEventListener('touchcancel', function() { setter(false); });
  }
  setupMobBtn('mobLeft', function(v) { mobLeftDown = v; });
  setupMobBtn('mobRight', function(v) { mobRightDown = v; });
  setupMobBtn('mobGas', function(v) { mobGasDown = v; });
  setupMobBtn('mobBrake', function(v) { mobBrakeDown = v; });

  function isLeft() { return keys['ArrowLeft'] || keys['a'] || keys['A'] || mobLeftDown; }
  function isRight() { return keys['ArrowRight'] || keys['d'] || keys['D'] || mobRightDown; }
  function isAccel() { return keys['ArrowUp'] || keys['w'] || keys['W'] || mobGasDown; }
  function isBrake() { return keys['ArrowDown'] || keys['s'] || keys['S'] || mobBrakeDown; }

  // ═══════════════════════════════════════════════════════════
  // AUDIO
  // ═══════════════════════════════════════════════════════════
  var audioCtx = null;
  var engineOsc = null;
  var engineGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 60;
    engineGain.gain.value = 0;
    engineOsc.connect(engineGain);
    engineGain.connect(audioCtx.destination);
    engineOsc.start();
  }

  function updateEngineSound(frac) {
    if (!engineOsc) return;
    engineOsc.frequency.value = 60 + frac * 200;
    engineGain.gain.value = Math.min(0.08, frac * 0.12);
  }

  function stopEngine() {
    if (engineGain) engineGain.gain.value = 0;
  }

  function playTone(freq, dur, type, vol) {
    if (!audioCtx) return;
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.1;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  }

  function playCrash() {
    if (!audioCtx) return;
    var bufSz = audioCtx.sampleRate * 0.3;
    var buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSz; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSz);
    var src = audioCtx.createBufferSource();
    var g = audioCtx.createGain();
    src.buffer = buf;
    g.gain.value = 0.15;
    src.connect(g);
    g.connect(audioCtx.destination);
    src.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  }

  function playCheckpoint() {
    playTone(880, 0.15, 'sine', 0.12);
    setTimeout(function() { playTone(1320, 0.2, 'sine', 0.12); }, 100);
  }

  function playTimerWarn() { playTone(440, 0.1, 'square', 0.08); }

  // ═══════════════════════════════════════════════════════════
  // PARTICLES & SPEED LINES
  // ═══════════════════════════════════════════════════════════
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8 - 3,
        life: 0.5 + Math.random() * 0.5,
        maxLife: 0.5 + Math.random() * 0.5,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function updateSpeedLines(dt, frac) {
    if (frac > 0.6) {
      var count = Math.floor((frac - 0.6) * 15);
      for (var i = 0; i < count; i++) {
        if (Math.random() < 0.3) {
          speedLines.push({
            x: Math.random() < 0.5 ? Math.random() * W * 0.15 : W - Math.random() * W * 0.15,
            y: H * 0.3 + Math.random() * H * 0.5,
            len: 20 + Math.random() * 40,
            life: 0.2 + Math.random() * 0.3,
            maxLife: 0.2 + Math.random() * 0.3,
            alpha: 0.3 + frac * 0.4
          });
        }
      }
    }
    for (var i = speedLines.length - 1; i >= 0; i--) {
      speedLines[i].life -= dt;
      speedLines[i].y += frac * 400 * dt;
      if (speedLines[i].life <= 0) speedLines.splice(i, 1);
    }
  }

  // ═══════════════════════════════════════════════════════════
  // LINE-BY-LINE PSEUDO-3D ROAD RENDERER
  //
  // For each screen row y from bottom to horizon:
  //   z = cameraHeight * cameraDepthPx / (y - H/2)
  //   => gives depth at this row
  //   roadHalfW = (ROAD_WIDTH/2) * cameraDepthPx / z (in px)
  //   roadCenterX = W/2 + curveShift * cameraDepthPx / z
  //
  // The curve accumulation must be done segment by segment,
  // so we walk from camera forward and cache per-segment
  // the cumulative curve offset.
  // ═══════════════════════════════════════════════════════════

  // Pre-compute curve offsets for each segment ahead of camera
  // curveOffsets[n] = cumulative world-space X offset at segment n
  var curveOffsets = new Float64Array(DRAW_DISTANCE + 2);

  function computeCurveOffsets(baseSeg) {
    curveOffsets[0] = 0;
    for (var n = 1; n <= DRAW_DISTANCE; n++) {
      var si = (baseSeg + n) % TOTAL_SEGMENTS;
      curveOffsets[n] = curveOffsets[n - 1] + road[si].curve * SEG_LENGTH * 0.6;
    }
  }

  // Get the curve offset at a given z depth by interpolation
  function getCurveAtZ(z, baseSeg) {
    var segAhead = z / SEG_LENGTH;
    var idx = Math.floor(segAhead);
    if (idx < 0) return 0;
    if (idx >= DRAW_DISTANCE) return curveOffsets[DRAW_DISTANCE];
    var frac = segAhead - idx;
    return curveOffsets[idx] * (1 - frac) + curveOffsets[Math.min(idx + 1, DRAW_DISTANCE)] * frac;
  }

  // Main road draw function
  function drawRoad(playerPos, playerXPos, isIdleMode) {
    var baseSeg = Math.floor(playerPos / SEG_LENGTH) % TOTAL_SEGMENTS;
    var baseOffset = playerPos % SEG_LENGTH; // how far into current segment

    computeCurveOffsets(baseSeg);

    // Camera depth in pixels (projection constant)
    var cameraDepthPx = CAMERA_DEPTH * H;

    // Horizon Y: where z = infinity -> y = H/2
    // But we shift horizon up a bit for better perspective
    var horizonY = Math.floor(H / 2);

    // Draw sky above horizon
    drawSky(horizonY, gameTime);

    // Scanline buffer: draw from bottom of screen up to horizon
    // For efficiency, we use fillRect line-by-line

    var halfRoad = ROAD_WIDTH / 2;

    // We need to track which segment each screen row belongs to
    // for alternating colors (barber pole)
    for (var y = H - 1; y > horizonY; y--) {
      var dy = y - horizonY;
      if (dy <= 0) break;

      // Z depth at this screen row
      var z = CAMERA_HEIGHT * cameraDepthPx / dy;

      // Which segment is this z in (relative to camera)?
      var worldZ = z + baseOffset;
      var segAhead = worldZ / SEG_LENGTH;
      var absSegIdx = (baseSeg + Math.floor(segAhead)) % TOTAL_SEGMENTS;

      // Alternating dark/light bands (absolute world segment)
      var bandIdx = Math.floor((playerPos + z) / SEG_LENGTH);
      var isDark = (bandIdx % 2) === 0;

      // Road perspective width at this depth
      var scale = cameraDepthPx / z;
      var roadHalfPx = halfRoad * scale;

      // Get curve offset at this z
      var curveOff = getCurveAtZ(segAhead, baseSeg);
      // Subtract player X offset
      var centerX = W / 2 + (curveOff - playerXPos) * scale;

      var roadLeft = centerX - roadHalfPx;
      var roadRight = centerX + roadHalfPx;

      // Draw grass (fill the whole row, then road on top)
      ctx.fillStyle = isDark ? C_GRASS_DARK : C_GRASS_LIGHT;
      ctx.fillRect(0, y, W, 1);

      // Draw road
      ctx.fillStyle = isDark ? C_ROAD_DARK : C_ROAD_LIGHT;
      ctx.fillRect(roadLeft, y, roadRight - roadLeft, 1);

      // Rumble strips (edges)
      var rumbleW = roadHalfPx * 0.08;
      if (isDark) {
        ctx.fillStyle = C_RUMBLE_CYAN;
        ctx.fillRect(roadLeft - rumbleW, y, rumbleW, 1);
        ctx.fillStyle = C_RUMBLE_PINK;
        ctx.fillRect(roadRight, y, rumbleW, 1);
      } else {
        ctx.fillStyle = C_RUMBLE_PINK;
        ctx.fillRect(roadLeft - rumbleW, y, rumbleW, 1);
        ctx.fillStyle = C_RUMBLE_CYAN;
        ctx.fillRect(roadRight, y, rumbleW, 1);
      }

      // Edge lines (thick, bright)
      var edgeThick = Math.max(2, roadHalfPx * 0.015);
      ctx.fillStyle = C_EDGE_CYAN;
      ctx.fillRect(roadLeft - edgeThick / 2, y, edgeThick, 1);
      ctx.fillStyle = C_EDGE_PINK;
      ctx.fillRect(roadRight - edgeThick / 2, y, edgeThick, 1);

      // Center dashes (gold) — only on dark bands
      if (isDark) {
        var dashW = Math.max(2, roadHalfPx * 0.02);
        ctx.fillStyle = C_LINE_GOLD;
        ctx.fillRect(centerX - dashW / 2, y, dashW, 1);
      }

      // Lane dividers (subtle) — on light bands
      if (!isDark) {
        ctx.fillStyle = 'rgba(122,122,154,0.25)';
        var laneThick = Math.max(1, roadHalfPx * 0.008);
        ctx.fillRect(centerX - roadHalfPx * 0.33 - laneThick / 2, y, laneThick, 1);
        ctx.fillRect(centerX + roadHalfPx * 0.33 - laneThick / 2, y, laneThick, 1);
      }

      // Fog for distant rows
      var fogFrac = 1 - dy / (H / 2);
      if (fogFrac > 0.5) {
        var fogAlpha = (fogFrac - 0.5) * 2;
        fogAlpha = fogAlpha * fogAlpha * fogAlpha; // cubic falloff
        ctx.fillStyle = 'rgba(10,10,18,' + Math.min(fogAlpha, 1) + ')';
        ctx.fillRect(0, y, W, 1);
      }
    }

    // ──────────────────────────────────────────────────
    // SPRITES: Trees, traffic, checkpoints
    // These need to be drawn from far to near (back to front)
    // so we collect all sprites with their screen positions,
    // sort by z (descending), then draw.
    // ──────────────────────────────────────────────────

    var spriteList = [];

    // Trees
    for (var i = 0; i < trees.length; i++) {
      var tree = trees[i];
      var treeWorldZ = tree.seg * SEG_LENGTH;
      // Z relative to player (handle wrap)
      var relZ = treeWorldZ - playerPos;
      if (relZ < -trackLength / 2) relZ += trackLength;
      if (relZ > trackLength / 2) relZ -= trackLength;
      // Skip if behind camera or too far
      if (relZ < SEG_LENGTH || relZ > DRAW_DISTANCE * SEG_LENGTH) continue;

      var segAhead2 = relZ / SEG_LENGTH;
      var curveOff2 = getCurveAtZ(segAhead2, baseSeg);
      var scale2 = cameraDepthPx / relZ;
      var cx2 = W / 2 + (curveOff2 - playerXPos) * scale2;
      var roadHalfPx2 = halfRoad * scale2;
      var screenY2 = horizonY + CAMERA_HEIGHT * cameraDepthPx / relZ;

      // Place tree offset from road edge
      var treeX = cx2 + tree.side * (roadHalfPx2 * 1.3);

      spriteList.push({
        type: 'tree',
        x: treeX,
        y: screenY2,
        scale: scale2 * ROAD_WIDTH * 0.5,
        z: relZ,
        side: tree.side
      });
    }

    // Traffic
    if (!isIdleMode) {
      for (var i = 0; i < traffic.length; i++) {
        var car = traffic[i];
        var carRelZ = car.z - playerPos;
        if (carRelZ < -trackLength / 2) carRelZ += trackLength;
        if (carRelZ > trackLength / 2) carRelZ -= trackLength;
        if (carRelZ < 50 || carRelZ > DRAW_DISTANCE * SEG_LENGTH) continue;

        var segAhead3 = carRelZ / SEG_LENGTH;
        var curveOff3 = getCurveAtZ(segAhead3, baseSeg);
        var scale3 = cameraDepthPx / carRelZ;
        var cx3 = W / 2 + (curveOff3 - playerXPos) * scale3;
        var roadHalfPx3 = halfRoad * scale3;
        var screenY3 = horizonY + CAMERA_HEIGHT * cameraDepthPx / carRelZ;

        var carScreenX = cx3 + car.offset * roadHalfPx3;

        spriteList.push({
          type: 'car',
          x: carScreenX,
          y: screenY3,
          scale: scale3 * ROAD_WIDTH * 0.5,
          z: carRelZ,
          color: car.color
        });
      }
    }

    // Checkpoints
    for (var i = 0; i < TOTAL_SEGMENTS; i += CHECKPOINT_EVERY) {
      if (i === 0) continue;
      var cpZ = i * SEG_LENGTH;
      var relZcp = cpZ - playerPos;
      if (relZcp < -trackLength / 2) relZcp += trackLength;
      if (relZcp > trackLength / 2) relZcp -= trackLength;
      if (relZcp < SEG_LENGTH || relZcp > DRAW_DISTANCE * SEG_LENGTH * 0.8) continue;

      var segAheadCp = relZcp / SEG_LENGTH;
      var curveOffCp = getCurveAtZ(segAheadCp, baseSeg);
      var scaleCp = cameraDepthPx / relZcp;
      var cxCp = W / 2 + (curveOffCp - playerXPos) * scaleCp;
      var roadHalfCp = halfRoad * scaleCp;
      var screenYcp = horizonY + CAMERA_HEIGHT * cameraDepthPx / relZcp;

      spriteList.push({
        type: 'checkpoint',
        x: cxCp,
        y: screenYcp,
        scale: scaleCp * ROAD_WIDTH * 0.5,
        z: relZcp,
        halfW: roadHalfCp
      });
    }

    // Sort far to near
    spriteList.sort(function(a, b) { return b.z - a.z; });

    // Draw sprites
    for (var i = 0; i < spriteList.length; i++) {
      var sp = spriteList[i];
      // Clip: don't draw below bottom of screen or above horizon
      if (sp.y < horizonY || sp.y > H + 50) continue;

      if (sp.type === 'tree') {
        drawPalmTree(sp.x, sp.y, sp.scale);
      } else if (sp.type === 'car') {
        drawTrafficCar(sp.x, sp.y, sp.scale, sp.color);
      } else if (sp.type === 'checkpoint') {
        drawCheckpointBanner(sp.x, sp.y, sp.scale, sp.halfW);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════
  // SKY RENDERER
  // ═══════════════════════════════════════════════════════════
  function drawSky(horizonY, t) {
    var grad = ctx.createLinearGradient(0, 0, 0, horizonY);
    grad.addColorStop(0, '#0a0a12');
    grad.addColorStop(0.5, '#0e0a1a');
    grad.addColorStop(1, '#1a0a2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, horizonY + 1);

    // Stars
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var sx = s.xFrac * W;
      var sy = s.yFrac * Math.max(horizonY - 20, 10);
      var alpha = 0.3 + Math.sin(t * 2 + s.phase) * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(sx, sy, s.size, s.size);
    }

    // City silhouette
    ctx.fillStyle = '#0e0e1a';
    var cityY = horizonY - 12;
    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    for (var x = 0; x <= W; x += 12) {
      var h = 5 + Math.sin(x * 0.02) * 8 + Math.sin(x * 0.05) * 4 + Math.sin(x * 0.11) * 6;
      ctx.lineTo(x, cityY - Math.max(0, h));
    }
    ctx.lineTo(W, horizonY);
    ctx.closePath();
    ctx.fill();

    // Horizon glow
    ctx.fillStyle = 'rgba(180,77,255,0.08)';
    ctx.fillRect(0, horizonY - 3, W, 6);
  }

  // ═══════════════════════════════════════════════════════════
  // SPRITE RENDERERS
  // ═══════════════════════════════════════════════════════════

  function drawPalmTree(x, y, scl) {
    if (scl < 0.001) return;
    var h = 140 * scl;
    var trunkW = Math.max(1, 8 * scl);

    ctx.save();
    // Trunk (neon green)
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = trunkW;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 2 * scl, y - h);
    ctx.stroke();

    // Fronds (purple)
    var cx = x + 2 * scl;
    var cy = y - h;
    ctx.strokeStyle = '#b44dff';
    ctx.lineWidth = Math.max(1, 3 * scl);
    for (var a = -2.5; a <= 0.5; a += 0.5) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(
        cx + Math.cos(a) * 45 * scl, cy + Math.sin(a) * 28 * scl - 18 * scl,
        cx + Math.cos(a) * 70 * scl, cy + Math.sin(a) * 55 * scl
      );
      ctx.stroke();
    }
    // Pink accent fronds
    ctx.strokeStyle = '#ff2d7b';
    ctx.globalAlpha = 0.45;
    for (var a = -2.8; a <= 0.2; a += 0.6) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(
        cx + Math.cos(a) * 35 * scl, cy + Math.sin(a) * 22 * scl - 12 * scl,
        cx + Math.cos(a) * 60 * scl, cy + Math.sin(a) * 45 * scl
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawTrafficCar(x, y, scl, color) {
    if (scl < 0.002) return;
    var cw = 40 * scl;
    var ch = 24 * scl;

    ctx.save();
    ctx.globalAlpha = 0.9;
    // Body outline
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, 2 * scl);
    ctx.strokeRect(x - cw / 2, y - ch, cw, ch);
    // Roof
    var rw = cw * 0.6;
    var rh = ch * 0.5;
    ctx.strokeRect(x - rw / 2, y - ch - rh, rw, rh);
    // Fill
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.1;
    ctx.fillRect(x - cw / 2, y - ch, cw, ch);
    // Tail lights
    ctx.fillStyle = '#ff2d7b';
    ctx.globalAlpha = 0.8;
    var tl = Math.max(2, 4 * scl);
    ctx.fillRect(x - cw / 2, y - ch * 0.3, tl, tl);
    ctx.fillRect(x + cw / 2 - tl, y - ch * 0.3, tl, tl);
    ctx.restore();
  }

  function drawCheckpointBanner(x, y, scl, halfW) {
    if (scl < 0.003) return;
    ctx.save();
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = Math.max(1, 3 * scl);
    ctx.globalAlpha = 0.7;
    var bh = 35 * scl;
    ctx.strokeRect(x - halfW, y - bh, halfW * 2, bh);
    ctx.font = '700 ' + Math.max(8, 14 * scl) + 'px Orbitron';
    ctx.fillStyle = '#39ff14';
    ctx.textAlign = 'center';
    ctx.fillText('CHECKPOINT', x, y - bh * 0.3);
    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════════
  // PLAYER CAR
  // ═══════════════════════════════════════════════════════════
  function drawPlayerCar(steer, speedFrac) {
    var cx = W / 2;
    var cy = H * 0.82;
    var carW = Math.min(80, W * 0.1);
    var carH = carW * 0.55;
    var tilt = steer * 3;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(tilt * Math.PI / 180);

    // Shadow
    ctx.fillStyle = 'rgba(0,240,255,0.08)';
    ctx.beginPath();
    ctx.ellipse(0, carH * 0.3, carW * 0.8, carH * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.fillStyle = 'rgba(0,240,255,0.06)';
    ctx.beginPath();
    ctx.moveTo(-carW / 2, carH / 2);
    ctx.lineTo(-carW * 0.35, -carH / 2);
    ctx.lineTo(carW * 0.35, -carH / 2);
    ctx.lineTo(carW / 2, carH / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Windshield
    ctx.strokeStyle = 'rgba(0,240,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-carW * 0.25, -carH * 0.1);
    ctx.lineTo(-carW * 0.2, -carH * 0.4);
    ctx.lineTo(carW * 0.2, -carH * 0.4);
    ctx.lineTo(carW * 0.25, -carH * 0.1);
    ctx.closePath();
    ctx.stroke();

    // Headlights
    if (speedFrac > 0.1) {
      var glowA = 0.15 + speedFrac * 0.2;
      ctx.fillStyle = 'rgba(255,255,255,' + glowA + ')';
      ctx.beginPath();
      ctx.ellipse(-carW * 0.3, -carH / 2, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(carW * 0.3, -carH / 2, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Beams
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.beginPath();
      ctx.moveTo(-carW * 0.35, -carH / 2);
      ctx.lineTo(-carW * 0.8, -carH * 2);
      ctx.lineTo(-carW * 0.1, -carH * 2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(carW * 0.35, -carH / 2);
      ctx.lineTo(carW * 0.8, -carH * 2);
      ctx.lineTo(carW * 0.1, -carH * 2);
      ctx.closePath();
      ctx.fill();
    }

    // Tail lights
    ctx.fillStyle = '#ff2d7b';
    ctx.shadowColor = '#ff2d7b';
    ctx.shadowBlur = 8;
    ctx.fillRect(-carW / 2 + 2, carH / 2 - 4, 8, 4);
    ctx.fillRect(carW / 2 - 10, carH / 2 - 4, 8, 4);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════════
  // HUD
  // ═══════════════════════════════════════════════════════════
  function drawHUD(speedMph, timerSec, distKm) {
    // Speed (bottom-right)
    var sX = W - 100;
    var sY = H - 60;
    ctx.font = '900 ' + Math.min(36, W * 0.04) + 'px Orbitron';
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 10;
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(speedMph), sX, sY);
    ctx.shadowBlur = 0;
    ctx.font = '300 12px Rajdhani';
    ctx.fillStyle = '#7a7a9a';
    ctx.fillText('MPH', sX + 2, sY + 14);

    // Speed bar
    var barW = 80, barH = 4;
    var barX = sX - barW, barY = sY + 20;
    ctx.fillStyle = 'rgba(122,122,154,0.2)';
    ctx.fillRect(barX, barY, barW, barH);
    var frac = speedMph / MAX_SPEED_MPH;
    ctx.fillStyle = frac > 0.8 ? '#ff2d7b' : frac > 0.5 ? '#ffd700' : '#00f0ff';
    ctx.fillRect(barX, barY, barW * frac, barH);

    // Timer (top-center)
    var timerStr = Math.ceil(timerSec).toString();
    var timerColor = timerSec < 10 ? '#ff2d7b' : timerSec < 20 ? '#ffd700' : '#00f0ff';
    ctx.font = '900 ' + Math.min(44, W * 0.05) + 'px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillStyle = timerColor;
    ctx.shadowColor = timerColor;
    ctx.shadowBlur = timerSec < 10 ? 15 : 8;
    if (timerSec < 10 && Math.floor(timerSec * 3) % 2 === 0) ctx.globalAlpha = 0.5;
    ctx.fillText(timerStr, W / 2, 52);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.font = '300 12px Rajdhani';
    ctx.fillStyle = '#7a7a9a';
    ctx.fillText('TIME', W / 2, 22);

    // Distance (top-left)
    ctx.font = '700 ' + Math.min(24, W * 0.03) + 'px Orbitron';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.fillText(distKm.toFixed(1) + ' km', 20, 48);
    ctx.shadowBlur = 0;
    ctx.font = '300 12px Rajdhani';
    ctx.fillStyle = '#7a7a9a';
    ctx.fillText('DISTANCE', 20, 22);

    // Checkpoints
    ctx.font = '500 14px Rajdhani';
    ctx.fillStyle = '#9999bb';
    ctx.fillText('CP: ' + checkpoints, 20, 68);

    // Checkpoint flash
    if (checkpointFlash > 0) {
      ctx.font = '900 ' + Math.min(28, W * 0.035) + 'px Orbitron';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#39ff14';
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 15;
      ctx.globalAlpha = checkpointFlash;
      ctx.fillText('CHECKPOINT! +' + CHECKPOINT_TIME + 's', W / 2, H * 0.35);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }
  }

  // ═══════════════════════════════════════════════════════════
  // UPDATE (physics, collisions, game logic)
  // ═══════════════════════════════════════════════════════════
  function update(dt) {
    if (state === 'crash') {
      crashTimer -= dt;
      crashSpin += crashDir * 720 * dt;
      speed *= Math.pow(0.92, dt * 60);
      position += speed * dt;
      if (position >= trackLength) position -= trackLength;
      if (position < 0) position += trackLength;
      totalDistKm += speed * dt * (MAX_SPEED_MPH / MAX_SPEED) * 0.000447; // mph to km/s: 1 mph = 0.000447 km/s
      if (crashTimer <= 0) {
        state = 'playing';
        crashSpin = 0;
      }
      updateEngineSound(speed / MAX_SPEED);
      return;
    }

    // Timer
    timer -= dt;
    if (timer <= 0) {
      timer = 0;
      endGame();
      return;
    }

    // Timer warnings
    if (timer < 10) {
      var sec = Math.ceil(timer);
      if (sec !== lastTimerWarn) {
        lastTimerWarn = sec;
        playTimerWarn();
      }
    }

    // Steering
    var speedFrac = speed / MAX_SPEED;
    var steerAmount = STEER_SPEED * dt * Math.max(0.3, speedFrac);
    if (isLeft()) {
      playerX -= steerAmount;
    } else if (isRight()) {
      playerX += steerAmount;
    }

    // Off road detection: beyond 85% of road half width
    var halfRoad = ROAD_WIDTH / 2;
    var isOffRoad = Math.abs(playerX) > halfRoad * 0.85;

    // Acceleration
    if (isAccel()) {
      if (isOffRoad) {
        speed = Math.min(speed + ACCEL * dt, MAX_SPEED * OFF_ROAD_MAX_FRAC);
      } else {
        speed = Math.min(speed + ACCEL * dt, MAX_SPEED);
      }
    } else if (isBrake()) {
      speed -= BRAKE_DECEL * dt;
    } else {
      speed -= NATURAL_DECEL * dt;
    }

    // Off-road slowdown
    if (isOffRoad && speed > MAX_SPEED * OFF_ROAD_MAX_FRAC) {
      speed -= OFF_ROAD_DECEL * dt;
    }

    speed = Math.max(0, speed);

    // Move forward
    var prevPos = position;
    position += speed * dt;
    if (position >= trackLength) position -= trackLength;

    // Track distance
    totalDistKm += speed * dt / 1000 * 0.001;

    // Centrifugal force
    var currentSegIdx = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
    var currentCurve = road[currentSegIdx].curve;
    playerX += currentCurve * speed * CENTRIFUGAL * dt;

    // Clamp player X to road + shoulder
    playerX = Math.max(-halfRoad * 2.5, Math.min(halfRoad * 2.5, playerX));

    // Speed display
    var speedMph = speedFrac * MAX_SPEED_MPH;
    topSpeedMph = Math.max(topSpeedMph, speedMph);

    // Checkpoint detection
    if (road[currentSegIdx].isCheckpoint && currentSegIdx !== lastCheckpointSeg) {
      lastCheckpointSeg = currentSegIdx;
      timer += CHECKPOINT_TIME;
      checkpoints++;
      checkpointFlash = 1;
      playCheckpoint();
      spawnParticles(W / 2, H * 0.35, '#39ff14', 15);
    }

    if (checkpointFlash > 0) checkpointFlash -= dt * 1.5;

    // Traffic collision
    for (var i = 0; i < traffic.length; i++) {
      var car = traffic[i];
      // Move traffic
      car.z += car.speedFrac * MAX_SPEED * dt;
      if (car.z >= trackLength) car.z -= trackLength;

      // Check collision
      var dz = car.z - position;
      if (dz < -trackLength / 2) dz += trackLength;
      if (dz > trackLength / 2) dz -= trackLength;

      if (Math.abs(dz) < SEG_LENGTH * 0.8) {
        // Car offset is fraction of half-road
        var carWorldX = car.offset * halfRoad;
        var dx = Math.abs(playerX - carWorldX);
        if (dx < halfRoad * 0.18 && speed > MAX_SPEED * 0.15) {
          // Crash!
          state = 'crash';
          crashTimer = CRASH_DURATION;
          crashDir = playerX > carWorldX ? 1 : -1;
          crashSpin = 0;
          speed *= 0.15;
          playCrash();
          spawnParticles(W / 2, H * 0.7, '#ff2d7b', 20);
          document.getElementById('gameWrap').classList.add('shake');
          setTimeout(function() {
            document.getElementById('gameWrap').classList.remove('shake');
          }, 250);
          break;
        }
      }
    }

    updateEngineSound(speedFrac);
    updateSpeedLines(dt, speedFrac);
  }

  // ═══════════════════════════════════════════════════════════
  // DRAW FRAME
  // ═══════════════════════════════════════════════════════════
  function draw(dt) {
    ctx.clearRect(0, 0, W, H);

    drawRoad(position, playerX, false);

    // Player car
    var steerInput = isLeft() ? -1 : isRight() ? 1 : 0;
    var currentSegIdx = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
    var curveTilt = road[currentSegIdx].curve * 0.3;

    if (state === 'crash') {
      ctx.save();
      ctx.translate(W / 2, H * 0.82);
      ctx.rotate(crashSpin * Math.PI / 180);
      ctx.translate(-W / 2, -H * 0.82);
      drawPlayerCar(0, speed / MAX_SPEED);
      ctx.restore();
    } else {
      drawPlayerCar(steerInput + curveTilt, speed / MAX_SPEED);
    }

    // Speed lines
    ctx.strokeStyle = 'rgba(0,240,255,0.3)';
    ctx.lineWidth = 1;
    for (var i = 0; i < speedLines.length; i++) {
      var sl = speedLines[i];
      ctx.globalAlpha = sl.alpha * (sl.life / sl.maxLife);
      ctx.beginPath();
      ctx.moveTo(sl.x, sl.y);
      ctx.lineTo(sl.x, sl.y + sl.len);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 10 * dt;
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // HUD
    var speedMph = (speed / MAX_SPEED) * MAX_SPEED_MPH;
    drawHUD(speedMph, timer, totalDistKm);
  }

  // ═══════════════════════════════════════════════════════════
  // IDLE ANIMATION (start & game over screens)
  // ═══════════════════════════════════════════════════════════
  var idlePos = 0;
  function drawIdle(dt) {
    idlePos += 4000 * dt;
    if (idlePos >= trackLength) idlePos -= trackLength;
    ctx.clearRect(0, 0, W, H);
    drawRoad(idlePos, 0, true);
  }

  // ═══════════════════════════════════════════════════════════
  // MAIN LOOP
  // ═══════════════════════════════════════════════════════════
  var lastTime = 0;

  function render(now) {
    requestAnimationFrame(render);
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    gameTime += dt;

    if (state === 'start' || state === 'gameover') {
      drawIdle(dt);
      return;
    }

    update(dt);
    draw(dt);
  }

  // ═══════════════════════════════════════════════════════════
  // GAME FLOW
  // ═══════════════════════════════════════════════════════════
  function startGame() {
    initAudio();
    buildRoad();
    position = 0;
    speed = 0;
    playerX = 0;
    timer = START_TIME;
    totalDistKm = 0;
    topSpeedMph = 0;
    checkpoints = 0;
    lastCheckpointSeg = -1;
    crashTimer = 0;
    crashSpin = 0;
    particles = [];
    speedLines = [];
    checkpointFlash = 0;
    lastTimerWarn = 0;
    score = 0;
    state = 'playing';

    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }

  function endGame() {
    state = 'gameover';
    stopEngine();

    score = Math.round(totalDistKm * 1000 + checkpoints * 500);

    document.getElementById('goDist').textContent = totalDistKm.toFixed(1) + ' km';
    document.getElementById('goSpeed').textContent = Math.round(topSpeedMph) + ' mph';
    document.getElementById('goCP').textContent = checkpoints;
    document.getElementById('goScore').textContent = score.toLocaleString();

    gameOverScreen.classList.remove('hidden');

    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      Neon.render(document.getElementById('goLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    });
  }

  // Share
  shareBtn.addEventListener('click', function() {
    var text = '\uD83C\uDFCE\uFE0F OUTRUN\n' +
      'Distance: ' + totalDistKm.toFixed(1) + ' km | Top: ' + Math.round(topSpeedMph) + ' mph\n' +
      'Checkpoints: ' + checkpoints + ' | Score: ' + score.toLocaleString() + '\n' +
      'neonarcade.net/neonclassic/outrun.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        navigator.clipboard.writeText(text);
      });
    } else {
      navigator.clipboard.writeText(text).then(function() {
        shareBtn.textContent = 'COPIED!';
        setTimeout(function() { shareBtn.textContent = 'SHARE'; }, 1500);
      });
    }
  });

  // Buttons
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // ═══════════════════════════════════════════════════════════
  // NEON.JS INIT
  // ═══════════════════════════════════════════════════════════
  Neon.init({
    game: 'outrun',
    mode: 'high',
    key: 'neonarcade_neonclassic_outrun_scores',
    emoji: '\uD83C\uDFCE\uFE0F',
    title: 'OUTRUN'
  });
  Neon.render(document.getElementById('startLB'));

  // ═══════════════════════════════════════════════════════════
  // BUILD ROAD & START
  // ═══════════════════════════════════════════════════════════
  buildRoad();
  requestAnimationFrame(render);

})();
</script>
</body>
</html>
