<script src="/neon.js"></script>
<script>
(() => {
  'use strict';

  // ── CONFIG ──
  const ROAD_WIDTH = 2000;
  const SEG_LENGTH = 200;
  const RUMBLE_LENGTH = 3;
  const DRAW_DISTANCE = 150;
  const LANES = 3;
  const CAMERA_HEIGHT = 1000;
  const CAMERA_DEPTH_FACTOR = 1 / Math.tan(50 * Math.PI / 180);
  const FOG_DENSITY = 5;
  const MAX_SPEED = 200; // mph display
  const MAX_SPEED_INTERNAL = SEG_LENGTH * 60; // segments per second -> units per frame @60fps
  const ACCEL = 0.8;
  const BRAKE = 1.5;
  const DECEL = 0.3;
  const OFF_ROAD_DECEL = 1.2;
  const OFF_ROAD_MAX = 0.3; // fraction of max speed
  const CENTRIFUGAL = 0.3;
  const STEER_SPEED = 3.0;
  const STEER_RETURN = 2.0;
  const CHECKPOINT_INTERVAL = 300; // segments between checkpoints
  const CHECKPOINT_TIME = 30; // seconds added per checkpoint
  const START_TIME = 60; // starting timer seconds
  const TRAFFIC_DENSITY = 0.06; // probability per segment to have traffic
  const CRASH_DURATION = 1.5; // seconds of spin-out

  // Colors
  const C_ROAD_DARK = '#12121f';
  const C_ROAD_LIGHT = '#16162a';
  const C_RUMBLE_DARK = '#00f0ff';
  const C_RUMBLE_LIGHT = '#0a0a12';
  const C_GRASS_DARK = '#080814';
  const C_GRASS_LIGHT = '#0a0a1a';
  const C_LINE_GOLD = '#ffd700';
  const C_LINE_HIDDEN = '#16162a';
  const C_EDGE_CYAN = '#00f0ff';
  const C_EDGE_PINK = '#ff2d7b';

  // Neon traffic colors
  const TRAFFIC_COLORS = ['#00f0ff', '#ff2d7b', '#39ff14', '#ffd700', '#b44dff', '#ff8c00'];

  // ── DOM ──
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const shareBtn = document.getElementById('shareBtn');

  // ── HIDPI ──
  let W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ── ROAD GENERATION ──
  let segments = [];
  let totalSegments = 0;
  let trackLength = 0;

  function addSegment(curve, hill) {
    const n = segments.length;
    segments.push({
      index: n,
      p: { world: { z: n * SEG_LENGTH }, camera: {}, screen: {} },
      curve: curve,
      hill: hill,
      sprites: [],
      traffic: null,
      isCheckpoint: false
    });
  }

  function addRoad(enter, hold, leave, curve, hill) {
    for (let i = 0; i < enter; i++) addSegment(ease(0, curve, i / enter), ease(0, hill, i / enter));
    for (let i = 0; i < hold; i++) addSegment(curve, hill);
    for (let i = 0; i < leave; i++) addSegment(ease(curve, 0, i / leave), ease(hill, 0, i / leave));
  }

  function addStraight(n) { addRoad(n || 25, n || 25, n || 25, 0, 0); }
  function addCurve(n, c, h) { addRoad(n || 25, n || 25, n || 25, c || 2, h || 0); }
  function addHill(n, h) { addRoad(n || 25, n || 25, n || 25, 0, h || 20); }
  function addSCurve() {
    addRoad(15, 20, 15, -3, 0);
    addRoad(15, 20, 15, 3, 0);
  }

  function ease(a, b, t) { return a + (b - a) * ((-Math.cos(t * Math.PI) / 2) + 0.5); }

  function buildRoad() {
    segments = [];
    addStraight(25);
    addCurve(30, 2, 0);
    addHill(25, 15);
    addStraight(20);
    addCurve(30, -3, 0);
    addHill(20, -10);
    addSCurve();
    addStraight(25);
    addCurve(40, 4, 5);
    addHill(30, 20);
    addStraight(15);
    addCurve(25, -2, -10);
    addSCurve();
    addStraight(20);
    addCurve(30, 3, 10);
    addHill(25, -15);
    addStraight(30);

    totalSegments = segments.length;
    trackLength = totalSegments * SEG_LENGTH;

    // Place sprites (roadside objects)
    for (let i = 0; i < totalSegments; i++) {
      // Palm trees
      if (i % 15 === 0) {
        segments[i].sprites.push({ offset: -1.2, type: 'palm' });
        segments[i].sprites.push({ offset: 1.2, type: 'palm' });
      }
      // Buildings/signs
      if (i % 40 === 20) {
        segments[i].sprites.push({ offset: (Math.random() > 0.5 ? 1.5 : -1.5), type: 'building' });
      }
      if (i % 25 === 12) {
        segments[i].sprites.push({ offset: (Math.random() > 0.5 ? 1.1 : -1.1), type: 'sign' });
      }
      // Checkpoints
      if (i > 0 && i % CHECKPOINT_INTERVAL === 0) {
        segments[i].isCheckpoint = true;
      }
    }

    // Place traffic
    for (let i = 50; i < totalSegments; i++) {
      if (Math.random() < TRAFFIC_DENSITY) {
        const lane = Math.floor(Math.random() * LANES) - 1; // -1, 0, 1
        segments[i].traffic = {
          offset: lane * 0.6,
          color: TRAFFIC_COLORS[Math.floor(Math.random() * TRAFFIC_COLORS.length)],
          speed: 0.3 + Math.random() * 0.5 // fraction of max speed
        };
      }
    }
  }

  // ── GAME STATE ──
  let state = 'start'; // start, playing, crash, gameover
  let position = 0;
  let speed = 0;
  let playerX = 0; // -1 to 1
  let steerDir = 0; // -1, 0, 1
  let timer = START_TIME;
  let distance = 0;
  let topSpeed = 0;
  let checkpoints = 0;
  let lastCheckpoint = -1;
  let crashTimer = 0;
  let crashDir = 0;
  let crashSpin = 0;
  let score = 0;
  let particles = [];
  let speedLines = [];
  let checkpointFlash = 0;
  let lastTimerWarn = 0;

  // ── INPUT ──
  const keys = {};
  let mobLeft = false, mobRight = false, mobGas = false, mobBrake = false;

  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'Escape' && state === 'playing') {
      state = 'start';
      startScreen.classList.remove('hidden');
      return;
    }
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // Mobile touch
  function setupMobBtn(id, flagSetter) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); flagSetter(true); }, { passive: false });
    el.addEventListener('touchend', e => { e.preventDefault(); flagSetter(false); }, { passive: false });
    el.addEventListener('touchcancel', e => { flagSetter(false); });
  }
  setupMobBtn('mobLeft', v => { mobLeft = v; });
  setupMobBtn('mobRight', v => { mobRight = v; });
  setupMobBtn('mobGas', v => { mobGas = v; });
  setupMobBtn('mobBrake', v => { mobBrake = v; });

  function isLeft() { return keys['ArrowLeft'] || keys['a'] || keys['A'] || mobLeft; }
  function isRight() { return keys['ArrowRight'] || keys['d'] || keys['D'] || mobRight; }
  function isAccel() { return keys['ArrowUp'] || keys['w'] || keys['W'] || mobGas; }
  function isBrake() { return keys['ArrowDown'] || keys['s'] || keys['S'] || mobBrake; }

  // ── AUDIO ──
  let audioCtx = null;
  let engineOsc = null;
  let engineGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Engine hum
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 60;
    engineGain.gain.value = 0;
    engineOsc.connect(engineGain);
    engineGain.connect(audioCtx.destination);
    engineOsc.start();
  }

  function updateEngineSound(speedFraction) {
    if (!engineOsc) return;
    engineOsc.frequency.value = 60 + speedFraction * 200;
    engineGain.gain.value = Math.min(0.08, speedFraction * 0.12);
  }

  function stopEngine() {
    if (engineGain) engineGain.gain.value = 0;
  }

  function playTone(freq, dur, type, vol) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.1;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  }

  function playCrash() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.3;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buffer;
    g.gain.value = 0.15;
    src.connect(g);
    g.connect(audioCtx.destination);
    src.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  }

  function playCheckpoint() {
    playTone(880, 0.15, 'sine', 0.12);
    setTimeout(() => playTone(1320, 0.2, 'sine', 0.12), 100);
  }

  function playTimerWarn() {
    playTone(440, 0.1, 'square', 0.08);
  }

  // ── PARTICLES ──
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8 - 3,
        life: 0.5 + Math.random() * 0.5,
        maxLife: 0.5 + Math.random() * 0.5,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  // ── SPEED LINES ──
  function updateSpeedLines(dt, speedFrac) {
    if (speedFrac > 0.6) {
      const count = Math.floor((speedFrac - 0.6) * 15);
      for (let i = 0; i < count; i++) {
        if (Math.random() < 0.3) {
          speedLines.push({
            x: Math.random() < 0.5 ? Math.random() * W * 0.15 : W - Math.random() * W * 0.15,
            y: H * 0.3 + Math.random() * H * 0.5,
            len: 20 + Math.random() * 40,
            life: 0.2 + Math.random() * 0.3,
            maxLife: 0.2 + Math.random() * 0.3,
            alpha: 0.3 + speedFrac * 0.4
          });
        }
      }
    }
    for (let i = speedLines.length - 1; i >= 0; i--) {
      speedLines[i].life -= dt;
      speedLines[i].y += speedFrac * 400 * dt;
      if (speedLines[i].life <= 0) speedLines.splice(i, 1);
    }
  }

  // ── PROJECTION ──
  function project(p, cameraX, cameraY, cameraZ, cameraDepth) {
    p.camera.x = (p.world.x || 0) - cameraX;
    p.camera.y = (p.world.y || 0) - cameraY;
    p.camera.z = (p.world.z || 0) - cameraZ;
    p.screen.scale = cameraDepth / p.camera.z;
    p.screen.x = Math.round(W / 2 + p.screen.scale * p.camera.x * W / 2);
    p.screen.y = Math.round(H / 2 - p.screen.scale * p.camera.y * W / 2);
    p.screen.w = Math.round(p.screen.scale * ROAD_WIDTH * W / 2);
  }

  // ── FIND SEGMENT ──
  function findSegment(z) {
    return segments[Math.floor(z / SEG_LENGTH) % totalSegments];
  }

  // ── RENDER HELPERS ──
  function drawPolygon(color, x1, y1, x2, y2, x3, y3, x4, y4) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fill();
  }

  function drawSegmentGfx(width1, lanes1, x1, y1, width2, lanes2, x2, y2, fogAlpha, segIdx) {
    const isDark = (Math.floor(segIdx / RUMBLE_LENGTH) % 2) === 0;

    // Grass
    ctx.fillStyle = isDark ? C_GRASS_DARK : C_GRASS_LIGHT;
    ctx.fillRect(0, y2, W, y1 - y2);

    // Road
    const roadColor = isDark ? C_ROAD_DARK : C_ROAD_LIGHT;
    drawPolygon(roadColor, x1 - width1, y1, x1 + width1, y1, x2 + width2, y2, x2 - width2, y2);

    // Rumble strips (left edge)
    const rumbleW1 = width1 * 0.06;
    const rumbleW2 = width2 * 0.06;
    const rumbleColor = isDark ? C_RUMBLE_DARK : C_RUMBLE_LIGHT;
    drawPolygon(rumbleColor,
      x1 - width1, y1, x1 - width1 + rumbleW1, y1,
      x2 - width2 + rumbleW2, y2, x2 - width2, y2);
    // Right edge
    drawPolygon(rumbleColor,
      x1 + width1 - rumbleW1, y1, x1 + width1, y1,
      x2 + width2, y2, x2 + width2 - rumbleW2, y2);

    // Edge glow lines
    if (isDark) {
      ctx.strokeStyle = C_EDGE_CYAN;
      ctx.lineWidth = Math.max(1, width1 * 0.004);
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(x1 - width1, y1);
      ctx.lineTo(x2 - width2, y2);
      ctx.stroke();
      ctx.strokeStyle = C_EDGE_PINK;
      ctx.beginPath();
      ctx.moveTo(x1 + width1, y1);
      ctx.lineTo(x2 + width2, y2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Center lane dashes
    if (isDark) {
      const lineW1 = width1 * 0.015;
      const lineW2 = width2 * 0.015;
      ctx.fillStyle = C_LINE_GOLD;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(x1 - lineW1, y1);
      ctx.lineTo(x1 + lineW1, y1);
      ctx.lineTo(x2 + lineW2, y2);
      ctx.lineTo(x2 - lineW2, y2);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Lane markers
    if (!isDark) {
      const laneW1 = width1 * 0.005;
      const laneW2 = width2 * 0.005;
      ctx.fillStyle = 'rgba(122,122,154,0.3)';
      for (let l = -1; l <= 1; l += 2) {
        const lx1 = x1 + l * width1 * 0.33;
        const lx2 = x2 + l * width2 * 0.33;
        ctx.beginPath();
        ctx.moveTo(lx1 - laneW1, y1);
        ctx.lineTo(lx1 + laneW1, y1);
        ctx.lineTo(lx2 + laneW2, y2);
        ctx.lineTo(lx2 - laneW2, y2);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Fog overlay
    if (fogAlpha > 0) {
      ctx.fillStyle = 'rgba(10,10,18,' + Math.min(fogAlpha, 1) + ')';
      ctx.fillRect(0, y2, W, y1 - y2);
    }
  }

  // ── DRAW SPRITES ──
  function drawPalm(x, y, scale) {
    if (scale < 0.003) return;
    const h = 120 * scale;
    const trunkW = 6 * scale;
    // Trunk
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = trunkW;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 3 * scale, y - h);
    ctx.stroke();
    // Fronds
    const cx = x + 3 * scale;
    const cy = y - h;
    ctx.strokeStyle = '#b44dff';
    ctx.lineWidth = Math.max(1, 3 * scale);
    for (let a = -2.5; a <= 0.5; a += 0.5) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(cx + Math.cos(a) * 50 * scale, cy + Math.sin(a) * 30 * scale - 20 * scale,
        cx + Math.cos(a) * 80 * scale, cy + Math.sin(a) * 60 * scale);
      ctx.stroke();
    }
    ctx.strokeStyle = '#ff2d7b';
    ctx.globalAlpha = 0.5;
    for (let a = -2.8; a <= 0.2; a += 0.6) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(cx + Math.cos(a) * 40 * scale, cy + Math.sin(a) * 25 * scale - 15 * scale,
        cx + Math.cos(a) * 70 * scale, cy + Math.sin(a) * 50 * scale);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawBuilding(x, y, scale) {
    if (scale < 0.003) return;
    const bw = 60 * scale;
    const bh = 160 * scale;
    ctx.fillStyle = '#12121f';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = Math.max(1, 2 * scale);
    ctx.globalAlpha = 0.7;
    ctx.fillRect(x - bw / 2, y - bh, bw, bh);
    ctx.strokeRect(x - bw / 2, y - bh, bw, bh);
    // Windows
    ctx.fillStyle = '#00f0ff';
    ctx.globalAlpha = 0.3;
    const rows = 5;
    const cols = 3;
    const ww = bw * 0.15;
    const wh = bh * 0.06;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (Math.random() > 0.4) {
          const wx = x - bw / 2 + bw * 0.15 + c * bw * 0.28;
          const wy = y - bh + bh * 0.1 + r * bh * 0.17;
          ctx.fillRect(wx, wy, ww, wh);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawSign(x, y, scale) {
    if (scale < 0.003) return;
    const sw = 40 * scale;
    const sh = 30 * scale;
    const postH = 60 * scale;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = Math.max(1, 2 * scale);
    ctx.globalAlpha = 0.7;
    // Post
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y - postH);
    ctx.stroke();
    // Sign
    ctx.fillStyle = 'rgba(255,215,0,0.1)';
    ctx.fillRect(x - sw / 2, y - postH - sh, sw, sh);
    ctx.strokeRect(x - sw / 2, y - postH - sh, sw, sh);
    ctx.globalAlpha = 1;
  }

  function drawTrafficCar(x, y, scale, color) {
    if (scale < 0.003) return;
    const cw = 50 * scale;
    const ch = 30 * scale;
    // Body outline
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, 2 * scale);
    ctx.globalAlpha = 0.9;
    // Body
    ctx.strokeRect(x - cw / 2, y - ch, cw, ch);
    // Roof
    const rw = cw * 0.6;
    const rh = ch * 0.5;
    ctx.strokeRect(x - rw / 2, y - ch - rh, rw, rh);
    // Fill lightly
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.1;
    ctx.fillRect(x - cw / 2, y - ch, cw, ch);
    ctx.globalAlpha = 0.06;
    ctx.fillRect(x - rw / 2, y - ch - rh, rw, rh);
    // Tail lights
    ctx.fillStyle = '#ff2d7b';
    ctx.globalAlpha = 0.8;
    const tlSize = Math.max(2, 4 * scale);
    ctx.fillRect(x - cw / 2, y - ch * 0.3, tlSize, tlSize);
    ctx.fillRect(x + cw / 2 - tlSize, y - ch * 0.3, tlSize, tlSize);
    ctx.globalAlpha = 1;
  }

  // ── DRAW PLAYER CAR ──
  function drawPlayerCar(steer, speedFrac) {
    const cx = W / 2;
    const cy = H * 0.78;
    const carW = Math.min(80, W * 0.1);
    const carH = carW * 0.55;
    const tilt = steer * 3;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(tilt * Math.PI / 180);

    // Shadow/glow underneath
    ctx.fillStyle = 'rgba(0,240,255,0.08)';
    ctx.beginPath();
    ctx.ellipse(0, carH * 0.3, carW * 0.8, carH * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.fillStyle = 'rgba(0,240,255,0.06)';

    // Main body trapezoid
    ctx.beginPath();
    ctx.moveTo(-carW / 2, carH / 2);
    ctx.lineTo(-carW * 0.35, -carH / 2);
    ctx.lineTo(carW * 0.35, -carH / 2);
    ctx.lineTo(carW / 2, carH / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Windshield
    ctx.strokeStyle = 'rgba(0,240,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-carW * 0.25, -carH * 0.1);
    ctx.lineTo(-carW * 0.2, -carH * 0.4);
    ctx.lineTo(carW * 0.2, -carH * 0.4);
    ctx.lineTo(carW * 0.25, -carH * 0.1);
    ctx.closePath();
    ctx.stroke();

    // Headlights glow
    if (speedFrac > 0.1) {
      const glowAlpha = 0.15 + speedFrac * 0.2;
      ctx.fillStyle = 'rgba(255,255,255,' + glowAlpha + ')';
      ctx.beginPath();
      ctx.ellipse(-carW * 0.3, -carH / 2, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(carW * 0.3, -carH / 2, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Headlight beams
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.beginPath();
      ctx.moveTo(-carW * 0.35, -carH / 2);
      ctx.lineTo(-carW * 0.8, -carH * 2);
      ctx.lineTo(-carW * 0.1, -carH * 2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(carW * 0.35, -carH / 2);
      ctx.lineTo(carW * 0.8, -carH * 2);
      ctx.lineTo(carW * 0.1, -carH * 2);
      ctx.closePath();
      ctx.fill();
    }

    // Tail lights
    ctx.fillStyle = '#ff2d7b';
    ctx.shadowColor = '#ff2d7b';
    ctx.shadowBlur = 8;
    ctx.fillRect(-carW / 2 + 2, carH / 2 - 4, 8, 4);
    ctx.fillRect(carW / 2 - 10, carH / 2 - 4, 8, 4);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  // ── DRAW HUD ──
  function drawHUD(speedMph, timerSec, distKm) {
    // Speedometer (bottom-right)
    const sX = W - 100;
    const sY = H - 60;

    ctx.font = '900 ' + Math.min(36, W * 0.04) + 'px Orbitron';
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 10;
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(speedMph), sX, sY);
    ctx.shadowBlur = 0;
    ctx.font = '300 12px Rajdhani';
    ctx.fillStyle = '#7a7a9a';
    ctx.fillText('MPH', sX + 2, sY + 14);

    // Speed bar
    const barW = 80;
    const barH = 4;
    const barX = sX - barW;
    const barY = sY + 20;
    ctx.fillStyle = 'rgba(122,122,154,0.2)';
    ctx.fillRect(barX, barY, barW, barH);
    const frac = speedMph / MAX_SPEED;
    const barColor = frac > 0.8 ? '#ff2d7b' : frac > 0.5 ? '#ffd700' : '#00f0ff';
    ctx.fillStyle = barColor;
    ctx.fillRect(barX, barY, barW * frac, barH);

    // Timer (top-center)
    const timerStr = Math.ceil(timerSec).toString();
    const timerColor = timerSec < 10 ? '#ff2d7b' : timerSec < 20 ? '#ffd700' : '#00f0ff';
    ctx.font = '900 ' + Math.min(44, W * 0.05) + 'px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillStyle = timerColor;
    ctx.shadowColor = timerColor;
    ctx.shadowBlur = timerSec < 10 ? 15 : 8;
    // Flash when < 10
    if (timerSec < 10 && Math.floor(timerSec * 3) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    ctx.fillText(timerStr, W / 2, 52);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.font = '300 12px Rajdhani';
    ctx.fillStyle = '#7a7a9a';
    ctx.fillText('TIME', W / 2, 22);

    // Distance (top-left)
    ctx.font = '700 ' + Math.min(24, W * 0.03) + 'px Orbitron';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.fillText(distKm.toFixed(1) + ' km', 20, 48);
    ctx.shadowBlur = 0;
    ctx.font = '300 12px Rajdhani';
    ctx.fillStyle = '#7a7a9a';
    ctx.fillText('DISTANCE', 20, 22);

    // Checkpoints (top-left under distance)
    ctx.font = '500 14px Rajdhani';
    ctx.fillStyle = '#9999bb';
    ctx.fillText('CP: ' + checkpoints, 20, 68);

    // Checkpoint flash
    if (checkpointFlash > 0) {
      ctx.font = '900 ' + Math.min(28, W * 0.035) + 'px Orbitron';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#39ff14';
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 15;
      ctx.globalAlpha = checkpointFlash;
      ctx.fillText('CHECKPOINT! +' + CHECKPOINT_TIME + 's', W / 2, H * 0.35);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }
  }

  // ── DRAW SKY ──
  let stars = [];
  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * 2000,
        y: Math.random() * 500,
        size: 0.5 + Math.random() * 1.5,
        twinkle: Math.random() * Math.PI * 2
      });
    }
  }
  initStars();

  function drawSky(horizonY, t) {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, horizonY);
    grad.addColorStop(0, '#0a0a12');
    grad.addColorStop(0.5, '#0e0a1a');
    grad.addColorStop(1, '#1a0a2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, horizonY);

    // Stars
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      const sx = (s.x / 2000) * W;
      const sy = (s.y / 500) * Math.max(horizonY - 20, 0);
      const alpha = 0.3 + Math.sin(t * 2 + s.twinkle) * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(sx, sy, s.size, s.size);
    }

    // City silhouette
    ctx.fillStyle = '#0e0e1a';
    const cityY = horizonY - 15;
    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    // Generate jagged skyline
    for (let x = 0; x <= W; x += 15) {
      const h = 5 + Math.sin(x * 0.02) * 8 + Math.sin(x * 0.05) * 4 + Math.sin(x * 0.11) * 6;
      ctx.lineTo(x, cityY - Math.max(0, h));
    }
    ctx.lineTo(W, horizonY);
    ctx.closePath();
    ctx.fill();

    // Horizon glow
    ctx.fillStyle = 'rgba(180,77,255,0.08)';
    ctx.fillRect(0, horizonY - 3, W, 6);
  }

  // ── MAIN RENDER ──
  let lastTime = 0;
  let gameTime = 0;

  function render(now) {
    requestAnimationFrame(render);
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    gameTime += dt;

    if (state === 'start' || state === 'gameover') {
      drawIdle(dt);
      return;
    }

    update(dt);
    draw(dt);
  }

  function update(dt) {
    if (state === 'crash') {
      crashTimer -= dt;
      crashSpin += crashDir * 720 * dt;
      speed *= 0.95;
      position += speed * dt;
      if (position >= trackLength) position -= trackLength;
      if (crashTimer <= 0) {
        state = 'playing';
        crashSpin = 0;
      }
      distance = position / (SEG_LENGTH * totalSegments) * totalSegments * SEG_LENGTH / 5280 * 0.3048; // rough km
      return;
    }

    // Timer
    timer -= dt;
    if (timer <= 0) {
      timer = 0;
      endGame();
      return;
    }

    // Timer warning beeps
    if (timer < 10) {
      const sec = Math.ceil(timer);
      if (sec !== lastTimerWarn) {
        lastTimerWarn = sec;
        playTimerWarn();
      }
    }

    // Steering
    if (isLeft()) {
      playerX -= STEER_SPEED * dt * (speed / MAX_SPEED_INTERNAL);
    } else if (isRight()) {
      playerX += STEER_SPEED * dt * (speed / MAX_SPEED_INTERNAL);
    }

    // Clamp playerX wider than road = off-road
    const isOffRoad = Math.abs(playerX) > 0.85;

    // Acceleration / braking
    if (isAccel()) {
      if (isOffRoad) {
        speed = Math.min(speed + ACCEL * 60 * dt, MAX_SPEED_INTERNAL * OFF_ROAD_MAX);
      } else {
        speed = Math.min(speed + ACCEL * 60 * dt, MAX_SPEED_INTERNAL);
      }
    } else if (isBrake()) {
      speed -= BRAKE * 60 * dt;
    } else {
      speed -= DECEL * 60 * dt;
    }

    // Off-road slowdown
    if (isOffRoad && speed > MAX_SPEED_INTERNAL * OFF_ROAD_MAX) {
      speed -= OFF_ROAD_DECEL * 60 * dt;
    }

    speed = Math.max(0, speed);

    // Position
    position += speed * dt;
    if (position >= trackLength) position -= trackLength;

    // Calculate distance in km
    distance = position / (SEG_LENGTH * totalSegments) * totalSegments * SEG_LENGTH / 5280 * 0.3048;
    // Actually let's just track total distance properly
    // distance is cumulative, not position-based. Let's use a separate counter.
    // We'll fix distance tracking:

    // Centrifugal force from curves
    const currentSeg = findSegment(position);
    playerX -= (currentSeg.curve * CENTRIFUGAL * (speed / MAX_SPEED_INTERNAL) * dt);

    // Hard clamp
    playerX = Math.max(-2.5, Math.min(2.5, playerX));

    // Speed in mph for display
    const speedMph = (speed / MAX_SPEED_INTERNAL) * MAX_SPEED;
    topSpeed = Math.max(topSpeed, speedMph);

    // Checkpoint detection
    const segIdx = Math.floor(position / SEG_LENGTH) % totalSegments;
    if (segments[segIdx].isCheckpoint && segIdx !== lastCheckpoint) {
      lastCheckpoint = segIdx;
      timer += CHECKPOINT_TIME;
      checkpoints++;
      checkpointFlash = 1;
      playCheckpoint();
      spawnParticles(W / 2, H * 0.35, '#39ff14', 15);
    }

    // Checkpoint flash decay
    if (checkpointFlash > 0) checkpointFlash -= dt * 1.5;

    // Traffic collision
    const playerSegIdx = Math.floor(position / SEG_LENGTH) % totalSegments;
    for (let i = -2; i <= 2; i++) {
      const si = (playerSegIdx + i + totalSegments) % totalSegments;
      const seg = segments[si];
      if (seg.traffic) {
        // Check z proximity
        const trafficZ = seg.index * SEG_LENGTH;
        let dz = trafficZ - position;
        if (dz < -trackLength / 2) dz += trackLength;
        if (dz > trackLength / 2) dz -= trackLength;
        if (Math.abs(dz) < SEG_LENGTH * 1.5) {
          // Check x proximity
          const dx = Math.abs(playerX - seg.traffic.offset * 1.4);
          if (dx < 0.4 && speed > MAX_SPEED_INTERNAL * 0.2) {
            // Crash!
            state = 'crash';
            crashTimer = CRASH_DURATION;
            crashDir = playerX > seg.traffic.offset * 1.4 ? 1 : -1;
            crashSpin = 0;
            speed *= 0.2;
            playCrash();
            spawnParticles(W / 2, H * 0.7, '#ff2d7b', 20);
            document.getElementById('gameWrap').classList.add('shake');
            setTimeout(() => document.getElementById('gameWrap').classList.remove('shake'), 250);
            break;
          }
        }
      }
    }

    // Engine sound
    updateEngineSound(speed / MAX_SPEED_INTERNAL);

    // Speed lines
    updateSpeedLines(dt, speed / MAX_SPEED_INTERNAL);
  }

  // ── TRACK TOTAL DISTANCE ──
  let totalDistance = 0;
  let prevPosition = 0;

  function trackDistance() {
    let delta = position - prevPosition;
    if (delta < -trackLength / 2) delta += trackLength;
    if (delta < 0) delta = 0;
    totalDistance += delta;
    prevPosition = position;
    return totalDistance / 1000 * 0.3; // convert to approx km
  }

  function draw(dt) {
    ctx.clearRect(0, 0, W, H);

    const baseSegIdx = Math.floor(position / SEG_LENGTH) % totalSegments;
    const baseSeg = segments[baseSegIdx];

    // Camera
    const cameraDepth = CAMERA_DEPTH_FACTOR * W;
    const cameraHeight = CAMERA_HEIGHT;
    const cameraZ = position - cameraDepth * cameraHeight;

    // Find horizon Y
    let maxY = H;
    let horizonY = H * 0.4;

    // First pass: project all visible segments
    let curveAcc = 0;
    let hillAcc = 0;
    const projected = [];

    for (let n = 0; n < DRAW_DISTANCE; n++) {
      const segIdx = (baseSegIdx + n) % totalSegments;
      const seg = segments[segIdx];
      const looped = (baseSegIdx + n) >= totalSegments;

      const p = {
        world: { z: seg.index * SEG_LENGTH + (looped ? trackLength : 0), x: curveAcc, y: hillAcc },
        camera: {},
        screen: {}
      };

      project(p, playerX * ROAD_WIDTH / 2, cameraHeight, position, cameraDepth);

      curveAcc += seg.curve;
      hillAcc += seg.hill;

      if (p.camera.z <= 0) continue;
      if (p.screen.y >= maxY) continue;

      projected.push({
        seg: seg,
        segIdx: segIdx,
        n: n,
        p: p,
        looped: looped
      });

      if (n === 0) horizonY = Math.min(p.screen.y, H * 0.7);
      maxY = p.screen.y;
    }

    // Draw sky
    drawSky(Math.max(horizonY, 0), gameTime);

    // Draw road back to front
    for (let i = projected.length - 1; i > 0; i--) {
      const curr = projected[i];
      const prev = projected[i - 1];

      const fog = Math.pow(curr.n / DRAW_DISTANCE, FOG_DENSITY);

      drawSegmentGfx(
        prev.p.screen.w, 0, prev.p.screen.x, prev.p.screen.y,
        curr.p.screen.w, 0, curr.p.screen.x, curr.p.screen.y,
        fog, curr.segIdx
      );

      // Draw sprites on this segment
      const seg = curr.seg;
      for (let s = 0; s < seg.sprites.length; s++) {
        const sprite = seg.sprites[s];
        const spriteX = curr.p.screen.x + curr.p.screen.w * sprite.offset;
        const spriteY = curr.p.screen.y;
        const spriteScale = curr.p.screen.w / 500;

        if (sprite.type === 'palm') drawPalm(spriteX, spriteY, spriteScale);
        else if (sprite.type === 'building') drawBuilding(spriteX, spriteY, spriteScale);
        else if (sprite.type === 'sign') drawSign(spriteX, spriteY, spriteScale);
      }

      // Draw traffic
      if (seg.traffic) {
        const tx = curr.p.screen.x + curr.p.screen.w * seg.traffic.offset;
        const ty = curr.p.screen.y;
        const tscale = curr.p.screen.w / 500;
        drawTrafficCar(tx, ty, tscale, seg.traffic.color);
      }

      // Checkpoint banner
      if (seg.isCheckpoint) {
        const bannerScale = curr.p.screen.w / 300;
        if (bannerScale > 0.01) {
          ctx.strokeStyle = '#39ff14';
          ctx.lineWidth = Math.max(1, 3 * bannerScale);
          ctx.globalAlpha = 0.7;
          const bx = curr.p.screen.x;
          const by = curr.p.screen.y;
          const bw = curr.p.screen.w * 1.0;
          const bh = 40 * bannerScale;
          ctx.strokeRect(bx - bw, by - bh, bw * 2, bh);
          ctx.font = '700 ' + Math.max(8, 16 * bannerScale) + 'px Orbitron';
          ctx.fillStyle = '#39ff14';
          ctx.textAlign = 'center';
          ctx.fillText('CHECKPOINT', bx, by - bh * 0.3);
          ctx.globalAlpha = 1;
        }
      }
    }

    // Draw player car
    const steerInput = isLeft() ? -1 : isRight() ? 1 : 0;
    if (state === 'crash') {
      ctx.save();
      ctx.translate(W / 2, H * 0.78);
      ctx.rotate(crashSpin * Math.PI / 180);
      ctx.translate(-W / 2, -H * 0.78);
      drawPlayerCar(0, speed / MAX_SPEED_INTERNAL);
      ctx.restore();
    } else {
      drawPlayerCar(steerInput + baseSeg.curve * 0.3, speed / MAX_SPEED_INTERNAL);
    }

    // Speed lines
    ctx.strokeStyle = 'rgba(0,240,255,0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < speedLines.length; i++) {
      const sl = speedLines[i];
      ctx.globalAlpha = sl.alpha * (sl.life / sl.maxLife);
      ctx.beginPath();
      ctx.moveTo(sl.x, sl.y);
      ctx.lineTo(sl.x, sl.y + sl.len);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 10 * dt;
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // HUD
    const distKm = trackDistance();
    const speedMph = (speed / MAX_SPEED_INTERNAL) * MAX_SPEED;
    drawHUD(speedMph, timer, distKm);
  }

  // ── IDLE ANIMATION (start/gameover screens) ──
  let idlePos = 0;
  function drawIdle(dt) {
    idlePos += 1000 * dt;
    if (idlePos >= trackLength) idlePos -= trackLength;

    ctx.clearRect(0, 0, W, H);

    const baseSegIdx = Math.floor(idlePos / SEG_LENGTH) % totalSegments;
    const cameraDepth = CAMERA_DEPTH_FACTOR * W;
    let maxY = H;
    let curveAcc = 0;
    let hillAcc = 0;
    const projected = [];

    for (let n = 0; n < DRAW_DISTANCE; n++) {
      const segIdx = (baseSegIdx + n) % totalSegments;
      const seg = segments[segIdx];
      const looped = (baseSegIdx + n) >= totalSegments;

      const p = {
        world: { z: seg.index * SEG_LENGTH + (looped ? trackLength : 0), x: curveAcc, y: hillAcc },
        camera: {},
        screen: {}
      };

      project(p, 0, CAMERA_HEIGHT, idlePos, cameraDepth);
      curveAcc += seg.curve;
      hillAcc += seg.hill;

      if (p.camera.z <= 0) continue;
      if (p.screen.y >= maxY) continue;

      projected.push({ seg, segIdx, n, p });
      maxY = p.screen.y;
    }

    const horizonY = projected.length > 0 ? Math.max(projected[0].p.screen.y, 0) : H * 0.4;
    drawSky(horizonY, gameTime);

    for (let i = projected.length - 1; i > 0; i--) {
      const curr = projected[i];
      const prev = projected[i - 1];
      const fog = Math.pow(curr.n / DRAW_DISTANCE, FOG_DENSITY);
      drawSegmentGfx(
        prev.p.screen.w, 0, prev.p.screen.x, prev.p.screen.y,
        curr.p.screen.w, 0, curr.p.screen.x, curr.p.screen.y,
        fog, curr.segIdx
      );

      const seg = curr.seg;
      for (let s = 0; s < seg.sprites.length; s++) {
        const sprite = seg.sprites[s];
        const spriteX = curr.p.screen.x + curr.p.screen.w * sprite.offset;
        const spriteY = curr.p.screen.y;
        const spriteScale = curr.p.screen.w / 500;
        if (sprite.type === 'palm') drawPalm(spriteX, spriteY, spriteScale);
        else if (sprite.type === 'building') drawBuilding(spriteX, spriteY, spriteScale);
        else if (sprite.type === 'sign') drawSign(spriteX, spriteY, spriteScale);
      }
    }
  }

  // ── GAME FLOW ──
  function startGame() {
    initAudio();
    buildRoad();
    position = 0;
    prevPosition = 0;
    totalDistance = 0;
    speed = 0;
    playerX = 0;
    timer = START_TIME;
    topSpeed = 0;
    checkpoints = 0;
    lastCheckpoint = -1;
    crashTimer = 0;
    crashSpin = 0;
    particles = [];
    speedLines = [];
    checkpointFlash = 0;
    lastTimerWarn = 0;
    score = 0;
    state = 'playing';

    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }

  function endGame() {
    state = 'gameover';
    stopEngine();

    const distKm = trackDistance();
    const speedMph = topSpeed;

    // Score = distance * 100 + checkpoints * 500
    score = Math.round(distKm * 100 + checkpoints * 500);

    document.getElementById('goDist').textContent = distKm.toFixed(1) + ' km';
    document.getElementById('goSpeed').textContent = Math.round(speedMph) + ' mph';
    document.getElementById('goCP').textContent = checkpoints;
    document.getElementById('goScore').textContent = score.toLocaleString();

    gameOverScreen.classList.remove('hidden');

    // Neon.js save
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(score);
    }).then(function(result) {
      Neon.render(document.getElementById('goLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    });
  }

  // Share
  shareBtn.addEventListener('click', () => {
    const distKm = trackDistance();
    const text = '\uD83C\uDFCE\uFE0F OUTRUN\n' +
      'Distance: ' + distKm.toFixed(1) + ' km | Top: ' + Math.round(topSpeed) + ' mph\n' +
      'Checkpoints: ' + checkpoints + ' | Score: ' + score.toLocaleString() + '\n' +
      'neonarcade.net/neonclassic/outrun.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(() => {
        navigator.clipboard.writeText(text);
      });
    } else {
      navigator.clipboard.writeText(text).then(() => {
        shareBtn.textContent = 'COPIED!';
        setTimeout(() => { shareBtn.textContent = 'SHARE'; }, 1500);
      });
    }
  });

  // Buttons
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // ── NEON.JS INIT ──
  Neon.init({
    game: 'outrun',
    mode: 'high',
    key: 'neonarcade_neonclassic_outrun_scores',
    emoji: '\uD83C\uDFCE\uFE0F',
    title: 'OUTRUN'
  });
  Neon.render(document.getElementById('startLB'));

  // ── BUILD ROAD & START LOOP ──
  buildRoad();
  requestAnimationFrame(render);

})();
</script>
