<script>
(function() {
  'use strict';

  // ===== CONSTANTS =====
  var SEGMENT_LENGTH = 200;
  var RUMBLE_LENGTH = 3;
  var ROAD_WIDTH = 2000;
  var LANES = 3;
  var CAMERA_HEIGHT = 1000;
  var FIELD_OF_VIEW = 100;
  var DRAW_DISTANCE = 150;
  var CAMERA_DEPTH = 1 / Math.tan((FIELD_OF_VIEW / 2) * Math.PI / 180);
  var PLAYER_Z = CAMERA_HEIGHT * CAMERA_DEPTH;
  var CENTRIFUGAL = 0.3;

  var MAX_SPEED = SEGMENT_LENGTH * 75; // ~25% faster than before
  var ACCEL = MAX_SPEED / 4.5;
  var BRAKE_DECEL = -MAX_SPEED;
  var NATURAL_DECEL = -MAX_SPEED / 5;
  var OFF_ROAD_DECEL = -MAX_SPEED / 2;
  var OFF_ROAD_LIMIT = MAX_SPEED / 4;

  var TOTAL_CARS = 30;
  var CHECKPOINT_TIME = 60; // seconds starting time
  var CHECKPOINT_BONUS = 15; // seconds added per checkpoint
  var CHECKPOINT_INTERVAL = 600; // segments between checkpoints

  // NEON COLORS (explicit hex, no CSS vars)
  var COL = {
    SKY: '#0a0a12',
    GRASS_DARK: '#0a140a',
    GRASS_LIGHT: '#0d1a0d',
    ROAD_DARK: '#333355',
    ROAD_LIGHT: '#3e3e68',
    RUMBLE_DARK: '#00f0ff',
    RUMBLE_LIGHT: '#ff2d7b',
    LANE_DARK: null,
    LANE_LIGHT: '#ffd700',
    START_ROAD: '#ffffff',
    START_RUMBLE: '#ffffff',
    START_LANE: '#ffffff'
  };

  var COLORS_DARK = { road: COL.ROAD_DARK, grass: COL.GRASS_DARK, rumble: COL.RUMBLE_DARK, lane: COL.LANE_DARK };
  var COLORS_LIGHT = { road: COL.ROAD_LIGHT, grass: COL.GRASS_LIGHT, rumble: COL.RUMBLE_LIGHT, lane: COL.LANE_LIGHT };
  var COLORS_START = { road: COL.START_ROAD, grass: COL.GRASS_LIGHT, rumble: COL.START_RUMBLE, lane: COL.START_LANE };

  // Traffic car colors (neon palette)
  var CAR_COLORS = ['#ff2d7b', '#39ff14', '#ffd700', '#b44dff', '#ff8c00', '#00f0ff'];

  // ===== ROAD BUILDER =====
  var ROAD = {
    LENGTH: { SHORT: 25, MEDIUM: 50, LONG: 100 },
    CURVE: { NONE: 0, EASY: 2, MEDIUM: 4, HARD: 6 }
  };

  // ===== STATE =====
  var canvas, ctx, W, H, dpr;
  var segments = [];
  var cars = [];
  var trackLength = 0;
  var position = 0;
  var speed = 0;
  var playerX = 0;
  var timeRemaining = CHECKPOINT_TIME;
  var totalDistance = 0;
  var topSpeed = 0;
  var gameState = 'idle'; // idle, playing, over
  var lastTimestamp = 0;
  var nextCheckpoint = CHECKPOINT_INTERVAL;
  var checkpointFlash = 0;
  var particles = [];

  // Input
  var keyLeft = false, keyRight = false, keyFaster = false, keySlower = false;

  // Sound
  var audioCtx = null;
  var engineOsc = null, engineGain = null;

  // ===== DOM =====
  var $canvas, $hud, $startScreen, $gameOverScreen, $touchControls;
  var $hudSpeed, $hudTime, $hudDist;
  var $goDistance, $goTopSpeed, $goBest, $goTitle;

  // ===== INIT =====
  function init() {
    $canvas = document.getElementById('c');
    ctx = $canvas.getContext('2d');
    $hud = document.getElementById('hud');
    $startScreen = document.getElementById('startScreen');
    $gameOverScreen = document.getElementById('gameOverScreen');
    $touchControls = document.getElementById('touchControls');
    $hudSpeed = document.getElementById('hudSpeed');
    $hudTime = document.getElementById('hudTime');
    $hudDist = document.getElementById('hudDist');
    $goDistance = document.getElementById('goDistance');
    $goTopSpeed = document.getElementById('goTopSpeed');
    $goBest = document.getElementById('goBest');
    $goTitle = document.getElementById('goTitle');

    resize();
    window.addEventListener('resize', resize);
    setupInput();
    buildRoad();

    // Neon.js
    Neon.init({
      game: 'outrun',
      mode: 'high',
      key: 'neonarcade_neonclassic_outrun_scores'
    });
    Neon.render(document.getElementById('startLB'));

    // Show start screen, run idle animation
    showStart();
    requestAnimationFrame(loop);
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = Math.min(window.innerWidth, 960);
    H = Math.min(window.innerHeight, 640);
    $canvas.width = W * dpr;
    $canvas.height = H * dpr;
    $canvas.style.width = W + 'px';
    $canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ===== ROAD BUILDING (from Jake Gordon's proven algorithm) =====
  function lastY() {
    return segments.length === 0 ? 0 : segments[segments.length - 1].p2.world.y;
  }

  function addSegment(curve, y) {
    var n = segments.length;
    segments.push({
      index: n,
      p1: { world: { y: lastY(), z: n * SEGMENT_LENGTH }, camera: {}, screen: {} },
      p2: { world: { y: y, z: (n + 1) * SEGMENT_LENGTH }, camera: {}, screen: {} },
      curve: curve,
      cars: [],
      sprites: [],
      color: Math.floor(n / RUMBLE_LENGTH) % 2 ? COLORS_DARK : COLORS_LIGHT
    });
  }

  function easeIn(a, b, t) { return a + (b - a) * t * t; }
  function easeInOut(a, b, t) { return a + (b - a) * (-Math.cos(t * Math.PI) / 2 + 0.5); }

  function addRoad(enter, hold, leave, curve, y) {
    var startY = lastY();
    var endY = startY + ((y || 0) * SEGMENT_LENGTH);
    var total = enter + hold + leave;
    for (var n = 0; n < enter; n++)
      addSegment(easeIn(0, curve, n / enter), easeInOut(startY, endY, n / total));
    for (var n = 0; n < hold; n++)
      addSegment(curve, easeInOut(startY, endY, (enter + n) / total));
    for (var n = 0; n < leave; n++)
      addSegment(easeInOut(curve, 0, n / leave), easeInOut(startY, endY, (enter + hold + n) / total));
  }

  function addStraight(num) {
    num = num || ROAD.LENGTH.MEDIUM;
    addRoad(num, num, num, 0, 0);
  }

  function addCurve(num, curve) {
    num = num || ROAD.LENGTH.MEDIUM;
    curve = curve || ROAD.CURVE.MEDIUM;
    addRoad(num, num, num, curve, 0);
  }

  function addSCurves() {
    addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, -ROAD.CURVE.EASY, 0);
    addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.CURVE.MEDIUM, 0);
    addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.CURVE.EASY, 0);
    addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, -ROAD.CURVE.EASY, 0);
    addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, -ROAD.CURVE.MEDIUM, 0);
  }

  function buildRoad() {
    segments = [];

    addStraight(ROAD.LENGTH.SHORT);
    addCurve(ROAD.LENGTH.MEDIUM, ROAD.CURVE.EASY);
    addStraight(ROAD.LENGTH.SHORT);
    addSCurves();
    addStraight(ROAD.LENGTH.SHORT);
    addCurve(ROAD.LENGTH.LONG, -ROAD.CURVE.MEDIUM);
    addStraight(ROAD.LENGTH.MEDIUM);
    addCurve(ROAD.LENGTH.MEDIUM, ROAD.CURVE.HARD);
    addStraight(ROAD.LENGTH.SHORT);
    addSCurves();
    addCurve(ROAD.LENGTH.LONG, ROAD.CURVE.MEDIUM);
    addStraight(ROAD.LENGTH.LONG);
    addCurve(ROAD.LENGTH.MEDIUM, -ROAD.CURVE.HARD);
    addStraight(ROAD.LENGTH.MEDIUM);
    addSCurves();
    addStraight(ROAD.LENGTH.LONG);

    // Mark start line
    var startIdx = findSegment(PLAYER_Z).index;
    segments[startIdx + 2].color = COLORS_START;
    segments[startIdx + 3].color = COLORS_START;

    trackLength = segments.length * SEGMENT_LENGTH;

    // Place roadside sprites (palm trees, signs)
    for (var i = 0; i < segments.length; i++) {
      // Palm trees every 15 segments on both sides
      if (i % 15 === 0) {
        segments[i].sprites.push({ type: 'palm', offset: -1.2 - Math.random() * 0.3 });
        segments[i].sprites.push({ type: 'palm', offset: 1.2 + Math.random() * 0.3 });
      }
      // Extra trees scattered
      if (i % 7 === 3) {
        segments[i].sprites.push({ type: 'palm', offset: (Math.random() > 0.5 ? 1 : -1) * (1.5 + Math.random() * 0.5) });
      }
      // Checkpoint banners
      if (i > 0 && i % CHECKPOINT_INTERVAL === 0) {
        segments[i].sprites.push({ type: 'checkpoint' });
      }
    }

    // Place traffic cars
    cars = [];
    for (var i = 0; i < TOTAL_CARS; i++) {
      var offset = (Math.random() * 1.6 - 0.8);
      var z = Math.floor(Math.random() * segments.length) * SEGMENT_LENGTH;
      var carSpeed = MAX_SPEED / 6 + Math.random() * MAX_SPEED / 3;
      var carColor = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];
      var car = { offset: offset, z: z, speed: carSpeed, color: carColor, w: 0.3 };
      findSegment(car.z).cars.push(car);
      cars.push(car);
    }
  }

  function findSegment(z) {
    return segments[Math.floor(z / SEGMENT_LENGTH) % segments.length];
  }

  function percentRemaining(z, segLen) {
    return (z % segLen) / segLen;
  }

  function increase(start, increment, max) {
    var result = start + increment;
    while (result >= max) result -= max;
    while (result < 0) result += max;
    return result;
  }

  function interpolate(a, b, t) {
    return a + (b - a) * t;
  }

  function limit(val, min, max) {
    return Math.max(min, Math.min(val, max));
  }

  function overlap(x1, w1, x2, w2, pct) {
    pct = pct || 1;
    var half = pct / 2;
    var min1 = x1 - w1 * half;
    var max1 = x1 + w1 * half;
    var min2 = x2 - w2 * half;
    var max2 = x2 + w2 * half;
    return !(min1 > max2 || max1 < min2);
  }

  // ===== PROJECTION (proven formula from Jake Gordon) =====
  function project(p, cameraX, cameraY, cameraZ, cameraDepth, width, height, roadWidth) {
    p.camera.x = (p.world.x || 0) - cameraX;
    p.camera.y = (p.world.y || 0) - cameraY;
    p.camera.z = (p.world.z || 0) - cameraZ;
    p.screen.scale = cameraDepth / p.camera.z;
    p.screen.x = Math.round((width / 2) + (p.screen.scale * p.camera.x * width / 2));
    p.screen.y = Math.round((height / 2) - (p.screen.scale * p.camera.y * height / 2));
    p.screen.w = Math.round(p.screen.scale * roadWidth * width / 2);
  }

  // ===== RENDERING (polygon-based, proven approach) =====
  function drawPolygon(x1, y1, x2, y2, x3, y3, x4, y4, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fill();
  }

  function rumbleWidth(projectedWidth) {
    return projectedWidth / Math.max(6, 2 * LANES);
  }

  function laneMarkerWidth(projectedWidth) {
    return projectedWidth / Math.max(32, 8 * LANES);
  }

  function drawSegment(x1, y1, w1, x2, y2, w2, color) {
    var r1 = rumbleWidth(w1);
    var r2 = rumbleWidth(w2);
    var l1 = laneMarkerWidth(w1);
    var l2 = laneMarkerWidth(w2);

    // Grass (full width band)
    ctx.fillStyle = color.grass;
    ctx.fillRect(0, y2, W, y1 - y2);

    // Rumble strips (left and right)
    drawPolygon(x1 - w1 - r1, y1, x1 - w1, y1, x2 - w2, y2, x2 - w2 - r2, y2, color.rumble);
    drawPolygon(x1 + w1 + r1, y1, x1 + w1, y1, x2 + w2, y2, x2 + w2 + r2, y2, color.rumble);

    // Road surface
    drawPolygon(x1 - w1, y1, x1 + w1, y1, x2 + w2, y2, x2 - w2, y2, color.road);

    // Lane markers
    if (color.lane) {
      var lanew1 = w1 * 2 / LANES;
      var lanew2 = w2 * 2 / LANES;
      var lanex1 = x1 - w1 + lanew1;
      var lanex2 = x2 - w2 + lanew2;
      for (var lane = 1; lane < LANES; lane++, lanex1 += lanew1, lanex2 += lanew2) {
        drawPolygon(
          lanex1 - l1 / 2, y1, lanex1 + l1 / 2, y1,
          lanex2 + l2 / 2, y2, lanex2 - l2 / 2, y2,
          color.lane
        );
      }
    }
  }

  function drawPalmTree(screenX, screenY, scaleVal, clipY) {
    if (scaleVal < 0.3) return;
    var trunkH = 120 * scaleVal;
    var trunkW = Math.max(2, 8 * scaleVal);
    if (screenY - trunkH < clipY - 20) return;

    // Trunk
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = trunkW;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(screenX, screenY);
    ctx.lineTo(screenX + 3 * scaleVal, screenY - trunkH);
    ctx.stroke();

    // Fronds
    var topX = screenX + 3 * scaleVal;
    var topY = screenY - trunkH;
    ctx.lineWidth = Math.max(1, 3 * scaleVal);
    ctx.strokeStyle = '#b44dff';
    for (var a = -2.5; a <= 0.5; a += 0.5) {
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.quadraticCurveTo(
        topX + Math.cos(a) * 50 * scaleVal, topY + Math.sin(a) * 30 * scaleVal - 15 * scaleVal,
        topX + Math.cos(a) * 70 * scaleVal, topY + Math.sin(a) * 50 * scaleVal
      );
      ctx.stroke();
    }
    ctx.strokeStyle = '#ff2d7b';
    ctx.globalAlpha = 0.5;
    for (var a = -2.8; a <= 0.2; a += 0.7) {
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.quadraticCurveTo(
        topX + Math.cos(a) * 35 * scaleVal, topY + Math.sin(a) * 20 * scaleVal - 10 * scaleVal,
        topX + Math.cos(a) * 60 * scaleVal, topY + Math.sin(a) * 40 * scaleVal
      );
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawCheckpointBanner(screenX, screenY, scaleVal, clipY) {
    if (scaleVal < 0.5) return;
    var bannerW = 200 * scaleVal;
    var bannerH = 30 * scaleVal;
    if (screenY - bannerH * 3 < clipY) return;

    // Banner
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = Math.max(2, 3 * scaleVal);
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 10;
    ctx.strokeRect(screenX - bannerW / 2, screenY - bannerH * 3, bannerW, bannerH);
    ctx.shadowBlur = 0;

    // Text
    var fontSize = Math.max(8, 14 * scaleVal);
    ctx.font = '700 ' + fontSize + 'px Orbitron';
    ctx.fillStyle = '#39ff14';
    ctx.textAlign = 'center';
    ctx.fillText('CHECKPOINT', screenX, screenY - bannerH * 2.3);
    ctx.textAlign = 'left';

    // Posts
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = Math.max(1, 3 * scaleVal);
    ctx.beginPath();
    ctx.moveTo(screenX - bannerW / 2, screenY);
    ctx.lineTo(screenX - bannerW / 2, screenY - bannerH * 3);
    ctx.moveTo(screenX + bannerW / 2, screenY);
    ctx.lineTo(screenX + bannerW / 2, screenY - bannerH * 3);
    ctx.stroke();
  }

  function drawCar(car, scaleVal, screenX, screenY, clipY) {
    // Car dimensions in screen space
    var carW = 40 * scaleVal;
    var carH = 20 * scaleVal;
    var cx = screenX;
    var cy = screenY;

    // Clip check
    if (cy < clipY - carH) return;

    // Car body
    ctx.fillStyle = car.color;
    ctx.fillRect(cx - carW / 2, cy - carH, carW, carH);

    // Roof (smaller rectangle)
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(cx - carW * 0.3, cy - carH * 0.85, carW * 0.6, carH * 0.5);

    // Windshield glow
    ctx.fillStyle = car.color;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(cx - carW * 0.25, cy - carH * 0.8, carW * 0.5, carH * 0.3);
    ctx.globalAlpha = 1;

    // Tail lights
    ctx.fillStyle = '#ff2d7b';
    ctx.fillRect(cx - carW / 2, cy - carH * 0.3, carW * 0.1, carH * 0.2);
    ctx.fillRect(cx + carW / 2 - carW * 0.1, cy - carH * 0.3, carW * 0.1, carH * 0.2);
  }

  function drawPlayerCar(steer) {
    var cx = W / 2;
    var cy = H - 30;
    var bodyW = 90;
    var bodyH = 50;
    var bounce = speed > 0 ? (Math.random() - 0.5) * (speed / MAX_SPEED) * 2 : 0;
    cy += bounce;

    var lean = steer * 5;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 4, bodyW * 0.6, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowColor = 'rgba(0,240,255,0.5)';
    ctx.shadowBlur = 15;

    // Rear body (wide base)
    ctx.fillStyle = '#0e1a2a';
    ctx.beginPath();
    ctx.moveTo(cx - bodyW / 2, cy);
    ctx.lineTo(cx + bodyW / 2, cy);
    ctx.lineTo(cx + bodyW * 0.4 + lean, cy - bodyH * 0.5);
    ctx.lineTo(cx - bodyW * 0.4 + lean, cy - bodyH * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Cabin (narrower top)
    ctx.fillStyle = '#0a1220';
    ctx.beginPath();
    ctx.moveTo(cx - bodyW * 0.35 + lean, cy - bodyH * 0.5);
    ctx.lineTo(cx + bodyW * 0.35 + lean, cy - bodyH * 0.5);
    ctx.lineTo(cx + bodyW * 0.25 + lean * 1.2, cy - bodyH * 0.85);
    ctx.lineTo(cx - bodyW * 0.25 + lean * 1.2, cy - bodyH * 0.85);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Windshield
    ctx.fillStyle = 'rgba(0,240,255,0.2)';
    ctx.beginPath();
    ctx.moveTo(cx - bodyW * 0.22 + lean * 1.2, cy - bodyH * 0.85);
    ctx.lineTo(cx + bodyW * 0.22 + lean * 1.2, cy - bodyH * 0.85);
    ctx.lineTo(cx + bodyW * 0.18 + lean * 1.3, cy - bodyH);
    ctx.lineTo(cx - bodyW * 0.18 + lean * 1.3, cy - bodyH);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;

    // Rear wing
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - bodyW * 0.45, cy - bodyH * 0.05);
    ctx.lineTo(cx - bodyW * 0.5 + lean * 0.3, cy - bodyH * 0.2);
    ctx.lineTo(cx + bodyW * 0.5 + lean * 0.3, cy - bodyH * 0.2);
    ctx.lineTo(cx + bodyW * 0.45, cy - bodyH * 0.05);
    ctx.stroke();

    // Wheels
    ctx.fillStyle = '#555';
    ctx.fillRect(cx - bodyW / 2 - 4, cy - 10, 8, 14);
    ctx.fillRect(cx + bodyW / 2 - 4, cy - 10, 8, 14);
    // Front wheels (visible at lean)
    ctx.fillRect(cx - bodyW * 0.38 + lean - 3, cy - bodyH * 0.45, 6, 10);
    ctx.fillRect(cx + bodyW * 0.38 + lean - 3, cy - bodyH * 0.45, 6, 10);

    // Tail lights
    ctx.fillStyle = '#ff2d7b';
    ctx.shadowColor = 'rgba(255,45,123,0.8)';
    ctx.shadowBlur = 8;
    ctx.fillRect(cx - bodyW / 2 + 2, cy - 5, 10, 4);
    ctx.fillRect(cx + bodyW / 2 - 12, cy - 5, 10, 4);
    ctx.shadowBlur = 0;

    // Headlights glow
    if (speed > 0) {
      ctx.fillStyle = 'rgba(0,240,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(cx + lean * 1.3, cy - bodyH - 3, bodyW * 0.5, 12, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }

  // ===== PARTICLES =====
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8 - 2,
        life: 1,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function updateParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.2;
      p.life -= dt * 2;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ===== MAIN RENDER (used for BOTH idle and gameplay) =====
  function render() {
    var baseSegment = findSegment(position);
    var basePercent = percentRemaining(position, SEGMENT_LENGTH);
    var playerSegment = findSegment(position + PLAYER_Z);
    var playerPercent = percentRemaining(position + PLAYER_Z, SEGMENT_LENGTH);
    var playerY = interpolate(playerSegment.p1.world.y, playerSegment.p2.world.y, playerPercent);
    var maxy = H;

    var x = 0;
    var dx = -(baseSegment.curve * basePercent);

    // 1. Clear and fill background
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);

    // 2. Draw stars in top half
    drawStars();

    // 3. Draw road segments back-to-front (near to far)
    var segmentsDrawn = 0;

    for (var n = 0; n < DRAW_DISTANCE; n++) {
      var segment = segments[(baseSegment.index + n) % segments.length];
      segment.looped = segment.index < baseSegment.index;
      segment.clip = maxy;

      project(segment.p1, (playerX * ROAD_WIDTH) - x, playerY + CAMERA_HEIGHT, position - (segment.looped ? trackLength : 0), CAMERA_DEPTH, W, H, ROAD_WIDTH);
      project(segment.p2, (playerX * ROAD_WIDTH) - x - dx, playerY + CAMERA_HEIGHT, position - (segment.looped ? trackLength : 0), CAMERA_DEPTH, W, H, ROAD_WIDTH);

      x = x + dx;
      dx = dx + segment.curve;

      // Clip: behind camera, below horizon, or above last drawn segment
      if ((segment.p1.camera.z <= CAMERA_DEPTH) ||
          (segment.p2.screen.y >= segment.p1.screen.y) ||
          (segment.p2.screen.y >= maxy))
        continue;

      drawSegment(
        segment.p1.screen.x, segment.p1.screen.y, segment.p1.screen.w,
        segment.p2.screen.x, segment.p2.screen.y, segment.p2.screen.w,
        segment.color
      );

      segmentsDrawn++;
      maxy = segment.p2.screen.y;
    }

    console.log('ROAD DRAW: y range', Math.round(maxy), 'to', H, '(' + segmentsDrawn + ' segments drawn)');

    // 5. Draw sprites (trees, signs, traffic) back-to-front
    for (var n = DRAW_DISTANCE - 1; n > 0; n--) {
      var segment = segments[(baseSegment.index + n) % segments.length];
      var spriteBaseScale = segment.p1.screen.scale;

      // Roadside sprites (trees, checkpoints)
      for (var s = 0; s < segment.sprites.length; s++) {
        var sprite = segment.sprites[s];
        var spScale = spriteBaseScale * W * 8;
        var spY = segment.p1.screen.y;
        var spX = segment.p1.screen.x;

        if (sprite.type === 'palm') {
          var treeX = spX + (spriteBaseScale * sprite.offset * ROAD_WIDTH * W / 2);
          drawPalmTree(treeX, spY, spScale, segment.clip);
        } else if (sprite.type === 'checkpoint') {
          drawCheckpointBanner(spX, spY, spScale, segment.clip);
        }
      }

      // Traffic cars
      for (var i = 0; i < segment.cars.length; i++) {
        var car = segment.cars[i];
        var carPercent = percentRemaining(car.z, SEGMENT_LENGTH);
        var carSpriteScale = interpolate(segment.p1.screen.scale, segment.p2.screen.scale, carPercent);
        var carSpriteX = interpolate(segment.p1.screen.x, segment.p2.screen.x, carPercent) +
                      (carSpriteScale * car.offset * ROAD_WIDTH * W / 2);
        var carSpriteY = interpolate(segment.p1.screen.y, segment.p2.screen.y, carPercent);
        drawCar(car, carSpriteScale * W * 8, carSpriteX, carSpriteY, segment.clip);
      }
    }

    // 6. Draw player car
    var steerDir = keyLeft ? -1 : (keyRight ? 1 : 0);
    drawPlayerCar(steerDir);

    // 7. Particles
    drawParticles();
  }

  // Stars
  var starCache = [];
  function initStars() {
    for (var i = 0; i < 60; i++) {
      starCache.push({
        x: Math.random(),
        y: Math.random() * 0.5,
        size: 0.5 + Math.random() * 1.5,
        flicker: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars() {
    var t = Date.now() * 0.001;
    for (var i = 0; i < starCache.length; i++) {
      var s = starCache[i];
      var alpha = 0.3 + 0.3 * Math.sin(t + s.flicker);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(s.x * W, s.y * H, s.size, s.size);
    }
  }

  // ===== UPDATE =====
  function update(dt) {
    if (gameState !== 'playing') return;

    var playerSegment = findSegment(position + PLAYER_Z);
    var speedPercent = speed / MAX_SPEED;
    var steerDx = dt * 2 * speedPercent;

    // Steering
    if (keyLeft) playerX -= steerDx;
    else if (keyRight) playerX += steerDx;

    // Centrifugal force
    playerX -= steerDx * speedPercent * playerSegment.curve * CENTRIFUGAL;

    // Acceleration
    if (keyFaster) speed += ACCEL * dt;
    else if (keySlower) speed += BRAKE_DECEL * dt;
    else speed += NATURAL_DECEL * dt;

    // Off-road penalty
    if (playerX < -1 || playerX > 1) {
      if (speed > OFF_ROAD_LIMIT) speed += OFF_ROAD_DECEL * dt;
    }

    // Collision with traffic
    var playerW = 0.3;
    for (var i = 0; i < playerSegment.cars.length; i++) {
      var car = playerSegment.cars[i];
      if (speed > car.speed && overlap(playerX, playerW, car.offset, car.w, 0.8)) {
        speed = car.speed * (car.speed / speed);
        position = increase(car.z, -PLAYER_Z, trackLength);
        spawnParticles(W / 2, H - 60, '#ff2d7b', 12);
        playSound('crash');
        document.body.classList.add('shake');
        setTimeout(function() { document.body.classList.remove('shake'); }, 250);
        break;
      }
    }

    // Clamp
    playerX = limit(playerX, -2.5, 2.5);
    speed = limit(speed, 0, MAX_SPEED);

    // Move position
    position = increase(position, dt * speed, trackLength);

    // Update distance
    totalDistance += dt * speed / SEGMENT_LENGTH;
    if (speed > topSpeed) topSpeed = speed;

    // Checkpoints
    var currentSegIdx = findSegment(position).index;
    if (currentSegIdx >= nextCheckpoint) {
      timeRemaining += CHECKPOINT_BONUS;
      nextCheckpoint += CHECKPOINT_INTERVAL;
      checkpointFlash = 2;
      spawnParticles(W / 2, 50, '#39ff14', 15);
      playSound('checkpoint');
    }

    // Timer
    timeRemaining -= dt;
    if (checkpointFlash > 0) checkpointFlash -= dt;
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      gameOver();
    }

    // Update traffic
    updateCars(dt);

    // Particles
    updateParticles(dt);

    // Engine sound
    updateEngineSound();

    // HUD
    $hudSpeed.textContent = Math.round(speed / MAX_SPEED * 200);
    $hudTime.textContent = Math.ceil(timeRemaining);
    $hudTime.style.color = timeRemaining < 10 ? '#ff2d7b' : '#ffd700';
    $hudDist.textContent = Math.floor(totalDistance);
  }

  function updateCars(dt) {
    for (var i = 0; i < cars.length; i++) {
      var car = cars[i];
      var oldSeg = findSegment(car.z);
      car.z = increase(car.z, dt * car.speed, trackLength);
      var newSeg = findSegment(car.z);
      if (oldSeg !== newSeg) {
        var idx = oldSeg.cars.indexOf(car);
        if (idx >= 0) oldSeg.cars.splice(idx, 1);
        newSeg.cars.push(car);
      }
    }
  }

  // ===== SOUND =====
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 60;
    engineGain.gain.value = 0;
    engineOsc.connect(engineGain);
    engineGain.connect(audioCtx.destination);
    engineOsc.start();
  }

  function updateEngineSound() {
    if (!audioCtx || !engineOsc) return;
    var freq = 60 + (speed / MAX_SPEED) * 200;
    engineOsc.frequency.value = freq;
    engineGain.gain.value = gameState === 'playing' ? 0.03 + (speed / MAX_SPEED) * 0.04 : 0;
  }

  function playSound(type) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'crash') {
      osc.type = 'square';
      osc.frequency.value = 150;
      gain.gain.value = 0.15;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'checkpoint') {
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.12;
      osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'start') {
      osc.type = 'sine';
      osc.frequency.value = 440;
      gain.gain.value = 0.1;
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'gameover') {
      osc.type = 'sawtooth';
      osc.frequency.value = 300;
      gain.gain.value = 0.1;
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }
  }

  function stopEngineSound() {
    if (engineGain) engineGain.gain.value = 0;
  }

  // ===== GAME LOOP =====
  function loop(timestamp) {
    var dt = timestamp && lastTimestamp ? (timestamp - lastTimestamp) / 1000 : 1 / 60;
    lastTimestamp = timestamp;
    if (dt > 0.1) dt = 0.1; // Cap delta

    if (gameState === 'idle') {
      // Idle: slowly advance position to show road animation
      position = increase(position, dt * MAX_SPEED * 0.15, trackLength);
      speed = MAX_SPEED * 0.15;
    }

    update(dt);
    render();

    requestAnimationFrame(loop);
  }

  // ===== GAME STATE =====
  function showStart() {
    gameState = 'idle';
    $startScreen.style.display = 'flex';
    $gameOverScreen.style.display = 'none';
    $hud.style.display = 'none';
    $touchControls.style.display = 'none';
    speed = 0;
    stopEngineSound();
  }

  function startGame() {
    initAudio();
    playSound('start');

    gameState = 'playing';
    position = 0;
    speed = 0;
    playerX = 0;
    timeRemaining = CHECKPOINT_TIME;
    totalDistance = 0;
    topSpeed = 0;
    nextCheckpoint = CHECKPOINT_INTERVAL;
    checkpointFlash = 0;
    particles = [];

    // Rebuild road and cars for fresh game
    buildRoad();

    $startScreen.style.display = 'none';
    $gameOverScreen.style.display = 'none';
    $hud.style.display = 'block';

    var isMobile = 'ontouchstart' in window && window.innerWidth < 900;
    $touchControls.style.display = isMobile ? 'block' : 'none';
  }

  function gameOver() {
    gameState = 'over';
    playSound('gameover');
    stopEngineSound();

    var dist = Math.floor(totalDistance);
    var topSpeedKmh = Math.round(topSpeed / MAX_SPEED * 200);

    $goDistance.textContent = dist;
    $goTopSpeed.textContent = topSpeedKmh + ' km/h';
    $goTitle.textContent = 'TIME UP';
    $hud.style.display = 'none';
    $touchControls.style.display = 'none';
    $gameOverScreen.style.display = 'flex';

    // Neon.js save
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(dist);
    }).then(function(result) {
      $goBest.textContent = Neon.getHighScore();
      Neon.render(document.getElementById('goLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    });
  }

  function shareResult() {
    var dist = Math.floor(totalDistance);
    var topSpeedKmh = Math.round(topSpeed / MAX_SPEED * 200);
    var bars = Math.min(10, Math.floor(dist / 50));
    var visual = '';
    for (var i = 0; i < 10; i++) visual += i < bars ? '\u2593' : '\u2591';

    var text = '\uD83C\uDFCE\uFE0F OUTRUN -- NEON ARCADE\n' +
               'Distance: ' + dist + ' | Top Speed: ' + topSpeedKmh + ' km/h\n' +
               visual + '\n' +
               'Race the neon highway: https://neonarcade.net/neonclassic/outrun.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {});
    } else {
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('btnShare');
        btn.textContent = 'COPIED!';
        setTimeout(function() { btn.textContent = 'SHARE'; }, 2000);
      });
    }
  }

  // ===== INPUT =====
  function setupInput() {
    document.addEventListener('keydown', function(e) {
      switch (e.key) {
        case 'ArrowLeft': case 'a': case 'A': keyLeft = true; e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': keyRight = true; e.preventDefault(); break;
        case 'ArrowUp': case 'w': case 'W': keyFaster = true; e.preventDefault(); break;
        case 'ArrowDown': case 's': case 'S': keySlower = true; e.preventDefault(); break;
        case 'Escape':
          if (gameState === 'playing') {
            showStart();
          }
          break;
      }
    });

    document.addEventListener('keyup', function(e) {
      switch (e.key) {
        case 'ArrowLeft': case 'a': case 'A': keyLeft = false; break;
        case 'ArrowRight': case 'd': case 'D': keyRight = false; break;
        case 'ArrowUp': case 'w': case 'W': keyFaster = false; break;
        case 'ArrowDown': case 's': case 'S': keySlower = false; break;
      }
    });

    // Touch controls
    function touchHandler(id, keyObj) {
      var el = document.getElementById(id);
      el.addEventListener('touchstart', function(e) { e.preventDefault(); keyObj.fn(true); });
      el.addEventListener('touchend', function(e) { e.preventDefault(); keyObj.fn(false); });
      el.addEventListener('touchcancel', function(e) { keyObj.fn(false); });
    }
    touchHandler('tLeft', { fn: function(v) { keyLeft = v; } });
    touchHandler('tRight', { fn: function(v) { keyRight = v; } });
    touchHandler('tGas', { fn: function(v) { keyFaster = v; } });
    touchHandler('tBrake', { fn: function(v) { keySlower = v; } });

    // Buttons
    document.getElementById('btnStart').addEventListener('click', startGame);
    document.getElementById('btnRestart').addEventListener('click', startGame);
    document.getElementById('btnShare').addEventListener('click', shareResult);
  }

  // ===== BOOT =====
  initStars();
  init();
})();
</script>
</body>
</html>
