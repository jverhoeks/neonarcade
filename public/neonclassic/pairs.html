    <div class="card-grid" id="card-grid"></div>
  </div>
  <div class="bottom-bar">
    <button class="bar-btn" onclick="restartGame()">RESTART</button>

      <button class="btn" onclick="restartGame()">PLAY AGAIN</button>
      <button class="btn secondary" onclick="goToMenu()">CHANGE SIZE</button>
    </div>
    <div class="leaderboard" id="complete-lb"></div>
  </div>

  <!-- 2P COMPLETE OVERLAY -->
  <div class="overlay" id="complete-overlay-2p">

    <div class="overlay-stats" id="complete-stats-2p"></div>
    <div class="overlay-btns">
      <button class="btn share" onclick="shareResult()">SHARE</button>
      <button class="btn" onclick="restartGame()">PLAY AGAIN</button>
      <button class="btn secondary" onclick="goToMenu()">CHANGE SIZE</button>
    </div>
  </div>

<script>
(() => {
  'use strict';

  // ========== CONFIG ==========
  const DIFFICULTIES = [
    { cols: 4, rows: 4, pairs: 8,  label: '4x4' },
    { cols: 5, rows: 4, pairs: 10, label: '5x4' },
    { cols: 6, rows: 5, pairs: 15, label: '6x5' }

  // ========== AUDIO ==========
  var audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playFlipSound() {
    try {
      var ctx = getAudio();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  function playMatchSound() {
    try {
      var ctx = getAudio();
      var t = ctx.currentTime;
      [523, 659, 784].forEach(function(freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t + i * 0.08);
        gain.gain.setValueAtTime(0.15, t + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
        osc.start(t + i * 0.08);
        osc.stop(t + i * 0.08 + 0.2);
      });
    } catch(e) {}
  }

  function playMismatchSound() {
    try {
      var ctx = getAudio();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    } catch(e) {}
  }

  function playCompleteSound() {
    try {
      var ctx = getAudio();
      var t = ctx.currentTime;
      [523, 659, 784, 1047].forEach(function(freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t + i * 0.12);
        gain.gain.setValueAtTime(0.15, t + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.08, t + i * 0.12 + 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
        osc.start(t + i * 0.12);
        osc.stop(t + i * 0.12 + 0.4);
      });
    } catch(e) {}
  }

  // ========== PARTICLES ==========
  var particles = [];

  function resizeParticleCanvas() {
    var dpr = window.devicePixelRatio || 1;
    particleCanvas.width = window.innerWidth * dpr;
    particleCanvas.height = window.innerHeight * dpr;
    particleCanvas.style.width = window.innerWidth + 'px';
    particleCanvas.style.height = window.innerHeight + 'px';
    particleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeParticleCanvas();
  window.addEventListener('resize', resizeParticleCanvas);

  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < (count || 12); i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1.5 + Math.random() * 3;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        size: 2 + Math.random() * 3,
        color: color
      });
    }
  }

  function tickParticles() {
    particleCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      particleCtx.globalAlpha = p.life;
      particleCtx.fillStyle = p.color;
      particleCtx.shadowBlur = 8;
      particleCtx.shadowColor = p.color;
      particleCtx.beginPath();
      particleCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      particleCtx.fill();
    }
    particleCtx.globalAlpha = 1;
    particleCtx.shadowBlur = 0;
    requestAnimationFrame(tickParticles);
  }
  tickParticles();

  // ========== NEON.JS INIT ==========
  function initNeon() {
    var diff = DIFFICULTIES[currentDiff];
    if (twoPlayerMode) {
      Neon.init({
        game: 'pairs',
        mode: 'high',
        key: 'neonarcade_neonclassic_pairs_scores_2p_' + diff.label,
        formatScore: function(s) { return s + ' pairs'; }
      });
    } else {
      Neon.init({
        game: 'pairs',
        mode: 'low',
        key: 'neonarcade_neonclassic_pairs_scores_' + diff.label,
        formatScore: function(s) {
          var m = Math.floor(s / 60);
          var sec = Math.floor(s % 60);
          return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        }
      });
    }
  }

  function formatTime(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // ========== DIFFICULTY SELECTION ==========
  window.selectDiff = function(idx) {
    currentDiff = idx;
    document.querySelectorAll('.diff-btn').forEach(function(btn, i) {
      btn.classList.toggle('selected', i === idx);
    });
    initNeon();
    updateBestTimes();
    Neon.render(document.getElementById('start-lb'));
  };

  function updateBestTimes() {
    DIFFICULTIES.forEach(function(diff, i) {
      var key = 'neonarcade_neonclassic_pairs_scores_' + diff.label;
      var scores;try{scores=JSON.parse(localStorage.getItem(key)||'[]');}catch(e){scores=[];}
      var el = document.getElementById('best-' + i);
      if (scores.length > 0) {
        el.textContent = formatTime(scores[0].score);
      } else {
        el.textContent = '--:--';
      }
    });
  }

  // ========== SHUFFLE ==========
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // ========== GAME START ==========
  window.startGame = function(is2P) {
    twoPlayerMode = !!is2P;
    var diff = DIFFICULTIES[currentDiff];
    totalPairs = diff.pairs;
    matchedPairs = 0;
    moves = 0;
    elapsedSeconds = 0;
    flippedCards = [];
    isLocked = false;
    gameActive = false;
    cards = [];

    // 2P reset
    currentPlayer = 0;
    playerScores = [0, 0];

    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    movesCounter.textContent = 'MOVES: 0';
    pairsCounter.textContent = '0 / ' + totalPairs;
    timerEl.textContent = '00:00';
    completeOverlay.classList.remove('active');
    completeOverlay2p.classList.remove('active');
    turnOverlay.classList.remove('active');

    // Toggle top bars
    if (twoPlayerMode) {
      topBarSolo.style.display = 'none';
      topBar2p.classList.add('active');
      update2pUI();
      initNeon();
    } else {
      topBarSolo.style.display = '';
      topBar2p.classList.remove('active');
    }

    // Build card data
    var symbolPool = shuffle(SYMBOLS.slice()).slice(0, totalPairs);
    var colorPool = shuffle(NEON_COLORS.slice()).slice(0, totalPairs);
    var cardData = [];
    for (var i = 0; i < totalPairs; i++) {
      cardData.push({ id: i, symbol: symbolPool[i].glyph, color: colorPool[i] });
      cardData.push({ id: i, symbol: symbolPool[i].glyph, color: colorPool[i] });
    }
    shuffle(cardData);

    // Build grid
    while (cardGrid.firstChild) cardGrid.removeChild(cardGrid.firstChild);
    var cardSize = calcCardSize(diff.cols, diff.rows);
    cardGrid.style.gridTemplateColumns = 'repeat(' + diff.cols + ', ' + cardSize + 'px)';
    cardGrid.style.gridTemplateRows = 'repeat(' + diff.rows + ', ' + cardSize + 'px)';

    cardData.forEach(function(data, idx) {
      var card = document.createElement('div');
      card.className = 'card';
      card.style.width = cardSize + 'px';
      card.style.height = cardSize + 'px';
      card.dataset.idx = idx;
      card.dataset.pairId = data.id;

      var back = document.createElement('div');
      back.className = 'card-face card-back';

      var front = document.createElement('div');
      front.className = 'card-face card-front';
      front.textContent = data.symbol;
      front.style.color = data.color;
      front.style.textShadow = '0 0 10px ' + data.color + ', 0 0 30px ' + data.color + '80';

      card.appendChild(back);
      card.appendChild(front);

      card.addEventListener('click', function() { flipCard(card); });
      card.addEventListener('touchstart', function(e) { e.preventDefault(); flipCard(card); }, { passive: false });

      cardGrid.appendChild(card);
      cards.push({ el: card, data: data, isFlipped: false, isMatched: false });
    });

    // Switch screens
    startScreen.classList.remove('active');
    gameScreen.classList.add('active');
  };

  function calcCardSize(cols, rows) {
    var wrapperW = window.innerWidth - 40;
    var wrapperH = window.innerHeight - 120;
    var maxW = Math.floor((wrapperW - (cols - 1) * 6) / cols);
    var maxH = Math.floor((wrapperH - (rows - 1) * 6) / rows);
    return Math.min(maxW, maxH, 100);
  }

  // ========== 2P UI ==========
  function update2pUI() {
    p1ScoreEl.textContent = 'P1: ' + playerScores[0];
    p2ScoreEl.textContent = 'P2: ' + playerScores[1];
    if (currentPlayer === 0) {
      p1ScoreEl.classList.add('active-turn');
      p2ScoreEl.classList.remove('active-turn');
      turnLabelEl.textContent = "P1's TURN";
      turnLabelEl.style.color = PLAYER_COLORS[0];
    } else {
      p1ScoreEl.classList.remove('active-turn');
      p2ScoreEl.classList.add('active-turn');
      turnLabelEl.textContent = "P2's TURN";
      turnLabelEl.style.color = PLAYER_COLORS[1];
    }
  }

  function showTurnTransition(callback) {
    var pNum = currentPlayer + 1;
    turnOverlayText.textContent = 'PLAYER ' + pNum + "'s TURN";
    turnOverlayText.style.color = PLAYER_COLORS[currentPlayer];
    turnOverlay.classList.add('active');
    setTimeout(function() {
      turnOverlay.classList.remove('active');
      if (callback) callback();
    }, 800);
  }

  function switchPlayer() {
    currentPlayer = currentPlayer === 0 ? 1 : 0;
    update2pUI();
    showTurnTransition(function() {
      isLocked = false;
    });
  }

  // ========== CARD FLIP ==========
  function flipCard(cardEl) {
    if (isLocked) return;

    var idx = parseInt(cardEl.dataset.idx);
    var card = cards[idx];

    if (card.isFlipped || card.isMatched) return;
    if (flippedCards.length >= 2) return;

    // Start timer on first flip (solo mode only)
    if (!gameActive) {
      gameActive = true;
      if (!twoPlayerMode) {
        timerStart = Date.now();
        timerInterval = setInterval(updateTimer, 200);
      }
    }

    card.isFlipped = true;
    cardEl.classList.add('flipped');
    flippedCards.push(card);
    playFlipSound();

    if (flippedCards.length === 2) {
      moves++;
      if (!twoPlayerMode) {
        movesCounter.textContent = 'MOVES: ' + moves;
      }

      var c1 = flippedCards[0];
      var c2 = flippedCards[1];

      if (c1.data.id === c2.data.id) {
        // Match
        isLocked = true;
        setTimeout(function() {
          c1.isMatched = true;
          c2.isMatched = true;
          c1.el.classList.add('matched');
          c2.el.classList.add('matched');
          matchedPairs++;
          if (!twoPlayerMode) {
            pairsCounter.textContent = matchedPairs + ' / ' + totalPairs;
          }
          playMatchSound();

          var r1 = c1.el.getBoundingClientRect();
          var r2 = c2.el.getBoundingClientRect();
          spawnParticles(r1.left + r1.width / 2, r1.top + r1.height / 2, c1.data.color, 10);
          spawnParticles(r2.left + r2.width / 2, r2.top + r2.height / 2, c2.data.color, 10);

          if (twoPlayerMode) {
            playerScores[currentPlayer]++;
            update2pUI();
          }

          flippedCards = [];
          isLocked = false;

          if (matchedPairs === totalPairs) {
            if (twoPlayerMode) {
              gameComplete2p();
            } else {
              gameComplete();
            }
          }
          // In 2P mode, current player keeps their turn on match
        }, 300);
      } else {
        // Mismatch
        isLocked = true;
        setTimeout(function() {
          playMismatchSound();
          c1.el.classList.add('wrong');
          c2.el.classList.add('wrong');
          document.body.classList.add('shake');

          setTimeout(function() {
            c1.isFlipped = false;
            c2.isFlipped = false;
            c1.el.classList.remove('flipped', 'wrong');
            c2.el.classList.remove('flipped', 'wrong');
            document.body.classList.remove('shake');
            flippedCards = [];

            if (twoPlayerMode) {
              // Switch player — isLocked stays true until transition ends
              switchPlayer();
            } else {
              isLocked = false;
            }
          }, 500);
        }, 800);
      }
    }
  }

  // ========== TIMER ==========
  function updateTimer() {
    if (!gameActive) return;
    elapsedSeconds = (Date.now() - timerStart) / 1000;
    timerEl.textContent = formatTime(elapsedSeconds);
  }

  // ========== GAME COMPLETE ==========
  function gameComplete() {
    gameActive = false;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    elapsedSeconds = (Date.now() - timerStart) / 1000;
    timerEl.textContent = formatTime(elapsedSeconds);

    playCompleteSound();

    // Star rating
    var perfectMoves = totalPairs;
    var extraMoves = moves - perfectMoves;
    var stars;
    if (extraMoves <= 2) stars = 3;
    else if (extraMoves <= 6) stars = 2;
    else stars = 1;

    var starStr = '';
    for (var i = 0; i < 3; i++) {
      starStr += (i < stars) ? '\u2B50' : '\u2606';
    }
    starDisplay.textContent = starStr;

    // Build stats using DOM methods
    while (completeStats.firstChild) completeStats.removeChild(completeStats.firstChild);

    var timeDiv = document.createElement('div');
    timeDiv.className = 'stat';
    var timeVal = document.createElement('span');
    timeVal.className = 'val';
    timeVal.textContent = formatTime(elapsedSeconds);
    timeDiv.appendChild(timeVal);
    timeDiv.appendChild(document.createTextNode('TIME'));
    completeStats.appendChild(timeDiv);

    var movesDiv = document.createElement('div');
    movesDiv.className = 'stat';
    var movesVal = document.createElement('span');
    movesVal.className = 'val';
    movesVal.textContent = moves;
    movesDiv.appendChild(movesVal);
    movesDiv.appendChild(document.createTextNode('MOVES'));
    completeStats.appendChild(movesDiv);

    var pairsDiv = document.createElement('div');
    pairsDiv.className = 'stat';
    var pairsVal = document.createElement('span');
    pairsVal.className = 'val';
    pairsVal.textContent = totalPairs;
    pairsDiv.appendChild(pairsVal);
    pairsDiv.appendChild(document.createTextNode('PAIRS'));
    completeStats.appendChild(pairsDiv);

    // Neon.js save
    var finalTime = Math.round(elapsedSeconds);
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(finalTime);
    }).then(function(result) {
      if (result && result.isNewBest) {
        bestNote.textContent = '\u2728 NEW BEST TIME! \u2728';
        bestNote.style.display = 'block';
      } else {
        bestNote.style.display = 'none';
      }
      Neon.render(document.getElementById('complete-lb'));
      if (result && result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    }).catch(function() {
      bestNote.style.display = 'none';
    });

    // Celebration particles
    for (var j = 0; j < 5; j++) {
      (function(delay) {
        setTimeout(function() {
          spawnParticles(
            window.innerWidth * (0.2 + Math.random() * 0.6),
            window.innerHeight * (0.3 + Math.random() * 0.4),
            NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)],
            15
          );
        }, delay);
      })(j * 150);
    }

    setTimeout(function() {
      completeOverlay.classList.add('active');
    }, 600);
  }

  // ========== 2P GAME COMPLETE ==========
  function gameComplete2p() {
    gameActive = false;
    playCompleteSound();

    var p1 = playerScores[0];
    var p2 = playerScores[1];
    var winnerIdx = -1;
    if (p1 > p2) winnerIdx = 0;
    else if (p2 > p1) winnerIdx = 1;

    // Title
    if (winnerIdx === -1) {
      winnerTitle.textContent = "IT'S A DRAW!";
      winnerTitle.style.color = '#ffd700';
    } else {
      winnerTitle.textContent = PLAYER_NAMES[winnerIdx] + ' WINS!';
      winnerTitle.style.color = PLAYER_COLORS[winnerIdx];
    }

    // Score cards
    while (vsFinalScores.firstChild) vsFinalScores.removeChild(vsFinalScores.firstChild);

    for (var i = 0; i < 2; i++) {
      var pDiv = document.createElement('div');
      pDiv.className = 'vs-p' + (i === winnerIdx ? ' winner' : '');
      var label = document.createElement('span');
      label.className = 'vs-label';
      label.textContent = 'P' + (i + 1);
      label.style.color = PLAYER_COLORS[i];
      var val = document.createElement('span');
      val.className = 'vs-val';
      val.textContent = playerScores[i];
      val.style.color = PLAYER_COLORS[i];
      pDiv.appendChild(label);
      pDiv.appendChild(val);
      vsFinalScores.appendChild(pDiv);
    }

    // Stats
    while (completeStats2p.firstChild) completeStats2p.removeChild(completeStats2p.firstChild);

    var movesDiv = document.createElement('div');
    movesDiv.className = 'stat';
    var movesVal = document.createElement('span');
    movesVal.className = 'val';
    movesVal.textContent = moves;
    movesDiv.appendChild(movesVal);
    movesDiv.appendChild(document.createTextNode('TOTAL MOVES'));
    completeStats2p.appendChild(movesDiv);

    var pairsDiv = document.createElement('div');
    pairsDiv.className = 'stat';
    var pairsVal = document.createElement('span');
    pairsVal.className = 'val';
    pairsVal.textContent = totalPairs;
    pairsDiv.appendChild(pairsVal);
    pairsDiv.appendChild(document.createTextNode('PAIRS'));
    completeStats2p.appendChild(pairsDiv);

    // Save winner's score via Neon.js if applicable
    if (winnerIdx >= 0) {
      var winnerScore = playerScores[winnerIdx];
      var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
      nameReady.then(function() {
        return Neon.save(winnerScore);
      }).then(function(result) {
        if (result && result.globalRank >= 1 && result.globalRank <= 5) {
          Neon.showGlobalSplash(result.globalRank);
        }
      }).catch(function() {});
    }

    // Celebration particles
    for (var j = 0; j < 5; j++) {
      (function(delay) {
        setTimeout(function() {
          spawnParticles(
            window.innerWidth * (0.2 + Math.random() * 0.6),
            window.innerHeight * (0.3 + Math.random() * 0.4),
            NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)],
            15
          );
        }, delay);
      })(j * 150);
    }

    setTimeout(function() {
      completeOverlay2p.classList.add('active');
    }, 600);
  }

  // ========== SHARE ==========
  window.shareResult = function() {
    var diff = DIFFICULTIES[currentDiff];
    var text;

    if (twoPlayerMode) {
      var p1 = playerScores[0];
      var p2 = playerScores[1];
      var resultLine;
      if (p1 > p2) resultLine = '\uD83C\uDFC6 P1 wins!';
      else if (p2 > p1) resultLine = '\uD83C\uDFC6 P2 wins!';
      else resultLine = '\uD83E\uDD1D Draw!';

      text = '\uD83C\uDCCF NEON PAIRS VS (' + diff.label + ')\n' +
        '\uD83D\uDFE6 P1: ' + p1 + ' | \uD83D\uDFE5 P2: ' + p2 + '\n' +
        resultLine + '\n' +
        'neonarcade.net/neonclassic/pairs.html';
    } else {
      var perfectMoves = totalPairs;
      var extraMoves = moves - perfectMoves;
      var stars;
      if (extraMoves <= 2) stars = 3;
      else if (extraMoves <= 6) stars = 2;
      else stars = 1;

      var starEmoji = '';
      for (var i = 0; i < stars; i++) starEmoji += '\u2B50';

      // Build mini grid
      var gridLines = [];
      var colCount = diff.cols;
      for (var r = 0; r < diff.rows; r++) {
        var line = '';
        for (var c = 0; c < colCount; c++) {
          var cardIdx = r * colCount + c;
          if (cardIdx < cards.length) {
            var pairId = cards[cardIdx].data.id;
            line += SHARE_BLOCKS[pairId % SHARE_BLOCKS.length];
          }
        }
        gridLines.push(line);
      }

      text = '\uD83C\uDCCF NEON PAIRS (' + diff.label + ')\n' +
        '\u23F1 ' + formatTime(elapsedSeconds) + ' | Moves: ' + moves + '\n' +
        starEmoji + '\n' +
        gridLines.join('\n') + '\n' +
        'neonarcade.net/neonclassic/pairs.html';
    }

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  };

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      showCopiedToast();
    }).catch(function() {
      showCopiedToast();
    });
  }

  function showCopiedToast() {
    var btn = document.querySelector('.btn.share');
    if (!btn) return;
    var orig = btn.textContent;
    btn.textContent = 'COPIED!';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }

  // ========== NAVIGATION ==========
  window.restartGame = function() {
    completeOverlay.classList.remove('active');
    completeOverlay2p.classList.remove('active');
    turnOverlay.classList.remove('active');
    startGame(twoPlayerMode);
  };

  window.goToMenu = function() {
    gameActive = false;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    gameScreen.classList.remove('active');
    completeOverlay.classList.remove('active');
    completeOverlay2p.classList.remove('active');
    turnOverlay.classList.remove('active');
    topBar2p.classList.remove('active');
    topBarSolo.style.display = '';
    startScreen.classList.add('active');
    twoPlayerMode = false;
    updateBestTimes();
    initNeon();
    Neon.render(document.getElementById('start-lb'));
  };

  // ========== ESC TO QUIT ==========
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && gameScreen.classList.contains('active')) {
      e.preventDefault();
      goToMenu();
    }
  });

  // ========== INIT ==========
  initNeon();
  updateBestTimes();
  setTimeout(function() {
    Neon.render(document.getElementById('start-lb'));
  }, 500);

  // Handle resize during game
  window.addEventListener('resize', function() {
    if (gameScreen.classList.contains('active') && !completeOverlay.classList.contains('active')) {
      var diff = DIFFICULTIES[currentDiff];
      var cardSize = calcCardSize(diff.cols, diff.rows);
      cardGrid.style.gridTemplateColumns = 'repeat(' + diff.cols + ', ' + cardSize + 'px)';
      cardGrid.style.gridTemplateRows = 'repeat(' + diff.rows + ', ' + cardSize + 'px)';
      cards.forEach(function(card) {
        card.el.style.width = cardSize + 'px';
        card.el.style.height = cardSize + 'px';
      });
    }
  });

})();
</script>
</body>
</html>
