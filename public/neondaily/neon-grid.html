<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON GRID — Daily Color Logic Puzzle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
:root {
  --bg-deep: #0a0a12;
  --bg-surface: #12121f;
  --neon-cyan: #00f0ff;
  --neon-green: #39ff14;
  --neon-gold: #ffd700;
  --neon-pink: #ff2d7b;
  --neon-purple: #b44dff;
  --neon-orange: #ff8c00;
  --text-dim: #4a4a6a;
  --text-mid: #8888aa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg-deep); font-family: 'Rajdhani', sans-serif; color: #fff; touch-action: none; -webkit-user-select: none; user-select: none; }
body::after {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 30% 10%, rgba(0,240,255,0.07) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 90%, rgba(255,45,123,0.05) 0%, transparent 50%);
}

.screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.screen.active { display: flex; }

/* START SCREEN */
#start-screen { gap: 12px; }
.game-title {
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(32px, 8vw, 56px);
  letter-spacing: 6px; color: var(--neon-cyan);
  text-shadow: 0 0 10px rgba(0,240,255,0.6), 0 0 40px rgba(0,240,255,0.2);
}
.subtitle {
  font-family: 'Rajdhani', sans-serif; font-weight: 300; font-size: clamp(14px, 3vw, 18px);
  letter-spacing: 2px; color: var(--text-mid); text-transform: uppercase; text-align: center; max-width: 340px;
}
.daily-label {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px;
  letter-spacing: 3px; color: var(--neon-gold); margin-top: 8px;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
.streak-display {
  font-family: 'Rajdhani', sans-serif; font-weight: 500; font-size: 16px;
  color: var(--neon-orange); margin-top: 4px;
}
.play-btn {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px;
  letter-spacing: 3px; padding: 14px 40px;
  border: 1px solid var(--neon-cyan); background: rgba(0,240,255,0.06);
  color: var(--neon-cyan); cursor: pointer; border-radius: 3px;
  text-transform: uppercase; margin-top: 16px; transition: all 0.2s;
}
.play-btn:hover { background: rgba(0,240,255,0.15); box-shadow: 0 0 20px rgba(0,240,255,0.2); transform: scale(1.04); }
#startLB { margin-top: 16px; width: 90%; max-width: 400px; }
.already-solved-msg {
  font-family: 'Rajdhani', sans-serif; font-weight: 500; font-size: 15px;
  color: var(--neon-green); margin-top: 8px;
}

/* GAME SCREEN */
#game-screen { gap: 8px; padding: 10px; }
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 400px; padding: 0 4px;
}
.timer {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: clamp(18px, 4vw, 24px);
  color: var(--neon-cyan); letter-spacing: 2px;
  text-shadow: 0 0 8px rgba(0,240,255,0.5);
}
.day-label {
  font-family: 'Orbitron', monospace; font-weight: 400; font-size: 11px;
  color: var(--text-dim); letter-spacing: 2px;
}

/* GRID */
.grid-container {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px;
  width: min(88vw, 88vh - 200px, 380px); aspect-ratio: 1;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px; padding: 3px;
}
.cell {
  aspect-ratio: 1; border-radius: 3px; cursor: pointer; position: relative;
  border: 1px solid rgba(255,255,255,0.08); transition: transform 0.1s, border-color 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.cell:hover { transform: scale(1.06); }
.cell.selected { border-color: #fff !important; box-shadow: 0 0 12px rgba(255,255,255,0.3); z-index: 2; }
.cell.locked { cursor: default; opacity: 1; }
.cell.locked::after {
  content: ''; position: absolute; top: 2px; right: 2px; width: 6px; height: 6px;
  background: rgba(255,255,255,0.35); border-radius: 50%;
}
.cell.conflict { animation: conflict-flash 0.4s ease 3; }
@keyframes conflict-flash {
  0%, 100% { border-color: rgba(255,255,255,0.08); }
  50% { border-color: var(--neon-pink); box-shadow: 0 0 14px rgba(255,45,123,0.5); }
}

.cell.c0 { background: rgba(0,240,255,0.25); border-color: rgba(0,240,255,0.3); box-shadow: inset 0 0 12px rgba(0,240,255,0.15); }
.cell.c1 { background: rgba(255,45,123,0.25); border-color: rgba(255,45,123,0.3); box-shadow: inset 0 0 12px rgba(255,45,123,0.15); }
.cell.c2 { background: rgba(57,255,20,0.25); border-color: rgba(57,255,20,0.3); box-shadow: inset 0 0 12px rgba(57,255,20,0.15); }
.cell.c3 { background: rgba(255,215,0,0.25); border-color: rgba(255,215,0,0.3); box-shadow: inset 0 0 12px rgba(255,215,0,0.15); }
.cell.c4 { background: rgba(180,77,255,0.25); border-color: rgba(180,77,255,0.3); box-shadow: inset 0 0 12px rgba(180,77,255,0.15); }
.cell.c5 { background: rgba(255,140,0,0.25); border-color: rgba(255,140,0,0.3); box-shadow: inset 0 0 12px rgba(255,140,0,0.15); }

.cell.locked.c0 { background: rgba(0,240,255,0.45); }
.cell.locked.c1 { background: rgba(255,45,123,0.45); }
.cell.locked.c2 { background: rgba(57,255,20,0.45); }
.cell.locked.c3 { background: rgba(255,215,0,0.45); }
.cell.locked.c4 { background: rgba(180,77,255,0.45); }
.cell.locked.c5 { background: rgba(255,140,0,0.45); }

/* COLOR PALETTE */
.palette {
  display: flex; gap: 6px; margin-top: 8px; align-items: center;
}
.palette-btn {
  width: clamp(36px, 9vw, 46px); height: clamp(36px, 9vw, 46px);
  border-radius: 4px; cursor: pointer; border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
}
.palette-btn:hover { transform: scale(1.12); }
.palette-btn.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); transform: scale(1.1); }
.palette-btn.p0 { background: rgba(0,240,255,0.5); border-color: rgba(0,240,255,0.4); }
.palette-btn.p1 { background: rgba(255,45,123,0.5); border-color: rgba(255,45,123,0.4); }
.palette-btn.p2 { background: rgba(57,255,20,0.5); border-color: rgba(57,255,20,0.4); }
.palette-btn.p3 { background: rgba(255,215,0,0.5); border-color: rgba(255,215,0,0.4); }
.palette-btn.p4 { background: rgba(180,77,255,0.5); border-color: rgba(180,77,255,0.4); }
.palette-btn.p5 { background: rgba(255,140,0,0.5); border-color: rgba(255,140,0,0.4); }
.palette-btn.p0.active { border-color: var(--neon-cyan); }
.palette-btn.p1.active { border-color: var(--neon-pink); }
.palette-btn.p2.active { border-color: var(--neon-green); }
.palette-btn.p3.active { border-color: var(--neon-gold); }
.palette-btn.p4.active { border-color: var(--neon-purple); }
.palette-btn.p5.active { border-color: var(--neon-orange); }
.eraser-btn {
  width: clamp(36px, 9vw, 46px); height: clamp(36px, 9vw, 46px);
  border-radius: 4px; cursor: pointer; border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: transform 0.15s, border-color 0.15s; color: var(--text-mid);
}
.eraser-btn:hover { transform: scale(1.12); }
.eraser-btn.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); transform: scale(1.1); }

/* COMPLETE SCREEN */
#complete-screen { gap: 14px; }
.complete-title {
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(28px, 7vw, 44px);
  letter-spacing: 4px; color: var(--neon-green);
  text-shadow: 0 0 10px rgba(57,255,20,0.6), 0 0 40px rgba(57,255,20,0.2);
}
.stat-row {
  display: flex; gap: 24px; margin-top: 4px;
}
.stat-item { text-align: center; }
.stat-value {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: clamp(22px, 5vw, 32px);
  color: var(--neon-cyan);
  text-shadow: 0 0 8px rgba(0,240,255,0.5);
}
.stat-label {
  font-family: 'Rajdhani', sans-serif; font-weight: 300; font-size: 12px;
  letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
}
.share-btn {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px;
  letter-spacing: 3px; padding: 12px 32px;
  border: 1px solid var(--neon-green); background: rgba(57,255,20,0.06);
  color: var(--neon-green); cursor: pointer; border-radius: 3px;
  text-transform: uppercase; transition: all 0.2s;
}
.share-btn:hover { background: rgba(57,255,20,0.15); box-shadow: 0 0 20px rgba(57,255,20,0.2); }
.share-copied {
  font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--neon-green);
  opacity: 0; transition: opacity 0.3s; height: 18px;
}
.countdown-label {
  font-family: 'Rajdhani', sans-serif; font-weight: 300; font-size: 13px;
  letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-top: 10px;
}
.countdown-time {
  font-family: 'Orbitron', monospace; font-weight: 700; font-size: 20px;
  color: var(--neon-purple); letter-spacing: 2px;
  text-shadow: 0 0 8px rgba(180,77,255,0.5);
}
#completeLB { margin-top: 10px; width: 90%; max-width: 400px; }

/* SHAKE */
@keyframes shake {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-3px, 1px); }
  40% { transform: translate(2px, -2px); }
  60% { transform: translate(-2px, 2px); }
  80% { transform: translate(3px, -1px); }
}
.shake { animation: shake 0.25s ease; }

/* PARTICLES */
.particle {
  position: fixed; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; z-index: 1000;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <div class="game-title">NEON GRID</div>
  <div class="subtitle">Fill the grid. One color per row and column.</div>
  <div class="daily-label" id="daily-label"></div>
  <div class="streak-display" id="start-streak"></div>
  <div class="already-solved-msg" id="already-solved" style="display:none"></div>
  <button class="play-btn" id="play-btn">PLAY TODAY</button>
  <div id="startLB"></div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <div class="day-label" id="game-day-label"></div>
    <div class="timer" id="timer">00:00</div>
  </div>
  <div class="grid-container" id="grid"></div>
  <div class="palette" id="palette"></div>
</div>

<!-- COMPLETE SCREEN -->
<div id="complete-screen" class="screen">
  <div class="complete-title">SOLVED</div>
  <div class="stat-row">
    <div class="stat-item">
      <div class="stat-value" id="final-time">00:00</div>
      <div class="stat-label">Time</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="final-streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
  </div>
  <button class="share-btn" id="share-btn">SHARE RESULT</button>
  <div class="share-copied" id="share-copied">Copied to clipboard!</div>
  <div id="completeLB"></div>
  <div class="countdown-label">NEXT PUZZLE IN</div>
  <div class="countdown-time" id="countdown">--:--:--</div>
</div>

<script src="/neon.js"></script>
<script>
(() => {
  // ===== CONFIG =====
  const GRID_SIZE = 6;
  const COLORS = [
    { name: 'cyan',   hex: '#00f0ff' },
    { name: 'pink',   hex: '#ff2d7b' },
    { name: 'green',  hex: '#39ff14' },
    { name: 'gold',   hex: '#ffd700' },
    { name: 'purple', hex: '#b44dff' },
    { name: 'orange', hex: '#ff8c00' }
  ];
  const SHARE_EMOJIS = ['🟦', '🩷', '🟩', '🟨', '🟪', '🟧'];
  const STORAGE_KEY = 'neonarcade_neondaily_neongrid';

  // ===== DOM =====
  const startScreen = document.getElementById('start-screen');
  const gameScreen = document.getElementById('game-screen');
  const completeScreen = document.getElementById('complete-screen');
  const gridEl = document.getElementById('grid');
  const paletteEl = document.getElementById('palette');
  const timerEl = document.getElementById('timer');
  const dailyLabel = document.getElementById('daily-label');
  const gameDayLabel = document.getElementById('game-day-label');
  const startStreak = document.getElementById('start-streak');
  const alreadySolved = document.getElementById('already-solved');
  const playBtn = document.getElementById('play-btn');
  const finalTimeEl = document.getElementById('final-time');
  const finalStreakEl = document.getElementById('final-streak');
  const shareBtn = document.getElementById('share-btn');
  const shareCopied = document.getElementById('share-copied');
  const countdownEl = document.getElementById('countdown');

  // ===== SEEDED PRNG =====
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function hashString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return h;
  }

  // ===== DATE UTILS =====
  function getTodayString() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function getDayNumber() {
    const epoch = new Date('2024-01-01').getTime();
    const now = new Date(getTodayString()).getTime();
    return Math.floor((now - epoch) / 86400000) + 1;
  }

  // ===== PUZZLE GENERATION =====
  function generatePuzzle(dateStr) {
    const rng = mulberry32(hashString('neongrid-' + dateStr));

    // Fisher-Yates shuffle with seeded rng
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Create valid Latin square: start with shifted identity, then shuffle rows and columns
    const base = [];
    for (let r = 0; r < GRID_SIZE; r++) {
      const row = [];
      for (let c = 0; c < GRID_SIZE; c++) {
        row.push((r + c) % GRID_SIZE);
      }
      base.push(row);
    }

    // Shuffle rows
    const rowOrder = shuffle([0, 1, 2, 3, 4, 5]);
    const shuffledRows = rowOrder.map(i => base[i]);

    // Shuffle columns
    const colOrder = shuffle([0, 1, 2, 3, 4, 5]);
    const solution = shuffledRows.map(row => colOrder.map(c => row[c]));

    // Permute symbols so the pattern isn't always the same structure
    const symbolPerm = shuffle([0, 1, 2, 3, 4, 5]);
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        solution[r][c] = symbolPerm[solution[r][c]];
      }
    }

    // Select clue cells (8-12)
    const numClues = 8 + Math.floor(rng() * 5); // 8 to 12
    const allCells = [];
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        allCells.push([r, c]);
      }
    }
    const shuffledCells = shuffle(allCells);

    // Ensure at least one clue per row and column
    const clueSet = new Set();
    const rowHasClue = new Array(GRID_SIZE).fill(false);
    const colHasClue = new Array(GRID_SIZE).fill(false);

    // First pass: guarantee coverage
    for (const [r, c] of shuffledCells) {
      if (!rowHasClue[r] || !colHasClue[c]) {
        clueSet.add(r * GRID_SIZE + c);
        rowHasClue[r] = true;
        colHasClue[c] = true;
      }
      if (clueSet.size >= GRID_SIZE) break;
    }

    // Fill up to numClues
    for (const [r, c] of shuffledCells) {
      if (clueSet.size >= numClues) break;
      clueSet.add(r * GRID_SIZE + c);
    }

    const clues = [];
    for (let r = 0; r < GRID_SIZE; r++) {
      const row = [];
      for (let c = 0; c < GRID_SIZE; c++) {
        row.push(clueSet.has(r * GRID_SIZE + c) ? solution[r][c] : -1);
      }
      clues.push(row);
    }

    return { solution, clues };
  }

  // ===== GAME STATE =====
  let solution = null;
  let clues = null;
  let grid = null; // current player grid, -1 = empty
  let locked = null; // boolean 6x6
  let selectedColor = 0; // 0-5, or -1 for eraser
  let selectedCell = null; // [r, c] or null
  let timerStart = 0;
  let timerInterval = null;
  let elapsed = 0;
  let solved = false;
  let dayNum = 0;
  let todayStr = '';

  // ===== AUDIO =====
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playPlace() {
    try {
      const ctx = getAudioCtx();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = 600;
      o.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(); o.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  function playError() {
    try {
      const ctx = getAudioCtx();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'square'; o.frequency.value = 150;
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(); o.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function playVictory() {
    try {
      const ctx = getAudioCtx();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
        g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.12 + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
        o.start(ctx.currentTime + i * 0.12);
        o.stop(ctx.currentTime + i * 0.12 + 0.3);
      });
    } catch(e) {}
  }

  // ===== PARTICLES =====
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = color;
      p.style.boxShadow = '0 0 6px ' + color;
      document.body.appendChild(p);
      const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      const speed = 40 + Math.random() * 60;
      const dx = Math.cos(angle) * speed;
      const dy = Math.sin(angle) * speed;
      let ox = 0, oy = 0, op = 1;
      const start = performance.now();
      function animP(now) {
        const t = (now - start) / 500;
        if (t > 1) { p.remove(); return; }
        ox += dx * 0.016; oy += dy * 0.016 + t * 2; op = 1 - t;
        p.style.transform = `translate(${ox}px, ${oy}px)`;
        p.style.opacity = op;
        requestAnimationFrame(animP);
      }
      requestAnimationFrame(animP);
    }
  }

  // ===== STORAGE =====
  function getStore() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
  }
  function setStore(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getStreak() {
    const store = getStore();
    return store.streak || 0;
  }

  function getLastSolvedDay() {
    const store = getStore();
    return store.lastSolvedDay || 0;
  }

  function getSolvedToday() {
    return getLastSolvedDay() === getDayNumber();
  }

  function getTodaySolveTime() {
    const store = getStore();
    if (store.lastSolvedDay === getDayNumber()) return store.lastSolveTime || 0;
    return 0;
  }

  function saveSolve(time) {
    const store = getStore();
    const day = getDayNumber();
    const yesterday = day - 1;
    if (store.lastSolvedDay === yesterday) {
      store.streak = (store.streak || 0) + 1;
    } else if (store.lastSolvedDay !== day) {
      store.streak = 1;
    }
    store.lastSolvedDay = day;
    store.lastSolveTime = time;
    // Save progress
    store.savedGrid = null;
    store.savedElapsed = null;
    store.savedDay = null;
    setStore(store);
  }

  function saveProgress() {
    if (solved) return;
    const store = getStore();
    store.savedGrid = grid;
    store.savedElapsed = elapsed;
    store.savedDay = getDayNumber();
    setStore(store);
  }

  function loadProgress() {
    const store = getStore();
    if (store.savedDay === getDayNumber() && store.savedGrid) {
      return { grid: store.savedGrid, elapsed: store.savedElapsed || 0 };
    }
    return null;
  }

  // ===== TIME FORMAT =====
  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  // ===== NEON.JS INIT =====
  Neon.init({
    game: 'neon-grid',
    mode: 'low',
    key: 'neonarcade_neondaily_neongrid_scores',
    formatScore: function(s) {
      var m = Math.floor(s / 60);
      var sec = Math.floor(s % 60);
      return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    }
  });

  // ===== SCREENS =====
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ===== RENDER GRID =====
  function buildGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        if (locked[r][c]) cell.classList.add('locked');
        cell.addEventListener('click', () => onCellClick(r, c));
        cell.addEventListener('touchstart', (e) => { e.preventDefault(); onCellClick(r, c); }, { passive: false });
        gridEl.appendChild(cell);
      }
    }
    updateGridDisplay();
  }

  function updateGridDisplay() {
    const cells = gridEl.querySelectorAll('.cell');
    cells.forEach(cell => {
      const r = +cell.dataset.r;
      const c = +cell.dataset.c;
      const v = grid[r][c];
      // Remove all color classes
      for (let i = 0; i < GRID_SIZE; i++) cell.classList.remove('c' + i);
      cell.classList.remove('conflict');
      if (v >= 0) cell.classList.add('c' + v);
      // Selected highlight
      if (selectedCell && selectedCell[0] === r && selectedCell[1] === c) {
        cell.classList.add('selected');
      } else {
        cell.classList.remove('selected');
      }
    });
  }

  // ===== CONFLICT CHECK =====
  function findConflicts() {
    const conflicts = new Set();
    // Check rows
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c1 = 0; c1 < GRID_SIZE; c1++) {
        if (grid[r][c1] < 0) continue;
        for (let c2 = c1 + 1; c2 < GRID_SIZE; c2++) {
          if (grid[r][c1] === grid[r][c2]) {
            conflicts.add(r * GRID_SIZE + c1);
            conflicts.add(r * GRID_SIZE + c2);
          }
        }
      }
    }
    // Check columns
    for (let c = 0; c < GRID_SIZE; c++) {
      for (let r1 = 0; r1 < GRID_SIZE; r1++) {
        if (grid[r1][c] < 0) continue;
        for (let r2 = r1 + 1; r2 < GRID_SIZE; r2++) {
          if (grid[r1][c] === grid[r2][c]) {
            conflicts.add(r1 * GRID_SIZE + c);
            conflicts.add(r2 * GRID_SIZE + c);
          }
        }
      }
    }
    return conflicts;
  }

  function highlightConflicts(conflicts) {
    const cells = gridEl.querySelectorAll('.cell');
    cells.forEach(cell => {
      const r = +cell.dataset.r;
      const c = +cell.dataset.c;
      cell.classList.remove('conflict');
      if (conflicts.has(r * GRID_SIZE + c)) {
        // Force reflow to restart animation
        void cell.offsetWidth;
        cell.classList.add('conflict');
      }
    });
  }

  // ===== CHECK WIN =====
  function checkWin() {
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        if (grid[r][c] < 0) return false;
      }
    }
    return findConflicts().size === 0;
  }

  // ===== CELL CLICK =====
  function onCellClick(r, c) {
    if (solved) return;
    if (locked[r][c]) return;

    // If a color (or eraser) is selected in palette, place it directly
    if (selectedColor >= 0) {
      placeColor(r, c, selectedColor);
    } else if (selectedColor === -1) {
      // Eraser
      placeColor(r, c, -1);
    }
  }

  function placeColor(r, c, color) {
    if (locked[r][c]) return;
    const old = grid[r][c];
    grid[r][c] = color;
    updateGridDisplay();

    if (color >= 0) {
      const conflicts = findConflicts();
      if (conflicts.size > 0) {
        highlightConflicts(conflicts);
        playError();
        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 250);
      } else {
        playPlace();
        // Particle effect
        const cellEl = gridEl.children[r * GRID_SIZE + c];
        const rect = cellEl.getBoundingClientRect();
        spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, COLORS[color].hex, 8);
      }
    }

    saveProgress();

    // Check win
    if (checkWin()) {
      onWin();
    }
  }

  // ===== PALETTE =====
  function buildPalette() {
    paletteEl.innerHTML = '';
    for (let i = 0; i < GRID_SIZE; i++) {
      const btn = document.createElement('div');
      btn.className = 'palette-btn p' + i;
      if (i === selectedColor) btn.classList.add('active');
      btn.addEventListener('click', () => selectPalette(i));
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); selectPalette(i); }, { passive: false });
      paletteEl.appendChild(btn);
    }
    const eraser = document.createElement('div');
    eraser.className = 'eraser-btn';
    eraser.textContent = '✕';
    if (selectedColor === -1) eraser.classList.add('active');
    eraser.addEventListener('click', () => selectPalette(-1));
    eraser.addEventListener('touchstart', (e) => { e.preventDefault(); selectPalette(-1); }, { passive: false });
    paletteEl.appendChild(eraser);
  }

  function selectPalette(colorIdx) {
    selectedColor = colorIdx;
    // Update active state
    const btns = paletteEl.querySelectorAll('.palette-btn, .eraser-btn');
    btns.forEach(b => b.classList.remove('active'));
    if (colorIdx >= 0) {
      paletteEl.children[colorIdx].classList.add('active');
    } else {
      paletteEl.lastChild.classList.add('active');
    }
  }

  // ===== KEYBOARD =====
  document.addEventListener('keydown', (e) => {
    if (solved) return;
    const key = e.key;
    if (key >= '1' && key <= '6') {
      selectPalette(parseInt(key) - 1);
      e.preventDefault();
    } else if (key === '0' || key === 'Backspace' || key === 'Delete') {
      selectPalette(-1);
      e.preventDefault();
    }
  });

  // ===== TIMER =====
  function startTimer(initialElapsed) {
    elapsed = initialElapsed || 0;
    timerStart = performance.now() - elapsed * 1000;
    timerEl.textContent = formatTime(elapsed);
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      elapsed = (performance.now() - timerStart) / 1000;
      timerEl.textContent = formatTime(elapsed);
    }, 200);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    elapsed = (performance.now() - timerStart) / 1000;
  }

  // ===== WIN =====
  function onWin() {
    solved = true;
    stopTimer();
    playVictory();

    const solveTime = Math.round(elapsed);
    saveSolve(solveTime);

    // Particles celebration
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight * 0.5;
        spawnParticles(x, y, COLORS[i].hex, 12);
      }, i * 150);
    }

    setTimeout(() => {
      showComplete(solveTime);
    }, 800);
  }

  function showComplete(solveTime) {
    finalTimeEl.textContent = formatTime(solveTime);
    finalStreakEl.textContent = getStreak();
    showScreen('complete-screen');

    // Neon.js save
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(solveTime);
    }).then(function(result) {
      Neon.render(document.getElementById('completeLB'));
      if (result && result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    });

    startCountdown();
  }

  // ===== SHARE =====
  shareBtn.addEventListener('click', () => {
    const solveTime = getTodaySolveTime();
    const streak = getStreak();

    // Build grid emoji representation
    let gridStr = '';
    for (let r = 0; r < GRID_SIZE; r++) {
      for (let c = 0; c < GRID_SIZE; c++) {
        gridStr += SHARE_EMOJIS[solution[r][c]];
      }
      if (r < GRID_SIZE - 1) gridStr += '\n';
    }

    const text = `🟦🟩🟨🟪🟧🩷 NEON GRID #${dayNum}\n⏱️ ${formatTime(solveTime)}\n🔥 Streak: ${streak}\nneonarcade.net/neondaily/neon-grid.html`;

    if (navigator.share) {
      navigator.share({ text }).catch(() => {
        navigator.clipboard.writeText(text).then(() => flashCopied());
      });
    } else {
      navigator.clipboard.writeText(text).then(() => flashCopied());
    }
  });

  function flashCopied() {
    shareCopied.style.opacity = '1';
    setTimeout(() => { shareCopied.style.opacity = '0'; }, 2000);
  }

  // ===== COUNTDOWN =====
  let countdownInterval = null;
  function startCountdown() {
    clearInterval(countdownInterval);
    function update() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      const diff = Math.max(0, Math.floor((tomorrow - now) / 1000));
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      countdownEl.textContent = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }
    update();
    countdownInterval = setInterval(update, 1000);
  }

  // ===== INIT =====
  function init() {
    todayStr = getTodayString();
    dayNum = getDayNumber();

    dailyLabel.textContent = 'PUZZLE #' + dayNum;
    gameDayLabel.textContent = 'PUZZLE #' + dayNum;

    const streak = getStreak();
    startStreak.textContent = streak > 0 ? '🔥 Streak: ' + streak : '';

    // Check if already solved today
    if (getSolvedToday()) {
      const t = getTodaySolveTime();
      alreadySolved.textContent = '✓ Solved today in ' + formatTime(t);
      alreadySolved.style.display = 'block';
      playBtn.textContent = 'VIEW PUZZLE';
    } else {
      alreadySolved.style.display = 'none';
      playBtn.textContent = 'PLAY TODAY';
    }

    // Generate puzzle
    const puzzle = generatePuzzle(todayStr);
    solution = puzzle.solution;
    clues = puzzle.clues;

    // Render start leaderboard
    Neon.render(document.getElementById('startLB'));
  }

  function startGame() {
    solved = false;
    selectedColor = 0;
    selectedCell = null;

    // Init grid from clues
    locked = [];
    grid = [];
    for (let r = 0; r < GRID_SIZE; r++) {
      const gr = [];
      const lr = [];
      for (let c = 0; c < GRID_SIZE; c++) {
        gr.push(clues[r][c]);
        lr.push(clues[r][c] >= 0);
      }
      grid.push(gr);
      locked.push(lr);
    }

    // Check for saved progress
    const progress = loadProgress();
    let initialElapsed = 0;
    if (progress && !getSolvedToday()) {
      // Restore grid (only non-locked cells)
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (!locked[r][c] && progress.grid[r] && progress.grid[r][c] !== undefined) {
            grid[r][c] = progress.grid[r][c];
          }
        }
      }
      initialElapsed = progress.elapsed || 0;
    }

    // If already solved, show completed grid
    if (getSolvedToday()) {
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          grid[r][c] = solution[r][c];
          locked[r][c] = true;
        }
      }
      solved = true;
    }

    buildGrid();
    buildPalette();
    showScreen('game-screen');

    if (!solved) {
      startTimer(initialElapsed);
    } else {
      timerEl.textContent = formatTime(getTodaySolveTime());
    }
  }

  // ===== EVENT LISTENERS =====
  playBtn.addEventListener('click', () => {
    startGame();
  });

  // ===== RUN =====
  init();
})();
</script>
</body>
