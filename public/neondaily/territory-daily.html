@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

.end-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

<div id="startScreen" class="screen active">

  </div>

  </div>

  <div id="endLB"></div>
</div>

<script src="/neon.js"></script>
<script>
(() => {
  // ====== CONFIG ======
  const GRID_SIZE = 8;
  const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
  const COLORS = ['cyan', 'pink', 'green', 'gold'];
  const COLOR_MAP = {
    cyan: { hex: '#00f0ff', rgb: [0,240,255], emoji: '\u{1f7e6}' },
    pink: { hex: '#ff2d7b', rgb: [255,45,123], emoji: '\u{1f7ea}' },
    green: { hex: '#39ff14', rgb: [57,255,20], emoji: '\u{1f7e9}' },
    gold: { hex: '#ffd700', rgb: [255,215,0], emoji: '\u{1f7e8}' }
  };
  const STORAGE_KEY_PREFIX = 'territory_daily_';

  // ====== SEEDED PRNG ======
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function getDayNumber() {
    var epoch = new Date(2024, 0, 1);
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return Math.floor((today - epoch) / 86400000);
  }

  function getDateStr() {
    var now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  }

  function generateRevealOrder(dayNum) {
    var rng = mulberry32(dayNum * 31337 + 42);
    var arr = [];
    for (var i = 0; i < TOTAL_CELLS; i++) arr.push(i);
    // Fisher-Yates shuffle
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // ====== AUDIO ======
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playPlace() {
    try {
      var ctx = getAudioCtx();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.12);
    } catch(e) {}
  }

  function playMerge() {
    try {
      var ctx = getAudioCtx();
      [440, 660, 880].forEach(function(freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.06);
        gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.06);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.15);
        osc.start(ctx.currentTime + i * 0.06);
        osc.stop(ctx.currentTime + i * 0.06 + 0.15);
      });
    } catch(e) {}
  }

  function playComplete() {
    try {
      var ctx = getAudioCtx();
      [523, 659, 784, 1047].forEach(function(freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
        gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.3);
      });
    } catch(e) {}
  }

  // ====== DOM REFS ======
  var startScreen = document.getElementById('startScreen');
  var gameScreen = document.getElementById('gameScreen');
  var endScreen = document.getElementById('endScreen');
  var playBtn = document.getElementById('playBtn');
  var gameGrid = document.getElementById('gameGrid');
  var cellCounter = document.getElementById('cellCounter');
  var scoreLive = document.getElementById('scoreLive');
  var territoryScoresEl = document.getElementById('territoryScores');
  var endGrid = document.getElementById('endGrid');
  var scoreBreakdown = document.getElementById('scoreBreakdown');
  var finalScoreEl = document.getElementById('finalScore');
  var shareBtn = document.getElementById('shareBtn');
  var copiedMsg = document.getElementById('copiedMsg');
  var startStreak = document.getElementById('startStreak');
  var endStreak = document.getElementById('endStreak');
  var alreadyPlayed = document.getElementById('alreadyPlayed');
  var countdownTimeEl = document.getElementById('countdownTime');

  // ====== GAME STATE ======
  var grid = []; // 2D array [row][col] = null | 'cyan' | 'pink' | 'green' | 'gold'
  var revealOrder = [];
  var currentStep = 0;
  var dayNumber = 0;
  var dateStr = '';
  var gameActive = false;

  // ====== TERRITORY CALC ======
  function calcTerritories() {
    var visited = [];
    for (var r = 0; r < GRID_SIZE; r++) {
      visited[r] = [];
      for (var c = 0; c < GRID_SIZE; c++) visited[r][c] = false;
    }
    var largest = { cyan: 0, pink: 0, green: 0, gold: 0 };

    for (var r = 0; r < GRID_SIZE; r++) {
      for (var c = 0; c < GRID_SIZE; c++) {
        if (visited[r][c] || !grid[r][c]) continue;
        var color = grid[r][c];
        var size = 0;
        var stack = [[r, c]];
        visited[r][c] = true;
        while (stack.length) {
          var p = stack.pop();
          size++;
          var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
          for (var d = 0; d < dirs.length; d++) {
            var nr = p[0] + dirs[d][0], nc = p[1] + dirs[d][1];
            if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && !visited[nr][nc] && grid[nr][nc] === color) {
              visited[nr][nc] = true;
              stack.push([nr, nc]);
            }
          }
        }
        if (size > largest[color]) largest[color] = size;
      }
    }
    return largest;
  }

  function calcScore() {
    var t = calcTerritories();
    return t.cyan + t.pink + t.green + t.gold;
  }

  // ====== STREAK ======
  function getStreakData() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY_PREFIX + 'streak'));
      if (d && typeof d.count === 'number') return d;
    } catch(e) {}
    return { count: 0, lastDate: '' };
  }

  function updateStreak(dateStr) {
    var sd = getStreakData();
    var yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    var yStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0');

    if (sd.lastDate === dateStr) return sd.count; // already updated today
    if (sd.lastDate === yStr) {
      sd.count++;
    } else {
      sd.count = 1;
    }
    sd.lastDate = dateStr;
    localStorage.setItem(STORAGE_KEY_PREFIX + 'streak', JSON.stringify(sd));
    return sd.count;
  }

  function getStreak() {
    var sd = getStreakData();
    var today = getDateStr();
    var yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    var yStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0');
    if (sd.lastDate === today || sd.lastDate === yStr) return sd.count;
    return 0;
  }

  // ====== DAILY RESULT STORAGE ======
  function getTodayResult() {
    try {
      var d = JSON.parse(localStorage.getItem(STORAGE_KEY_PREFIX + 'result_' + getDateStr()));
      return d;
    } catch(e) { return null; }
  }

  function saveTodayResult(score, territories, gridData) {
    var obj = { score: score, territories: territories, grid: gridData, date: getDateStr() };
    localStorage.setItem(STORAGE_KEY_PREFIX + 'result_' + getDateStr(), JSON.stringify(obj));
  }

  // ====== GRID RENDERING ======
  function buildGrid(container, interactive) {
    container.innerHTML = '';
    for (var i = 0; i < TOTAL_CELLS; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell unrevealed';
      cell.dataset.index = i;
      container.appendChild(cell);
    }
  }

  function updateGridDisplay() {
    var cells = gameGrid.children;
    for (var i = 0; i < TOTAL_CELLS; i++) {
      var r = Math.floor(i / GRID_SIZE), c = i % GRID_SIZE;
      var cell = cells[i];
      cell.className = 'cell';
      if (grid[r][c]) {
        cell.classList.add('color-' + grid[r][c]);
      } else if (currentStep < TOTAL_CELLS && revealOrder[currentStep] === i) {
        cell.classList.add('revealed-current');
      } else {
        cell.classList.add('unrevealed');
      }
    }
  }

  function updateScoreDisplay() {
    var t = calcTerritories();
    var total = t.cyan + t.pink + t.green + t.gold;
    scoreLive.textContent = 'SCORE: ' + total;
    territoryScoresEl.innerHTML =
      '<span class="ts-cyan">C:' + t.cyan + '</span>' +
      '<span class="ts-pink">P:' + t.pink + '</span>' +
      '<span class="ts-green">G:' + t.green + '</span>' +
      '<span class="ts-gold">D:' + t.gold + '</span>';
  }

  // ====== PLACE COLOR ======
  function placeColor(colorName) {
    if (!gameActive || currentStep >= TOTAL_CELLS) return;
    var idx = revealOrder[currentStep];
    var r = Math.floor(idx / GRID_SIZE), c = idx % GRID_SIZE;
    grid[r][c] = colorName;

    // Check if this forms/extends a territory
    var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    var merges = false;
    for (var d = 0; d < dirs.length; d++) {
      var nr = r + dirs[d][0], nc = c + dirs[d][1];
      if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc] === colorName) {
        merges = true; break;
      }
    }

    if (merges) {
      playMerge();
      // Flash merged neighbors
      var cell = gameGrid.children[idx];
      cell.classList.add('merge-flash');
      setTimeout(function() { cell.classList.remove('merge-flash'); }, 300);
    } else {
      playPlace();
    }

    currentStep++;
    cellCounter.textContent = 'CELL ' + Math.min(currentStep + 1, TOTAL_CELLS) + '/' + TOTAL_CELLS;
    updateGridDisplay();
    updateScoreDisplay();

    if (currentStep >= TOTAL_CELLS) {
      gameActive = false;
      setTimeout(finishGame, 600);
    }
  }

  // ====== FINISH GAME ======
  function finishGame() {
    playComplete();
    var t = calcTerritories();
    var total = t.cyan + t.pink + t.green + t.gold;
    var streak = updateStreak(dateStr);

    // Save grid data for result storage
    var gridData = [];
    for (var r = 0; r < GRID_SIZE; r++) {
      gridData[r] = [];
      for (var c = 0; c < GRID_SIZE; c++) gridData[r][c] = grid[r][c];
    }
    saveTodayResult(total, t, gridData);

    showEndScreen(total, t, streak, gridData);

    // Neon.js
    var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
    nameReady.then(function() {
      return Neon.save(total);
    }).then(function(result) {
      Neon.render(document.getElementById('endLB'));
      if (result.globalRank >= 1 && result.globalRank <= 5) {
        Neon.showGlobalSplash(result.globalRank);
      }
    }).catch(function() {
      Neon.render(document.getElementById('endLB'));
    });
  }

  function showEndScreen(total, territories, streak, gridData) {
    showScreen('end');

    // Render end grid
    endGrid.innerHTML = '';
    for (var r = 0; r < GRID_SIZE; r++) {
      for (var c = 0; c < GRID_SIZE; c++) {
        var cell = document.createElement('div');
        cell.className = 'end-cell color-' + (gridData[r][c] || 'cyan');
        endGrid.appendChild(cell);
      }
    }

    // Score breakdown
    scoreBreakdown.innerHTML = '';
    COLORS.forEach(function(color) {
      var row = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML =
        '<div class="color-label"><div class="color-dot" style="background:' + COLOR_MAP[color].hex + '"></div>' +
        '<span style="color:' + COLOR_MAP[color].hex + '">' + color.toUpperCase() + '</span></div>' +
        '<span style="color:' + COLOR_MAP[color].hex + '">' + territories[color] + '</span>';
      scoreBreakdown.appendChild(row);
    });

    finalScoreEl.textContent = total;
    endStreak.textContent = streak > 0 ? 'STREAK: ' + streak + ' \uD83D\uDD25' : '';

    startCountdown();
  }

  // ====== SHARE ======
  function buildShareText() {
    var result = getTodayResult();
    if (!result) return '';
    var t = result.territories;
    var streak = getStreak();
    var text = '\uD83D\uDDFA\uFE0F TERRITORY DAILY #' + dayNumber + '\n';
    text += COLOR_MAP.cyan.emoji + ' ' + t.cyan + ' ';
    text += COLOR_MAP.green.emoji + ' ' + t.green + ' ';
    text += COLOR_MAP.gold.emoji + ' ' + t.gold + ' ';
    text += COLOR_MAP.pink.emoji + ' ' + t.pink + '\n';
    text += 'Score: ' + result.score;
    if (streak > 0) text += ' \u00B7 Streak: ' + streak + ' \uD83D\uDD25';
    text += '\nneonarcade.net/neondaily/territory-daily.html';
    return text;
  }

  shareBtn.addEventListener('click', function() {
    var text = buildShareText();
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  });

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      copiedMsg.textContent = 'COPIED TO CLIPBOARD!';
      setTimeout(function() { copiedMsg.textContent = ''; }, 2500);
    }).catch(function() {
      copiedMsg.textContent = 'COULD NOT COPY';
      setTimeout(function() { copiedMsg.textContent = ''; }, 2500);
    });
  }

  // ====== COUNTDOWN ======
  var countdownInterval = null;
  function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    function tick() {
      var now = new Date();
      var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      var diff = tomorrow - now;
      var h = Math.floor(diff / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var s = Math.floor((diff % 60000) / 1000);
      countdownTimeEl.textContent =
        String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }
    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  // ====== SCREEN MANAGEMENT ======
  function showScreen(name) {
    startScreen.classList.remove('active');
    gameScreen.classList.remove('active');
    endScreen.classList.remove('active');
    if (name === 'start') startScreen.classList.add('active');
    else if (name === 'game') gameScreen.classList.add('active');
    else if (name === 'end') endScreen.classList.add('active');
  }

  // ====== START GAME ======
  function startGame() {
    dayNumber = getDayNumber();
    dateStr = getDateStr();
    revealOrder = generateRevealOrder(dayNumber);

    // Init grid
    grid = [];
    for (var r = 0; r < GRID_SIZE; r++) {
      grid[r] = [];
      for (var c = 0; c < GRID_SIZE; c++) grid[r][c] = null;
    }
    currentStep = 0;
    gameActive = true;

    buildGrid(gameGrid, true);
    cellCounter.textContent = 'CELL 1/' + TOTAL_CELLS;
    scoreLive.textContent = 'SCORE: 0';
    updateGridDisplay();
    updateScoreDisplay();
    showScreen('game');
  }

  // ====== INIT ======
  function init() {
    dayNumber = getDayNumber();
    dateStr = getDateStr();

    // Init Neon.js
    Neon.init({
      game: 'territory-daily',
      mode: 'high',
      key: 'neonarcade_neondaily_territorydaily_scores'
    });

    // Show streak
    var streak = getStreak();
    if (streak > 0) {
      startStreak.textContent = 'STREAK: ' + streak + ' \uD83D\uDD25';
    } else {
      startStreak.textContent = '';
    }

    // Check if already played today
    var todayResult = getTodayResult();
    if (todayResult) {
      alreadyPlayed.style.display = 'block';
      alreadyPlayed.textContent = 'TODAY\'S SCORE: ' + todayResult.score + ' \u2014 COME BACK TOMORROW!';
      playBtn.textContent = 'VIEW RESULT';
      playBtn.onclick = function() {
        var t = todayResult.territories;
        showEndScreen(todayResult.score, t, getStreak(), todayResult.grid);
      };
    } else {
      alreadyPlayed.style.display = 'none';
      playBtn.textContent = 'PLAY TODAY';
      playBtn.onclick = startGame;
    }

    // Render start leaderboard
    Neon.render(document.getElementById('startLB'));
  }

  // ====== INPUT HANDLERS ======
  // Color buttons
  document.querySelectorAll('.color-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      placeColor(btn.dataset.color);
    });
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (!gameActive) return;
    var key = e.key;
    if (key === '1' || key === 'q' || key === 'Q') placeColor('cyan');
    else if (key === '2' || key === 'w' || key === 'W') placeColor('pink');
    else if (key === '3' || key === 'e' || key === 'E') placeColor('green');
    else if (key === '4' || key === 'r' || key === 'R') placeColor('gold');
  });

  // ====== START ======
  init();
})();
</script>
</body>
