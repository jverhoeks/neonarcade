<script src="/neon.js"></script>
<script>
(function() {
  'use strict';

  // ===================== CONFIG =====================
  var STAGES = [
    { minRound: 1,  maxRound: 5,  size: 3, time: 5000 },
    { minRound: 6,  maxRound: 10, size: 4, time: 4500 },
    { minRound: 11, maxRound: 15, size: 5, time: 4000 },
    { minRound: 16, maxRound: 20, size: 6, time: 3500 },
    { minRound: 21, maxRound: 25, size: 7, time: 3000 },
    { minRound: 26, maxRound: Infinity, size: 8, time: 2500 }
  ];

  var NEON_COLORS = [
    '#00f0ff', '#39ff14', '#ffd700', '#ff2d7b',
    '#b44dff', '#ff8c00', '#ff4444', '#44ffcc',
    '#ff66b2', '#66ccff', '#ccff66', '#ff9966'
  ];

  var SHAPES = ['circle', 'square', 'triangle', 'diamond', 'star', 'cross'];
  var SYMBOLS = ['\u2605', '\u25CF', '\u25B2', '\u25A0', '\u25C6', '\u2726', '\u25AC', '\u2B22'];
  var CONTENT_TYPES = ['color', 'number', 'shape', 'symbol'];

  // ===================== DOM REFS =====================
  var startScreen = document.getElementById('startScreen');
  var gameScreen = document.getElementById('gameScreen');
  var endScreen = document.getElementById('endScreen');
  var startBtn = document.getElementById('startBtn');
  var restartBtn = document.getElementById('restartBtn');
  var shareBtn = document.getElementById('shareBtn');
  var roundNum = document.getElementById('roundNum');
  var gridSizeEl = document.getElementById('gridSize');
  var scoreDisplay = document.getElementById('scoreDisplay');
  var timerBar = document.getElementById('timerBar');
  var gridLeft = document.getElementById('gridLeft');
  var gridRight = document.getElementById('gridRight');
  var endReason = document.getElementById('endReason');
  var statRounds = document.getElementById('statRounds');
  var statMaxGrid = document.getElementById('statMaxGrid');
  var statAvgTime = document.getElementById('statAvgTime');
  var statBestTime = document.getElementById('statBestTime');

  // ===================== AUDIO =====================
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function playTone(freq, dur, type, vol) {
    ensureAudio();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }
  function sndCorrect() { playTone(660, 0.12, 'square', 0.07); setTimeout(function() { playTone(880, 0.15, 'square', 0.06); }, 80); }
  function sndWrong() { playTone(200, 0.25, 'sawtooth', 0.08); playTone(150, 0.3, 'sawtooth', 0.06); }
  function sndTimeout() { playTone(300, 0.15, 'triangle', 0.07); setTimeout(function() { playTone(200, 0.2, 'triangle', 0.06); }, 120); setTimeout(function() { playTone(120, 0.3, 'triangle', 0.05); }, 240); }
  function sndRoundStart() { playTone(440, 0.08, 'sine', 0.05); }
  function sndGameOver() { playTone(400, 0.15, 'square', 0.06); setTimeout(function() { playTone(300, 0.15, 'square', 0.06); }, 150); setTimeout(function() { playTone(200, 0.3, 'sawtooth', 0.07); }, 300); }

  // ===================== GAME STATE =====================
  var round = 0;
  var score = 0;
  var timerDuration = 0;
  var timerRAF = null;
  var roundActive = false;
  var currentSize = 3;
  var diffRow = 0;
  var diffCol = 0;
  var responseTimes = [];
  var roundStartTime = 0;
  var maxGridReached = 3;
  var gameEnded = false;
  var timerStartStamp = 0;

  // ===================== NEON INIT =====================
  Neon.init({
    game: 'gridmatch',
    mode: 'high',
    key: 'neonarcade_neongrind_gridmatch_scores'
  });
  Neon.render(document.getElementById('startLB'));

  // ===================== SCREENS =====================
  function showScreen(screen) {
    startScreen.classList.remove('active');
    gameScreen.classList.remove('active');
    endScreen.classList.remove('active');
    screen.classList.add('active');
  }

  // ===================== UTILITY =====================
  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function shuffle(arr) { for (var i = arr.length - 1; i > 0; i--) { var j = randInt(0, i); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

  function getStage(r) {
    for (var i = 0; i < STAGES.length; i++) {
      if (r >= STAGES[i].minRound && r <= STAGES[i].maxRound) return STAGES[i];
    }
    return STAGES[STAGES.length - 1];
  }

  // ===================== GRID SIZING =====================
  function getCellSize(size) {
    var ww = window.innerWidth;
    var wh = window.innerHeight;
    var isNarrow = ww <= 560;
    var maxGridW, maxGridH;
    if (isNarrow) {
      maxGridW = ww - 40;
      maxGridH = (wh - 140) / 2 - 30;
    } else {
      maxGridW = (Math.min(ww, 740) - 60) / 2;
      maxGridH = wh - 120;
    }
    var gap = 3;
    var pad = 8;
    var cellW = Math.floor((maxGridW - pad - (size - 1) * gap) / size);
    var cellH = Math.floor((maxGridH - pad - (size - 1) * gap) / size);
    var cellSize = Math.min(cellW, cellH, 80);
    return Math.max(cellSize, 24);
  }

  // ===================== CONTENT GENERATORS =====================
  function genColorContent(size, diffR, diffC, roundNum) {
    var baseColor = pick(NEON_COLORS);
    var r = parseInt(baseColor.slice(1, 3), 16);
    var g = parseInt(baseColor.slice(3, 5), 16);
    var b = parseInt(baseColor.slice(5, 7), 16);
    // Shift decreases with rounds for subtler differences
    var shift = Math.max(15, 60 - roundNum * 2);
    var dr = randInt(-shift, shift);
    var dg = randInt(-shift, shift);
    var db = randInt(-shift, shift);
    // Ensure minimum perceptible difference
    if (Math.abs(dr) + Math.abs(dg) + Math.abs(db) < shift) {
      dr = dr >= 0 ? shift : -shift;
    }
    var nr = Math.min(255, Math.max(0, r + dr));
    var ng = Math.min(255, Math.max(0, g + dg));
    var nb = Math.min(255, Math.max(0, b + db));
    var diffColor = '#' + ((1 << 24) + (nr << 16) + (ng << 8) + nb).toString(16).slice(1);
    var cells = [];
    for (var row = 0; row < size; row++) {
      cells[row] = [];
      for (var col = 0; col < size; col++) {
        var isDiff = (row === diffR && col === diffC);
        cells[row][col] = {
          type: 'color',
          value: isDiff ? diffColor : baseColor,
          base: baseColor
        };
      }
    }
    return cells;
  }

  function genNumberContent(size, diffR, diffC) {
    var cells = [];
    var baseNums = [];
    for (var i = 0; i < size * size; i++) {
      baseNums.push(randInt(1, 9));
    }
    var diffIdx = diffR * size + diffC;
    var diffNum = baseNums[diffIdx];
    var newNum;
    do { newNum = randInt(1, 9); } while (newNum === diffNum);

    for (var row = 0; row < size; row++) {
      cells[row] = [];
      for (var col = 0; col < size; col++) {
        var idx = row * size + col;
        var isDiff = (row === diffR && col === diffC);
        cells[row][col] = {
          type: 'number',
          value: isDiff ? newNum : baseNums[idx],
          base: baseNums[idx]
        };
      }
    }
    return cells;
  }

  function genShapeContent(size, diffR, diffC) {
    var cells = [];
    var usedShapes = shuffle(SHAPES.slice());
    var baseShapes = [];
    for (var i = 0; i < size * size; i++) {
      baseShapes.push(usedShapes[i % usedShapes.length]);
    }
    var diffIdx = diffR * size + diffC;
    var baseShape = baseShapes[diffIdx];
    var diffShape;
    do { diffShape = pick(SHAPES); } while (diffShape === baseShape);

    for (var row = 0; row < size; row++) {
      cells[row] = [];
      for (var col = 0; col < size; col++) {
        var idx = row * size + col;
        var isDiff = (row === diffR && col === diffC);
        cells[row][col] = {
          type: 'shape',
          value: isDiff ? diffShape : baseShapes[idx],
          base: baseShapes[idx]
        };
      }
    }
    return cells;
  }

  function genSymbolContent(size, diffR, diffC) {
    var cells = [];
    var baseSyms = [];
    for (var i = 0; i < size * size; i++) {
      baseSyms.push(pick(SYMBOLS));
    }
    var diffIdx = diffR * size + diffC;
    var baseSym = baseSyms[diffIdx];
    var diffSym;
    do { diffSym = pick(SYMBOLS); } while (diffSym === baseSym);

    for (var row = 0; row < size; row++) {
      cells[row] = [];
      for (var col = 0; col < size; col++) {
        var idx = row * size + col;
        var isDiff = (row === diffR && col === diffC);
        cells[row][col] = {
          type: 'symbol',
          value: isDiff ? diffSym : baseSyms[idx],
          base: baseSyms[idx]
        };
      }
    }
    return cells;
  }

  // ===================== SVG SHAPES =====================
  function createShapeSVG(shape, color) {
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 40 40');
    var el;
    switch (shape) {
      case 'circle':
        el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        el.setAttribute('cx', '20'); el.setAttribute('cy', '20'); el.setAttribute('r', '14');
        break;
      case 'square':
        el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        el.setAttribute('x', '6'); el.setAttribute('y', '6'); el.setAttribute('width', '28'); el.setAttribute('height', '28');
        break;
      case 'triangle':
        el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        el.setAttribute('points', '20,4 36,36 4,36');
        break;
      case 'diamond':
        el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        el.setAttribute('points', '20,2 38,20 20,38 2,20');
        break;
      case 'star':
        el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        el.setAttribute('points', '20,2 25,15 38,15 27,23 31,37 20,28 9,37 13,23 2,15 15,15');
        break;
      case 'cross':
        el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        el.setAttribute('points', '14,4 26,4 26,14 36,14 36,26 26,26 26,36 14,36 14,26 4,26 4,14 14,14');
        break;
    }
    el.setAttribute('fill', color);
    svg.appendChild(el);
    return svg;
  }

  // ===================== BUILD ROUND =====================
  function buildRound() {
    var stage = getStage(round);
    currentSize = stage.size;
    timerDuration = stage.time;
    if (currentSize > maxGridReached) maxGridReached = currentSize;

    diffRow = randInt(0, currentSize - 1);
    diffCol = randInt(0, currentSize - 1);

    var contentType = pick(CONTENT_TYPES);
    var cells;
    switch (contentType) {
      case 'color': cells = genColorContent(currentSize, diffRow, diffCol, round); break;
      case 'number': cells = genNumberContent(currentSize, diffRow, diffCol); break;
      case 'shape': cells = genShapeContent(currentSize, diffRow, diffCol); break;
      case 'symbol': cells = genSymbolContent(currentSize, diffRow, diffCol); break;
    }

    var cellSize = getCellSize(currentSize);

    // For non-color types, precompute consistent colors per cell position
    var cellColors = [];
    if (contentType !== 'color') {
      for (var i = 0; i < currentSize * currentSize; i++) {
        cellColors.push(pick(NEON_COLORS));
      }
    }

    renderGrid(gridLeft, cells, cellSize, false, cellColors);
    renderGrid(gridRight, cells, cellSize, true, cellColors);

    roundNum.textContent = round;
    gridSizeEl.textContent = currentSize + 'x' + currentSize;
    scoreDisplay.textContent = score;
  }

  function clearGrid(container) {
    while (container.firstChild) {
      container.removeChild(container.firstChild);
    }
  }

  function renderGrid(container, cells, cellSize, isDiffGrid, cellColors) {
    clearGrid(container);
    var size = cells.length;
    container.style.gridTemplateColumns = 'repeat(' + size + ', ' + cellSize + 'px)';
    container.style.gridTemplateRows = 'repeat(' + size + ', ' + cellSize + 'px)';

    for (var row = 0; row < size; row++) {
      for (var col = 0; col < size; col++) {
        var cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.style.width = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        cell.dataset.row = row;
        cell.dataset.col = col;
        cell.dataset.grid = isDiffGrid ? 'right' : 'left';

        var cellData = cells[row][col];
        var isDiffCell = (row === diffRow && col === diffCol);

        // Left grid always shows base; right grid shows diff value for the diff cell
        var displayValue;
        if (isDiffGrid && isDiffCell) {
          displayValue = cellData.value;
        } else {
          displayValue = cellData.base;
        }

        // Use consistent color per cell position for non-color types
        if (cellData.type === 'color') {
          cell.style.background = displayValue;
        } else {
          var idx = row * size + col;
          var cellColor = cellColors[idx];
          var fs = Math.max(10, Math.floor(cellSize * 0.45));
          cell.style.color = cellColor;
          cell.style.fontSize = fs + 'px';

          if (cellData.type === 'number' || cellData.type === 'symbol') {
            cell.textContent = displayValue;
          } else if (cellData.type === 'shape') {
            var svg = createShapeSVG(displayValue, cellColor);
            svg.classList.add('shape-svg');
            cell.appendChild(svg);
          }
        }

        cell.addEventListener('click', onCellClick);
        container.appendChild(cell);
      }
    }
  }

  // ===================== TIMER =====================
  function startTimer() {
    timerStartStamp = performance.now();
    roundStartTime = timerStartStamp;
    timerBar.style.width = '100%';
    timerBar.classList.remove('warning', 'danger');
    roundActive = true;
    tickTimer();
  }

  function tickTimer() {
    if (!roundActive) return;
    var elapsed = performance.now() - timerStartStamp;
    var pct = Math.max(0, 1 - elapsed / timerDuration);
    timerBar.style.width = (pct * 100) + '%';

    if (pct < 0.25) {
      timerBar.classList.add('danger');
      timerBar.classList.remove('warning');
    } else if (pct < 0.5) {
      timerBar.classList.add('warning');
      timerBar.classList.remove('danger');
    }

    if (pct <= 0) {
      roundActive = false;
      onTimeout();
      return;
    }
    timerRAF = requestAnimationFrame(tickTimer);
  }

  function stopTimer() {
    roundActive = false;
    if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
  }

  // ===================== CELL CLICK =====================
  function onCellClick(e) {
    if (!roundActive || gameEnded) return;
    var cell = e.currentTarget;
    var row = parseInt(cell.dataset.row);
    var col = parseInt(cell.dataset.col);

    if (row === diffRow && col === diffCol) {
      onCorrect(cell);
    } else {
      onWrong(cell);
    }
  }

  function onCorrect(cell) {
    stopTimer();
    sndCorrect();
    var elapsed = (performance.now() - roundStartTime) / 1000;
    responseTimes.push(elapsed);
    score = round;

    // Flash correct on diff cells in both grids
    highlightDiffCells('correct-flash');
    spawnParticles(cell, '#39ff14', 12);

    setTimeout(function() {
      round++;
      nextRound();
    }, 400);
  }

  function onWrong(cell) {
    stopTimer();
    sndWrong();
    cell.classList.add('wrong-flash');
    highlightDiffCells('correct-flash');
    gameScreen.classList.add('shake');
    setTimeout(function() { gameScreen.classList.remove('shake'); }, 300);
    endGame('WRONG CELL');
  }

  function onTimeout() {
    sndTimeout();
    highlightDiffCells('correct-flash');
    gameScreen.classList.add('shake');
    setTimeout(function() { gameScreen.classList.remove('shake'); }, 300);
    endGame('TIME UP');
  }

  function highlightDiffCells(cls) {
    var allCells = document.querySelectorAll('.grid-cell');
    for (var i = 0; i < allCells.length; i++) {
      var c = allCells[i];
      if (parseInt(c.dataset.row) === diffRow && parseInt(c.dataset.col) === diffCol) {
        c.classList.add(cls);
        c.style.border = '2px solid #39ff14';
        c.style.boxShadow = '0 0 10px rgba(57,255,20,0.5)';
      }
    }
  }

  // ===================== PARTICLES =====================
  function spawnParticles(el, color, count) {
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.background = color;
      var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5);
      var dist = 30 + Math.random() * 50;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(p);
      (function(particle) {
        setTimeout(function() { if (particle.parentNode) particle.parentNode.removeChild(particle); }, 700);
      })(p);
    }
  }

  // ===================== ROUND TRANSITION =====================
  function showRoundTransition() {
    var el = document.createElement('div');
    el.className = 'round-transition';
    el.textContent = 'ROUND ' + round;
    gameScreen.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
  }

  function nextRound() {
    showRoundTransition();
    sndRoundStart();
    setTimeout(function() {
      buildRound();
      startTimer();
    }, 500);
  }

  // ===================== START / END =====================
  function startGame() {
    ensureAudio();
    round = 1;
    score = 0;
    responseTimes = [];
    maxGridReached = 3;
    gameEnded = false;
    showScreen(gameScreen);
    showRoundTransition();
    sndRoundStart();
    setTimeout(function() {
      buildRound();
      startTimer();
    }, 500);
  }

  function computeStats() {
    var avg = 0;
    var best = 0;
    if (responseTimes.length > 0) {
      var sum = 0;
      best = responseTimes[0];
      for (var i = 0; i < responseTimes.length; i++) {
        sum += responseTimes[i];
        if (responseTimes[i] < best) best = responseTimes[i];
      }
      avg = sum / responseTimes.length;
    }
    return { avg: avg, best: best };
  }

  function endGame(reason) {
    gameEnded = true;
    sndGameOver();
    setTimeout(function() {
      showScreen(endScreen);
      endReason.textContent = reason;
      statRounds.textContent = score;
      statMaxGrid.textContent = maxGridReached + 'x' + maxGridReached;

      var stats = computeStats();
      statAvgTime.textContent = stats.avg.toFixed(1) + 's';
      statBestTime.textContent = stats.best.toFixed(1) + 's';

      // Neon.js save
      var finalScore = score;
      var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
      nameReady.then(function() {
        return Neon.save(finalScore);
      }).then(function(result) {
        Neon.render(document.getElementById('endLB'));
        if (result.globalRank >= 1 && result.globalRank <= 5) {
          Neon.showGlobalSplash(result.globalRank);
        }
      });
    }, 600);
  }

  // ===================== SHARE =====================
  function shareResult() {
    var stats = computeStats();
    var text = '\uD83D\uDC41\uFE0F GRIDMATCH\n' +
      'Round ' + score + ' | ' + maxGridReached + 'x' + maxGridReached + ' grids\n' +
      'Avg: ' + stats.avg.toFixed(1) + 's | Best: ' + stats.best.toFixed(1) + 's\n' +
      'neonarcade.net/neongrind/gridmatch.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        shareBtn.textContent = 'COPIED!';
        setTimeout(function() { shareBtn.textContent = 'SHARE'; }, 1500);
      });
    }
  }

  // ===================== ESC TO QUIT =====================
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && gameScreen.classList.contains('active') && !gameEnded) {
      e.preventDefault();
      stopTimer();
      roundActive = false;
      gameEnded = true;
      showScreen(startScreen);
      Neon.render(document.getElementById('startLB'));
    }
  });

  // ===================== EVENT LISTENERS =====================
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);
  shareBtn.addEventListener('click', shareResult);

  window.addEventListener('resize', function() {
    if (gameScreen.classList.contains('active') && roundActive) {
      buildRound();
    }
  });

})();
</script>
</body>
