<script>
(() => {
'use strict';

Neon.init({ game: 'reflex-chain', mode: 'high', key: 'neonarcade_neongrind_reflexchain' });

// ===== CONFIG =====

    { targets: 1, rounds: 10, window: 1.5, radius: 32, move: true, decoys: 0, ordered: false },

// ===== DOM =====

// ===== CANVAS SIZING =====
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ===== AUDIO =====
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTap(reactionTime) {
  ensureAudio();
  var now = audioCtx.currentTime;
  var freq = 600 + Math.max(0, 1 - reactionTime) * 800;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(freq, now);
  o.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.04);
  o.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.12);
  g.gain.setValueAtTime(0.18, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  o.connect(g).connect(audioCtx.destination);
  o.start(now); o.stop(now + 0.15);
}

  try {

    if (d) return Object.assign(def, d);
  } catch(e) {}
  return def;
}

}

var state = 'menu';
var currentLevel = 1;
var isEndless = false;
var score = 0;
var lives = 3;
var maxLives = 3;
var combo = 0;
var comboMultiplier = 1;
var targets = [];
var particles = [];
var roundIndex = 0;
var roundsTotal = 0;
var roundActive = false;
var levelReactions = [];
var levelMisses = 0;
var levelDeaths = 0;
var bestReactionThisLevel = Infinity;
var nextExpectedNumber = 1;

// ===== HELPERS =====
function getZone(lv) { return Math.floor((lv - 1) / 5); }
function getLevelInZone(lv) { return (lv - 1) % 5; }
function getConfig(lv) {
  var z = getZone(lv);
  var l = getLevelInZone(lv);
  if (z >= ZONE_CONFIGS.length) z = ZONE_CONFIGS.length - 1;
  if (l >= ZONE_CONFIGS[z].length) l = ZONE_CONFIGS[z].length - 1;
  return ZONE_CONFIGS[z][l];
}

function getEndlessConfig(round) {
  var t = Math.min(round, 100);
  var tgts = Math.min(2 + Math.floor(t / 15), 5);
  var win = Math.max(0.6, 1.8 - t * 0.012);
  var rad = Math.max(22, 34 - Math.floor(t / 10) * 2);
  var dec = t > 10 ? Math.min(Math.floor((t - 10) / 15) + 1, 3) : 0;
  var ord = t > 20;
  var mov = t > 5;
  return { targets: tgts, rounds: 999, window: win, radius: rad, move: mov, decoys: dec, ordered: ord };
}

function dist(a, b) { return Math.sqrt((a.x - b.x) * (a.x - b.x) + (a.y - b.y) * (a.y - b.y)); }

function showScreen(el) {
  [startScreen, levelIntro, levelComplete, gameOver, endlessUnlock].forEach(function(s) {
    s.classList.add('hidden');
  });
  if (el) el.classList.remove('hidden');
}

function showHud(show) {
  hudEl.classList.toggle('hidden', !show);
}

function triggerShake() {
  document.body.classList.remove('shake');
  void document.body.offsetWidth;
  document.body.classList.add('shake');
  setTimeout(function() { document.body.classList.remove('shake'); }, 250);
}

function showReactionFeedback(time, color) {
  reactionFeedback.textContent = time.toFixed(2) + 's';
  reactionFeedback.style.color = color;
  reactionFeedback.style.textShadow = '0 0 10px ' + color;
  reactionFeedback.classList.remove('show');
  void reactionFeedback.offsetWidth;
  reactionFeedback.classList.add('show');
  feedbackTimer = 0.8;
}

function updateHud() {
  hudScore.textContent = score;
  var z = isEndless ? 5 : getZone(currentLevel) + 1;
  var l = isEndless ? 'ENDLESS R' + roundIndex : 'LEVEL ' + currentLevel;
  hudLevel.textContent = 'ZONE ' + z + ' \u2014 ' + l;

  hudLives.textContent = '';
  for (var i = 0; i < maxLives; i++) {
    var heart = document.createElement('span');
    heart.textContent = '\u2764';
    if (i < lives) {
      heart.style.color = '#ff2d7b';
      heart.style.textShadow = '0 0 6px rgba(255,45,123,0.5)';
    } else {
      heart.style.color = '#2a2a3a';
    }
    hudLives.appendChild(heart);
  }

  if (combo >= 2) {
    hudCombo.textContent = combo + 'x COMBO';
    hudCombo.classList.add('active');
    hudCombo.classList.remove('pulse');
    void hudCombo.offsetWidth;
    hudCombo.classList.add('pulse');
    setTimeout(function() { hudCombo.classList.remove('pulse'); }, 200);
  } else {
    hudCombo.classList.remove('active');
  }
}

// ===== PARTICLES =====
function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 80 + Math.random() * 200;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.4,
      maxLife: 0.4 + Math.random() * 0.4,
      color: color,
      radius: 2 + Math.random() * 3
    });
  }
}

function spawnRingParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = (i / count) * Math.PI * 2;
    var speed = 120 + Math.random() * 60;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.3 + Math.random() * 0.2,
      maxLife: 0.3 + Math.random() * 0.2,
      color: color,
      radius: 1.5 + Math.random() * 2
    });
  }
}

// ===== TARGET SPAWNING =====
function spawnTargets() {
  targets = [];
  nextExpectedNumber = 1;
  var cfg = isEndless ? getEndlessConfig(roundIndex) : getConfig(currentLevel);
  var padding = 60;
  var safeTop = 60;
  var all = [];
  var totalCount = cfg.targets + cfg.decoys;

  for (var i = 0; i < totalCount; i++) {
    var attempts = 0;
    var x, y;
    do {
      x = padding + cfg.radius + Math.random() * (W - 2 * padding - 2 * cfg.radius);
      y = safeTop + cfg.radius + Math.random() * (H - safeTop - padding - 2 * cfg.radius);
      attempts++;
    } while (attempts < 80 && all.some(function(a) { return dist(a, {x:x,y:y}) < cfg.radius * 2.8; }));

    var isDecoy = i >= cfg.targets;
    var number = cfg.ordered && !isDecoy ? i + 1 : 0;

    var vx = 0, vy = 0;
    if (cfg.move) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 30 + Math.random() * 40;
      vx = Math.cos(angle) * speed;
      vy = Math.sin(angle) * speed;
    }

    var t = {
      x: x, y: y, radius: cfg.radius,
      spawnTime: performance.now() / 1000,
      lifetime: cfg.window,
      type: isDecoy ? 'decoy' : 'target',
      number: number,
      hit: false,
      missed: false,
      fadeOut: 0,
      fadeOutMax: 0,
      vx: vx, vy: vy,
      pulsePhase: Math.random() * Math.PI * 2,
      appearScale: 0
    };
    targets.push(t);
    all.push(t);
  }
  roundActive = true;
}

// ===== GAME LOGIC =====
function startGame(level, endless) {
  isEndless = endless || false;
  currentLevel = level;
  score = 0;
  lives = 3;
  combo = 0;
  comboMultiplier = 1;
  targets = [];
  particles = [];
  roundIndex = 0;
  levelReactions = [];
  levelMisses = 0;
  levelDeaths = 0;
  bestReactionThisLevel = Infinity;
  totalHits = 0;
  totalMisses = 0;
  totalDecoyHits = 0;
  bestReactionSession = Infinity;
  gameOverPending = false;
  state = 'intro';
  showLevelIntro();
}

function showLevelIntro() {
  showScreen(levelIntro);
  showHud(false);
  var z = isEndless ? 4 : getZone(currentLevel);
  introZone.textContent = 'ZONE ' + (z + 1) + ' \u2014 ' + ZONES[z].name;
  introZone.style.color = ZONES[z].color;
  introLevel.textContent = isEndless ? 'ENDLESS' : 'LEVEL ' + currentLevel;

  var showHintFlag = isEndless || getLevelInZone(currentLevel) === 0;
  introHint.textContent = showHintFlag ? ZONES[z].desc : '';
  introHint.style.display = showHintFlag ? 'block' : 'none';

  if (countdownInterval) clearInterval(countdownInterval);

  var count = 3;
  countdownEl.textContent = '';
  countdownEl.classList.remove('pop');

  countdownInterval = setInterval(function() {
    if (count > 0) {
      countdownEl.textContent = count;
      countdownEl.classList.remove('pop');
      void countdownEl.offsetWidth;
      countdownEl.classList.add('pop');
      playCountdown();
      count--;
    } else {
      clearInterval(countdownInterval);
      countdownInterval = null;
      countdownEl.textContent = 'GO!';
      countdownEl.style.color = '#39ff14';
      countdownEl.classList.remove('pop');
      void countdownEl.offsetWidth;
      countdownEl.classList.add('pop');
      playGo();
      setTimeout(function() {
        countdownEl.style.color = '#00f0ff';
        beginLevel();
      }, 400);
    }
  }, 600);
}

function beginLevel() {
  showScreen(null);
  showHud(true);
  state = 'playing';
  roundIndex = 0;
  levelReactions = [];
  levelMisses = 0;
  levelDeaths = 0;
  bestReactionThisLevel = Infinity;
  var cfg = isEndless ? getEndlessConfig(0) : getConfig(currentLevel);
  roundsTotal = isEndless ? 999 : cfg.rounds;
  roundDelay = 0.5;
  roundActive = false;
  updateHud();
}

function onTargetHit(target, now) {
  target.hit = true;
  target.fadeOut = 0.2;
  target.fadeOutMax = 0.2;
  var reaction = now - target.spawnTime;
  levelReactions.push(reaction);
  totalHits++;
  if (reaction < bestReactionThisLevel) bestReactionThisLevel = reaction;
  if (reaction < bestReactionSession) bestReactionSession = reaction;
  if (reaction < progress.bestReaction || !progress.bestReaction) {
    progress.bestReaction = reaction;
  }

  // Score: faster = more points
  var basePoints = Math.round(Math.max(10, 100 + (1 - Math.min(reaction, 2)) * 200));

  // Combo
  if (reaction < COMBO_THRESHOLD) {
    combo++;
    if (combo >= 3) comboMultiplier = 1 + (combo - 2) * 0.25;
    var milestones = [5, 10, 15, 20];
    var idx = milestones.indexOf(combo);
    if (idx >= 0) playComboMilestone(idx);
  } else {
    combo = 0;
    comboMultiplier = 1;
  }
  var points = Math.round(basePoints * comboMultiplier);
  score += points;

  // Color code
  var color;
  if (reaction < 0.5) color = '#39ff14';
  else if (reaction < 1.0) color = '#00f0ff';
  else if (reaction < 1.5) color = '#ff8c00';
  else color = '#ff2d7b';

  showReactionFeedback(reaction, color);
  playTap(reaction);
  spawnParticles(target.x, target.y, '#00f0ff', 12);
  spawnRingParticles(target.x, target.y, '#00f0ff', 10);
  updateHud();
}

function onTargetMiss(target) {
  target.missed = true;
  target.fadeOut = 0.5;
  target.fadeOutMax = 0.5;
  levelMisses++;
  levelDeaths++;
  totalMisses++;
  lives--;
  combo = 0;
  comboMultiplier = 1;
  playMiss();
  spawnParticles(target.x, target.y, '#ff2d7b', 6);
  updateHud();
  if (lives <= 0) {
    gameOverPending = true;
  }
}

function onDecoyHit(target) {
  target.hit = true;
  target.fadeOut = 0.2;
  target.fadeOutMax = 0.2;
  lives--;
  levelDeaths++;
  totalDecoyHits++;
  combo = 0;
  comboMultiplier = 1;
  playDecoy();
  triggerShake();
  spawnParticles(target.x, target.y, '#ff2d7b', 15);
  updateHud();
  if (lives <= 0) {
    gameOverPending = true;
  }
}

function onWrongOrder(target) {
  lives--;
  levelDeaths++;
  combo = 0;
  comboMultiplier = 1;
  playWrongOrder();
  triggerShake();
  spawnParticles(target.x, target.y, '#ff8c00', 10);
  updateHud();
  if (lives <= 0) {
    gameOverPending = true;
  }
}

function checkRoundComplete() {
  if (!roundActive) return;
  var realTargets = targets.filter(function(t) { return t.type === 'target'; });
  var allRealsHandled = realTargets.every(function(t) { return t.hit || t.missed; });
  if (allRealsHandled) {
    roundActive = false;
    // Mark remaining decoys as done
    targets.forEach(function(t) {
      if (t.type === 'decoy' && !t.hit && !t.missed) {
        t.missed = true;
        t.fadeOut = 0.3;
        t.fadeOutMax = 0.3;
      }
    });
    roundIndex++;

    if (gameOverPending) {
      endGame();
      return;
    }

    if (!isEndless && roundIndex >= roundsTotal) {
      setTimeout(completeLevel, 300);
    } else {
      roundDelay = 0.6;
    }
  }
}

function completeLevel() {
  state = 'levelcomplete';
  playLevelComplete();
  showHud(false);

  var avgReaction = levelReactions.length > 0 ? levelReactions.reduce(function(a,b){return a+b;},0) / levelReactions.length : 0;
  var accuracy = levelReactions.length > 0 ? Math.round(levelReactions.length / (levelReactions.length + levelMisses) * 100) : 0;

  // Stars
  var stars = 1;
  if (levelDeaths === 0) stars = 2;
  var cfg = getConfig(currentLevel);
  var targetTime = cfg.window * 0.5;
  if (stars === 2 && avgReaction < targetTime) stars = 3;

  var starStr = '';
  for (var i = 0; i < 3; i++) {
    if (i < stars) starStr += '\u2B50';
    else starStr += '\u2606';
  }
  lcStars.textContent = starStr;

  // Build stats with DOM
  lcStats.textContent = '';
  var statsData = [
    ['Avg Reaction', avgReaction.toFixed(3) + 's', '#00f0ff'],
    ['Best Tap', bestReactionThisLevel < Infinity ? bestReactionThisLevel.toFixed(3) + 's' : '-', '#00f0ff'],
    ['Accuracy', accuracy + '%', '#00f0ff'],
    ['Score', String(score), '#ffd700']
  ];
  statsData.forEach(function(row) {
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = row[0];
    var val = document.createElement('div');
    val.className = 'stat-value';
    val.textContent = row[1];
    val.style.color = row[2];
    lcStats.appendChild(lbl);
    lcStats.appendChild(val);
  });

  // Save progress
  progress.completedLevels[currentLevel] = Math.max(progress.completedLevels[currentLevel] || 0, stars);
  if (currentLevel < 25) {
    progress.unlockedLevel = Math.max(progress.unlockedLevel, currentLevel + 1);
  }
  saveProgressData();

  showScreen(levelComplete);
  btnNext.textContent = currentLevel === 25 ? 'CONTINUE' : 'NEXT LEVEL';
}

function endGame() {
  state = 'gameover';
  playGameOver();
  showHud(false);

  var avgReaction = levelReactions.length > 0 ? levelReactions.reduce(function(a,b){return a+b;},0) / levelReactions.length : 0;
  var accuracy = totalHits > 0 ? Math.round(totalHits / (totalHits + totalMisses + totalDecoyHits) * 100) : 0;

  saveProgressData();

  goLevel.textContent = isEndless ? 'ENDLESS \u2014 ROUND ' + roundIndex : 'ZONE ' + (getZone(currentLevel) + 1) + ' \u2014 LEVEL ' + currentLevel;
  goScore.textContent = score;

  // Build stats
  goStats.textContent = '';
  var statsData = [
    ['Avg Reaction', avgReaction.toFixed(3) + 's'],
    ['Best Tap', bestReactionSession < Infinity ? bestReactionSession.toFixed(3) + 's' : '-'],
    ['Accuracy', accuracy + '%'],
    ['Total Hits', String(totalHits)]
  ];
  statsData.forEach(function(row) {
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = row[0];
    var val = document.createElement('div');
    val.className = 'stat-value';
    val.textContent = row[1];
    goStats.appendChild(lbl);
    goStats.appendChild(val);
  });

  var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
  nameReady.then(function() {
    return Neon.save(score);
  }).then(function(result) {
    Neon.render(goLeaderboard);
    if (result.globalRank >= 1 && result.globalRank <= 5) {
      Neon.showGlobalSplash(result.globalRank);
    }
    showScreen(gameOver);
  });
}

function showEndlessUnlockScreen() {
  state = 'endlessunlock';
  progress.endlessUnlocked = true;
  saveProgressData();

  euStats.textContent = '';
  var statsData = [
    ['Final Score', String(score), '#ffd700'],
    ['Best Reaction', bestReactionSession < Infinity ? bestReactionSession.toFixed(3) + 's' : '-', '#00f0ff']
  ];
  statsData.forEach(function(row) {
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = row[0];

    val.textContent = row[1];
    val.style.color = row[2];
    euStats.appendChild(lbl);
    euStats.appendChild(val);
  });

  showScreen(endlessUnlock);
}

// ===== INPUT =====
function handleInput(px, py) {
  if (state !== 'playing' || !roundActive) return;
  ensureAudio();

  var now = performance.now() / 1000;
  var cfg = isEndless ? getEndlessConfig(roundIndex) : getConfig(currentLevel);

  // Sort by distance to click
  var sorted = targets.slice().filter(function(t) { return !t.hit && !t.missed; });
  sorted.sort(function(a, b) { return dist(a, {x:px,y:py}) - dist(b, {x:px,y:py}); });

  for (var i = 0; i < sorted.length; i++) {
    var t = sorted[i];
    var d = dist(t, {x: px, y: py});
    var hitRadius = Math.max(t.radius * 1.2, 24);
    if (d <= hitRadius) {
      if (t.type === 'decoy') {
        onDecoyHit(t);
        checkRoundComplete();
        return;
      }
      // Ordered check
      if (cfg.ordered && t.number > 0) {
        if (t.number !== nextExpectedNumber) {
          onWrongOrder(t);
          checkRoundComplete();
          return;
        }
        nextExpectedNumber++;
      }
      onTargetHit(t, now);
      checkRoundComplete();
      return;
    }
  }
}

canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  handleInput(e.clientX - rect.left, e.clientY - rect.top);
});

// ===== BUTTON HANDLERS =====
btnStart.addEventListener('click', function() {
  ensureAudio();
  startGame(progress.unlockedLevel, false);
});

btnEndless.addEventListener('click', function() {
  ensureAudio();
  startGame(26, true);
});

btnNext.addEventListener('click', function() {
  if (currentLevel === 25) {
    showEndlessUnlockScreen();
  } else {
    currentLevel++;
    roundIndex = 0;
    levelReactions = [];
    levelMisses = 0;
    levelDeaths = 0;
    bestReactionThisLevel = Infinity;
    state = 'intro';
    showLevelIntro();
  }
});

btnRetry.addEventListener('click', function() {
  var checkpoint = isEndless ? 26 : Math.floor((currentLevel - 1) / 5) * 5 + 1;
  startGame(checkpoint, isEndless);
});

btnShare.addEventListener('click', shareResult);
btnShareComplete.addEventListener('click', shareResult);

btnEndlessGo.addEventListener('click', function() {
  startGame(26, true);
});

btnBackMenu.addEventListener('click', function() {
  state = 'menu';
  showMenu();
});

function shareResult() {
  var avgReaction = levelReactions.length > 0 ? levelReactions.reduce(function(a,b){return a+b;},0) / levelReactions.length : 0;
  var accuracy = totalHits > 0 ? Math.round(totalHits / (totalHits + totalMisses + totalDecoyHits) * 100) : 0;
  var best = bestReactionSession < Infinity ? bestReactionSession.toFixed(2) : '-.--';
  var lvl = isEndless ? 'Endless R' + roundIndex : currentLevel + '/25';

  var barLen = 25;
  var filled = isEndless ? Math.min(barLen, roundIndex) : Math.round(currentLevel / 25 * barLen);
  var bar = '';
  for (var i = 0; i < barLen; i++) bar += i < filled ? '\u2588' : '\u2591';

  var text = '\u26A1 REFLEX CHAIN\n' +
    'Level ' + lvl + ' | Best: ' + best + 's\n' +
    bar + '\n' +
    'Avg reaction: ' + avgReaction.toFixed(2) + 's | Accuracy: ' + accuracy + '%\n' +
    'Can you react faster?';

  if (navigator.share) {
    navigator.share({ text: text }).catch(function() {
      copyToClipboard(text);
    });
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(function() {
    shareToast.classList.add('show');
    setTimeout(function() { shareToast.classList.remove('show'); }, 2000);
  }).catch(function() {
    shareToast.textContent = 'Could not copy';
    shareToast.classList.add('show');
    setTimeout(function() {
      shareToast.classList.remove('show');
      shareToast.textContent = 'Copied to clipboard!';
    }, 2000);
  });
}

// Zone grid clicks
zoneGrid.addEventListener('click', function(e) {
  var dot = e.target.closest('.zone-dot');
  if (!dot || dot.classList.contains('locked')) return;
  var lv = parseInt(dot.dataset.level);
  if (lv && lv <= progress.unlockedLevel) {
    ensureAudio();
    startGame(lv, false);
  }
});

// ===== MENU =====
function showMenu() {
  progress = loadProgress();
  showScreen(startScreen);
  showHud(false);

  // Build zone grid
  zoneGrid.textContent = '';
  for (var i = 1; i <= 25; i++) {
    var z = getZone(i);
    var unlocked = i <= progress.unlockedLevel;
    var completed = progress.completedLevels[i] > 0;
    var isCurrent = i === progress.unlockedLevel && !completed;
    var dot = document.createElement('div');
    dot.className = 'zone-dot';
    if (isCurrent) dot.className += ' current';
    else if (completed) dot.className += ' completed';
    else if (unlocked) dot.className += ' unlocked';
    else dot.className += ' locked';
    dot.dataset.level = i;
    if (unlocked) {
      dot.style.borderColor = ZONES[z].color + '60';
    }
    dot.textContent = unlocked ? i : '\uD83D\uDD12';
    zoneGrid.appendChild(dot);
  }

  // Best stat
  if (progress.bestReaction) {
    bestStat.textContent = '';
    var txt = document.createTextNode('Best reaction: ');
    var span = document.createElement('span');
    span.textContent = progress.bestReaction.toFixed(3) + 's';
    bestStat.appendChild(txt);
    bestStat.appendChild(span);
  } else {
    bestStat.textContent = '';
  }

  // Endless button
  if (progress.endlessUnlocked) {
    btnEndless.classList.remove('hidden');
  }
}

// ===== DRAW =====
function drawTarget(t, now) {
  var elapsed = now - t.spawnTime;
  var timeFrac = Math.min(elapsed / t.lifetime, 1);

  // Appear animation
  t.appearScale = Math.min(t.appearScale + 0.12, 1);
  var scale = t.appearScale;
  if (t.hit || t.missed) {
    // Quick scale down on hit/miss
    scale = Math.max(0, t.fadeOut / t.fadeOutMax) * t.appearScale;
  }

  var alpha = 1;
  if (t.hit) alpha = Math.max(0, t.fadeOut / t.fadeOutMax);
  else if (t.missed) alpha = Math.max(0, t.fadeOut / t.fadeOutMax) * 0.6;

  if (alpha <= 0 || scale <= 0) return;

  var pulse = Math.sin(now * 6 + t.pulsePhase) * 0.08 + 0.92;
  var r = t.radius * pulse * scale;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(t.x, t.y);

  var isDecoy = t.type === 'decoy';
  var baseColor = isDecoy ? '#ff2d7b' : '#00f0ff';
  var glowR, glowG, glowB;
  if (isDecoy) { glowR = 255; glowG = 45; glowB = 123; }
  else { glowR = 0; glowG = 240; glowB = 255; }

  // Outer timer ring (only for alive targets)
  if (!t.hit && !t.missed) {
    var ringFrac = 1 - timeFrac;
    ctx.beginPath();
    ctx.arc(0, 0, r + 6, -Math.PI / 2, -Math.PI / 2 + ringFrac * Math.PI * 2);
    ctx.strokeStyle = baseColor;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = alpha * 0.5;
    ctx.stroke();
    ctx.globalAlpha = alpha;

    // Urgency: pulsing border when time is running out
    if (timeFrac > 0.7 && !isDecoy) {
      var urgency = (Math.sin(now * 14) + 1) * 0.5;
      ctx.beginPath();
      ctx.arc(0, 0, r + 8, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,45,123,' + (urgency * 0.4 * alpha) + ')';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Outer glow
  var grad = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 1.4);
  grad.addColorStop(0, 'rgba(' + glowR + ',' + glowG + ',' + glowB + ',' + (0.3 * alpha) + ')');
  grad.addColorStop(0.5, 'rgba(' + glowR + ',' + glowG + ',' + glowB + ',' + (0.08 * alpha) + ')');
  grad.addColorStop(1, 'rgba(' + glowR + ',' + glowG + ',' + glowB + ',0)');
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Main circle fill
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(' + glowR + ',' + glowG + ',' + glowB + ',' + (0.12 * alpha) + ')';
  ctx.fill();

  // Border
  ctx.strokeStyle = baseColor;
  ctx.lineWidth = 2;
  ctx.globalAlpha = alpha * 0.9;
  ctx.stroke();
  ctx.globalAlpha = alpha;

  // Inner detail
  if (isDecoy) {
    // X pattern
    ctx.strokeStyle = 'rgba(255,45,123,' + (0.35 * alpha) + ')';
    ctx.lineWidth = 2;
    var s = r * 0.35;
    ctx.beginPath();
    ctx.moveTo(-s, -s); ctx.lineTo(s, s);
    ctx.moveTo(s, -s); ctx.lineTo(-s, s);
    ctx.stroke();
    // Inner ring
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,45,123,' + (0.15 * alpha) + ')';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    // Inner dot
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + glowR + ',' + glowG + ',' + glowB + ',' + (0.5 * alpha) + ')';
    ctx.fill();
    // Inner ring
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.45, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(' + glowR + ',' + glowG + ',' + glowB + ',' + (0.15 * alpha) + ')';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Number for ordered targets
  if (t.number > 0 && !t.hit) {
    ctx.font = '900 ' + Math.round(r * 0.65) + 'px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = baseColor;
    ctx.globalAlpha = alpha * 0.85;
    ctx.shadowColor = baseColor;
    ctx.shadowBlur = 8;
    ctx.fillText(t.number, 0, 1);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    var a = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * a, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a * 0.8;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBackground() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,240,255,0.018)';
  ctx.lineWidth = 1;
  var gridSize = 60;
  for (var x = 0; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (var y = 0; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

// ===== MAIN LOOP =====
var lastTime = performance.now() / 1000;

function loop() {
  requestAnimationFrame(loop);
  var now = performance.now() / 1000;
  var dt = Math.min(now - lastTime, 0.05);
  lastTime = now;

  resize();
  drawBackground();

  // Feedback timer
  if (feedbackTimer > 0) {
    feedbackTimer -= dt;
    if (feedbackTimer <= 0) {
      reactionFeedback.classList.remove('show');
    }
  }

  if (state === 'menu' || state === 'intro' || state === 'levelcomplete' || state === 'gameover' || state === 'endlessunlock') {
    // Idle ambient particles
    if (Math.random() < dt * 1.5) {
      var ix = Math.random() * W;
      var iy = Math.random() * H;
      var colors = ['#00f0ff', '#b44dff', '#ff2d7b', '#39ff14', '#ffd700'];
      spawnParticles(ix, iy, colors[Math.floor(Math.random() * colors.length)], 1);
    }
    drawParticles(dt);
    return;
  }

  if (state !== 'playing') return;

  // Round delay
  if (!roundActive && roundDelay > 0) {
    roundDelay -= dt;
    if (roundDelay <= 0 && !gameOverPending) {
      spawnTargets();
    }
    drawParticles(dt);
    return;
  }

  if (gameOverPending && !roundActive) {
    endGame();
    return;
  }

  // Update targets
  var cfg = isEndless ? getEndlessConfig(roundIndex) : getConfig(currentLevel);
  for (var i = 0; i < targets.length; i++) {
    var t = targets[i];

    // Move
    if (cfg.move && !t.hit && !t.missed) {
      t.x += t.vx * dt;
      t.y += t.vy * dt;
      var pad = 10;
      var topPad = 50;
      if (t.x - t.radius < pad) { t.vx = Math.abs(t.vx); t.x = t.radius + pad; }
      if (t.x + t.radius > W - pad) { t.vx = -Math.abs(t.vx); t.x = W - t.radius - pad; }
      if (t.y - t.radius < topPad) { t.vy = Math.abs(t.vy); t.y = t.radius + topPad; }
      if (t.y + t.radius > H - pad) { t.vy = -Math.abs(t.vy); t.y = H - t.radius - pad; }
    }

    // Fade out
    if (t.fadeOut > 0 && (t.hit || t.missed)) {
      t.fadeOut -= dt;
    }

    // Timeout check for real targets
    if (!t.hit && !t.missed && t.type === 'target') {
      var elapsed = now - t.spawnTime;
      if (elapsed >= t.lifetime) {
        onTargetMiss(t);
      }
    }
    // Decoy timeout
    if (!t.hit && !t.missed && t.type === 'decoy') {
      var elapsed2 = now - t.spawnTime;
      if (elapsed2 >= t.lifetime) {
        t.missed = true;
        t.fadeOut = 0.3;
        t.fadeOutMax = 0.3;
      }
    }
  }

  checkRoundComplete();

  // Draw targets
  for (var i = 0; i < targets.length; i++) {
    var t = targets[i];
    if ((t.hit || t.missed) && t.fadeOut <= 0) continue;
    drawTarget(t, now);
  }

  // Draw particles
  drawParticles(dt);
}

// ===== INIT =====
showMenu();
requestAnimationFrame(loop);

})();
