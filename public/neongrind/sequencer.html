/* SCREEN SHAKE */
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-3px,1px)}20%{transform:translate(3px,-2px)}30%{transform:translate(-2px,3px)}40%{transform:translate(2px,-1px)}50%{transform:translate(-3px,2px)}60%{transform:translate(3px,-3px)}70%{transform:translate(-1px,2px)}80%{transform:translate(2px,-2px)}90%{transform:translate(-2px,1px)}}

<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <div class="main-title">SEQUENCER</div>
  <div class="subtitle">How far can your memory reach? Watch the pattern, repeat the sequence.</div>

  </div>

<div id="gameScreen" class="screen">
  <div class="game-hud">
    <div class="hud-item"><div class="hud-label">ROUND</div><div class="hud-value round-val" id="hudRound">1</div></div>
    <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-value score-val" id="hudScore">0</div></div>

    <div class="pad pad-green" data-idx="2"><span class="pad-label">A / 3</span></div>

  <div id="endLB"></div>

<div class="feedback-flash" id="feedbackFlash"></div>

<script src="/neon.js"></script>
<script>
(() => {
  // CONFIG
  const PADS = [
    { name: 'CYAN',  hex: '#00f0ff', cls: 'pad-cyan',  freq: 261.63 }, // C4
    { name: 'PINK',  hex: '#ff2d7b', cls: 'pad-pink',  freq: 329.63 }, // E4
    { name: 'GREEN', hex: '#39ff14', cls: 'pad-green', freq: 392.00 }, // G4
    { name: 'GOLD',  hex: '#ffd700', cls: 'pad-gold',  freq: 523.25 }  // C5
  ];

  const PAD_EMOJIS = ['\uD83D\uDFE6', '\uD83D\uDFE5', '\uD83D\uDFE9', '\uD83D\uDFE8']; // blue, red, green, yellow squares

  const MODE_DESC = {
    visual: 'COLOR FLASHES ONLY \u2014 CLASSIC MEMORY',
    audio: 'SOUND ONLY \u2014 ALL PADS LOOK THE SAME',
    dual: 'VISUAL + AUDIO \u2014 FULL SENSORY MODE'
  };

  const FLASH_START = 600;   // ms initial flash duration
  const FLASH_MIN = 200;     // ms minimum flash duration
  const FLASH_DECAY = 25;    // ms reduction per round
  const GAP_START = 200;     // ms gap between flashes
  const GAP_MIN = 80;        // ms minimum gap
  const GAP_DECAY = 10;      // ms gap reduction per round

  // KEY MAPPINGS
  const KEY_MAP = { q: 0, w: 1, a: 2, s: 3, '1': 0, '2': 1, '3': 2, '4': 3 };

  // DOM
  const screens = {
    start: document.getElementById('startScreen'),
    game: document.getElementById('gameScreen'),
    result: document.getElementById('resultScreen')
  };
  const $ = id => document.getElementById(id);
  const padEls = document.querySelectorAll('.pad');
  const $padGrid = $('padGrid');
  const $hudRound = $('hudRound');
  const $hudScore = $('hudScore');
  const $hudBest = $('hudBest');
  const $gameStatus = $('gameStatus');
  const $progressWrap = $('progressWrap');
  const $feedbackFlash = $('feedbackFlash');
  const $modeDesc = $('modeDesc');
  const $resultTitle = $('resultTitle');
  const $resultScore = $('resultScore');
  const $newBest = $('newBest');
  const $statRound = $('statRound');
  const $statLength = $('statLength');
  const $statMode = $('statMode');

  // STATE
  let currentMode = 'visual';
  let sequence = [];
  let playerIdx = 0;
  let round = 0;
  let score = 0;
  let gameActive = false;
  let isPlayingSequence = false;
  let inputLocked = true;
  let playbackTimeouts = [];

  // AUDIO
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(padIdx, duration) {
    if (!audioCtx) return;
    try {
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(PADS[padIdx].freq, now);
      var dur = (duration || 300) / 1000;
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.setValueAtTime(0.15, now + dur * 0.7);
      gain.gain.linearRampToValueAtTime(0, now + dur);
      osc.start(now);
      osc.stop(now + dur);
    } catch (e) {}
  }

  function playSuccessJingle() {
    if (!audioCtx) return;
    try {
      var now = audioCtx.currentTime;
      var notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach(function(freq, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        var t = now + i * 0.08;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t);
        osc.stop(t + 0.15);
      });
    } catch (e) {}
  }

  function playFailBuzzer() {
    if (!audioCtx) return;
    try {
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(80, now + 0.4);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.5);
      osc.start(now);
      osc.stop(now + 0.5);
      // Second dissonant tone
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = 'sawtooth';
      osc2.frequency.setValueAtTime(160, now);
      osc2.frequency.linearRampToValueAtTime(70, now + 0.4);
      gain2.gain.setValueAtTime(0.08, now);
      gain2.gain.linearRampToValueAtTime(0, now + 0.5);
      osc2.start(now);
      osc2.stop(now + 0.5);
    } catch (e) {}
  }

  // PARTICLES
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = color;
      p.style.boxShadow = '0 0 6px ' + color;
      document.body.appendChild(p);
      var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      var speed = 60 + Math.random() * 100;
      var dx = Math.cos(angle) * speed;
      var dy = Math.sin(angle) * speed;
      var size = 3 + Math.random() * 4;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: 'translate(' + dx + 'px,' + dy + 'px)', opacity: 0 }
      ], { duration: 400 + Math.random() * 200, easing: 'cubic-bezier(0,.8,.5,1)' })
      .onfinish = function() { p.remove(); };
    }
  }

  function showScreen(name) {
    Object.values(screens).forEach(function(s) { s.classList.remove('active'); });
    screens[name].classList.add('active');
  }

  // MODE SELECTOR
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      $modeDesc.textContent = MODE_DESC[currentMode];
      initNeon();
    });
  });

  // NEON.JS
  function initNeon() {
    if (typeof Neon !== 'undefined') {
      Neon.init({
        game: 'sequencer',
        mode: 'high',
        key: 'neonarcade_neongrind_sequencer_scores'
      });
      Neon.render($('startLB'));
      var best = Neon.getHighScore();
      $hudBest.textContent = best || 0;
    }
  }

  // AUDIO MODE VISUALS
  function applyAudioMode(enable) {
    padEls.forEach(function(el) {
      if (enable) {
        el.classList.add('audio-mode');
      } else {
        el.classList.remove('audio-mode');
      }
    });
  }

  // PAD FLASH
  function flashPad(idx, duration, playSound) {
    var el = padEls[idx];
    el.classList.add('lit');
    if (playSound) {
      playTone(idx, duration);
    }
    setTimeout(function() {
      el.classList.remove('lit');
    }, duration);
  }

  // PROGRESS DOTS
  function renderProgress() {
    while ($progressWrap.firstChild) $progressWrap.removeChild($progressWrap.firstChild);
    var len = sequence.length;
    // Only show dots for current sequence (max ~30 visible)
    var maxDots = Math.min(len, 30);
    var startFrom = len > 30 ? len - 30 : 0;
    for (var i = startFrom; i < len; i++) {
      var dot = document.createElement('div');
      dot.className = 'progress-dot';
      if (i < playerIdx) {
        dot.classList.add('done');
      } else if (i === playerIdx) {
        dot.classList.add('current');
      } else {
        dot.classList.add('pending');
      }
      $progressWrap.appendChild(dot);
    }
  }

  function updateProgressDot(idx) {
    var dots = $progressWrap.children;
    var len = sequence.length;
    var startFrom = len > 30 ? len - 30 : 0;
    var dotIdx = idx - startFrom;
    if (dotIdx >= 0 && dotIdx < dots.length) {
      dots[dotIdx].classList.remove('current', 'pending');
      dots[dotIdx].classList.add('done');
    }
    // Highlight next
    var nextDotIdx = (idx + 1) - startFrom;
    if (nextDotIdx >= 0 && nextDotIdx < dots.length) {
      dots[nextDotIdx].classList.remove('pending');
      dots[nextDotIdx].classList.add('current');
    }
  }

  // GET FLASH DURATION FOR CURRENT ROUND
  function getFlashDuration() {
    return Math.max(FLASH_MIN, FLASH_START - round * FLASH_DECAY);
  }

  function getGapDuration() {
    return Math.max(GAP_MIN, GAP_START - round * GAP_DECAY);
  }

  // PLAY SEQUENCE
  function playSequence() {
    isPlayingSequence = true;
    inputLocked = true;
    $gameStatus.textContent = 'WATCH';
    $gameStatus.className = 'game-status watching';

    var shouldPlaySound = currentMode === 'audio' || currentMode === 'dual';
    var shouldShowVisual = currentMode === 'visual' || currentMode === 'dual';
    var flashDur = getFlashDuration();
    var gapDur = getGapDuration();

    // In audio mode, still flash the pad (but all same color via CSS)
    var delay = 400;
    for (var i = 0; i < sequence.length; i++) {
      (function(idx, d) {
        var t = setTimeout(function() {
          if (!gameActive) return;
          flashPad(sequence[idx], flashDur, shouldPlaySound || shouldShowVisual);
        }, d);
        playbackTimeouts.push(t);
      })(i, delay + i * (flashDur + gapDur));
    }

    var totalTime = delay + sequence.length * (flashDur + gapDur);
    var t2 = setTimeout(function() {
      if (!gameActive) return;
      isPlayingSequence = false;
      inputLocked = false;
      playerIdx = 0;
      $gameStatus.textContent = 'YOUR TURN';
      $gameStatus.className = 'game-status your-turn';
      renderProgress();
    }, totalTime);
    playbackTimeouts.push(t2);
  }

  // CANCEL ALL PLAYBACK
  function cancelPlayback() {
    playbackTimeouts.forEach(function(t) { clearTimeout(t); });
    playbackTimeouts = [];
    isPlayingSequence = false;
    padEls.forEach(function(el) { el.classList.remove('lit'); });
  }

  // NEXT ROUND
  function nextRound() {
    round++;
    $hudRound.textContent = round;

    // Add a random pad to the sequence
    var next = Math.floor(Math.random() * 4);
    sequence.push(next);
    playerIdx = 0;

    // Short pause then play sequence
    var t = setTimeout(function() {
      if (!gameActive) return;
      playSequence();
    }, round === 1 ? 600 : 800);
    playbackTimeouts.push(t);
  }

  // HANDLE PAD INPUT
  function handlePadInput(idx) {
    if (!gameActive || inputLocked || isPlayingSequence) return;

    var el = padEls[idx];
    var shouldPlaySound = currentMode === 'audio' || currentMode === 'dual';
    var flashDur = Math.min(getFlashDuration(), 250);

    // Flash pad on press
    el.classList.add('lit', 'pressed');
    if (shouldPlaySound || currentMode === 'visual') {
      playTone(idx, flashDur);
    }
    setTimeout(function() {
      el.classList.remove('lit', 'pressed');
    }, flashDur);

    if (idx === sequence[playerIdx]) {
      // Correct
      updateProgressDot(playerIdx);
      playerIdx++;

      if (playerIdx === sequence.length) {
        // Round complete!
        inputLocked = true;
        score += sequence.length;
        $hudScore.textContent = score;

        $gameStatus.textContent = 'CORRECT!';
        $gameStatus.className = 'game-status success';

        // Success flash + particles
        $feedbackFlash.className = 'feedback-flash correct';
        setTimeout(function() { $feedbackFlash.className = 'feedback-flash'; }, 200);

        var gr = $padGrid.getBoundingClientRect();
        spawnParticles(gr.left + gr.width / 2, gr.top + gr.height / 2, '#39ff14', 16);
        playSuccessJingle();

        // Next round after delay
        var t = setTimeout(function() {
          if (!gameActive) return;
          nextRound();
        }, 1000);
        playbackTimeouts.push(t);
      }
    } else {
      // Wrong!
      gameActive = false;
      inputLocked = true;
      playFailBuzzer();

      // Show wrong flash
      el.classList.remove('lit');
      el.classList.add('wrong-flash');
      $feedbackFlash.className = 'feedback-flash wrong';
      document.body.classList.add('shaking');

      setTimeout(function() {
        el.classList.remove('wrong-flash');
        $feedbackFlash.className = 'feedback-flash';
        document.body.classList.remove('shaking');
      }, 400);

      // Flash the correct pad
      setTimeout(function() {
        var correctEl = padEls[sequence[playerIdx]];
        correctEl.classList.add('lit');
        playTone(sequence[playerIdx], 400);
        setTimeout(function() {
          correctEl.classList.remove('lit');
          endGame();
        }, 500);
      }, 500);
    }
  }

  // PAD CLICK/TOUCH
  padEls.forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      handlePadInput(parseInt(el.dataset.idx));
    });
    el.addEventListener('touchstart', function(e) {
      e.preventDefault();
      handlePadInput(parseInt(el.dataset.idx));
    }, { passive: false });
  });

  // START GAME
  function startGame() {
    ensureAudio();

    sequence = [];
    playerIdx = 0;
    round = 0;
    score = 0;
    gameActive = true;
    inputLocked = true;
    isPlayingSequence = false;
    playbackTimeouts = [];

    $hudRound.textContent = '1';
    $hudScore.textContent = '0';
    var best = 0;
    if (typeof Neon !== 'undefined') {
      best = Neon.getHighScore() || 0;
    }
    $hudBest.textContent = best;

    applyAudioMode(currentMode === 'audio');

    showScreen('game');
    while ($progressWrap.firstChild) $progressWrap.removeChild($progressWrap.firstChild);

    $gameStatus.textContent = 'GET READY';
    $gameStatus.className = 'game-status watching';

    nextRound();
  }

  // END GAME
  function endGame() {
    cancelPlayback();
    gameActive = false;

    var roundReached = round;
    var longestSeq = sequence.length - 1; // failed on current, so completed length - 1

    showScreen('result');

    $resultScore.textContent = score;
    $statRound.textContent = roundReached;
    $statLength.textContent = longestSeq;
    $statMode.textContent = currentMode.toUpperCase();
    $newBest.style.display = 'none';

    if (typeof Neon !== 'undefined') {
      var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
      nameReady.then(function() {
        return Neon.save(score);
      }).then(function(result) {
        if (result && result.isNewBest) {
          $newBest.style.display = '';
        }
        Neon.render($('endLB'));
        if (result && result.globalRank >= 1 && result.globalRank <= 5) {
          Neon.showGlobalSplash(result.globalRank);
        }
      });
    }

    var sr = $resultScore.getBoundingClientRect();
    spawnParticles(sr.left + sr.width / 2, sr.top + sr.height / 2, '#00f0ff', 20);
  }

  // SHARE
  function getShareText() {
    var modeLabel = currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
    var longestSeq = Math.max(0, sequence.length - 1);
    // Show last 10 of completed sequence
    var completedSeq = sequence.slice(0, longestSeq);
    var showCount = Math.min(completedSeq.length, 10);
    var seqEmojis = '';
    for (var i = completedSeq.length - showCount; i < completedSeq.length; i++) {
      seqEmojis += PAD_EMOJIS[completedSeq[i]];
    }
    if (!seqEmojis) seqEmojis = '\u2014';
    return '\uD83C\uDFB5 SEQUENCER\n' +
      'Round: ' + round + ' | Score: ' + score + ' | Mode: ' + modeLabel + '\n' +
      seqEmojis + '\n' +
      'Can you beat my memory? \uD83E\uDDE0\n' +
      'neonarcade.net/neongrind/sequencer.html';
  }

  $('shareBtn').addEventListener('click', function() {
    var text = getShareText();
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        navigator.clipboard.writeText(text).then(function() {
          $('shareBtn').textContent = 'COPIED!';
          setTimeout(function() { $('shareBtn').textContent = 'SHARE'; }, 2000);
        });
      });
    } else {
      navigator.clipboard.writeText(text).then(function() {
        $('shareBtn').textContent = 'COPIED!';
        setTimeout(function() { $('shareBtn').textContent = 'SHARE'; }, 2000);
      });
    }
  });

  // KEYBOARD
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (gameActive || isPlayingSequence) {
        e.preventDefault();
        cancelPlayback();
        gameActive = false;
        inputLocked = true;
        isPlayingSequence = false;
        applyAudioMode(false);
        showScreen('start');
        initNeon();
      }
      return;
    }

    if (!gameActive) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        if (screens.start.classList.contains('active')) startGame();
        else if (screens.result.classList.contains('active')) restartGame();
      }
      return;
    }

    var key = e.key.toLowerCase();
    if (key in KEY_MAP) {
      e.preventDefault();
      handlePadInput(KEY_MAP[key]);
    }
  });

  $('startBtn').addEventListener('click', startGame);
  $('replayBtn').addEventListener('click', restartGame);

  function restartGame() {
    cancelPlayback();
    gameActive = false;
    applyAudioMode(false);
    showScreen('start');
    initNeon();
  }

  // INIT
  initNeon();
})();
</script>
</body>
