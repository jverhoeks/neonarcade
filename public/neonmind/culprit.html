  function showScreen(scr) {
    startScreen.classList.remove('active');

    resultScreen.classList.remove('active');
    scr.classList.add('active');

  function fmtTime(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function showToast(msg, dur) {
    toast.textContent = msg;
    toast.classList.remove('hidden');
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { toast.classList.add('hidden'); }, dur || 2200);
  }

  // ===== CLUE TEXT =====
  function clueToText(clue, p) {
    var s = p.suspects;
    var l = p.locations;
    var w = p.weapons;
    switch (clue.type) {
      case 'notIn':    return s[clue.suspect] + ' was NOT in the ' + l[clue.location] + '.';
      case 'notScene': return 'The crime did NOT occur in the ' + l[clue.location] + '.';
      case 'notUsed':  return 'The ' + w[clue.weapon] + ' was NOT the murder weapon.';
      case 'notDone':  return s[clue.suspect] + ' did NOT use the ' + w[clue.weapon] + '.';
      case 'wasIn':    return s[clue.suspect] + ' was CONFIRMED in the ' + l[clue.location] + '.';
      case 'usedBy':   return 'The ' + w[clue.weapon] + ' was found near ' + s[clue.suspect] + '.';
      default:         return '';
    }
  }

  // ===== GRID STATE =====
  function initGridStates() {
    gridStates = { SL: [], SW: [], LW: [] };
    for (var r = 0; r < 3; r++) {
      gridStates.SL.push([0, 0, 0]);
      gridStates.SW.push([0, 0, 0]);
      gridStates.LW.push([0, 0, 0]);
    }
  }

  // After any manual cell change, auto-fill: confirmed row/col fills rest with auto-x
  function autoFill(gid) {
    var g = gridStates[gid];
    // First clear all auto-x (3) that haven't become manual
    for (var r = 0; r < 3; r++) {
      for (var c = 0; c < 3; c++) {
        if (g[r][c] === 3) g[r][c] = 0;
      }
    }
    // Then fill based on checks
    for (var r2 = 0; r2 < 3; r2++) {
      for (var c2 = 0; c2 < 3; c2++) {
        if (g[r2][c2] === 2) {
          for (var cc = 0; cc < 3; cc++) {
            if (cc !== c2 && g[r2][cc] === 0) g[r2][cc] = 3;
          }
          for (var rr = 0; rr < 3; rr++) {
            if (rr !== r2 && g[rr][c2] === 0) g[rr][c2] = 3;
          }
        }
      }
    }
  }

  // ===== RENDER CLUES =====
  function renderClues(p) {
    // Clear safely
    while (cluesList.firstChild) { cluesList.removeChild(cluesList.firstChild); }
    p.clues.forEach(function(clue, i) {
      var el = document.createElement('div');
      el.className = 'clue-item';
      el.textContent = (i + 1) + '. ' + clueToText(clue, p);
      cluesList.appendChild(el);
    });
  }

  // ===== RENDER GRIDS =====
  var GRID_DEFS = [
    { id: 'SL', title: 'SUSPECTS \u00D7 LOCATIONS', rows: 'suspects',  cols: 'locations' },
    { id: 'SW', title: 'SUSPECTS \u00D7 WEAPONS',   rows: 'suspects',  cols: 'weapons'   },
    { id: 'LW', title: 'LOCATIONS \u00D7 WEAPONS',  rows: 'locations', cols: 'weapons'   }
  ];

  function renderGrids(p) {
    while (gridArea.firstChild) { gridArea.removeChild(gridArea.firstChild); }

    GRID_DEFS.forEach(function(def) {
      var section = document.createElement('div');
      section.className = 'sub-grid-section';

      var titleEl = document.createElement('div');
      titleEl.className = 'sub-grid-title';
      titleEl.textContent = def.title;
      section.appendChild(titleEl);

      var rowLabels = p[def.rows];
      var colLabels = p[def.cols];

      var grid = document.createElement('div');
      grid.className = 'deduction-grid';
      grid.style.gridTemplateColumns = 'minmax(76px,110px) repeat(3,1fr)';

      // Corner
      var corner = document.createElement('div');
      corner.className = 'grid-corner';
      grid.appendChild(corner);

      // Column headers
      colLabels.forEach(function(lbl) {
        var h = document.createElement('div');
        h.className = 'grid-header-cell';
        h.textContent = lbl;
        grid.appendChild(h);
      });

      // Row data
      rowLabels.forEach(function(rowLbl, r) {
        var rl = document.createElement('div');
        rl.className = 'grid-row-label';
        rl.textContent = rowLbl;
        grid.appendChild(rl);

        for (var c = 0; c < 3; c++) {
          var cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.dataset.grid = def.id;
          cell.dataset.row  = String(r);
          cell.dataset.col  = String(c);
          applyCellState(cell, gridStates[def.id][r][c]);
          cell.addEventListener('click', onCellClick);
          grid.appendChild(cell);
        }
      });

      section.appendChild(grid);
      gridArea.appendChild(section);
    });
  }

  function applyCellState(cell, state) {
    cell.classList.remove('state-x', 'state-check', 'auto-x');
    cell.textContent = '';
    if (state === 1) {
      cell.classList.add('state-x');
      cell.textContent = '\u2717';
    } else if (state === 2) {
      cell.classList.add('state-check');
      cell.textContent = '\u2713';
    } else if (state === 3) {
      cell.classList.add('auto-x');
      cell.textContent = '\u2717';
    }
  }

  function refreshAllCells() {
    var cells = gridArea.querySelectorAll('.grid-cell');
    for (var i = 0; i < cells.length; i++) {
      var cell = cells[i];
      var gid  = cell.dataset.grid;
      var r    = parseInt(cell.dataset.row, 10);
      var c    = parseInt(cell.dataset.col, 10);
      applyCellState(cell, gridStates[gid][r][c]);
    }
  }

  function onCellClick(e) {
    if (!gameActive) return;
    var cell = e.currentTarget;
    var gid  = cell.dataset.grid;
    var r    = parseInt(cell.dataset.row, 10);
    var c    = parseInt(cell.dataset.col, 10);

    // Auto-x cells toggle back to 0 on click
    var cur = gridStates[gid][r][c];
    if (cur === 3) {
      gridStates[gid][r][c] = 0;
    } else {
      // cycle: 0 → 1 → 2 → 0
      gridStates[gid][r][c] = (cur + 1) % 3;
    }

    autoFill(gid);
    refreshAllCells();
    soundClick(gridStates[gid][r][c]);
  }

  // ===== POPULATE DROPDOWNS =====
  function populateDropdowns(p) {
    function fill(sel, items) {
      while (sel.firstChild) { sel.removeChild(sel.firstChild); }
      items.forEach(function(item, i) {
        var opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = item;
        sel.appendChild(opt);
      });
    }
    fill(accuseSuspect,  p.suspects);
    fill(accuseLocation, p.locations);
    fill(accuseWeapon,   p.weapons);
  }

  // ===== TIMER =====
  function startTimer() {
    timerStart = Date.now();
    elapsed = 0;
    topTimerEl.textContent = '00:00';
    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      elapsed = (Date.now() - timerStart) / 1000;
      topTimerEl.textContent = fmtTime(elapsed);
    }, 250);
  }

  // ===== START SCREEN =====
  function updateStartScreen() {
    currentPuzzle = PUZZLES[puzzleIndex];
    document.getElementById('startPuzzleNum').textContent = 'PUZZLE #' + (puzzleIndex + 1);
    document.getElementById('startThemeName').textContent = currentPuzzle.theme;

    var suspEl = document.getElementById('startSuspects');
    var locEl  = document.getElementById('startLocations');
    var wepEl  = document.getElementById('startWeapons');
    while (suspEl.firstChild) { suspEl.removeChild(suspEl.firstChild); }
    while (locEl.firstChild)  { locEl.removeChild(locEl.firstChild); }
    while (wepEl.firstChild)  { wepEl.removeChild(wepEl.firstChild); }

    currentPuzzle.suspects.forEach(function(s) {
      var d = document.createElement('div');
      d.className = 'entity-item';
      d.textContent = s;
      suspEl.appendChild(d);
    });
    currentPuzzle.locations.forEach(function(l) {
      var d = document.createElement('div');
      d.className = 'entity-item';
      d.textContent = l;
      locEl.appendChild(d);
    });
    currentPuzzle.weapons.forEach(function(w) {
      var d = document.createElement('div');
      d.className = 'entity-item';
      d.textContent = w;
      wepEl.appendChild(d);
    });

    Neon.render(startLB);
  }

  // ===== START GAME =====
  function startGame() {
    currentPuzzle = PUZZLES[puzzleIndex];
    topPuzzleNumEl.textContent = 'PUZZLE #' + (puzzleIndex + 1);
    topThemeEl.textContent = currentPuzzle.theme;

    initGridStates();
    renderClues(currentPuzzle);
    renderGrids(currentPuzzle);
    populateDropdowns(currentPuzzle);

    gameActive = true;
    lastWon = false;
    showScreen(gameScreen);
    startTimer();
    soundStart();
  }

  // ===== ACCUSATION =====
  function makeAccusation() {
    if (!gameActive) return;

    var guessS = parseInt(accuseSuspect.value, 10);
    var guessL = parseInt(accuseLocation.value, 10);
    var guessW = parseInt(accuseWeapon.value, 10);

    clearInterval(timerInterval);
    gameActive = false;

    var sol = currentPuzzle.solution;
    var correctS = (guessS === sol.suspect);
    var correctL = (guessL === sol.location);
    var correctW = (guessW === sol.weapon);
    var allCorrect = correctS && correctL && correctW;

    endGame(allCorrect, guessS, guessL, guessW, correctS, correctL, correctW);
  }

  // ===== END GAME =====
  function endGame(won, guessS, guessL, guessW, correctS, correctL, correctW) {
    var p   = currentPuzzle;
    var sol = p.solution;
    var totalTime = Math.floor(elapsed);
    lastWon = won;

    resultPuzzleNumEl.textContent = 'PUZZLE #' + (puzzleIndex + 1);
    resultThemeEl.textContent = p.theme;

    // Always reveal the correct answer
    verdictSuspectName.textContent  = p.suspects[sol.suspect];
    verdictLocationName.textContent = p.locations[sol.location];
    verdictWeaponName.textContent   = p.weapons[sol.weapon];

    if (won) {
      resultTitle.textContent = 'CASE CLOSED';
      resultTitle.className   = 'result-title solved';
      resultVerdict.className = 'result-verdict';
      verdictSuspectRow.className   = 'verdict-row correct';
      verdictLocationRow.className  = 'verdict-row correct';
      verdictWeaponRow.className    = 'verdict-row correct';
      verdictSuspectIcon.textContent  = '\u2705';
      verdictLocationIcon.textContent = '\u2705';
      verdictWeaponIcon.textContent   = '\u2705';
      resultAccuracyEl.textContent = 'PERFECT';
      soundVictory();
    } else {
      resultTitle.textContent = 'CASE FAILED';
      resultTitle.className   = 'result-title failed';
      resultVerdict.className = 'result-verdict wrong';
      verdictSuspectRow.className  = 'verdict-row ' + (correctS ? 'correct' : 'wrong-part');
      verdictLocationRow.className = 'verdict-row ' + (correctL ? 'correct' : 'wrong-part');
      verdictWeaponRow.className   = 'verdict-row ' + (correctW ? 'correct' : 'wrong-part');
      verdictSuspectIcon.textContent  = correctS ? '\u2705' : '\u274C';
      verdictLocationIcon.textContent = correctL ? '\u2705' : '\u274C';
      verdictWeaponIcon.textContent   = correctW ? '\u2705' : '\u274C';
      var hits = (correctS ? 1 : 0) + (correctL ? 1 : 0) + (correctW ? 1 : 0);
      resultAccuracyEl.textContent = hits + '/3';
      document.body.classList.add('shaking');
      setTimeout(function() { document.body.classList.remove('shaking'); }, 300);
      soundLose();
    }

    resultTimeEl.textContent = fmtTime(totalTime);
    showScreen(resultScreen);

    if (won) {
      var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
      nameReady.then(function() {
        return Neon.save(totalTime);
      }).then(function(result) {
        Neon.render(resultLB);
        if (result.globalRank >= 1 && result.globalRank <= 5) {
          Neon.showGlobalSplash(result.globalRank);
        }
      });
      var colors = ['#00f0ff', '#39ff14', '#ffd700', '#b44dff', '#ff2d7b'];
      for (var pi = 0; pi < 6; pi++) {
        (function(idx) {
          setTimeout(function() {
            spawnParticles(
              window.innerWidth  * (0.15 + Math.random() * 0.7),
              window.innerHeight * (0.15 + Math.random() * 0.5),
              colors[idx % colors.length], 10
            );
          }, idx * 160);
        })(pi);
      }
    } else {
      Neon.render(resultLB);
    }
  }

  // ===== SHARE =====
  function buildShareText() {
    var p = currentPuzzle;
    var num = puzzleIndex + 1;
    var totalTime = Math.floor(elapsed);
    var lines = [
      '\uD83D\uDD0D CULPRIT #' + num + ' \u2014 ' + p.theme,
      'Solved in ' + fmtTime(totalTime) + (lastWon ? '' : ' | Case failed')
    ];
    if (lastWon) {
      lines.push('\uD83D\uDD75\uFE0F WHO: \u2705 WHERE: \u2705 WITH: \u2705');
    }
    lines.push('neonarcade.net/neonmind/culprit.html');
    return lines.join('\n');
  }

  function doShare() {
    var text = buildShareText();
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        navigator.clipboard.writeText(text)
          .then(function() { showToast('Copied to clipboard!'); })
          .catch(function() { showToast('Could not copy'); });
      });
    } else {
      navigator.clipboard.writeText(text)
        .then(function() { showToast('Result copied!'); })
        .catch(function() { showToast('Could not copy'); });
    }
  }

  // ===== PARTICLES =====
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var el = document.createElement('div');
      el.className = 'particle';
      var angle = Math.random() * Math.PI * 2;
      var dist  = 40 + Math.random() * 80;
      var dx    = Math.cos(angle) * dist;
      var dy    = Math.sin(angle) * dist - 30;
      var size  = 4 + Math.random() * 5;
      el.style.cssText = [
        'left:' + (x - size / 2) + 'px',
        'top:'  + (y - size / 2) + 'px',
        'width:' + size + 'px',
        'height:' + size + 'px',
        'background:' + color,
        '--dx:' + dx + 'px',
        '--dy:' + dy + 'px',
        'animation-duration:' + (0.6 + Math.random() * 0.5) + 's'
      ].join(';');
      document.body.appendChild(el);
      setTimeout(function(node) { if (node.parentNode) { node.parentNode.removeChild(node); } }, 1200, el);
    }
  }

  // ===== AUDIO =====
  var audioCtx = null;
  function getCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    }
    return audioCtx;
  }

  function playTone(freq, type, vol, dur, delay) {
    var ctx = getCtx();
    if (!ctx) return;
    var d = delay || 0;
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + d);
    gain.gain.setValueAtTime(vol || 0.12, ctx.currentTime + d);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + (dur || 0.2));
    osc.start(ctx.currentTime + d);
    osc.stop(ctx.currentTime  + d + (dur || 0.2));
  }

  function soundClick(state) {
    if (state === 1)      { playTone(220, 'square', 0.07, 0.08); }
    else if (state === 2) { playTone(440, 'sine',   0.11, 0.14); }
    else                  { playTone(180, 'sine',   0.05, 0.07); }
  }

  function soundStart() {
    playTone(330, 'sine', 0.09, 0.12, 0.00);
    playTone(440, 'sine', 0.09, 0.12, 0.13);
    playTone(550, 'sine', 0.09, 0.18, 0.26);
  }

  function soundVictory() {
    var notes = [392, 523, 659, 784, 1047];
    notes.forEach(function(f, i) { playTone(f, 'sine', 0.11, 0.22, i * 0.11); });
  }

  function soundLose() {
    playTone(280, 'sawtooth', 0.09, 0.15, 0.00);
    playTone(220, 'sawtooth', 0.09, 0.20, 0.16);
    playTone(160, 'sawtooth', 0.09, 0.35, 0.32);
  }

  // ===== EVENTS =====
  startBtn.addEventListener('click', startGame);

  backBtn.addEventListener('click', function() {
    if (gameActive) {
      gameActive = false;
      clearInterval(timerInterval);
    }
    showScreen(startScreen);
    updateStartScreen();
  });

  accuseBtn.addEventListener('click', makeAccusation);
  shareBtn.addEventListener('click', doShare);
  menuBtn.addEventListener('click', function() {
    showScreen(startScreen);
    updateStartScreen();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && gameScreen.classList.contains('active') && gameActive) {
      gameActive = false;
      clearInterval(timerInterval);
      showScreen(startScreen);
      updateStartScreen();
    }
  });

  // ===== INIT =====
  updateStartScreen();

})();
</script>
</body>
