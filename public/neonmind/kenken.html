<script>
(function(){
'use strict';

/* ============================================================
   AUDIO ENGINE
   ============================================================ */
var audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type, vol){
  try{
    var a = getAudio();
    var o = a.createOscillator();
    var g = a.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g);
    g.connect(a.destination);
    o.start(a.currentTime);
    o.stop(a.currentTime + dur);
  }catch(e){}
}
function sndPlace(){ playTone(880, 0.08, 'square', 0.06); }
function sndClear(){ playTone(440, 0.06, 'sine', 0.04); }
function sndError(){ playTone(150, 0.2, 'sawtooth', 0.07); }
function sndUndo(){ playTone(330, 0.05, 'triangle', 0.04); }
function sndVictory(){
  var notes = [523, 659, 784, 1047];
  notes.forEach(function(n, i){
    setTimeout(function(){ playTone(n, 0.2, 'square', 0.06); }, i * 120);
  });
}

/* ============================================================
   PARTICLES
   ============================================================ */
function spawnParticles(x, y, color, count){
  count = count || 12;
  for(var i = 0; i < count; i++){
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 3 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = color;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.boxShadow = '0 0 6px ' + color;
    document.body.appendChild(p);
    var angle = Math.random() * Math.PI * 2;
    var speed = 40 + Math.random() * 80;
    var dx = Math.cos(angle) * speed;
    var dy = Math.sin(angle) * speed;
    (function(el, ddx, ddy){
      var sx = x, sy = y, t = 0;
      var dur = 0.4 + Math.random() * 0.4;
      function tick(){
        t += 0.016;
        if(t > dur){ el.remove(); return; }
        sx += ddx * 0.016;
        sy += ddy * 0.016;
        ddy += 200 * 0.016;
        el.style.left = sx + 'px';
        el.style.top = sy + 'px';
        el.style.opacity = String(1 - t / dur);
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })(p, dx, dy);
  }
}

/* ============================================================
   STATE
   ============================================================ */
var currentSize = 4;
var solution = [];
var cages = [];
var cageMap = [];
var userGrid = [];
var pencilMarks = [];
var selectedR = -1;
var selectedC = -1;
var pencilMode = false;
var autoCheck = false;
var timerStart = 0;
var timerElapsed = 0;
var timerInterval = null;
var undoStack = [];
var gameActive = false;
var longPressTimer = null;

/* Canvas */
var canvas, ctx;
var dpr = 1;
var cellSize = 60;
var gridPx = 0;

/* ============================================================
   NEON.JS INIT
   ============================================================ */
function initNeon(){
  Neon.init({
    game: 'kenken',
    mode: 'low',
    key: 'neonarcade_neonmind_kenken_scores_' + currentSize,
    formatScore: function(s){

/* ============================================================
   DIFFICULTY SELECTION
   ============================================================ */
window.selectDiff = function(size){

/* ============================================================
   SCREEN MANAGEMENT
   ============================================================ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

window.goBack = function(){

  initNeon();
  Neon.render(document.getElementById('startLB'));
};

/* ============================================================
   PUZZLE GENERATION
   ============================================================ */

function shuffle(arr){
  for(var i = arr.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

/* Generate a random Latin square */
function generateLatinSquare(n){
  var grid = [];
  for(var r = 0; r < n; r++){
    grid[r] = [];
    for(var c = 0; c < n; c++){
      grid[r][c] = ((r + c) % n) + 1;
    }
  }
  /* Shuffle via row swaps, column swaps, and number relabelling */
  for(var iter = 0; iter < n * 20; iter++){
    var op = Math.floor(Math.random() * 3);
    if(op === 0){
      var r1 = Math.floor(Math.random() * n);
      var r2 = Math.floor(Math.random() * n);
      var tmp = grid[r1]; grid[r1] = grid[r2]; grid[r2] = tmp;
    } else if(op === 1){
      var c1 = Math.floor(Math.random() * n);
      var c2 = Math.floor(Math.random() * n);
      for(var rr = 0; rr < n; rr++){
        var t = grid[rr][c1]; grid[rr][c1] = grid[rr][c2]; grid[rr][c2] = t;
      }
    } else {
      var a = Math.floor(Math.random() * n) + 1;
      var b = Math.floor(Math.random() * n) + 1;
      if(a !== b){
        for(var rr2 = 0; rr2 < n; rr2++){
          for(var cc = 0; cc < n; cc++){
            if(grid[rr2][cc] === a) grid[rr2][cc] = b;
            else if(grid[rr2][cc] === b) grid[rr2][cc] = a;
          }
        }
      }
    }
  }
  return grid;
}

/* Partition grid into contiguous cages of 1-4 cells */
function generateCages(n){
  var map = [];
  for(var r = 0; r < n; r++){
    map[r] = [];
    for(var c = 0; c < n; c++) map[r][c] = -1;
  }
  var cageList = [];
  var cageId = 0;
  var cells = [];
  for(var r2 = 0; r2 < n; r2++){
    for(var c2 = 0; c2 < n; c2++) cells.push([r2, c2]);
  }
  shuffle(cells);

  for(var i = 0; i < cells.length; i++){
    var cr = cells[i][0], cc = cells[i][1];
    if(map[cr][cc] !== -1) continue;
    var maxCageSize = Math.random() < 0.15 ? 1 : (Math.random() < 0.4 ? 2 : (Math.random() < 0.7 ? 3 : 4));
    var cage = [[cr, cc]];
    map[cr][cc] = cageId;
    while(cage.length < maxCageSize){
      var neighbors = [];
      for(var j = 0; j < cage.length; j++){
        var nr = cage[j][0], nc = cage[j][1];
        var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
        for(var d = 0; d < dirs.length; d++){
          var rr3 = nr + dirs[d][0], cc3 = nc + dirs[d][1];
          if(rr3 >= 0 && rr3 < n && cc3 >= 0 && cc3 < n && map[rr3][cc3] === -1){
            var found = false;
            for(var k = 0; k < neighbors.length; k++){
              if(neighbors[k][0] === rr3 && neighbors[k][1] === cc3){ found = true; break; }
            }
            if(!found) neighbors.push([rr3, cc3]);
          }
        }
      }
      if(neighbors.length === 0) break;
      var pick = neighbors[Math.floor(Math.random() * neighbors.length)];
      cage.push(pick);
      map[pick[0]][pick[1]] = cageId;
    }
    cageList.push(cage);
    cageId++;
  }
  return { map: map, cages: cageList };
}

/* Assign operations and targets to cages based on solution values */
function assignOperations(cageList, sol, n){
  var result = [];
  for(var i = 0; i < cageList.length; i++){
    var cellArr = cageList[i];
    var vals = cellArr.map(function(c){ return sol[c[0]][c[1]]; });

    if(cellArr.length === 1){
      result.push({ cells: cellArr, op: '', target: vals[0] });
      continue;
    }

    var ops = [];
    var sum = 0;
    for(var j = 0; j < vals.length; j++) sum += vals[j];
    ops.push({ op: '+', target: sum });

    var prod = 1;
    for(var j2 = 0; j2 < vals.length; j2++) prod *= vals[j2];
    ops.push({ op: '\u00d7', target: prod });

    if(cellArr.length === 2){
      var big = Math.max(vals[0], vals[1]);
      var small = Math.min(vals[0], vals[1]);
      ops.push({ op: '-', target: big - small });
      if(small > 0 && big % small === 0){
        ops.push({ op: '\u00f7', target: big / small });
      }
    }

    var chosen = ops[Math.floor(Math.random() * ops.length)];
    result.push({ cells: cellArr, op: chosen.op, target: chosen.target });
  }
  return result;
}

/* Backtracking solver to verify uniqueness */
function solvePuzzle(n, cageList, cageMapArr){
  var grid = [];
  for(var r = 0; r < n; r++){
    grid[r] = [];
    for(var c = 0; c < n; c++) grid[r][c] = 0;
  }
  var solutions = 0;

  function isValid(r, c, num){
    for(var cc = 0; cc < n; cc++){
      if(cc !== c && grid[r][cc] === num) return false;
    }
    for(var rr = 0; rr < n; rr++){
      if(rr !== r && grid[rr][c] === num) return false;
    }
    return true;
  }

  function checkCageFull(cageIdx){
    var cage = cageList[cageIdx];
    var vals = [];
    for(var i = 0; i < cage.cells.length; i++){
      var v = grid[cage.cells[i][0]][cage.cells[i][1]];
      if(v === 0) return true;
      vals.push(v);
    }
    if(cage.op === '') return vals[0] === cage.target;
    if(cage.op === '+'){
      var s = 0; for(var j = 0; j < vals.length; j++) s += vals[j];
      return s === cage.target;
    }
    if(cage.op === '\u00d7'){
      var p = 1; for(var j2 = 0; j2 < vals.length; j2++) p *= vals[j2];
      return p === cage.target;
    }
    if(cage.op === '-'){
      return Math.max.apply(null, vals) - Math.min.apply(null, vals) === cage.target;
    }
    if(cage.op === '\u00f7'){
      var mx = Math.max.apply(null, vals);
      var mn = Math.min.apply(null, vals);
      return mn > 0 && mx / mn === cage.target;
    }
    return false;
  }

  function checkCagePartial(cageIdx){
    var cage = cageList[cageIdx];
    var vals = [];
    var empties = 0;
    for(var i = 0; i < cage.cells.length; i++){
      var v = grid[cage.cells[i][0]][cage.cells[i][1]];
      if(v === 0) empties++;
      else vals.push(v);
    }
    if(empties === 0) return checkCageFull(cageIdx);
    if(vals.length === 0) return true;
    if(cage.op === '+'){
      var s = 0; for(var j = 0; j < vals.length; j++) s += vals[j];
      if(s + empties > cage.target) return false;
      if(s + empties * n < cage.target) return false;
    } else if(cage.op === '\u00d7'){
      var p = 1; for(var j2 = 0; j2 < vals.length; j2++) p *= vals[j2];
      if(p > cage.target) return false;
      if(cage.target % p !== 0) return false;
    }
    return true;
  }

  function solve(pos){
    if(solutions > 1) return;
    if(pos === n * n){
      solutions++;
      return;
    }
    var r = Math.floor(pos / n);
    var c = pos % n;
    for(var num = 1; num <= n; num++){
      if(!isValid(r, c, num)) continue;
      grid[r][c] = num;
      var cIdx = cageMapArr[r][c];
      if(checkCagePartial(cIdx)){
        solve(pos + 1);
      }
      grid[r][c] = 0;
      if(solutions > 1) return;
    }
  }

  solve(0);
  return solutions;
}

function generatePuzzle(n){
  var maxAttempts = 40;
  for(var attempt = 0; attempt < maxAttempts; attempt++){
    var sol = generateLatinSquare(n);
    var cageData = generateCages(n);
    var cageList = assignOperations(cageData.cages, sol, n);
    var solCount = solvePuzzle(n, cageList, cageData.map);
    if(solCount === 1){
      return { solution: sol, cages: cageList, cageMap: cageData.map };
    }
  }
  return getPregenPuzzle(n);
}

function getPregenPuzzle(n){
  var puzzles = PREGEN[n];
  if(!puzzles || puzzles.length === 0) return null;
  var p = puzzles[Math.floor(Math.random() * puzzles.length)];
  return JSON.parse(JSON.stringify(p));
}

/* ============================================================
   CANVAS DRAWING
   ============================================================ */
function initCanvas(){
  canvas = document.getElementById('gridCanvas');
  ctx = canvas.getContext('2d');
  dpr = window.devicePixelRatio || 1;
  sizeCanvas();
}

function sizeCanvas(){
  var container = document.getElementById('gridContainer');
  var maxW = container.clientWidth - 16;
  /* Top-bar 40 + tools 40 + numpad 55 + nav-bar 65 + screen padding 16 + gaps 24 = ~240 */
  var availH = window.innerHeight - 240;
  var maxDim = Math.min(maxW, Math.max(200, availH));
  cellSize = Math.floor(maxDim / currentSize);
  gridPx = cellSize * currentSize;

  canvas.width = gridPx * dpr;
  canvas.height = gridPx * dpr;
  canvas.style.width = gridPx + 'px';
  canvas.style.height = gridPx + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  drawGrid();
}

function drawGrid(){
  if(!gameActive && !solution.length) return;
  var n = currentSize;

  ctx.clearRect(0, 0, gridPx, gridPx);

  /* Cell backgrounds */
  for(var r = 0; r < n; r++){
    for(var c = 0; c < n; c++){
      var x = c * cellSize;
      var y = r * cellSize;

      var bg = '#14142a';
      if(selectedR === r && selectedC === c){
        bg = '#1f1f40';
      } else if(selectedR >= 0 && selectedC >= 0 && cageMap[r] && cageMap[selectedR] &&
                cageMap[r][c] === cageMap[selectedR][selectedC]){
        bg = '#181835';
      }

      if(autoCheck && userGrid[r] && userGrid[r][c] > 0 && hasRowColDuplicate(r, c)){
        bg = 'rgba(255,45,123,0.12)';
      }

      ctx.fillStyle = bg;
      ctx.fillRect(x, y, cellSize, cellSize);

      /* Thin grid lines */
      ctx.strokeStyle = '#2a2a4a';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
    }
  }

  /* Cage borders (thick neon cyan) */
  ctx.strokeStyle = '#00f0ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = 'rgba(0,240,255,0.3)';
  ctx.shadowBlur = 4;

  for(var ci = 0; ci < cages.length; ci++){
    drawCageBorder(cages[ci].cells);
  }
  ctx.shadowBlur = 0;

  /* Cage labels (target + op) */
  for(var ci2 = 0; ci2 < cages.length; ci2++){
    var cage = cages[ci2];
    var topLeft = cage.cells[0];
    for(var j = 1; j < cage.cells.length; j++){
      if(cage.cells[j][0] < topLeft[0] ||
        (cage.cells[j][0] === topLeft[0] && cage.cells[j][1] < topLeft[1])){
        topLeft = cage.cells[j];
      }
    }
    var lx = topLeft[1] * cellSize + 4;
    var ly = topLeft[0] * cellSize + 4;
    var labelSize = Math.max(10, Math.min(cellSize * 0.22, 16));
    ctx.font = '700 ' + labelSize + 'px Rajdhani, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(255,215,0,0.4)';
    ctx.shadowBlur = 4;
    var label = cage.target + cage.op;
    ctx.fillText(label, lx, ly);
    ctx.shadowBlur = 0;
  }

  /* Selected cell highlight */
  if(selectedR >= 0 && selectedC >= 0){
    var sx = selectedC * cellSize;
    var sy = selectedR * cellSize;
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(0,240,255,0.5)';
    ctx.shadowBlur = 8;
    ctx.strokeRect(sx + 2, sy + 2, cellSize - 4, cellSize - 4);
    ctx.shadowBlur = 0;
  }

  /* User numbers and pencil marks */
  for(var r2 = 0; r2 < n; r2++){
    for(var c2 = 0; c2 < n; c2++){
      var cx = c2 * cellSize + cellSize / 2;
      var cy = r2 * cellSize + cellSize / 2;

      if(userGrid[r2][c2] > 0){
        var numSize = Math.max(16, cellSize * 0.42);
        ctx.font = '700 ' + numSize + 'px Orbitron, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if(autoCheck && hasRowColDuplicate(r2, c2)){
          ctx.fillStyle = '#ff2d7b';
          ctx.shadowColor = 'rgba(255,45,123,0.5)';
        } else {
          ctx.fillStyle = '#ffffff';
          ctx.shadowColor = 'rgba(255,255,255,0.15)';
        }
        ctx.shadowBlur = 4;
        ctx.fillText(String(userGrid[r2][c2]), cx, cy + 2);
        ctx.shadowBlur = 0;
      } else if(pencilMarks[r2] && pencilMarks[r2][c2] && pencilMarks[r2][c2].size > 0){
        var marks = pencilMarks[r2][c2];
        var subCols = currentSize <= 4 ? 2 : 3;
        var subRows = Math.ceil(currentSize / subCols);
        var subW = cellSize / subCols;
        var subH = cellSize / subRows;
        var markSize = Math.max(8, cellSize * 0.16);
        ctx.font = '500 ' + markSize + 'px Rajdhani, sans-serif';
        ctx.fillStyle = '#7a7a9a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for(var num = 1; num <= currentSize; num++){
          if(marks.has(num)){
            var mi = num - 1;
            var mr = Math.floor(mi / subCols);
            var mc = mi % subCols;
            var pmx = c2 * cellSize + mc * subW + subW / 2;
            var pmy = r2 * cellSize + mr * subH + subH / 2;
            ctx.fillText(String(num), pmx, pmy);
          }
        }
      }
    }
  }
}

function drawCageBorder(cells){
  var n = currentSize;
  var cellSet = {};
  for(var i = 0; i < cells.length; i++){
    cellSet[cells[i][0] + ',' + cells[i][1]] = true;
  }

  for(var i2 = 0; i2 < cells.length; i2++){
    var r = cells[i2][0], c = cells[i2][1];
    var x = c * cellSize, y = r * cellSize;

    if(r === 0 || !cellSet[(r-1) + ',' + c]){
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); ctx.stroke();
    }
    if(r === n - 1 || !cellSet[(r+1) + ',' + c]){
      ctx.beginPath(); ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke();
    }
    if(c === 0 || !cellSet[r + ',' + (c-1)]){
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); ctx.stroke();
    }
    if(c === n - 1 || !cellSet[r + ',' + (c+1)]){
      ctx.beginPath(); ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke();
    }
  }
}

/* ============================================================
   ERROR CHECKING
   ============================================================ */
function hasRowColDuplicate(r, c){
  var n = currentSize;
  var val = userGrid[r][c];
  if(val === 0) return false;
  for(var cc = 0; cc < n; cc++){
    if(cc !== c && userGrid[r][cc] === val) return true;
  }
  for(var rr = 0; rr < n; rr++){
    if(rr !== r && userGrid[rr][c] === val) return true;
  }
  return false;
}

window.toggleAutoCheck = function(){
  autoCheck = !autoCheck;
  document.getElementById('checkLabel').textContent = 'CHECK: ' + (autoCheck ? 'ON' : 'OFF');
  document.getElementById('checkLabel').style.color = autoCheck ? '#39ff14' : '#ffd700';
  drawGrid();
};

/* ============================================================
   WIN DETECTION
   ============================================================ */
function checkWin(){
  var n = currentSize;
  for(var r = 0; r < n; r++){
    for(var c = 0; c < n; c++){
      if(userGrid[r][c] === 0) return false;
    }
  }
  for(var r2 = 0; r2 < n; r2++){
    var rowSet = {};
    for(var c2 = 0; c2 < n; c2++){
      if(rowSet[userGrid[r2][c2]]) return false;
      rowSet[userGrid[r2][c2]] = true;
    }
  }
  for(var c3 = 0; c3 < n; c3++){
    var colSet = {};
    for(var r3 = 0; r3 < n; r3++){
      if(colSet[userGrid[r3][c3]]) return false;
      colSet[userGrid[r3][c3]] = true;
    }
  }
  for(var i = 0; i < cages.length; i++){
    if(!checkCageConstraint(cages[i])) return false;
  }
  return true;
}

function checkCageConstraint(cage){
  var vals = cage.cells.map(function(c){ return userGrid[c[0]][c[1]]; });
  if(cage.op === '') return vals[0] === cage.target;
  if(cage.op === '+'){
    var s = 0; for(var j = 0; j < vals.length; j++) s += vals[j];
    return s === cage.target;
  }
  if(cage.op === '\u00d7'){
    var p = 1; for(var j2 = 0; j2 < vals.length; j2++) p *= vals[j2];
    return p === cage.target;
  }
  if(cage.op === '-'){
    return Math.max.apply(null, vals) - Math.min.apply(null, vals) === cage.target;
  }
  if(cage.op === '\u00f7'){
    var mx = Math.max.apply(null, vals);
    var mn = Math.min.apply(null, vals);
    return mn > 0 && mx / mn === cage.target;
  }
  return false;
}

/* ============================================================
   GAME ACTIONS
   ============================================================ */
function placeNumber(num){
  if(!gameActive || selectedR < 0 || selectedC < 0) return;
  if(num < 1 || num > currentSize) return;

  if(pencilMode){
    undoStack.push({
      r: selectedR, c: selectedC,
      val: userGrid[selectedR][selectedC],
      marks: new Set(pencilMarks[selectedR][selectedC])
    });
    if(pencilMarks[selectedR][selectedC].has(num)){
      pencilMarks[selectedR][selectedC].delete(num);
    } else {
      pencilMarks[selectedR][selectedC].add(num);
    }
    sndPlace();
    drawGrid();
    return;
  }

  undoStack.push({
    r: selectedR, c: selectedC,
    val: userGrid[selectedR][selectedC],
    marks: new Set(pencilMarks[selectedR][selectedC])
  });

  userGrid[selectedR][selectedC] = num;
  pencilMarks[selectedR][selectedC] = new Set();

  if(autoCheck && hasRowColDuplicate(selectedR, selectedC)){
    sndError();
    document.body.classList.add('shake');
    setTimeout(function(){ document.body.classList.remove('shake'); }, 250);
  } else {
    sndPlace();
  }

  /* Particles at cell */
  var rect = canvas.getBoundingClientRect();
  var scaleRatio = rect.width / gridPx;
  var px = rect.left + selectedC * cellSize * scaleRatio + cellSize * scaleRatio / 2;
  var py = rect.top + selectedR * cellSize * scaleRatio + cellSize * scaleRatio / 2;
  spawnParticles(px, py, '#00f0ff', 6);

  drawGrid();

  if(checkWin()){
    gameActive = false;
    if(timerInterval) clearInterval(timerInterval);
    sndVictory();
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#39ff14', 20);
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#00f0ff', 15);
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#ffd700', 15);
    setTimeout(showComplete, 600);
  }
}

window.doUndo = function(){
  if(!gameActive || undoStack.length === 0) return;
  var entry = undoStack.pop();
  userGrid[entry.r][entry.c] = entry.val;
  pencilMarks[entry.r][entry.c] = entry.marks;
  sndUndo();
  drawGrid();
};

window.togglePencil = function(){
  pencilMode = !pencilMode;
  document.getElementById('pencilBtn').classList.toggle('active', pencilMode);
  sndPlace();
};

window.clearCell = function(){
  if(!gameActive || selectedR < 0 || selectedC < 0) return;
  if(userGrid[selectedR][selectedC] === 0 &&
     (!pencilMarks[selectedR][selectedC] || pencilMarks[selectedR][selectedC].size === 0)) return;
  undoStack.push({
    r: selectedR, c: selectedC,
    val: userGrid[selectedR][selectedC],
    marks: new Set(pencilMarks[selectedR][selectedC])
  });
  userGrid[selectedR][selectedC] = 0;
  pencilMarks[selectedR][selectedC] = new Set();
  sndClear();
  drawGrid();
};

/* ============================================================
   INPUT: CANVAS CLICKS
   ============================================================ */
function getCellFromEvent(e){
  var rect = canvas.getBoundingClientRect();
  var scaleX = gridPx / rect.width;
  var scaleY = gridPx / rect.height;
  var clientX, clientY;
  if(e.touches && e.touches.length > 0){
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if(e.changedTouches && e.changedTouches.length > 0){
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  var x = (clientX - rect.left) * scaleX;
  var y = (clientY - rect.top) * scaleY;
  var c = Math.floor(x / cellSize);
  var r = Math.floor(y / cellSize);
  if(r >= 0 && r < currentSize && c >= 0 && c < currentSize){
    return { r: r, c: c };
  }
  return null;
}

function onCanvasClick(e){
  if(!gameActive) return;
  var cell = getCellFromEvent(e);
  if(!cell) return;

  if(selectedR === cell.r && selectedC === cell.c){
    window.clearCell();
  } else {
    selectedR = cell.r;
    selectedC = cell.c;
    sndPlace();
  }
  drawGrid();
}

function onCanvasTouchStart(e){
  if(!gameActive) return;
  longPressTimer = setTimeout(function(){
    if(!pencilMode) window.togglePencil();
    longPressTimer = null;
  }, 500);
}

function onCanvasTouchEnd(e){
  if(longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}

/* ============================================================
   INPUT: KEYBOARD
   ============================================================ */
document.addEventListener('keydown', function(e){
  if(!gameActive) return;

  if(e.key === 'Escape'){
    e.preventDefault();
    window.goBack();
    return;
  }

  if(e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight'){
    e.preventDefault();
    if(selectedR < 0){ selectedR = 0; selectedC = 0; }
    else if(e.key === 'ArrowUp') selectedR = Math.max(0, selectedR - 1);
    else if(e.key === 'ArrowDown') selectedR = Math.min(currentSize - 1, selectedR + 1);
    else if(e.key === 'ArrowLeft') selectedC = Math.max(0, selectedC - 1);
    else if(e.key === 'ArrowRight') selectedC = Math.min(currentSize - 1, selectedC + 1);
    drawGrid();
    return;
  }

  var num = parseInt(e.key);
  if(num >= 1 && num <= currentSize){
    e.preventDefault();
    placeNumber(num);
    return;
  }

  if(e.key === 'Delete' || e.key === 'Backspace'){
    e.preventDefault();
    window.clearCell();
    return;
  }

  if(e.key === 'p' || e.key === 'P'){
    e.preventDefault();
    window.togglePencil();
    return;
  }

  if((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)){
    e.preventDefault();
    window.doUndo();
    return;
  }
});

document.addEventListener('contextmenu', function(e){
  if(gameActive && e.target === canvas){
    e.preventDefault();
    if(!pencilMode) window.togglePencil();
  }
});

/* ============================================================
   NUMBER PAD
   ============================================================ */
function buildNumpad(){
  var pad = document.getElementById('numpad');
  /* Remove existing buttons */
  while(pad.firstChild) pad.removeChild(pad.firstChild);
  pad.style.gridTemplateColumns = 'repeat(' + currentSize + ', 1fr)';
  for(var i = 1; i <= currentSize; i++){
    var btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = String(i);
    btn.setAttribute('data-num', String(i));
    (function(n){
      btn.addEventListener('click', function(){ placeNumber(n); });
    })(i);
    pad.appendChild(btn);
  }
}

/* ============================================================
   TIMER
   ============================================================ */
function startTimer(){
  timerStart = Date.now();
  timerElapsed = 0;
  updateTimerDisplay();
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    timerElapsed = Math.floor((Date.now() - timerStart) / 1000);
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay(){
  var m = Math.floor(timerElapsed / 60);
  var s = timerElapsed % 60;
  document.getElementById('timer').textContent =
    (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function formatTime(secs){
  var m = Math.floor(secs / 60);
  var s = secs % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

/* ============================================================
   START GAME
   ============================================================ */
window.startGame = function(){
  initNeon();

  var puzzle = generatePuzzle(currentSize);
  solution = puzzle.solution;
  cages = puzzle.cages;
  cageMap = puzzle.cageMap;

  var n = currentSize;
  userGrid = [];
  pencilMarks = [];
  for(var r = 0; r < n; r++){
    userGrid[r] = [];
    pencilMarks[r] = [];
    for(var c = 0; c < n; c++){
      userGrid[r][c] = 0;
      pencilMarks[r][c] = new Set();
    }
  }

  selectedR = -1;
  selectedC = -1;
  pencilMode = false;
  autoCheck = false;
  undoStack = [];
  gameActive = true;

  document.getElementById('pencilBtn').classList.remove('active');
  document.getElementById('checkLabel').textContent = 'CHECK: OFF';
  document.getElementById('checkLabel').style.color = '#ffd700';
  document.getElementById('diffLabel').textContent = currentSize + 'x' + currentSize;

  buildNumpad();
  showScreen('gameScreen');
  initCanvas();
  startTimer();

  canvas.removeEventListener('click', onCanvasClick);
  canvas.addEventListener('click', onCanvasClick);
  canvas.removeEventListener('touchstart', onCanvasTouchStart);
  canvas.addEventListener('touchstart', onCanvasTouchStart, { passive: true });
  canvas.removeEventListener('touchend', onCanvasTouchEnd);
  canvas.addEventListener('touchend', onCanvasTouchEnd);

  drawGrid();
};

/* ============================================================
   COMPLETE SCREEN
   ============================================================ */
function showComplete(){
  var secs = timerElapsed;
  document.getElementById('finalTime').textContent = formatTime(secs);
  document.getElementById('finalSize').textContent = currentSize + 'x' + currentSize;

  var thresholds = { 4:[60,120,180], 5:[120,240,360], 6:[180,360,540] };
  var t = thresholds[currentSize] || [120,240,360];
  var stars;
  if(secs <= t[0]) stars = '\u2b50\u2b50\u2b50';
  else if(secs <= t[1]) stars = '\u2b50\u2b50';
  else if(secs <= t[2]) stars = '\u2b50';
  else stars = '\u2014';
  document.getElementById('stars').textContent = stars;

  showScreen('completeScreen');

  var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
  nameReady.then(function(){
    return Neon.save(secs);
  }).then(function(result){
    Neon.render(document.getElementById('completeLB'));
    if(result.globalRank >= 1 && result.globalRank <= 5){
      Neon.showGlobalSplash(result.globalRank);
    }
  });
}

/* ============================================================
   SHARE
   ============================================================ */
window.shareResult = function(){
  var secs = timerElapsed;
  var sizeLabel = currentSize + 'x' + currentSize;
  var diffLabel = currentSize === 4 ? 'Easy' : (currentSize === 5 ? 'Medium' : 'Hard');
  var text = '\ud83e\uddee KENKEN\n' +
    sizeLabel + ' ' + diffLabel + ' | \u23f1 ' + formatTime(secs) + '\n' +
    'Operations: + - \u00d7 \u00f7\n' +
    'No errors! \ud83c\udfaf\n' +
    'neonarcade.net/neonmind/kenken.html';

  if(navigator.share){
    navigator.share({ text: text }).catch(function(){
      copyToClipboard(text);
    });
  } else {
    copyToClipboard(text);
  }
};

function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(function(){
    showCopyToast();
  }).catch(function(){
    showCopyToast();
  });
}

function showCopyToast(){
  var toast = document.createElement('div');
  toast.textContent = 'COPIED TO CLIPBOARD';
  toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);' +
    'font-family:Orbitron,monospace;font-weight:700;font-size:12px;letter-spacing:2px;' +
    'color:#39ff14;background:rgba(57,255,20,0.1);border:1px solid #39ff14;' +
    'padding:10px 24px;border-radius:3px;z-index:10000;' +
    'text-shadow:0 0 8px rgba(57,255,20,0.5)';
  document.body.appendChild(toast);
  setTimeout(function(){ toast.remove(); }, 2000);
}

/* ============================================================
   RESIZE
   ============================================================ */
window.addEventListener('resize', function(){
  if(gameActive) sizeCanvas();
});

/* ============================================================
   INIT
   ============================================================ */
initNeon();
Neon.render(document.getElementById('startLB'));

})();
</script>
