<script>
(() => {
  // CONFIG
  var SIZES = { 4: 'EASY', 5: 'MEDIUM', 6: 'HARD' };
  var CLUE_KEEP = { 4: 0.6, 5: 0.5, 6: 0.4 };

  // STATE
  var N = 4;
  var grid = [];
  var solution = [];
  var clues = { top: [], bottom: [], left: [], right: [] };
  var selectedRow = -1, selectedCol = -1;
  var timerStart = 0, timerInterval = null, elapsed = 0;
  var moveHistory = [];
  var gameActive = false;

  // AUDIO
  var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTone(freq, dur, type, vol) {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }
  function sndPlace() { playTone(520, 0.12, 'sine', 0.07); }
  function sndError() { playTone(180, 0.25, 'sawtooth', 0.06); playTone(140, 0.3, 'sawtooth', 0.04); }
  function sndClear() { playTone(300, 0.08, 'sine', 0.05); }
  function sndWin() {
    [523, 659, 784, 1047].forEach(function(f, i) {
      setTimeout(function() { playTone(f, 0.3, 'sine', 0.07); }, i * 120);
    });
  }

  // PUZZLE GENERATION
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function generateLatinSquare(n) {
    var g = [];
    for (var i = 0; i < n; i++) g[i] = new Array(n).fill(0);

    function canPlace(r, c, v) {
      for (var i = 0; i < n; i++) {
        if (g[r][i] === v) return false;
        if (g[i][c] === v) return false;
      }
      return true;
    }

    function solve(pos) {
      if (pos === n * n) return true;
      var r = Math.floor(pos / n), c = pos % n;
      var vals = [];
      for (var i = 1; i <= n; i++) vals.push(i);
      shuffle(vals);
      for (var vi = 0; vi < vals.length; vi++) {
        if (canPlace(r, c, vals[vi])) {
          g[r][c] = vals[vi];
          if (solve(pos + 1)) return true;
          g[r][c] = 0;
        }
      }
      return false;
    }

    solve(0);
    return g;
  }

  function countVisible(arr) {
    var max = 0, count = 0;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i] > max) { count++; max = arr[i]; }
    }
    return count;
  }

  function getColumnFromGrid(g, c) {
    var col = [];
    for (var r = 0; r < g.length; r++) col.push(g[r][c]);
    return col;
  }

  function computeAllClues(sol, n) {
    var top = [], bottom = [], left = [], right = [];
    for (var c = 0; c < n; c++) {
      var col = getColumnFromGrid(sol, c);
      top.push(countVisible(col));
      bottom.push(countVisible(col.slice().reverse()));
    }
    for (var r = 0; r < n; r++) {
      left.push(countVisible(sol[r]));
      right.push(countVisible(sol[r].slice().reverse()));
    }
    return { top: top, bottom: bottom, left: left, right: right };
  }

  function hasUniqueSolution(cluesObj, n) {
    var solCount = 0;
    var tg = [];
    for (var i = 0; i < n; i++) tg[i] = new Array(n).fill(0);

    function canPlace(r, c, v) {
      for (var i = 0; i < n; i++) {
        if (tg[r][i] === v) return false;
        if (tg[i][c] === v) return false;
      }
      return true;
    }

    function checkCluesPartial(r, c) {
      var rowComplete = true;
      for (var i = 0; i < n; i++) { if (tg[r][i] === 0) { rowComplete = false; break; } }
      if (rowComplete) {
        if (cluesObj.left[r] > 0 && countVisible(tg[r]) !== cluesObj.left[r]) return false;
        if (cluesObj.right[r] > 0 && countVisible(tg[r].slice().reverse()) !== cluesObj.right[r]) return false;
      }
      var colComplete = true;
      for (var i = 0; i < n; i++) { if (tg[i][c] === 0) { colComplete = false; break; } }
      if (colComplete) {
        var col = getColumnFromGrid(tg, c);
        if (cluesObj.top[c] > 0 && countVisible(col) !== cluesObj.top[c]) return false;
        if (cluesObj.bottom[c] > 0 && countVisible(col.slice().reverse()) !== cluesObj.bottom[c]) return false;
      }
      return true;
    }

    function solve(pos) {
      if (solCount > 1) return;
      if (pos === n * n) { solCount++; return; }
      var r = Math.floor(pos / n), c = pos % n;
      for (var v = 1; v <= n; v++) {
        if (canPlace(r, c, v)) {
          tg[r][c] = v;
          if (checkCluesPartial(r, c)) solve(pos + 1);
          tg[r][c] = 0;
        }
      }
    }

    solve(0);
    return solCount === 1;
  }

  function generatePuzzle(n) {
    var sol = generateLatinSquare(n);
    var allClues = computeAllClues(sol, n);
    var keepRatio = CLUE_KEEP[n] || 0.5;

    var indices = [];
    for (var i = 0; i < n; i++) {
      indices.push({ side: 'top', idx: i });
      indices.push({ side: 'bottom', idx: i });
      indices.push({ side: 'left', idx: i });
      indices.push({ side: 'right', idx: i });
    }
    shuffle(indices);

    var puzzleClues = {
      top: allClues.top.slice(),
      bottom: allClues.bottom.slice(),
      left: allClues.left.slice(),
      right: allClues.right.slice()
    };

    var totalClues = n * 4;
    var targetKeep = Math.ceil(totalClues * keepRatio);
    var removed = 0;
    var maxRemove = totalClues - targetKeep;

    for (var i = 0; i < indices.length && removed < maxRemove; i++) {
      var ci = indices[i];
      var oldVal = puzzleClues[ci.side][ci.idx];
      puzzleClues[ci.side][ci.idx] = 0;
      if (hasUniqueSolution(puzzleClues, n)) {
        removed++;
      } else {
        puzzleClues[ci.side][ci.idx] = oldVal;
      }
    }

    return { solution: sol, clues: puzzleClues };
  }

  // NEON.JS
  function initNeon() {
    if (typeof Neon !== 'undefined') {
      Neon.init({
        game: 'skyscrapers',
        mode: 'low',
        key: 'neonarcade_neonmind_skyscrapers_scores_' + N,
        formatScore: function(s) {
          var m = Math.floor(s / 60);
          var sec = Math.floor(s % 60);
          return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        }
      });
      Neon.render(document.getElementById('startLB'));
    }
  }

  // DIFFICULTY SELECT
  window.selectDiff = function(el) {
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('selected'); });
    el.classList.add('selected');
    N = parseInt(el.dataset.size);
    initNeon();
  };

  // SHOW SCREENS
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  window.showStart = function() {
    stopTimer();
    gameActive = false;
    showScreen('startScreen');
    initNeon();
  };

  // TIMER
  function startTimer() {
    timerStart = Date.now();
    elapsed = 0;
    updateTimerDisplay();
    timerInterval = setInterval(function() {
      elapsed = (Date.now() - timerStart) / 1000;
      updateTimerDisplay();
    }, 200);
  }
  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }
  function updateTimerDisplay() {
    var m = Math.floor(elapsed / 60);
    var s = Math.floor(elapsed % 60);
    document.getElementById('timer').textContent =
      (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }
  function formatTime(sec) {
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  // BUILD GRID UI
  function buildGrid() {
    var wrapper = document.getElementById('gridWrapper');
    // Clear children safely
    while (wrapper.firstChild) wrapper.removeChild(wrapper.firstChild);

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var maxGridWidth = Math.min(vw - 40, 500);
    var maxGridHeight = vh - 200;
    var totalSlots = N + 2;
    var cellSize = Math.floor(Math.min(maxGridWidth / totalSlots, maxGridHeight / totalSlots));
    cellSize = Math.max(cellSize, 32);
    cellSize = Math.min(cellSize, 64);
    var clueSize = cellSize;
    var fontSize = Math.max(14, Math.floor(cellSize * 0.45));
    var clueFontSize = Math.max(12, Math.floor(clueSize * 0.4));

    var container = document.createElement('div');
    container.style.display = 'grid';
    container.style.gridTemplateColumns = clueSize + 'px repeat(' + N + ', ' + cellSize + 'px) ' + clueSize + 'px';
    container.style.gridTemplateRows = clueSize + 'px repeat(' + N + ', ' + cellSize + 'px) ' + clueSize + 'px';
    container.style.gap = '0px';

    // Top-left corner
    container.appendChild(document.createElement('div'));

    // Top clues
    for (var c = 0; c < N; c++) {
      container.appendChild(createClue(clues.top[c], clueFontSize, 'top', c));
    }

    // Top-right corner
    container.appendChild(document.createElement('div'));

    // Grid rows
    for (var r = 0; r < N; r++) {
      container.appendChild(createClue(clues.left[r], clueFontSize, 'left', r));

      for (var c = 0; c < N; c++) {
        var cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.style.width = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        cell.style.fontSize = fontSize + 'px';
        cell.dataset.row = r;
        cell.dataset.col = c;
        cell.id = 'cell-' + r + '-' + c;
        if (grid[r][c] > 0) {
          cell.textContent = grid[r][c];
          cell.classList.add('height-' + grid[r][c]);
        }
        (function(rr, cc) {
          cell.addEventListener('click', function() { selectCell(rr, cc); });
        })(r, c);
        container.appendChild(cell);
      }

      container.appendChild(createClue(clues.right[r], clueFontSize, 'right', r));
    }

    // Bottom-left corner
    container.appendChild(document.createElement('div'));

    // Bottom clues
    for (var c = 0; c < N; c++) {
      container.appendChild(createClue(clues.bottom[c], clueFontSize, 'bottom', c));
    }

    // Bottom-right corner
    container.appendChild(document.createElement('div'));

    wrapper.appendChild(container);

    buildNumpad();
    updateClueColors();
  }

  function createClue(val, fontSize, side, idx) {
    var el = document.createElement('div');
    el.className = 'clue';
    el.id = 'clue-' + side + '-' + idx;
    el.style.fontSize = fontSize + 'px';
    if (val > 0) {
      el.textContent = val;
    } else {
      el.classList.add('empty');
    }
    return el;
  }

  function buildNumpad() {
    var pad = document.getElementById('numpad');
    while (pad.firstChild) pad.removeChild(pad.firstChild);
    for (var i = 1; i <= N; i++) {
      var btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.textContent = i;
      (function(v) {
        btn.addEventListener('click', function() { placeNumber(v); });
      })(i);
      pad.appendChild(btn);
    }
    var clearBtn = document.createElement('button');
    clearBtn.className = 'num-btn clear-btn';
    clearBtn.textContent = 'CLR';
    clearBtn.addEventListener('click', function() { clearSelectedCell(); });
    pad.appendChild(clearBtn);
  }

  // CELL SELECTION
  function selectCell(r, c) {
    selectedRow = r;
    selectedCol = c;
    document.querySelectorAll('.grid-cell').forEach(function(el) { el.classList.remove('selected'); });
    var cell = document.getElementById('cell-' + r + '-' + c);
    if (cell) cell.classList.add('selected');
  }

  // PLACE NUMBER
  function placeNumber(val) {
    if (!gameActive || selectedRow < 0 || selectedCol < 0) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    var r = selectedRow, c = selectedCol;
    var old = grid[r][c];

    if (old === val) {
      clearSelectedCell();
      return;
    }

    moveHistory.push({ r: r, c: c, old: old });
    grid[r][c] = val;

    var cell = document.getElementById('cell-' + r + '-' + c);
    cell.textContent = val;
    cell.className = 'grid-cell selected filled height-' + val;

    var hasConflict = checkConflicts();
    if (hasConflict) {
      sndError();
      document.getElementById('gameScreen').classList.add('shake');
      setTimeout(function() { document.getElementById('gameScreen').classList.remove('shake'); }, 250);
    } else {
      sndPlace();
    }

    updateClueColors();

    if (isGridFull() && !hasConflict && allCluesSatisfied()) {
      gameWin();
    }
  }

  function clearSelectedCell() {
    if (!gameActive || selectedRow < 0 || selectedCol < 0) return;
    var r = selectedRow, c = selectedCol;
    if (grid[r][c] === 0) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    moveHistory.push({ r: r, c: c, old: grid[r][c] });
    grid[r][c] = 0;
    var cell = document.getElementById('cell-' + r + '-' + c);
    cell.textContent = '';
    cell.className = 'grid-cell selected';
    sndClear();
    checkConflicts();
    updateClueColors();
  }

  // UNDO
  window.doUndo = function() {
    if (!gameActive || moveHistory.length === 0) return;
    var entry = moveHistory.pop();
    grid[entry.r][entry.c] = entry.old;
    var cell = document.getElementById('cell-' + entry.r + '-' + entry.c);
    cell.textContent = entry.old > 0 ? entry.old : '';
    cell.className = 'grid-cell' + (entry.old > 0 ? ' height-' + entry.old : '');
    selectedRow = entry.r;
    selectedCol = entry.c;
    cell.classList.add('selected');
    document.querySelectorAll('.grid-cell').forEach(function(el) {
      if (el !== cell) el.classList.remove('selected');
    });
    sndClear();
    checkConflicts();
    updateClueColors();
  };

  // RESET
  window.resetPuzzle = function() {
    if (!gameActive) return;
    for (var r = 0; r < N; r++)
      for (var c = 0; c < N; c++)
        grid[r][c] = 0;
    moveHistory = [];
    selectedRow = -1;
    selectedCol = -1;
    buildGrid();
  };

  // CONFLICT CHECK
  function checkConflicts() {
    var conflictCells = {};

    for (var r = 0; r < N; r++) {
      var seen = {};
      for (var c = 0; c < N; c++) {
        var v = grid[r][c];
        if (v === 0) continue;
        if (seen[v] !== undefined) {
          conflictCells[r + ',' + c] = true;
          conflictCells[r + ',' + seen[v]] = true;
        } else {
          seen[v] = c;
        }
      }
    }

    for (var c = 0; c < N; c++) {
      var seen = {};
      for (var r = 0; r < N; r++) {
        var v = grid[r][c];
        if (v === 0) continue;
        if (seen[v] !== undefined) {
          conflictCells[r + ',' + c] = true;
          conflictCells[seen[v] + ',' + c] = true;
        } else {
          seen[v] = r;
        }
      }
    }

    var hasAny = false;
    for (var r = 0; r < N; r++) {
      for (var c = 0; c < N; c++) {
        var cell = document.getElementById('cell-' + r + '-' + c);
        if (conflictCells[r + ',' + c]) {
          cell.classList.add('conflict');
          hasAny = true;
        } else {
          cell.classList.remove('conflict');
        }
      }
    }

    return hasAny;
  }

  // CLUE SATISFACTION
  function updateClueColors() {
    var sides = ['top', 'bottom', 'left', 'right'];
    for (var si = 0; si < sides.length; si++) {
      var side = sides[si];
      for (var i = 0; i < N; i++) {
        var clueVal = clues[side][i];
        if (clueVal === 0) continue;
        var el = document.getElementById('clue-' + side + '-' + i);
        if (!el) continue;

        var line = getLine(side, i);
        var complete = true;
        for (var k = 0; k < line.length; k++) { if (line[k] === 0) { complete = false; break; } }

        if (complete) {
          var vis;
          if (side === 'bottom' || side === 'right') {
            vis = countVisible(line.slice().reverse());
          } else {
            vis = countVisible(line);
          }
          if (vis === clueVal) {
            el.classList.add('satisfied');
          } else {
            el.classList.remove('satisfied');
          }
        } else {
          el.classList.remove('satisfied');
        }
      }
    }
  }

  function getLine(side, idx) {
    if (side === 'top' || side === 'bottom') return getColumnFromGrid(grid, idx);
    return grid[idx].slice();
  }

  function isGridFull() {
    for (var r = 0; r < N; r++)
      for (var c = 0; c < N; c++)
        if (grid[r][c] === 0) return false;
    return true;
  }

  function allCluesSatisfied() {
    var sides = ['top', 'bottom', 'left', 'right'];
    for (var si = 0; si < sides.length; si++) {
      var side = sides[si];
      for (var i = 0; i < N; i++) {
        var clueVal = clues[side][i];
        if (clueVal === 0) continue;
        var line = getLine(side, i);
        var vis;
        if (side === 'bottom' || side === 'right') {
          vis = countVisible(line.slice().reverse());
        } else {
          vis = countVisible(line);
        }
        if (vis !== clueVal) return false;
      }
    }
    return true;
  }

  // WIN
  function gameWin() {
    gameActive = false;
    stopTimer();
    sndWin();
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#39ff14', 20);

    var solveTime = Math.floor(elapsed);
    var diffName = SIZES[N] || '';
    document.getElementById('endSize').textContent = N + 'x' + N + ' ' + diffName;
    document.getElementById('endTime').textContent = formatTime(solveTime);

    setTimeout(function() {
      showScreen('completeScreen');

      if (typeof Neon !== 'undefined') {
        var nameReady = Neon.getName() ? Promise.resolve() : Neon.promptName();
        nameReady.then(function() {
          return Neon.save(solveTime);
        }).then(function(result) {
          Neon.render(document.getElementById('endLB'));
          if (result.globalRank >= 1 && result.globalRank <= 5) {
            Neon.showGlobalSplash(result.globalRank);
          }
        });
      }
    }, 600);
  }

  // PARTICLES
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = 3 + Math.random() * 5;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = color;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.boxShadow = '0 0 6px ' + color;
      document.body.appendChild(p);

      var angle = Math.random() * Math.PI * 2;
      var speed = 80 + Math.random() * 200;
      var dx = Math.cos(angle) * speed;
      var dy = Math.sin(angle) * speed;

      (function(el, pdx, pdy) {
        var startX = x, startY = y, t = 0;
        var dur = 600 + Math.random() * 600;
        function animate() {
          t += 16;
          var progress = t / dur;
          if (progress >= 1) { el.remove(); return; }
          el.style.left = (startX + pdx * progress) + 'px';
          el.style.top = (startY + pdy * progress - 50 * progress) + 'px';
          el.style.opacity = String(1 - progress);
          requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
      })(p, dx, dy);
    }
  }

  // SHARE
  window.shareResult = function() {
    var diffName = SIZES[N] || '';
    var timeStr = formatTime(Math.floor(elapsed));
    var text = '\u{1f3d9}\ufe0f SKYSCRAPERS\n' +
      N + 'x' + N + ' ' + diffName + ' | ' + timeStr + '\n' +
      'All clues satisfied! \u{1f3d7}\ufe0f\n' +
      'neonarcade.net/neonmind/skyscrapers.html';

    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  };

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      document.getElementById('shareCopied').textContent = 'COPIED TO CLIPBOARD';
      setTimeout(function() { document.getElementById('shareCopied').textContent = ''; }, 2000);
    }).catch(function() {
      document.getElementById('shareCopied').textContent = 'COPY FAILED';
    });
  }

  // KEYBOARD
  document.addEventListener('keydown', function(e) {
    if (!gameActive) return;

    if (e.key >= '1' && e.key <= '9' && parseInt(e.key) <= N) {
      e.preventDefault();
      placeNumber(parseInt(e.key));
      return;
    }

    if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      clearSelectedCell();
      return;
    }

    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      doUndo();
      return;
    }

    var dr = 0, dc = 0;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') dr = -1;
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') dr = 1;
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') dc = -1;
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') dc = 1;

    if (dr !== 0 || dc !== 0) {
      e.preventDefault();
      var nr = selectedRow + dr;
      var nc = selectedCol + dc;
      if (selectedRow < 0) { nr = 0; nc = 0; }
      if (nr >= 0 && nr < N && nc >= 0 && nc < N) {
        selectCell(nr, nc);
      }
    }
  });

  // START GAME
  window.startGame = function() {
    if (audioCtx.state === 'suspended') audioCtx.resume();

    document.getElementById('sizeLabel').textContent = N + 'x' + N + ' ' + SIZES[N];

    var puzzle = generatePuzzle(N);
    solution = puzzle.solution;
    clues = puzzle.clues;

    grid = [];
    for (var r = 0; r < N; r++) grid[r] = new Array(N).fill(0);
    moveHistory = [];
    selectedRow = -1;
    selectedCol = -1;
    gameActive = true;

    showScreen('gameScreen');
    buildGrid();
    startTimer();
  };

  window.newPuzzle = function() {
    startGame();
  };

  // INIT
  initNeon();
})();
</script>
